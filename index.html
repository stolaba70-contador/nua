s del plan; y no aplicará el\npárrafo siguiente si no es relevante."}, {"num": 930, "texto": "Cuando una póliza de seguro no cumple las condiciones para ser aceptable, una\nentidad no la presentará como un activo del plan. Si, y solo si, existe virtual\ncertidumbre que un tercero reembolsará alguno o todos los desembolsos exigidos\npara cancelar una obligación por beneficios definidos, una entidad:\na) reconocerá su derecho al reembolso como un activo separado;\nb) medirá tal activo a su valor razonable;\nc) en todo lo demás, tratará tal activo de la misma manera que al resto de los\nactivos del plan; y\nd) en el estado de resultados, podrá presentar el gasto relacionado con el plan\nde beneficios definidos neto de la cuantía reconocida como reembolsable.\n\nRendimientos de los activos del plan"}, {"num": 931, "texto": "Al determinar el rendimiento de los activos del plan, excluyendo los importes\ncorrespondientes al interés neto sobre el pasivo (activo) de beneficios definidos neto,\nuna entidad deducirá los costos de gestión de los activos del plan y cualquier impuesto\npor pagar por el plan en sí mismo, distinto de los impuestos incluidos en los supuestos\nactuariales utilizados para medir la obligación por beneficios definidos. Otros costos\nde administración no se deducirán del rendimiento de los activos del plan."}, {"num": 932, "texto": "Una entidad reconocerá los rendimientos de los activos del plan a los que se refiere\nel párrafo anterior en resultados diferidos. Una entidad no reclasificará a resultados\nlos saldos acumulados por los resultados diferidos a los que se refiere este párrafo.\n\nReducciones y terminaciones de planes de servicios definidos"}, {"num": 933, "texto": "Cuando tengan lugar reducciones o terminaciones en un plan de beneficios definidos,\nuna entidad reconocerá las pérdidas o ganancias correspondientes, que comprenden\nlo siguiente:\na) cualquier cambio que pudiera resultar en el valor presente de las obligaciones\npor beneficios definidos contraídos por la entidad; y\nb) cualquier variación en el valor razonable de los activos del plan."}, {"num": 934, "texto": "Antes de proceder a la determinación del efecto de la reducción o de la terminación\nen cuestión, una entidad volverá a estimar el importe de la obligación contraída (así\ncomo el valor de los activos del plan, si existiesen) utilizando supuestos actuariales\nactualizados (incluyendo las tasas de interés vigentes y otros precios de mercado\nvigentes)."}, {"num": 935, "texto": "Una reducción tiene lugar cuando la entidad:\na) se ha comprometido incuestionablemente a realizar una reducción significativa\nen el número de empleados cubiertos por el plan; o\nb) ajusta los términos del plan de beneficios definidos de forma tal que un\ncomponente significativo de los servicios futuros a prestar por los empleados\nactuales no va a ser tenido en cuenta para el cómputo de los beneficios en su\n\nmomento, o bien será tenido en cuenta dando lugar a beneficios menores que\nlos actuales."}, {"num": 936, "texto": "La reducción puede producirse como consecuencia de un suceso aislado, como por\nejemplo el cierre de una fábrica, la interrupción de una actividad productiva o la\nterminación o suspensión de un plan de beneficios."}, {"num": 937, "texto": "Un acontecimiento es lo suficientemente significativo para ser considerado como una\nreducción, si el reconocimiento de las pérdidas y ganancias resultantes de tal\nreducción son significativos para los estados contables de la entidad. Con frecuencia\nlas reducciones están relacionadas con una reestructuración, por lo cual la entidad\ntendrá que contabilizarlos al mismo tiempo que procede a registrarla."}, {"num": 938, "texto": "La terminación del plan ocurre cuando la entidad lleva a cabo una operación o\ntransacción que tiene por efecto eliminar la obligación legal o implícita de satisfacer\nla totalidad o una parte de los beneficios otorgados por un plan de beneficios\ndefinidos."}, {"num": 939, "texto": "En algunos casos, una entidad adquiere una póliza de seguro para financiar una parte\no la totalidad de los beneficios de los empleados relacionados con servicios presentes\no anteriores. La adquisición de tal póliza no es una terminación del plan si la entidad\nconserva la obligación, ya sea legal o implícita, de pagar cuando el asegurador no\nllegue a fondear los beneficios.\n\nRevelación en notas"}, {"num": 940, "texto": "En relación con los planes de beneficios definidos, una entidad revelará la siguiente\ninformación en notas a los estados contables:\na) Una descripción general del tipo de plan que se trate (por ejemplo, plan de\nbeneficio post-relación laboral de importe fijo, basado en las últimas\nremuneraciones, plan de beneficios por atención médica, etc.).\nb) Una conciliación de los activos y pasivos reconocidos en el estado de situación\npatrimonial, presentando, como mínimo:\n(i) el valor presente, a la fecha de los estados contables, de las\nobligaciones por beneficios definidos (antes de deducir el valor razonable\nde los activos del plan) identificando a aquellas que están total o\nparcialmente fondeadas y a aquellas que no lo están;\n(ii) el valor razonable, a la fecha de los estados contables, de los activos\ndel plan; y\n(iii) el valor razonable, a la fecha de los estados contables, de cualquier\nderecho de reembolso reconocido como activo.\nc) Los importes de las partidas incluidas dentro del valor razonable de los activos\nen el plan para:\n(i) cada categoría de instrumentos financieros emitidos por la entidad; y\n(ii) cualquier activo que esté siendo utilizado por la entidad.\nd) Una conciliación de los saldos al comienzo y al cierre del período del pasivo\n(activo) neto por beneficios definidos expuestos en el estado de situación\n\npatrimonial la entidad, que incluya una descripción de los movimientos del\nperíodo.\ne) El gasto total reconocido en el estado de resultados y la línea específica del\nestado de resultados en la que se hayan incluido los importes correspondientes\na cada uno de los siguientes conceptos:\n(i) Costos de los servicios del período presente.\n(ii) Interés neto sobre el pasivo (activo) por beneficios definidos neto.\n(iii) Costos por servicios prestados en el pasado.\n(iv) El efecto de cualquier reducción o terminación del plan.\n(v) De corresponder, los efectos de las variaciones en los tipos de cambio de\nla moneda extranjera.\nf) Los principales supuestos actuariales utilizados, con sus valores en términos\nabsolutos, a la fecha de los estados contables, entre los que se incluirán,\nsegún corresponda:\n(i) las tasas de interés;\n(ii) las tasas esperadas de incremento en los salarios (y de los cambios en\nlos índices y otras variables especificadas en los términos formales o\nimplícitos del plan como determinantes de los incrementos futuros de los\nbeneficios);\n(iii) la tendencia de los costos de atención médica, odontológica, legal, y otros;\ny\n(iv) otros supuestos actuariales significativos utilizados."}, {"num": 941, "texto": "Cuando tenga más de un plan de beneficios definidos, una entidad presentará la\ninformación de la manera que se considere más útil para el lector de los estados\ncontables. Por ejemplo, podría presentar la siguiente información:\na) de acuerdo con la localización geográfica de los planes, por ejemplo,\ndistinguiendo entre planes en el país y en el extranjero; o\nb) separando aquellos planes que estén sujetos a riesgos significativamente\ndiferentes, por ejemplo, procediendo a distinguir entre las partidas relativas a\nlos planes de beneficios post-relación laboral de importe fijo, los calculados\nsegún los sueldos finales o los que consistan en beneficios de atención médica,\nodontológica, legal, y otros.\n\nPlanes multi-empleador"}, {"num": 942, "texto": "Un plan multi-empleador es un plan fondeado por dos o más empleadores,\nnormalmente, en función de un convenio colectivo de trabajo. Su característica\nprincipal es que los activos contribuidos por una entidad participante pueden ser\nusados para pagar beneficios a empleados de otro empleador participante, debido a\nque los activos no están segregados en una cuenta individual de cada empleador o\nno están restringidos para pagar beneficios de los empleados de la entidad que los\naportó."}, {"num": 943, "texto": "Una entidad clasificará un plan multi-empleador como un plan de contribuciones\ndefinidas o de beneficios definidos, en función de sus características. En el caso de\nque el plan multi-empleador sea un plan de beneficios definidos, una entidad:\na) contabilizará su parte proporcional de la obligación por beneficios definidos, de\nlos activos del plan y de los costos asociados con el plan, de la misma manera\nque haría en el caso de cualquier otro plan de beneficios definidos; y\nb) revelará en sus estados contables la información descripta en el párrafo 940."}, {"num": 944, "texto": "Cuando no esté disponible información suficiente para aplicar el tratamiento contable\nde los planes de beneficios definidos a un plan de beneficios definidos multi-\nempleador, una entidad:\na) tratará contablemente el plan como si fuera un plan de contribuciones definidas;\nb) revelará la siguiente información:\n(i) el hecho de que el plan multi-empleador es un plan de beneficios\ndefinidos; y\n(ii) las razones por las que no está disponible la información suficiente para\npermitir a la entidad contabilizarlo como un plan de beneficios definidos;\ny\nc) en la medida que exista la posibilidad de que un excedente o déficit en el plan\npueda afectar al importe de las futuras contribuciones, revelar adicionalmente:\n(i) cualquier información respecto a tal excedente o déficit;\n(ii) las bases utilizadas para su determinación; y\n(iii) las implicancias que, en su caso, pudieran tener estos desequilibrios para\nla entidad."}, {"num": 945, "texto": "Los planes multi-empleador son diferentes de los planes administrados\ncolectivamente. Un plan administrado colectivamente es una mera acumulación de\nplanes individuales, combinados para permitir a las entidades participantes agrupar\nsus activos a la hora de realizar inversiones, y así poder obtener mejores rendimientos\nde sus inversiones y reducir los costos de administración, pero los activos\npertenecientes a cada una de las entidades se mantienen segregados para atender\nlos beneficios de sus empleados en particular. Los planes administrados\ncolectivamente no plantean problemas particulares en cuanto a su contabilización,\npuesto que la información para proceder a su tratamiento contable está siempre\ndisponible y porque tales planes no comportan la exposición de ninguna de las\nentidades participantes a los riesgos actuariales asociados con empleados activos o\njubilados del resto de las entidades participantes. Las definiciones ofrecidas en esta\nresolución técnica exigen que las entidades clasifiquen los planes administrados\ncolectivamente como planes de contribuciones definidas o de beneficios definidos, de\nacuerdo con las características de cada uno de ellos.\n\nPlanes gubernamentales"}, {"num": 946, "texto": "Los planes gubernamentales son establecidos por la legislación para cubrir a la\ntotalidad de las entidades (o bien a todos las entidades de una misma clase o\ncategoría, como por ejemplo a los que pertenecen a un sector específico de la\nindustria) y se administran por autoridades nacionales, provinciales o municipales, o\nbien por otros organismos (por ejemplo, una agencia autónoma creada\nespecíficamente para este propósito) que no está sujeto al control o influencia de las\nentidades cuyos empleados son los beneficiarios."}, {"num": 947, "texto": "Una entidad caracterizará los planes gubernamentales como de contribuciones o de\nbeneficios definidos según la naturaleza de las obligaciones de las entidades que\nparticipan en ellos. En la mayoría de los planes gubernamentales, la entidad no tiene\nobligación legal ni implícita de pagar futuras contribuciones, ya que su único\ncompromiso consiste en pagar las contribuciones a medida que se realizan los pagos\na los empleados, de forma que, si la entidad dejara de emplear a beneficiarios del\nplan gubernamental, no tendría obligación de seguir pagando los beneficios\nacumulados (o devengados) por los años de servicio anteriores de sus empleados.\nPor esta razón, los planes gubernamentales se clasifican normalmente como planes\nde contribuciones definidas."}, {"num": 948, "texto": "No obstante, en aquellos casos atípicos en que un plan gubernamental califique como\nun plan de beneficios definidos, una entidad aplicará el tratamiento establecido en\nesta sección [ver los párrafos 885 a 941].\n\nBeneficios asegurados"}, {"num": 949, "texto": "Una entidad puede fondear un plan de beneficios post-relación laboral mediante la\ncontratación de una póliza de seguros. Cuando la póliza de seguros está a nombre\nde uno de los empleados participantes o de un grupo de empleados y la entidad que\nla ha contratado no tiene obligación legal ni implícita de cubrir las pérdidas derivadas\nde la póliza, no existiendo para la entidad ningún compromiso de pagar los beneficios\nde los empleados, puesto que el asegurador es el responsable exclusivo de tales\npagos, una entidad tratará el plan como un plan de contribuciones definidas."}, {"num": 950, "texto": "Cuando tenga la obligación legal o implícita de:\na) pagar a los empleados los beneficios directamente en el momento en que sean\nexigibles; o\nb) pagar cantidades adicionales si el asegurador no pagara todos los beneficios\nrelativos a los servicios prestados por los empleados en el periodo presente y\nen los anteriores; la entidad deberá tratar al plan como si fuera un plan de\nbeneficios definidos. Una entidad:\n(i) contabilizará la póliza de seguro aceptable como un activo del plan; y\n(ii) reconocerá las demás pólizas de seguro como derechos de reembolso.\n\nOtros beneficios a largo plazo a favor de los empleados"}, {"num": 951, "texto": "Los otros beneficios a largo plazo a los empleados incluyen, por ejemplo:\na) las ausencias remuneradas a largo plazo, tales como vacaciones especiales\ntras largos períodos de vida activa o años sabáticos;\nb) los premios por antigüedad u otros beneficios por largo tiempo de servicio;\nc) los beneficios por invalidez permanente;\nd) la participación en ganancias e incentivos pagaderos a partir de los doce meses\ndel cierre del período en el que los empleados han prestado sus servicios\ncorrespondientes; y\ne) los beneficios diferidos que se recibirán a partir de los doce meses del cierre del\nperíodo en el que se han ganado."}, {"num": 952, "texto": "La medición de los otros beneficios a largo plazo a los empleados no está sujeta,\nnormalmente, al mismo grado de incertidumbre que afecta a los beneficios post-\nrelación laboral. Además, la creación de -o los cambios a- este tipo de beneficios a\nlargo plazo raramente resultan en un importe significativo de costo por servicios\nprestados en el pasado. Por tales razones, esta resolución técnica exige la utilización\nde un método simplificado para el registro contable de los otros beneficios a largo\nplazo a los empleados. Este método difiere de la contabilización exigida para los\nbeneficios post-relación laboral en que cualquier efecto por el reconocimiento y la\nmedición del plan se reconoce en resultados.\n\nReconocimiento"}, {"num": 953, "texto": "Una entidad reconocerá un pasivo por otros beneficios a largo plazo a los empleados\npor un importe equivalente a:\na) el valor presente de la obligación por otros beneficios a largo plazo definidos a\nla fecha de los estados contables; menos\nb) el valor razonable, a la fecha de los estados contables, de los activos del\nplan, si los hubiere, con los que se cancelarán directamente las obligaciones.\n\nMedición"}, {"num": 954, "texto": "Al medir el importe del pasivo, una entidad aplicará lo establecido para planes de\nbeneficios definidos."}, {"num": 955, "texto": "Una entidad deberá reconocer el importe neto total de las siguientes cantidades como\ngasto o como ingreso, o como un componente del costo de un activo, según lo\nestablecido en esta Resolución Técnica u otras normas contables:\na) el costo de servicio del período presente;\nb) el costo por intereses;\nc) el rendimiento esperado de los activos del plan y de cualquier derecho de\nreembolso reconocido como un activo;\nd) las pérdidas y ganancias actuariales,\ne) el costo por servicios prestados en el pasado, y\nf) el efecto de reducciones o terminaciones."}, {"num": 956, "texto": "Una variedad posible de otros beneficios a largo plazo a los empleados es el beneficio\npor invalidez permanente. Si el importe del beneficio depende del período de servicio\nactivo, la obligación surgirá cuando se preste el servicio. Una entidad:\na) medirá esta obligación de manera tal que refleje la probabilidad de que el pago\npueda ser exigido, así como el intervalo de tiempo a lo largo del cual se espera\nrealizar los pagos; y\nb) reconocerá el costo de los beneficios cuando se produzca el suceso que cause\nla invalidez permanente.\n\nCAPÍTULO 9\n\nEFECTOS PROCEDENTES DE DETERMINADAS CIRCUNSTANCIAS, TRANSACCIONES O\nCONTRATOS PARTICULARES\n\nINTRODUCCIÓN AL PRESENTE CAPÍTULO"}]}]}, {"id": "cap9", "num": 9, "nombre": "Contratos Particulares", "icono": "🤝", "secciones": [{"id": "c9s1", "nombre": "Combinaciones de Negocios", "parrafos": [{"num": 958, "texto": "El objetivo de esta sección es establecer las reglas de reconocimiento, medición, e\ninformación a revelar en notas, en los estados contables de una adquirente, con\nrelación las combinaciones de negocios, considerando el alcance establecido en los\npárrafos 960 y 961.\n\nDefiniciones"}, {"num": 959, "texto": "A los fines del tratamiento de las combinaciones de negocios, una entidad deberá\nconsiderar las siguientes definiciones:\nAdquirente: Entidad que obtiene el control de la adquirida.\nAdquirida: Negocio o negocios cuyo control obtiene la adquirente en una\ncombinación de negocios.\nCombinación de negocios: Transacción u otro suceso en el que una adquirente\nobtiene el control de uno o más negocios.\nUna combinación de negocios puede estructurarse de diferentes formas, en\nfunción de razones legales, fiscales u otras consideraciones relevantes. Puede\nimplicar, por ejemplo:\na) la compra de los activos netos de otra entidad que sea un negocio;\nb) la compra de los títulos representativos del capital de otra entidad, que no\npierde su individualidad jurídica, tomando su control, siempre que tal entidad\nsea un negocio;\nc) la constitución de una nueva entidad, que tome el control sobre los negocios\ncombinados.\nCombinación de negocios bajo control común: Combinación de negocios en la\nque todos negocios que se combinan están controlados, en última instancia, por\n\nuna misma parte o partes, tanto antes como después de la combinación de\nnegocios y ese control no es transitorio.\nFecha de adquisición: Fecha en la que la adquirente obtiene el control sobre la\nadquirida.\nNegocio: Conjunto integrado de actividades y activos susceptibles de ser dirigidos\ny gestionados con el propósito de proporcionar bienes o servicios a los clientes,\nque genera ingresos de actividades ordinarias o por inversiones (tales como\ndividendos o intereses). No toda entidad es un negocio; por ejemplo, una entidad\npodría incluir solo créditos procedentes de pérdidas fiscales acumuladas.\nPeríodo de la combinación: Ejercicio durante el cual se produce la combinación\nde negocios.\nPeríodo de medición: Plazo de doce meses contado desde la fecha de\nadquisición, durante el cual la adquirente realizará, de corresponder, ajustes\nposteriores al reconocimiento inicial relacionados con la combinación de\nnegocios.\n\nAlcance"}, {"num": 960, "texto": "Una entidad aplicará esta sección para contabilizar una combinación de negocios,\ndistinta de la referida en el inciso b) del párrafo siguiente."}, {"num": 961, "texto": "Una entidad no aplicará esta sección para contabilizar:\na) La adquisición de un activo o grupos de activos que no constituyen un negocio.\nb) Una combinación de negocios bajo control común.\n\nMétodo de contabilización"}, {"num": 962, "texto": "Una adquirente contabilizará cada combinación de negocios dentro del alcance de\nesta sección mediante la aplicación del método de la adquisición."}, {"num": 963, "texto": "Para aplicar el método de la adquisición, una entidad realizará las siguientes tareas:\na) identificación de la adquirente;\nb) determinación de la fecha de adquisición;\nc) medición del costo de la combinación de negocios;\nd) reconocimiento, clasificación y medición de los activos identificables\nadquiridos, de los pasivos asumidos y de cualquier participación no\ncontroladora en la adquirida; y\ne) reconocimiento y medición de la llave de negocio o de una ganancia por una\ncompra en términos muy ventajosos.\n\nIdentificación de la adquirente"}, {"num": 964, "texto": "Una entidad identificará a la adquirente de acuerdo con las disposiciones de la\nsección “Definición de control (sobre otra entidad)” [ver los párrafos 770 y 771] y de\nla sección “Aplicación de la definición de control” [ver los párrafos 772 a 783]."}, {"num": 965, "texto": "Cuando, de acuerdo con lo establecido en el párrafo anterior, una entidad no pueda\nidentificar con claridad a la adquirente, considerará que la adquirente generalmente\nes:\na) La entidad cuyo tamaño relativo (medido en función de los activos, beneficios,\nvalor razonable o ingresos de actividades ordinarias) es mayor que el de\nlas demás entidades.\nb) En el caso de combinaciones de negocios que se efectúan mediante la entrega\nde efectivo, la transferencia de otros activos o la asunción de pasivos: la\nentidad que:\n(i) entrega el efectivo;\n(ii) transfiere otros activos; o\n(iii) asume pasivos.\nc) En el caso de combinaciones de negocios que se efectúan mediante el\nintercambio de instrumentos de patrimonio, la entidad:\n(i) que emite tales instrumentos;\n(ii) cuyos propietarios tienen la capacidad de elegir, designar o cesar a los\nmiembros del órgano de administración de la entidad combinada;\n(iii) cuya dirección (anterior a la combinación) domina a la dirección de la\nentidad combinada;\n(iv) que paga una prima sobre el valor razonable de las participaciones en el\npatrimonio neto de las otras entidades (anterior a la combinación); o\n(v) cuyos propietarios tienen mayor participación minoritaria en el voto, si el\nresto de los propietarios no tiene una participación significativa en el\nderecho a voto.\n\nDeterminación de la fecha de adquisición"}, {"num": 966, "texto": "Una adquirente identificará la fecha de adquisición, que es aquella en la que obtiene\ncontrol de los activos menos los pasivos (activos netos) y de las operaciones de la\nadquirida."}, {"num": 967, "texto": "La fecha en la cual la adquirente obtiene el control de la adquirida es generalmente\naquélla en la que la adquirente transfiere legalmente la contraprestación, adquiere los\nactivos y asume los pasivos de la adquirida (también conocida como “fecha de\ncierre”). Sin embargo, la adquirente puede obtener el control en una fecha anterior o\nposterior a la fecha de cierre. Por ejemplo, la fecha de adquisición precederá a la\nfecha de cierre si un acuerdo escrito prevé que la adquirente obtenga el control de la\nadquirida en una fecha anterior a la fecha de cierre. Una adquirente considerará todos\nlos hechos y circunstancias pertinentes.\n\nMedición del costo de la combinación de negocios"}, {"num": 968, "texto": "Para determinar el costo de la combinación de negocios, una adquirente computará\nlos siguientes conceptos:\na) Cualquier activo entregado, a su valor razonable.\nb) Cualquier pasivo asumido, a su valor descontado.\nc) Las acciones que emita:\n(i) Al valor calculado en función a la participación que dichas acciones\notorguen en el neto de las mediciones asignadas a los activos y pasivos\nde la adquirida en la fecha de adquisición, si es pequeña o mediana.\n(ii) A su valor razonable, en los restantes casos.\nd) Los ajustes al precio de adquisición que dependan de la concreción de uno o\nmás hechos futuros, por su valor razonable, excepto que se trate de una\nentidad pequeña o mediana; y\ne) El importe de los activos y pagos monetarios que la adquirente deba entregar o\nefectuar por costos directos relacionados con la adquisición (por ejemplo,\nhonorarios profesionales)."}, {"num": 969, "texto": "Tal como surge del inciso a) del párrafo anterior, el costo de la combinación de\nnegocios puede incluir activos distintos al efectivo que tengan un importe en libros\nque difiera de sus valores razonables en la fecha de adquisición (por ejemplo,\nactivos no monetarios). Si así fuera, una adquirente medirá nuevamente los activos\ntransferidos a sus valores razonables en la fecha de adquisición y reconocerá las\nganancias o pérdidas resultantes, si las hubiera, en resultados. Sin embargo, algunas\nveces los activos transferidos permanecen en la entidad combinada tras la\ncombinación de negocios (por ejemplo, porque los activos se transfirieron a la\nadquirida y no a sus anteriores propietarios), y la adquirente, por lo tanto, retiene el\ncontrol sobre ellos. En esa situación, una adquirente medirá esos activos por sus\nimportes en libros inmediatamente antes de la fecha de adquisición y no reconocerá\nninguna ganancia o pérdida en resultados sobre activos que controla tanto antes\ncomo después de la combinación de negocios."}, {"num": 970, "texto": "Son costos relacionados con la combinación de negocios aquellos en que incurre la\nadquirente para llevar a cabo una combinación de negocios. Estos costos incluyen\nlos honorarios de búsqueda; asesoramiento, jurídicos, contables, de valoración y\notros honorarios profesionales o de consultoría; costos generales de administración,\nincluyendo los de mantener un departamento interno de adquisiciones; y costos de\nregistro y emisión de títulos de deuda y de patrimonio. Una adquirente contabilizará\nlos costos relacionados con la adquisición como parte del costo de la combinación de\nnegocios, a excepción de los costos de emisión de deuda o títulos de patrimonio, que\nse reconocerán de acuerdo con los requerimientos de la presente Resolución Técnica\nu otras normas contables, según corresponda.\n\nReconocimiento, clasificación y medición de los activos identificables adquiridos, los\npasivos asumidos y de cualquier participación no controladora adquirida"}, {"num": 971, "texto": "A efectos de reconocer, clasificar y medir los activos identificables adquiridos, los\npasivos asumidos y de cualquier participación no controladora adquirida, una entidad\naplicará:\na) Los principios generales, establecidos en los párrafos 972 a 975.\nb) Los requerimientos de aplicación particular, establecidos en el párrafo 976.\n\nPrincipio general de reconocimiento"}, {"num": 972, "texto": "A la fecha de la adquisición, la adquirente reconocerá por separado de la llave de\nnegocio, los activos identificables adquiridos, los pasivos asumidos y cualquier\nparticipación no controladora en la adquirida."}, {"num": 973, "texto": "Para dar cumplimiento a lo requerido en el párrafo anterior, una adquirente\nreconocerá los activos identificables adquiridos y los pasivos asumidos,\nprocedentes de la adquirida, siempre que, a la fecha de adquisición:\na) cumplan las definiciones establecidas en los párrafos 22 o 23, según\ncorresponda; y\nb) sean parte de lo que la adquirente y la adquirida (o sus anteriores propietarios)\nintercambiaron en la transacción de la combinación de negocios y no el\nresultado de transacciones separadas.\n\nPrincipio general de clasificación o designación"}, {"num": 974, "texto": "A la fecha de la adquisición, una adquirente:\na) clasificará o designará los activos identificables adquiridos y los pasivos\nasumidos según sea necesario para la aplicación posterior de esta Resolución\nTécnica u otras normas contables; y\nb) efectuará esas clasificaciones o designaciones sobre la base de los acuerdos\ncontractuales, de las condiciones económicas, de sus políticas contables o de\noperación y de otras condiciones pertinentes tal como existan en la fecha de la\nadquisición.\n\nPrincipio general de medición"}, {"num": 975, "texto": "Una adquirente medirá los activos identificables adquiridos y los pasivos asumidos\nde una adquirida a sus valores razonables en la fecha de adquisición.\n\nCuestiones de aplicación en particular"}, {"num": 976, "texto": "A la fecha de la adquisición, una adquirente:\na) Reconocerá:\n(i) Los activos intangibles por separado de la llave de negocio siempre que\nsus valores razonables satisfagan el requisito de confiabilidad\n(credibilidad) y puedan ser estimados sin un costo o esfuerzo\ndesproporcionado, de conformidad con lo establecido en el párrafo 83,\nincluso si no hubieran sido objeto de reconocimiento previo en los libros\nde la adquirida (por ejemplo, por tratarse de un nombre comercial, una\nmarca, una patente o una relación con un cliente que la adquirente\ndesarrolló internamente y contabilizó como gasto).\n(ii) Los pasivos contingentes, sin importar su probabilidad de ocurrencia.\nb) Medirá:\n(i) Los pasivos por obligaciones con los empleados, distintos de los\nreferidos en el inciso (ii) siguiente, a su valor nominal.\n(ii) los saldos procedentes de beneficios a los empleados posteriores a la\nterminación de la relación laboral y otros beneficios a largo plazo, de\nacuerdo con lo establecido en la sección “Beneficios a los empleados\nposteriores a la terminación de la relación laboral y otros beneficios a\nlargo plazo” [ver los párrafos 872 a 956].\n(iii) Los pasivos originados en arrendamientos financieros, por el importe en\nlibros que tengan en la contabilidad de la adquirida a la fecha de\nadquisición.\nc) Reconocerá y medirá:\n(i) Los activos y pasivos relacionados con el impuesto a las ganancias, de\nacuerdo con lo establecido en la sección “Contabilización del Impuesto a\nlas Ganancias” [ver los párrafos 571 a 600].\n(ii) Cualquier activo no corriente adquirido (o un grupo de activos para su\ndisposición) que se clasifique como mantenido para la venta a la fecha\nde la adquisición, de acuerdo con lo establecido en la sección “Activos\nno corrientes mantenidos para la venta” [ver los párrafos 416 a 434] a su\nvalor neto de realización.\n\nMedición de la participación no controladora"}, {"num": 977, "texto": "Una adquirente medirá cualquier participación no controladora en la adquirida en\nfunción a la proporción que le corresponda en el neto de las medidas asignadas a los\nactivos identificables adquiridos y los pasivos asumidos de la adquirida, a la fecha\nde adquisición.\n\nReconocimiento y medición de la llave de negocio o de una ganancia por una compra en\ntérminos ventajosos"}, {"num": 978, "texto": "Una adquirente reconocerá una llave de negocios, en la fecha de la adquisición,\nmedida como el exceso del inciso (a) sobre el (b) siguientes:\na) La suma de:\n(i) el costo de la combinación de negocios, medido de acuerdo con lo\nestablecido en los párrafos 968 a 970;\n(ii) el importe de cualquier participación no controladora en la adquirida\nmedida de acuerdo con el párrafo 977; y\n(iii) el valor razonable en la fecha de adquisición de la participación\nanteriormente tenida por el adquirente en el patrimonio neto de la\nadquirida, en el caso de una combinación de negocios llevada a cabo por\netapas, según lo establecido en el párrafo 981.\nb) El neto de los importes en la fecha de la adquisición de los activos\nidentificables adquiridos y de los pasivos asumidos de la adquirida,\nreconocidos y medidos de acuerdo con los requerimientos de la presente\nsección."}, {"num": 979, "texto": "Cuando la aplicación del párrafo anterior dé por resultado que el inciso (a) es inferior\nal inciso (b), una adquirente:\na) identificará y medirá nuevamente los activos y pasivos de la adquirida;\nb) volverá a medir el costo de la combinación; y\nc) reconocerá inmediatamente en el resultado del período cualquier diferencia que\nresulte de la nueva evaluación.\n\nPeríodo de medición (ajustes posteriores al reconocimiento inicial)"}, {"num": 980, "texto": "Si la contabilización inicial de una combinación de negocios está incompleta al final\ndel período en que la combinación ocurre, una adquirente:\na) A la fecha de los estados contables, reconocerá los importes provisionales de\nlas partidas cuya contabilización está incompleta.\nb) En el período de medición:\n(i) ajustará los importes provisionales referidos en el inciso anterior para\nreflejar la nueva información obtenida sobre hechos y circunstancias que\nexistían a la fecha de la adquisición y que, si los hubiese conocido,\nhabrían afectado la medición de los importes reconocidos en esa fecha;\n(ii) reconocerá activos y pasivos adicionales si obtiene nueva información\nsobre hechos y circunstancias que existían a la fecha de la adquisición y\nque, si los hubiese conocido, habrían resultado en el reconocimiento de\nesos activos y pasivos a esa fecha; y\n(iii) corregirá, como consecuencia de las tareas especificadas en los incisos\nanteriores, la medición contable asignada inicialmente a la llave de\nnegocio o a la ganancia por una compra en términos muy ventajosos,\nsegún corresponda.\nc) Con posterioridad al período de medición, reconocerá, si correspondiera,\najustes a la contabilización inicial de una combinación de negocios únicamente\npara corregir errores u omisiones de períodos anteriores de acuerdo con el\npárrafo 92.\n\nCombinación de negocios realizada por etapas"}, {"num": 981, "texto": "Cuando obtenga el control de una adquirida en la que tenía una participación en el\npatrimonio neto antes de la fecha de la adquisición, una adquirente:\na) medirá nuevamente su participación anterior por su valor razonable en la fecha\nde adquisición; y\nb) reconocerá la ganancia o pérdida resultante, si la hubiera, en el resultado del\nperíodo.\n\nMedición posterior de la llave de negocio\n\nTratamiento general"}, {"num": 982, "texto": "Después del reconocimiento inicial, una adquirente medirá la llave de negocio:\na) a su costo original menos amortizaciones y desvalorizaciones acumuladas, si\nle asignó una vida útil definida; o\nb) a su costo original menos desvalorizaciones acumuladas, en el caso contrario."}, {"num": 983, "texto": "Una adquirente revisará tanto la medición inicial como la amortización acumulada de\nla llave de negocio si, con posterioridad a la fecha de adquisición, ajusta:\na) el costo de la combinación; o\nb) las mediciones iniciales de los activos identificables adquiridos o los pasivos\nasumidos, de acuerdo con los requerimientos de la presente sección."}, {"num": 984, "texto": "Si la llave de negocio de negocio tiene vida útil indefinida, una adquirente:\na) evaluará anualmente si los hechos y circunstancias justifican mantener esa\nasignación de vida útil;\nb) revelará las causas que justifican la asignación de una vida útil indefinida; y\nc) comparará anualmente su medición contable con el respectivo valor\nrecuperable, de acuerdo con lo establecido en la sección “Comparación de la\nmedición de ciertos activos con su valor recuperable” [ver los párrafos 145 a\n175]."}, {"num": 985, "texto": "Si de la consideración de los hechos y circunstancias referidos en el párrafo anterior,\nuna adquirente llega a la conclusión de que debe asignarle a la llave de negocio una\nvida útil definida, aplicará las disposiciones sobre un cambio en la estimación contable\ndebido a la obtención de nuevos elementos de juicio, de acuerdo con lo establecido\nen esta Resolución Técnica.\n\nAmortizaciones"}, {"num": 986, "texto": "Una adquirente calculará la amortización de la llave de negocio:\na) Sobre una base sistemática a lo largo de su vida útil, la que debería representar\nla mejor estimación del período durante el cual se espera recibir beneficios\neconómicos provenientes de la llave.\nb) Con el método de la línea recta, excepto que existan evidencias de la existencia\nde otro método que es más adecuado a las circunstancias."}, {"num": 987, "texto": "Para la estimación de la vida útil, una adquirente considerará, entre otros factores:\na) la naturaleza y vida previsible del negocio adquirido;\nb) la estabilidad y vida previsible del correspondiente ramo de la industria;\nc) la información pública sobre las características de la llave en negocios o\nindustrias similares y sobre los ciclos de vida de negocios similares;\nd) los efectos que sobre el negocio adquirido tengan la obsolescencia de\nproductos, los cambios en la demanda y otros factores económicos;\ne) las expectativas que puedan existir acerca del manejo eficiente del negocio por\nparte de un grupo gerencial distinto al actual;\nf) la factibilidad de mantener el nivel de desembolsos necesario para la obtención\nde los futuros beneficios económicos por parte del negocio adquirido;\ng) las acciones esperadas por parte de competidores actuales o potenciales; y\nh) el período de control sobre el negocio adquirido y las disposiciones legales o\ncontractuales que afecten su vida útil.\n\nRevelación en notas"}, {"num": 988, "texto": "En los períodos en que se produzcan combinaciones de negocios, una adquirente\ninformará:\na) el nombre y la descripción de cualquier negocio adquirido;\nb) la fecha de la adquisición;\nc) cualquier operación que, con motivo de la combinación, decidió descontinuar;\nd) en su caso, el porcentaje de acciones con voto adquirido;\ne) los conceptos incluidos para determinar el costo de la combinación de negocios\ny sus posibles ajustes;\nf) los activos identificables adquiridos y los pasivos asumidos de la adquirida que\nfueron objeto de reconocimiento en la fecha de la adquisición, junto con sus\ncorrespondientes importes;\ng) el importe de cualquier ganancia por compra en términos ventajosos,\nreconocida de acuerdo con lo establecido en el párrafo 979;\nh) una descripción cualitativa de los factores generadores de la llave de negocio\nreconocida, como sinergias esperadas de la combinación de negocios o activos\nintangibles no reconocidos;\ni) la vida útil de la llave de negocio (junto con los factores considerados al\ndeterminarla) y la reconciliación del importe en libros al inicio y al cierre, y la\nlínea del estado de resultados donde se imputó la amortización de este activo;\ny\nj) si la amortización de la llave de negocio se computó por un método distinto al de\nla línea recta, la base utilizada y las razones por las cuales se consideró más\nadecuado tal tratamiento."}, {"num": 989, "texto": "Una adquirente suministrará la información referida en el párrafo anterior respecto de\nlas combinaciones de negocios efectuadas después de la fecha de los estados\ncontables, pero antes de su emisión. Si esto le resultara imposible, una entidad\nrevelará tal imposibilidad en notas a los estados contables.\n\nINSTRUMENTOS DERIVADOS Y OPERACIONES DE COBERTURA\n\nObjetivo"}, {"num": 990, "texto": "El objetivo de la presente sección es prescribir las normas específicas de\nreconocimiento, medición y presentación correspondiente a instrumentos derivados y\noperaciones de cobertura.\n\nAclaración (texto no integrante de la presente Resolución Técnica)\n\n¿Qué son los instrumentos derivados?\n\nLos instrumentos derivados son contratos que tienen las siguientes características:\na) Su valor cambia en respuesta a los cambios en otra variable. Si esta variable no fuera\nfinanciera no debe ser específica para una de las partes del contrato (a veces se denomina\n“subyacente” a esta variable).\nb) No requiere una inversión inicial neta o solo obliga a realizar una inversión inferior a la que\nse requeriría para otros tipos de contratos, en los que se podría esperar una respuesta\nsimilar ante cambios en las condiciones de mercado.\nc) Se liquidan en una fecha futura.\n\nLos instrumentos derivados pueden agruparse en:\na) contratos a término;\nb) contratos de futuro;\nc) contratos de opciones; o\nd) contratos de canje o permuta.\n\nGeneralmente, los instrumentos derivados se suelen clasificar:\na) En función al tipo de variable de variable subyacente, como:\n(i) Instrumentos derivados financieros: son aquellos cuya variable subyacente es un\nactivo financiero (por ejemplo, una moneda, un instrumento de patrimonio, un\ninstrumento de deuda); u otras variables que dependen de activos financieros (por\nejemplo, un tipo de cambio, una tasa de interés, o un índice que refleja la evolución\ndel precio de una acción u otros activos con cotización pública).\n(ii) Instrumentos derivados no financieros: son aquellos cuya variable subyacente es\nuna partida no financiera (por ejemplo, una materia prima cotizada).\nb) En función a los agentes que intervienen, como:\n(i) Instrumentos derivados extrabursátiles (OTC): son los celebrados entre particulares\n(es decir, sin un mercado institucional); por ejemplo, un forward para comprar cierta\nmateria prima entre un productor agropecuario y una empresa industrial, o una\npermuta de tasa de interés entre dos bancos.\n(ii) Instrumentos derivados bursátiles (ETC): son objeto de compraventa en mercados\ninstitucionales de derivados.\n\nUn instrumento derivado no financiero podría celebrarse con la intención de:\na) obtener/entregar el activo subyacente; o\nb) cobrar/pagar las diferencias entre el precio de cotización de la partida no financiera\nsubyacente a la fecha de liquidación del contrato y el precio acordado.\n\nCuando un instrumento derivado no financiero se celebra con la intención de obtener/entregar\nel subyacente; se trata, en esencia, de un contrato para la compra o venta tal partida. Por lo\ntanto, dicho instrumento no se contabilizará según las disposiciones establecidas en esta\n\nAclaración (texto no integrante de la presente Resolución Técnica)\n\nsección; excepto que deba reconocerse un derivado implícito, si corresponde su separación,\no que ese instrumento sea designado como partida cubierta en una relación de cobertura.\nEjemplo de lo indicado en el párrafo anterior: un contrato de forward celebrado entre\nfabricante de harina y un productor agropecuario para intercambiar, en una fecha\nfutura establecida, una cantidad determinada de trigo a un precio fijo definido\ncontractualmente, y que se liquidará con la entrega del trigo y el pago de la suma\nacordada. Ese instrumento derivado no financiero es, en esencia, un contrato para\ncomprar la materia prima (el trigo).\nEn cambio, cuando un instrumento derivado no financiero se celebra con la intención de cobrar\n/ pagar las diferencias entre el precio de la partida no financiera subyacente en la fecha de\nliquidación del contrato y el precio fijo contractualmente definido, funciona igual que los\ninstrumentos derivados financieros; por lo tanto, son contratos cuyo tratamiento se rige por lo\nestablecido en esta sección.\n\nEjemplo continuador del anterior: Con posterioridad a haber celebrado el contrato de\nforward, el productor espera que el precio de mercado del trigo, a la fecha de\nliquidación del forward, sea superior precio pactado. Por ello, compra un futuro para\nvender una cantidad de trigo similar a la del forward. En el mercado donde el productor\ncompró el futuro para vender trigo los instrumentos derivados no financieros se\nliquidan por la diferencia entre el precio contractual y el precio de mercado de la partida\nno financiera a la fecha de liquidación. El productor celebra ese contrato para eliminar\nel riesgo de que el precio de venta pactado con el fabricante resulte inferior al precio\nde mercado del trigo en la fecha de entrega. El contrato bursátil para vender trigo a\nfuturo, en esencia, funciona igual que un instrumento derivado financiero.\n\n¿Para qué se usan los derivados?\n\nSe reconocen dos fines por los cuales las entidades celebran este tipo de contratos:\na) Cobertura de un riesgo.\nb) Otros fines (en cuyo caso se suele hablar de “derivados especulativos”).\n\nAlcance"}, {"num": 991, "texto": "Una entidad aplicará las disposiciones de esta sección a las partidas que cumplan las\ndefiniciones establecidas en el párrafo 993, excepto que se trate de:\na) Contratos de garantía financiera que obligan efectuar determinados pagos si el\ndeudor no paga al vencimiento.\nb) Derechos y obligaciones procedentes de contratos de seguros que cubren\nriesgos distintos de cambios en variables financieras (excepto los derivados\nincorporados a tales contratos).\nc) Contratos de compras o ventas de partidas no financieras que:\n(i) se refieran a cantidades con expectativa de ser utilizadas o vendidas en el\ngiro normal del negocio durante un período razonable de tiempo;\n(ii) fueron señalados desde el principio para tal propósito; y\n(iii) se espera cancelar con la entrega de las partidas no financieras\ncorrespondientes.\nd) Contratos que establecen contrapartidas de carácter contingente en una\ncombinación de negocios para la entidad adquirente."}, {"num": 992, "texto": "Sin perjuicio de lo establecido en el inciso c) del párrafo anterior, una entidad aplicará\nesta sección para contabilizar:\na) Un derivado implícito en un contrato combinado que sea un contrato para\ncomprar o vender una partida no financiera que tenga las características\nestablecidas en el c) del párrafo anterior, en la medida que corresponda su\nseparación.\nb) Tales contratos, cuando son designados como partidas cubiertas en una\nrelación de cobertura.\n\nDefiniciones"}, {"num": 993, "texto": "A los fines del tratamiento de los temas abordados en esta sección, una entidad\ndeberá considerar las siguientes definiciones.\nDefiniciones generales:\nDerivado implícito: Componente de un contrato combinado, que incluye un\ncontrato principal que no es un derivado, cuyo efecto es que todos o algunos\nde los flujos de efectivo del contrato combinado varíen en forma similar a los\nde un derivado considerado independientemente. El siguiente es un listado\nno exhaustivo de ejemplos de contratos combinados que incluyen un derivado\nimplícito:\na) un instrumento de deuda que paga un rendimiento basado en una tasa\nde interés de referencia más los cambios en el precio de otro\ninstrumento financiero;\nb) un contrato para arrendar maquinaria agrícola cuyos pagos se basan\nen el precio de una materia prima cotizada;\nc) un contrato para prestar un servicio en el país, cuyo precio se establece\nen una moneda extranjera.\nInstrumento derivado: Contrato que tiene las tres características siguientes:\na) Su valor cambia en respuesta a los cambios en una variable (por\nejemplo, una tasa de interés especificada; el precio de un instrumento\nfinanciero; el precio de una materia prima cotizada; una tasa de cambio\nde la moneda extranjera; un índice de precios o de tasas de interés;\nuna calificación o índice de carácter crediticio). Si esta variable no fuera\nfinanciera no debe ser específica para una de las partes del contrato (se\ndenomina “subyacente” a esta variable).\nb) No requiere una inversión inicial neta o solo obliga a realizar una\ninversión inferior a la que se requeriría para otros tipos de contratos, en\nlos que se podría esperar una respuesta similar ante cambios en las\ncondiciones de mercado.\nc) Se liquidará en una fecha futura.\n\nVariable subyacente: Tasa de interés, precio de una materia prima cotizada,\ntipo de cambio de una moneda extranjera, índice de precios, calificación o\níndice de carácter crediticio o cualquier otra variable que, en el caso de no ser\nfinanciera, no debe ser específica para una de las partes del contrato.\n\nDefiniciones relacionadas con el uso de contabilidad de coberturas:\n\nCompromisos en firme no reconocidos contablemente: Acuerdo irrevocable\npara intercambiar una cantidad especificada de recurso a un precio\ndeterminado, en una fecha o fechas futuras prefijadas.\nEficacia de la cobertura: Grado en que los cambios en el valor razonable o\nen los flujos de efectivo de la partida cubierta, directamente atribuibles al\nriesgo cubierto, se compensan con los cambios en el valor razonable o los\nflujos de efectivo del instrumento de cobertura.\nIneficacia de cobertura (o parte ineficaz de la cobertura): Medida en que los\ncambios en el valor razonable o en los flujos de efectivo del instrumento de\ncobertura son mayores o menores que los de la partida cubierta.\n\nInstrumento de cobertura: Derivado que se mide a valor razonable (con\nciertas excepciones) u otro activo financiero o pasivo financiero que se\nmide a valor razonable con contrapartidas en resultados, que ha sido\ndesignado con este propósito y del que se espera que los cambios en su\nvalor razonable o en los flujos de efectivo generados cubran las diferencias\nen el valor razonable o en los flujos de efectivo, respectivamente, que\nprocedan de la partida cubierta.\nOperación de cobertura: Uno o más instrumentos derivados, designados\ncomo instrumentos de cobertura, de forma que el cambio en su valor\nrazonable compense total o parcialmente el cambio en el valor razonable o\nen los flujos de efectivo de la partida cubierta.\nPartida cubierta: Activo, pasivo, compromiso en firme, transacción esperada\nen el futuro (altamente probable), o entidad del exterior que expone a la\nentidad a un riesgo de cambio en el valor razonable o en los flujos de efectivo\nfuturos y que, para los propósitos de la cobertura contable, fueron designados\nexplícitamente como objeto de cobertura.\nRazón de cobertura: Relación entre la cantidad de un instrumento de\ncobertura y la cantidad de una partida cubierta, en términos de su\nponderación relativa.\n\nRequilibrio de la cobertura: Ajustes realizados en las cantidades designadas\nde la partida cubierta o del instrumento de cobertura de una relación de\ncobertura ya existente a efectos de mantener una razón de cobertura que\ncumpla con los requerimientos de la eficacia de la cobertura.\n\nRiesgo crediticio: Riesgo de que una de las partes de un instrumento\nfinanciero cause una pérdida financiera a la otra parte por incumplir su\nobligación.\n\nRiesgo a los cambios en el valor razonable: Exposición a los cambios en el\ntotal (o una porción identificada) del valor razonable de activos o pasivos\nreconocidos en los estados contables, o de un compromiso en firme no\nreconocidos contablemente, atribuible a un riesgo en particular y que pueda\nafectar el resultado.\nRiesgo de flujos de efectivo: Exposición a la variabilidad de los flujos de\nefectivo que se atribuye a un riesgo particular relacionado con activos y\npasivos reconocidos, transacciones esperadas en el futuro (altamente\nprobables) o compromisos firmes no reconocidos contablemente (siempre\nque no se traten como una exposición a los cambios en el valor razonable),\ny que afectan a los resultados.\n\nRiesgo en una inversión neta en una entidad del extranjero: Exposición al\ncambio en los flujos de efectivo correspondiente a la porción que corresponde\na la entidad en el patrimonio neto de una entidad del exterior.\nTransacción esperada en el futuro: Transacción prevista cuya ocurrencia es\naltamente probable (ejemplo: una compra o venta conocida por adelantado).\n\nContabilidad de coberturas\n\nDistinción entre una “operación de cobertura” y aplicar “contabilidad de coberturas”"}, {"num": 994, "texto": "Una entidad que realiza una operación de cobertura podrá aplicar la política contable\nestablecida en los párrafos 995 a 1012. Mientras que la operación de cobertura es\nuna decisión de gestión, la aplicación de los requerimientos establecidos en los\npárrafos 995 a 1012 consiste en una política contable seleccionada por la dirección\nde la entidad Una entidad optará por aplicar los requerimientos de contabilidad de\ncobertura establecidos en los párrafos 995 a 1012 para cada operación de cobertura.\n\nObjetivo y condiciones para aplicar contabilidad de coberturas"}, {"num": 995, "texto": "El objetivo de la contabilidad de coberturas es representar, en los estados contables,\nel efecto de las operaciones de cobertura de una entidad que utiliza instrumentos\nderivados u otros instrumentos financieros para gestionar las exposiciones que surgen\npor riesgos concretos que podrían afectar a los resultados o a los resultados\ndiferidos. Este enfoque pretende representar el contexto de los instrumentos de\ncobertura para los cuales se aplica la contabilidad de coberturas, a fin de permitir\nconocer mejor sus propósitos y efectos."}, {"num": 996, "texto": "Una entidad podrá aplicar la contabilidad de cobertura solo si se cumplen todos los\nrequisitos siguientes:\na) La relación de cobertura:\n(i) Consiste en alguno de los tipos de relaciones de coberturas previsto en\nel párrafo 997.\n(ii) Consta solo de:"}, {"num": 997, "texto": "Existen tres tipos de relaciones de cobertura:\na) Cobertura del valor razonable: Cobertura de la exposición a los cambios en el\nvalor razonable de las siguientes partidas, siempre que pueda atribuirse a un\nriesgo concreto y tenga la capacidad de afectar al resultado del periodo:\n(i) activos o pasivos reconocidos;\n(ii) compromisos en firme no reconocidos, o\n(iii) un componente de las partidas indicadas en (i) o (ii).\nb) Cobertura de flujos de efectivo: Cobertura de la exposición a la variación de los\nflujos de efectivo que se atribuye a un riesgo concreto, y que puede afectar al\nresultado del periodo, asociado con:\n(i) un activo o pasivo reconocido o un componente de éstos (tal como la\ntotalidad o algunos de los pagos futuros de interés de una deuda a interés\nvariable); o\n(ii) a una transacción esperada en el futuro (altamente probable).\nc) Cobertura de la inversión neta en una entidad del extranjero.\n\nInstrumentos de cobertura y partidas cubiertas"}, {"num": 998, "texto": "Un instrumento de cobertura cumplirá las condiciones a) y b) siguientes:\na) Debe ser:\n(i) un derivado que se mide a valor razonable, excepto ciertas opciones\nemitidas referidas en el párrafo siguiente; o\n(ii) un activo financiero o pasivo financiero no derivados que se midan a\nvalor razonable con cambios en resultados.\nb) Debe involucrar a una parte externa de la entidad."}, {"num": 999, "texto": "Una opción emitida no cumple con los requisitos de instrumento de cobertura a menos\nque se designe para compensar una opción comprada, incluyendo una opción que\nesté implícita en otro instrumento financiero (por ejemplo, una opción de compra\nemitida utilizada para cubrir un pasivo rescatable)"}, {"num": 1000, "texto": "Además, una entidad podrá designar como instrumento de cobertura:\na) Una proporción de un instrumento que cumpla las condiciones establecidas en\nlos dos párrafos inmediatos anteriores.\nb) Una combinación de:\n(i) instrumentos derivados que cumplan las condiciones establecidas en los\ndos párrafos inmediatos anteriores, o una proporción de éstos; y\n(ii) otro activo financiero o pasivo financiero no derivados que cumplan las\ncondiciones establecidas en los dos párrafos inmediatos anteriores o una\nproporción de éstos."}, {"num": 1001, "texto": "Una entidad podrá considerar como partida cubierta a cualquiera de las siguientes, en\nla medida que exponga a la entidad a un riesgo de cambio en el valor razonable o en\nlos flujos de efectivo futuros y que para los propósitos de la cobertura contable hayan\nsido designados explícitamente como objeto de cobertura:\na) un activo o pasivo reconocidos;\nb) un compromiso en firme;\nc) una transacción esperada en el futuro (altamente probable); o\nd) una entidad del exterior."}, {"num": 1002, "texto": "Además de lo indicado en el párrafo anterior, para considerar a una partida como\npartida cubierta de una relación de coberturas, una entidad:\na) Deberá poder medir a esa partida de manera fiable.\nb) Deberá involucrar a una parte externa a la entidad, excepto por lo que se indica\nen el párrafo 1004."}, {"num": 1003, "texto": "Una entidad podrá aplicar contabilidad de coberturas a transacciones entre entidades\ndentro del mismo grupo solo en el caso de estados contables separados o en los\nestados contables individuales de las entidades, pero no en los estados contables\nconsolidados del grupo, a excepción de lo establecido en el siguiente párrafo."}, {"num": 1004, "texto": "Una entidad podrá cubrir el riesgo de tipo de cambio de la moneda extranjera de\ncuentas por cobrar o pagar en moneda intragrupo (por ejemplo, una partida por cobrar\no pagar entre dos subsidiarias) en los estados contables consolidados si provoca\nuna exposición a las ganancias o pérdidas por movimientos en el tipo de cambio que\nno son completamente eliminadas en la consolidación.\n\nRequisitos de eficacia de la cobertura"}, {"num": 1005, "texto": "Una entidad considerará que una relación de cobertura es eficaz si cumple todos los\nrequisitos siguientes:\na) existe una relación económica entre la partida cubierta y el instrumento de\ncobertura;\nb) el efecto del riesgo crediticio no predomina sobre los cambios de valor que\nproceden de esa relación económica; y\nc) la razón de cobertura es la misma que la procedente de la cantidad de la partida\ncubierta y la cantidad del instrumento de cobertura que es realmente utilizado\npara cubrir dicha cantidad de la partida cubierta. Sin embargo, dicha\ndesignación no reflejará un desequilibrio entre las ponderaciones de la partida\ncubierta y el instrumento de cobertura que crearía una ineficacia de la cobertura\n(independientemente de si está reconocida o no) que podría dar lugar a un\nresultado contable que sería incongruente con el propósito de la contabilidad\nde coberturas."}, {"num": 1006, "texto": "Una entidad evaluará la eficacia de la cobertura\na) cada vez que se produzcan cambios significativos en las circunstancias que\nafectan los requisitos de la eficacia de la cobertura; o\nb) a la fecha de los estados contables, cuando no se cumplen las condiciones\ndel inciso anterior."}, {"num": 1007, "texto": "A los fines de medir la ineficacia de la cobertura, una entidad considerará el valor\ntemporal del dinero."}, {"num": 1008, "texto": "Si una relación de cobertura deja de cumplir el requisito de eficacia de la cobertura\nrelativo a la razón de cobertura, pero el objetivo de gestión de riesgos para esa relación\nde cobertura designada se mantiene invariable, una entidad ajustará la razón de\ncobertura de la relación de cobertura de forma que cumpla de nuevo los criterios\nrequeridos (a esto se hace referencia en esta sección como “reequilibrio de la\ncobertura”)."}]}, {"id": "c9s2", "nombre": "Información por Segmentos", "parrafos": [{"num": 1009, "texto": "Una entidad:\na) Contabilizará el reequilibrio como una continuación de la relación de cobertura.\nb) En el momento del reequilibrio, determinará y reconocerá de forma inmediata la\nineficacia de la relación de cobertura antes de ajustarla."}, {"num": 1010, "texto": "Una entidad discontinuará la contabilidad de coberturas de forma prospectiva solo\ncuando la relación de cobertura (o una parte de una relación de cobertura) deje de\ncumplir los criterios requeridos (después de tener en cuenta cualquier reequilibrio de\nla relación de cobertura, si procede).\n\nContabilización de los distintos tipos de relaciones de cobertura"}, {"num": 1011, "texto": "Una entidad contabilizará una relación de cobertura de la siguiente manera:\na) Cobertura del valor razonable cuya partida cubierta es un activo o un pasivo\nreconocido:\n(i) Reconocerá una partida por la diferencia entre el valor en libros y el valor\nrazonable de la partida cubierta, con contrapartida en resultados.\n(ii) Imputará los cambios del valor razonable del instrumento de cobertura en\nresultados.\nb) Cobertura del valor razonable cuya partida cubierta es un compromiso en firme:\n(i) Reconocerá una partida para representar los cambios en el valor\nrazonable del compromiso en firme no reconocido contablemente, con\ncontrapartida en resultados.\n(ii) Imputará los cambios del valor razonable del instrumento de cobertura en\nresultados.\nc) Cobertura de flujos de efectivo:\n(i) Calculará la reserva de cobertura de flujos de efectivo como un\ncomponente separado de patrimonio asociado con la partida cubierta como\nel menor, en términos absolutos, de:"}, {"num": 1012, "texto": "Cuando una entidad finalice de contabilizar una relación de cobertura:\na) Del valor razonable: dará de baja en cuentas cualquier ajuste determinado de\nconformidad con los incisos a)(i) y b)(i) del párrafo anterior en resultados.\nb) De flujos de efectivo:\n(i) Mantendrá en un componente separado del patrimonio neto los saldos de\nresultado diferidos acumulados relacionados con una partida que es\ntransacción esperada en el futuro que dejó de ser altamente probable, en\nla medida en que se espere que los flujos de efectivo cubiertos todavía\nocurran.\n(ii) Eliminará cualquier componente separado del patrimonio neto los saldos\nde resultado diferidos acumulados, en los casos distintos al referido en\nel inciso (i) inmediato anterior.\nc) De una inversión neta en una entidad del extranjero: Eliminará cualquier\ncomponente separado del patrimonio neto los saldos de resultado diferidos\nacumulados cuando la entidad deba reconocer en resultados el saldo por\nconversión, de acuerdo con lo establecido en los párrafos 758 y 759 .\n\nInstrumentos derivados\n\nReconocimiento\n\nReconocimiento de un instrumento derivado, en general"}, {"num": 1013, "texto": "Una entidad reconocerá un elemento como un instrumento derivado cuando se cumpla\nla definición específica contenida en el párrafo 993 (por ejemplo, cuando una entidad\nse convierte en parte de un instrumento derivado para comprar moneda extranjera a\nfuturo reconocerá tiene un instrumento derivado dado que cumple la definición del\npárrafo 993). Por lo general, en la fecha del reconocimiento, el importe contable que\nuna entidad le asignará a un derivado será nulo (excepto cuando se trate de una\nopción de compra o una opción de venta).\nReconocimiento de por separado de un derivado implícito"}, {"num": 1014, "texto": "Una entidad que no sea una entidad pequeña o una entidad mediana reconocerá un\nderivado implícito por separado del contrato principal, siempre que el contrato\ncombinado no se mida por su valor razonable con contrapartida en resultados y\ncumpla las siguientes condiciones:\na) las características económicas y los riesgos inherentes al derivado implícito no\nestán relacionados estrechamente con las correspondientes al contrato\nprincipal; y\nb) un instrumento independiente, con las mismas condiciones del derivado, cumple\ncon la definición de instrumento derivado.\n\nBaja"}, {"num": 1015, "texto": "Una entidad dará de baja un instrumento derivado cuando:\na) los derechos se hayan realizado, cedidos a un tercero o expirados; o\nb) la obligación se haya extinguido.\n\nMedición inicial"}, {"num": 1016, "texto": "Una entidad medirá inicialmente un instrumento derivado:\na) Por su valor razonable, de acuerdo con lo dispuesto en el apartado “Medición\nde valores corrientes” [ver los párrafos 117 a 122].\nb) Por la suma de dinero u otra contraprestación entregada o recibida, si no fuera\nposible aplicar lo dispuesto en el inciso precedente.\n\nMedición posterior\n\nImporte por el que se presentan en el estado de situación patrimonial"}, {"num": 1017, "texto": "Una entidad medirá un instrumento financiero:\na) Por su valor razonable, de acuerdo con lo dispuesto en el apartado “Medición\nde valores corrientes” [ver los párrafos 117 a 122].\nb) Por un importe determinado en una instancia anterior, si no fuera posible aplicar\nlo dispuesto en el inciso precedente.\n\nImputación de los cambios en el valor razonable de un instrumento derivado"}, {"num": 1018, "texto": "Una entidad imputará las diferencias entre la medición de un instrumento derivado a\nla fecha de los estados contables y su medición anterior del siguiente modo:\na) Si no lo designó como un instrumento de cobertura: en resultados.\nb) Si lo designó como un instrumento de cobertura en una relación de cobertura\ndel valor razonable: en resultados.\nc) Si lo designó como un instrumento de cobertura en una relación de cobertura\ndel flujo de efectivo o en una relación de una inversión neta en una entidad del\nextranjero, de conformidad con lo indicado en el párrafo 1011. Por lo tanto:\n(i) Imputará la parte de los cambios del valor razonable en el instrumento de\ncobertura que se considera efectiva en resultados diferidos.\n(ii) Imputará la parte de los cambios del valor razonable en el instrumento de\ncobertura que se considera ineficaz en resultados."}, {"num": 1019, "texto": "Cuando una entidad haya designado a un instrumento derivado como un instrumento\nde cobertura, tratará cualquier saldo acumulado en resultados diferido de conformidad\ncon lo establecido en el párrafo 1012.\n\nRevelación en notas"}, {"num": 1020, "texto": "Una entidad revelará en notas:\na) Para cada grupo homogéneo instrumentos derivados que no se hayan medido\npor su valor razonable:\n(i) el hecho de que su medición contable responda a otros criterios distintos\ndel valor razonable, junto con los motivos que dieron lugar a tal\ntratamiento; y\n(ii) el criterio de medición empleado.\nb) Para cada grupo homogéneo instrumentos derivados que se hayan medido por\nsu valor razonable, los métodos y principales presunciones empleadas para\ndeterminar tales valores.\nc) Las causas de las reclasificaciones de activos financieros que hayan implicado\nel abandono de los criterios de medición basados en el valor razonable.\nd) Las concentraciones del riesgo crediticio.\ne) El máximo riesgo crediticio involucrado (sin considerar el efecto de las\ngarantías recibidas), cuando su importe difiriera del presentado para el rubro\nen el estado de situación patrimonial (por ejemplo, en los casos de créditos\nsusceptibles de compensación con deudas que se exponen en el pasivo).\nf) La descripción de los objetivos y políticas en materia de gestión de riesgos,\nincluyendo:\n(i) políticas de cobertura para cada una de las operaciones previstas\nsignificativas;\n(ii) para cada uno de los tipos de riesgos (valor razonable, flujos de efectivo\ne inversión neta en una entidad extranjera):"}]}]}]}, {"id": "t3", "nombre": "TÍTULO III — NORMAS ESPECIALES", "capitulos": [{"id": "cap10", "num": 10, "nombre": "Actividad Agropecuaria", "icono": "🌾", "secciones": [{"id": "c10s1", "nombre": "Actividad Agropecuaria", "parrafos": [{"num": 1021, "texto": "El objetivo de la presente sección es prescribir las normas de reconocimiento,\nmedición, presentación, e información a revelar en notas, aplicables a las siguientes\npartidas:\na) Activos biológicos.\nb) Productos agropecuarios en el momento de la cosecha, recolección, obtención\no faena.\nc) Resultados atribuidos a la producción agropecuaria, cuyos componentes\nprincipales son los resultados generados por la transformación biológica.\n\nAlcance"}, {"num": 1022, "texto": "Para contabilizar otras partidas vinculadas con la actividad agropecuaria distintas a\nlos referidas en el párrafo anterior (por ejemplo, la tierra agropecuaria, o los productos\nagropecuarios después del punto de cosecha o recolección), una entidad aplicará las\nrestantes secciones de la presente Resolución Técnica u otras normas contables."}, {"num": 1023, "texto": "A los fines del tratamiento de los activos biológicos utilizados como factores de\nproducción en el curso normal de las operaciones, una entidad:\na) Aplicará lo establecido:\n(i) en el párrafo 1025 para su reconocimiento, y en el 1026A para su medición\ninicial;\n(ii) en el párrafo 1029 para su medición posterior.\nb) Podrá aplicar este capítulo para su presentación y revelación en notas, según se\ndescribe en el inciso b) del párrafo 1033.\n\nDefiniciones"}, {"num": 1024, "texto": "A los fines del tratamiento de los temas abordados en esta sección, una entidad\ndeberá considerar las siguientes definiciones.\nActividad agropecuaria: Producción de bienes económicos mediante la\ncombinación del esfuerzo del hombre y la naturaleza, para favorecer la actividad\nbiológica de plantas y animales; incluyendo su reproducción, mejoramiento,\ndegradación y/o crecimiento que conforman su desarrollo biológico. La\nintervención del hombre en la gestión del desarrollo biológico implica que la\ncosecha, recolección u obtención de recursos no gestionados previamente y que\nsean meramente extractivas (tales como la pesca en el océano y la tala de\nbosques naturales) no constituyen actividad agropecuaria.\n\nDefiniciones relacionadas con “activos biológicos” y “productos\nagropecuarios”\n\nActivos biológicos: Plantas y animales vivientes utilizados en la actividad\nagropecuaria. Excluye a los activos biológicos utilizados como factor de\nproducción en el curso normal de las operaciones.\n\nActivos biológicos en desarrollo: Activos biológicos que no completaron su\nproceso de desarrollo y no pueden ser considerados como “en producción,\nconsumibles o terminados” (por ejemplo: bosques, terneros, alevines,\nsementeras, frutas inmaduras, etc., cuyo proceso biológico de crecimiento no\nconcluyó, aunque se puedan obtener de los mismos bienes secundarios\ncomercializables).\n\nActivos biológicos producidos o terminados: Activos biológicos que\nconcluyeron su proceso de desarrollo y están en condiciones de ser vendidos,\ntransformados en productos agropecuarios o utilizados en otros procesos\nproductivos (plantines para su venta como tales, novillos terminados, frutos\nmaduros, bosques aptos para la tala, etc.). Ciertos activos pueden calificar\ncomo “activos biológicos en desarrollo” en una actividad y como “activos\nbiológicos producidos o terminados” en otra, según la extensión del ciclo\nbiológico. Por ejemplo, los plantines pueden destinarse a la venta o utilizarse\nen explotaciones de bosques.\n\nActivos biológicos utilizados como factor de producción en el curso\nnormal de las operaciones: Activos biológicos que cumplen la definición\nde “plantas productoras”, “animales productores” o “animales reproductores”.\n\nAnimales productores: Activos que:\na) se utilizan en forma predominante para la obtención de productos\npecuarios (lana, leche, etc.);\nb) se espera que su vida productiva dure más de un período; y\nc) tienen una probabilidad de venta remota, excepto como animales de\ndescarte al final de su período productivo.\n\nAnimales reproductores: Animales machos o hembras destinados\nexclusivamente a la procreación de nuevos individuos de su especie, desde\nsu categorización como tales por la entidad y hasta que cambien de destino.\n\nPlantas productoras: Plantas vivas que:\na) permiten obtener productos agrícolas;\nb) se espera que su vida productiva dure más de un período; y\nc) tienen una probabilidad de venta remota, excepto por cuestiones\nincidentales como raleos y podas.\n\nNo son plantas productoras las que se espera cosechar como productos\nagrícolas (por ejemplo, los bosques cultivados para madera o pasta para\npapel).\n\nProductos agropecuarios: Productos resultantes de la acción descripta en el\npunto “Obtención de productos agropecuarios” (por ejemplo: cereales\ncosechados, leche, lana, madera, frutos cosechados, etc.).\n\nEjemplos de activos biológicos, productos agropecuarios y productos\nresultantes de su procesamiento\n\nProductos resultantes del\nActivos biológicos Productos agropecuarios procesamiento tras la cosecha\no recolección\n\nBovinos Reses faenadas Hamburguesas, chacinados\n\nÁrboles de una plantación Árboles talados Troncos, maderas\nforestal\n\nPorcinos Reses sacrificadas Salchichas, jamones curados\n\nCaña de azúcar Caña cortada Azúcar\n\nSementera de trigo Trigo cosechado Harina\n\nEjemplos de activos biológicos utilizados como factor de producción en el\ncurso normal de las operaciones, productos agropecuarios y productos\nresultantes de su procesamiento\n\nActivos biológicos\nutilizados como factor de Productos resultantes del\nProductos agropecuarios procesamiento tras la cosecha\nproducción en el curso\no recolección\nnormal de las operaciones\n\nOvinos Lana Hilo de lana\n\nPlantas productoras de té Hojas recolectadas Té\n\nPlantas productoras: viñedos Uvas vendimiadas Vino\n\nPlantas productoras: frutales Fruta recolectada Fruta procesada\n\nPlantas productoras: olivo Aceitunas recolectadas Aceite de oliva\n\nDefiniciones relacionadas con el proceso de desarrollo o transformación\n\nDesarrollo (transformación) biológico: Conjunto de procesos que constituyen\nla causa de los cambios cualitativos o cuantitativos en los activos\nbiológicos. Comprende el crecimiento, la degradación o deterioro, la\nproducción y la procreación.\n\nEtapa inicial del desarrollo biológico: Etapa que abarca desde las tareas\npreparatorias previas al desarrollo biológico propiamente dicho hasta el\nmomento en que se evidencie un crecimiento biológico que permita realizar\nuna medición confiable y verificable de dicho desarrollo, utilizando\nestimaciones técnicas de valoración adecuadas.\n\nEtapa posterior del desarrollo biológico: Abarca desde el momento en que se\nevidencie un crecimiento biológico que permita realizar una medición\nconfiable y verificable de dicho desarrollo, utilizando técnicas de valoración\nadecuadas, hasta que se transforme en un producto agropecuario, o se\ntransforme en otro activo biológico.\n\nOtras definiciones\n\nGastos estimados en el punto de venta: Son los gastos directos relacionados\ncon la venta en que incurre el vendedor desde el momento en que los bienes\nestán en condiciones de ser vendidos hasta que se transfieren los riesgos y\nbeneficios inherentes a la propiedad de tales bienes a su comprador. Incluye,\nentre otros, comisiones, impuestos sobre la venta y seguros. No incluye los\nfletes para transportar los productos al mercado en que se comercializan,\nporque tales componentes son contemplados en la medición del valor\nrazonable.\n\nIngreso por producción agropecuaria: Resultado por cambios en el valor\nrazonable menos gastos estimados en el punto de venta, generado desde la\núltima medición anterior de los activos biológicos. Incluye la variación en el\nvalor de los activos biológicos resultante de su transformación biológica,\nproducida entre la etapa posterior de desarrollo biológico y la medición a la\nfecha de los estados contables, si esta es anterior al momento de la\ncosecha, recolección o faena (ejemplo: activos biológicos de ciclos\nplurianuales).\n\nObtención de productos agropecuarios: Separación de los frutos de un activo\nbiológico o la interrupción de su proceso vital. En las distintas actividades\nagropecuarias adopta el nombre de cosecha, ordeñe, esquila, tala,\nrecolección, etc. Estas actividades incluyen los procesos de adecuación de\nlos productos agropecuarios, necesarios para su posterior conservación o\nventa en condiciones técnicamente aceptables.\n\nReconocimiento de un activo biológico o de un producto agropecuario en el momento de\nla cosecha, recolección, obtención o faena"}, {"num": 1025, "texto": "Una entidad reconocerá un activo biológico o un producto agropecuario en el\nmomento de la cosecha, recolección, obtención o faena, según corresponda, cuando:\na) cumpla con la definición general del párrafo 22 y las definiciones específicas del\npárrafo 1024 o las incluidas en el glosario, según corresponda;\nb) su medición satisfaga el requisito de confiabilidad (credibilidad); y\nc) su contribución a los beneficios económicos futuros de la entidad resulte\nprobable.\n\nMedición de activos biológicos\n\nMedición inicial"}, {"num": 1026, "texto": "Una entidad medirá sus activos biológicos, excepto los referidos en el párrafo1026A,\nmediante alguno de los siguientes criterios:\na) Activos biológicos adquiridos: sobre la base de su costo de adquisición.\nb) Activos biológicos en desarrollo, según corresponda, en función de:\n(i) su costo de producción; o\n(ii) su valor razonable menos gastos estimados en el punto de venta.\nc) Activos biológicos producidos o terminados: en función de su valor\nrazonable menos los gastos estimados en el punto de venta.\nd) Activos biológicos recibidos mediante aportes o donaciones: de acuerdo con lo\nestablecido en el inciso c) del párrafo 204.\ne) Activos biológicos recibidos mediante trueques o canjes: de acuerdo con lo\nestablecido en el inciso d) del párrafo 204.\n\n1026A. Una entidad medirá sus activos biológicos utilizados como factor de producción\nen el curso normal de las operaciones, de acuerdo con alguno de los siguientes\ncriterios, según corresponda:\na) al costo de adquisición; o\nb) sobre la base de su costo atribuido, determinado\n(i) En el caso de animales productores o reproductores: de acuerdo con su\nvalor razonable menos gastos estimados en el punto de venta, en el\nmomento en que comienza su utilización como tales.\n(ii) En el caso de las plantas productoras, en función de su costo de\nproducción.\n\nMedición posterior\n\nActivos biológicos destinados a la venta o a su consumo en el curso normal de\nlas operaciones\n\nCriterio general"}, {"num": 1027, "texto": "En la fecha de los estados contables, una entidad medirá sus activos biológicos\ndestinados a la venta o a su consumo en el curso normal de la actividad de acuerdo\ncon los siguientes criterios, según corresponda:\na) Activos biológicos en desarrollo durante la fase inicial de esa etapa, que sean\nplantas: en función de su costo de producción.\nb) Los restantes activos biológicos:\n(i) Si la entidad es pequeña, podrá utilizar el costo de adquisición o costo\nde producción, según corresponda.\n(ii) Si la entidad es mediana, podrá utilizar el costo de adquisición o costo\nde producción, según corresponda, en la medida en que estimar el valor\nrazonable, menos los gastos estimados en el punto de venta, implique un\ncosto o esfuerzo desproporcionado, según la evaluación establecida en el\npárrafo 83.\n(iii) En los demás casos, a su valor razonable menos los gastos estimados en\nel punto de venta.\n\nComparación de los activos biológicos con su valor recuperable"}, {"num": 1028, "texto": "Una entidad aplicará lo establecido en el apartado “Comparación con el valor\nrecuperable” [ver los párrafos 296 a 300] a los activos biológicos destinados a la\nventa en el curso normal de las operaciones, cuando no los mida al valor\nrazonable menos los gastos estimados en el punto de venta.\n\nActivos biológicos utilizados como factor de la producción en el curso normal\nde las operaciones"}, {"num": 1029, "texto": "En la fecha de los estados contables, una entidad medirá los activos biológicos\nutilizados como factor de producción en el curso normal de las operaciones\nsegún lo establecido en la sección “Bienes de uso y depreciaciones” [ver los párrafos\n313 a 358].\n\nProductos agropecuarios\n\nMedición en el momento de la cosecha, recolección, obtención o faena"}, {"num": 1030, "texto": "Una entidad medirá sus productos agropecuarios en el momento de la cosecha,\nrecolección, obtención o faena a su valor razonable menos los gastos estimados en\nel punto de venta.\nMedición después de concluida la cosecha, recolección, obtención o faena"}, {"num": 1031, "texto": "Después del momento de la cosecha, recolección, obtención o faena, una entidad\nmedirá los productos obtenidos según lo establecido en la sección “Bienes de cambio\ny costo de los bienes vendidos (o de los servicios prestados)” [ver los párrafos 287 a\n312].\n\nContratos de compra o venta de activos biológicos o productos agropecuarios a futuro"}, {"num": 1032, "texto": "Una entidad tratará los contratos para la compra o venta de activos biológicos o\nproductos agropecuarios del siguiente modo:\na) Cuando los celebre con la intención de cancelarlos mediante la entrega o\nrecepción de los activos biológicos o productos agropecuarios, porque los\nemplea en su actividad: no reconocerá tales contratos excepto que se conviertan\nen contratos onerosos, en cuyo caso aplicará la sección “Compromisos
