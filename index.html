s a\nlos saldos en moneda extranjera.\nc) La existencia de restricciones para el uso de saldos de caja y bancos.\n\nOtras normas aplicables"}, {"num": 211, "texto": "Para el tratamiento contable de los componentes de caja y bancos una entidad deberá\ncontemplar, en tanto resulten pertinentes y no contradigan lo establecido en esta\nsección, otras disposiciones de esta Resolución Técnica u otras normas contables.\nPor ejemplo, y sin ánimo de ser exhaustivos, las referidas a:\na) “Mediciones en moneda extranjera” [ver los párrafos 124 a 128].\nb) “Expresión de los estados contables en moneda de cierre en un contexto de\ninflación (ajuste por inflación de los estados contables)” [ver los párrafos 176 a\n200].\n\nINVERSIONES FINANCIERAS\n\nDefinición"}]}, {"id": "c3s2", "nombre": "Inversiones Financieras", "parrafos": [{"num": 212, "texto": "A los fines del tratamiento de los activos referidos en esta sección, una entidad deberá\nconsiderar la definición siguiente:\n\nInversiones financieras: Son colocaciones de efectivo en otro activo financiero\nrealizadas o mantenidas con el objetivo de obtener renta, ganancias de capital u\notros beneficios, explícitos o implícitos.\n\nEste rubro:\na) incluye, entre otros:\n(i) depósitos a plazo fijo y colocaciones similares;\n(ii) títulos de deuda emitidos por otras entidades (públicas o privadas);\n(iii) acciones y otros instrumentos de patrimonio emitidos por entidades\nsobre las que no se posee control, control conjunto ni influencia\nsignificativa;\n(iv) derechos a recibir cualquier activo financiero distinto del efectivo, de\nlos equivalentes de efectivo y de los créditos en moneda.\nb) excluye:\n(i) Activos que no dan lugar, de forma simultánea, a la asunción por parte\nde otra entidad de un pasivo financiero o la emisión de un instrumento\nde patrimonio (por ejemplo, tenencias de oro).\n(ii) Activos que cumplan la definición de “activos del plan”, de acuerdo con\nla sección “Beneficios a los empleados posteriores a la terminación de\nla relación laboral y otros beneficios a largo plazo” [ver los párrafos 872\nal 956].\n(iii) Activos que se contabilicen aplicando la sección “Instrumentos\nderivados y operaciones de cobertura” [ver los párrafos 990 al 1020].\n\nReconocimiento"}, {"num": 213, "texto": "Una entidad reconocerá un elemento como una inversión financiera cuando se\ncumpla la definición general del párrafo 22 y la definición específica contenida en el\npárrafo 212 (por ejemplo, cuando una entidad compra una obligación negociable\nreconocerá una inversión financiera dado que cumple la definición de activo y obtiene\nlos derechos a los flujos de efectivo contractuales de este activo financiero).\n\nMedición inicial\n\nCriterio general"}, {"num": 214, "texto": "Una entidad medirá inicialmente las inversiones financieras que procedan de\ntransacciones entre partes independientes:\na) Cuando la medición posterior de los activos se haga a valor razonable o a su\ncotización sucedánea:\n(i) a su valor razonable, cuando los activos cotizan en un mercado activo;\no\n(ii) a su cotización sucedánea, cuando los activos no cotizan en un mercado\nactivo.\nb) Cuando la medición posterior de los activos se haga a costo amortizado:\n(i) Por el valor de las sumas entregadas (considerando los gastos\nincrementales), en cualquiera de los siguientes casos:"}, {"num": 215, "texto": "Una entidad reconocerá los costos de transacción:\na) En resultados, cuando realice la medición inicial a valor razonable o\ncotización sucedánea.\nb) Como parte del costo de inversión, cuando realice la medición inicial a costo\nde adquisición.\n\nInversiones financieras provenientes de transacciones entre partes relacionadas"}, {"num": 216, "texto": "Una entidad optará por medir las inversiones financieras provenientes de\ntransacciones entre partes relacionadas de acuerdo con alguno de los siguientes\ncriterios:\na) según las condiciones pactadas; o\nb) según lo definido en los párrafos 214 y 215 para inversiones financieras que\nprocedan de transacciones entre partes independientes."}, {"num": 217, "texto": "Cuando una entidad opte por la política contable referida en el inciso b) del párrafo\nanterior, contabilizará la contrapartida, de corresponder, de forma similar a la\nestablecido en los párrafos 509 y 510.\n\nMedición posterior"}, {"num": 218, "texto": "Una entidad medirá las inversiones financieras:\na) Cuando sean acciones u otros instrumentos de patrimonio emitidos por\nentidades sobre las que no se posee control, control conjunto ni influencia\nsignificativa:\n(i) Al valor razonable, cuando los activos cotizan en un mercado activo.\n(ii) A su cotización sucedánea, cuando los activos no cotizan en un\nmercado activo.\n(iii) Al costo de adquisición menos los dividendos en efectivo o en especie\nu otros beneficios declarados (y no pagados) hasta el momento del\nreconocimiento, en los restantes casos.\nb) Cuando se trate de deudas emitidas por otras entidades (por ejemplo, títulos\npúblicos o privados o plazos fijos):\n(i) Al valor razonable, si:"}, {"num": 219, "texto": "Una entidad reconocerá en el resultado del período, según corresponda:\na) los cambios del valor razonable;\nb) los cambios de la cotización sucedánea de las inversiones financieras;\nc) los ingresos financieros que generen; o\nd) los dividendos declarados por los resultados obtenidos por la emisora de las\nacciones u otros instrumentos de patrimonio.\n\nComparación con el valor recuperable"}, {"num": 220, "texto": "A la fecha de los estados contables, una entidad evaluará si existen indicios de\ndesvalorización de las inversiones financieras medidas al costo amortizado o al\ncosto de adquisición, excepto cuando se trate de inversiones financieras\ncontabilizadas usando la opción prevista en el inciso a) del párrafo 216."}, {"num": 221, "texto": "A los fines de determinar la necesidad de comparar la medición contable de las\ninversiones financieras con su valor recuperable, una entidad considerará, entre\notros, los siguientes indicios de deterioro:\na) Dificultades financieras significativas del emisor.\nb) Incumplimientos o infracciones de las condiciones de emisión de los títulos o\ndemás activos.\nc) Probabilidad de que el emisor inicie un proceso concursal o quiebre.\nd) Cambios adversos en el entorno económico, tecnológico o legal."}, {"num": 222, "texto": "Una entidad medirá las pérdidas por desvalorización de las inversiones financieras\nque se miden a costo amortizado, como la diferencia entre los siguientes importes,\nsiempre que el indicado en a) resulte mayor que el indicado en b):\na) la medición contable del activo; y\nb) el mayor de los siguientes importes:\n(i) El valor de los flujos de efectivo esperados, que deben ser consistentes\ncon las incobrabilidades y moras que se consideren probables con relación\na dicho activo, descontados mediante:"}, {"num": 223, "texto": "Una entidad medirá las pérdidas por desvalorización de las inversiones financieras\nque se miden a costo de adquisición, como la diferencia entre los siguientes\nimportes, siempre que el indicado en a) resulte mayor que el indicado en b):\na) la medición contable del activo; y\nb) la mejor estimación (que necesariamente tendrá que ser una aproximación) del\nimporte (que podría ser cero) que la entidad recibiría por el activo si se\nvendiese en la fecha de los estados contables, que debe ser consistente con\nlas nuevas condiciones crediticias del emisor."}, {"num": 224, "texto": "Una entidad revertirá pérdidas por desvalorización reconocidas en períodos\nanteriores solo cuando, con posterioridad a la fecha de su contabilización, se\nincremente el valor recuperable estimado. En tal caso, la entidad aumentará la\nmedición contable de las inversiones financieras involucradas por un importe que sea\nel menor entre:\na) la medición contable que las inversiones habrían tenido si nunca se hubiese\nreconocido una pérdida por desvalorización; y\nb) su nuevo valor recuperable.\n\nBaja en cuentas"}, {"num": 225, "texto": "Una entidad dará de baja una inversión financiera cuando:\na) expiren o se liquiden todos los derechos contractuales sobre los flujos de\nefectivo de la inversión financiera;\nb) transfiera dicho activo junto con todos los riesgos y ventajas inherentes a la\npropiedad de la inversión financiera, en los términos del inciso b) del párrafo\n226; o\nc) acuerde una refinanciación con las características descriptas en el párrafo 227."}, {"num": 226, "texto": "Si una entidad transfiere una inversión financiera y:\na) Conserva el riesgo de crédito:\n(i) no dará de baja en cuentas a los activos transferidos; y\n(ii) contabilizará un pasivo como contrapartida de cualquier activo recibido.\nb) Transfiere sustancialmente todos los riesgos y ventajas inherentes a la\npropiedad de la inversión financiera:\n(i) reconocerá cualquier activo recibido;\n(ii) dará de baja al activo transferido; y\n(iii) reconocerá cualquier resultado puesto en evidencia por esta transacción."}, {"num": 227, "texto": "Si una entidad refinancia una inversión financiera representativa de títulos de deuda\nemitidos por otras entidades (públicas o privadas) y la referida inversión después de\nla refinanciación es sustancialmente diferente respecto de esa inversión antes de la\nrefinanciación:\na) dará de baja al activo preexistente;\nb) reconocerá una nueva inversión, aplicando las normas sobre “Medición inicial”\n[ver los párrafos 214 y 215], contenidas en la presente sección;\nc) reconocerá en el resultado del ejercicio de la refinanciación:\n(i) la diferencia entre los importes de la inversión dada de baja y de la nueva\ninversión; y\n(ii) cualquier costo incurrido en la refinanciación por la entidad."}, {"num": 228, "texto": "La condición de “sustancialmente diferente” establecida en el párrafo anterior se\ncumple si:\na) el valor descontado de los flujos de efectivo posteriores a la refinanciación,\nutilizando la misma tasa empleada para medir la inversión original, difiere en,\npor lo menos, un 10% respecto del valor contable de la inversión refinanciada\nen la fecha de la refinanciación; o\nb) existen otros elementos de carácter cualitativo que permitan deducir que tal\ncambio es sustancial (por ejemplo, la constitución de nuevas garantías o la\nincorporación de cláusulas de cumplimiento contingente para el emisor)."}, {"num": 229, "texto": "Si la refinanciación no da lugar a la baja en cuentas de la inversión original se\nconsidera que solo existe un cambio en la estimación de los cobros futuros. Para\nreflejar el cambio indicado, la entidad:\na) recalculará el valor contable como el valor actual de los nuevos flujos de\nefectivo descontados a la tasa de interés efectiva de la inversión original;\nb) reconocerá inmediatamente en el resultado del ejercicio de la refinanciación la\ndiferencia entre el importe resultante de a) y el valor contable previo a la\nmodificación contractual; y\nc) ajustará el importe de la inversión adicionando cualquier costo incurrido en la\nrefinanciación, y lo amortizará a lo largo de la duración de la nueva inversión."}, {"num": 230, "texto": "Cuando se trate de una entidad que es pequeña o mediana podrá seguir el siguiente\nprocedimiento en reemplazo del indicado en el párrafo anterior, en la fecha de la\nrefinanciación:\na) mantendrá el valor contable de la inversión, ajustado por los costos incurridos\npor la entidad a causa de la refinanciación; y\nb) modificará la tasa de interés de forma prospectiva, sin que dé lugar al\nreconocimiento de ningún resultado inmediato por la refinanciación.\n\nPresentación en los estados contables"}, {"num": 231, "texto": "En el estado de situación patrimonial, una entidad presentará las inversiones\nfinancieras separadas del resto de los activos y distinguiendo, de corresponder, entre\nactivos corrientes y activos no corrientes.\n\nRevelación en notas"}, {"num": 232, "texto": "Una entidad describirá:\na) las políticas contables empleadas y los criterios de medición aplicados para\ncada clase de inversiones financieras; y\nb) las bases y métodos utilizados y los supuestos considerados en las mediciones\nbasadas en valores corrientes."}, {"num": 233, "texto": "Una entidad revelará información sobre la composición de las inversiones financieras\nque permita evaluar el importe, calendario e incertidumbre de los flujos de efectivo\nfuturos, incluyendo:\na) su naturaleza e instrumentación jurídica (por ejemplo, plazos fijos, acciones\ncon cotización, acciones sin cotización, títulos de deuda con cotización, títulos\nde deuda sin cotización, títulos en moneda extranjera con cotización,\nderechos a recibir activos financieros distintos del efectivo, de los equivalentes\ndel efectivo o los créditos en moneda, etc.);\nb) el valor razonable de las inversiones que midió al costo amortizado y cotizan\nen un mercado activo;\nc) los importes de inversiones en moneda extranjera, si las hubiere, y los tipos\nde cambio vigentes a la fecha de los estados contables;\nd) los importes, en función de los plazos de vencimiento o rescate, distinguiendo\nentre:\n(i) plazo vencido;\n(ii) sin plazo establecido;\n(iii) con vencimiento en cada uno de los trimestres del ejercicio subsiguiente;\ny\n(iv) con vencimiento en cada uno de los ejercicios posteriores al subsiguiente;\ne) las tasas de interés, explícitas o implícitas, por categoría de inversiones cuya\nmedición se efectuó en función del costo amortizado (pudiendo informar el\npromedio por categoría cuando existe más de una tasa);\nf) las pautas de actualización, si las hubiere;\ng) las inversiones garantizadas por el emisor que disminuyan el riesgo de la\nentidad; y\nh) las pérdidas por desvalorización (o las reversiones de dichas pérdidas)\nreconocidas y acumuladas."}, {"num": 234, "texto": "Una entidad pequeña o una entidad mediana podrá no revelar la información\nrequerida por los incisos b), d) y e) del párrafo anterior.\n\nOtras normas aplicables"}, {"num": 235, "texto": "Para el tratamiento contable de las inversiones financieras, una entidad deberá\ncontemplar, en tanto resulten pertinentes y no contradigan lo establecido en esta\nsección, otras disposiciones de esta Resolución Técnica u otras normas contables.\nPor ejemplo, y sin ánimo de ser exhaustivos, las referidas a:\na) “Medición de costos” [ver los párrafos 102 a 110], y “Medición inicial de bienes\no servicios” [ver los párrafos 203 a 204]\nb) “Medición de valores corrientes” [ver los párrafos 117 a 122].\nc) “Mediciones en moneda extranjera” [ver los párrafos 124 a 128].\nd) “Expresión de los estados contables en moneda de cierre en un contexto de\ninflación (ajuste por inflación de los estados contables)” [ver los párrafos 176 a\n200].\n\nCRÉDITOS EN MONEDA\n\nDefiniciones"}]}, {"id": "c3s3", "nombre": "Créditos en Moneda", "parrafos": [{"num": 236, "texto": "A los fines del tratamiento de los activos referidos en esta sección, una entidad deberá\nconsiderar las definiciones siguientes.\n\nCréditos en moneda: Son activos representativos de derechos, distintos de los\nincluidos en la sección “Inversiones financieras” [ver los párrafos 212 a 235] y de\nlos que se contabilicen aplicando la sección “Instrumentos derivados y\noperaciones de cobertura” [ver los párrafos 990 al 1020], que una entidad posee\ncontra terceros para:\na) recibir sumas de efectivo o equivalentes de efectivo; o\nb) compensar con obligaciones futuras de entregar efectivo o equivalentes\nde efectivo.\n\nQuedan exceptuados del inciso b) inmediato anterior los créditos procedentes de\nla aplicación del método del impuesto diferido, de acuerdo con lo definido en la\nsección “Contabilización del impuesto a las ganancias” [ver los párrafos 571 a\n600].\n\nCuentas por cobrar a clientes: Son créditos que:\na) proceden de reconocimiento de ingresos de actividades ordinarias por\nla venta de bienes, la prestación de servicios o la construcción de activos;\ny\nb) otorgan un derecho incondicional de cobro porque están respaldadas por\nfacturas o documentos similares, y:\n(i) son exigibles; o\n(ii) falta un tiempo hasta su vencimiento.\n\nDerechos de facturar a clientes: Son activos representativos de derechos no\ncontingentes, emergentes del cumplimiento de obligaciones por parte de la\nentidad que:\na) proceden del reconocimiento de ingresos de actividades ordinarias por la\nventa de bienes, la prestación de servicios o la construcción de activos (por\nejemplo, cuando se contabilizan en función del grado de avance);\nb) son distintos de las cuentas por cobrar a clientes;\nc) su facturación, o emisión de documentos similares, se difiere en el tiempo\ndebido a cuestiones tales como hitos acordados entre la entidad y su cliente;\ny\nd) generarán una cuenta por cobrar a clientes luego de la emisión de la\nfactura o documentos similares.\n\nAclaración (texto no integrante de la presente Resolución Técnica)\n\nLas partidas que, de conformidad con las RT 17 y 41, se reconocían, medían y presentaban\ncomo “bienes de cambio”, esta Resolución Técnica requiere que se contabilicen como\n“Derechos de facturar a clientes”, y se presenten junto con los créditos (en moneda o en especie,\nsegún corresponda).\n\nEste cambio no afecta al resultado de la entidad, ni al total del activo, del pasivo o de su\npatrimonio neto, pero explica de mejor manera las causas de los resultados y la naturaleza de\nlas partidas de activos o pasivos involucradas en las transacciones relacionadas.\n\nPara más información, remitimos al ejemplo incluido en la aclaración incorporada antes del\npárrafo 295 de la presente Resolución Técnica.\n\nOtros créditos en moneda: Son los procedentes de sucesos u operaciones que\nno dan lugar a ingresos de actividades ordinarias.\n\nPrevisión para desvalorización de créditos/previsión para cuentas de cobro\ndudoso: Son correcciones a la medición de los créditos originadas en pérdidas\npor desvalorización (generadas por incobrables y otras causas).\n\nDerechos de reembolso: Importes que una entidad esperar recuperar de terceros\nrelacionados con pasivos reconocidos.\n\nReconocimiento"}, {"num": 237, "texto": "Una entidad reconocerá una cuenta a cobrar a clientes como un activo cuando:\na) se cumple la definición general del párrafo 22 y la definición específica\ncontenida en el párrafo 236; y\nb) emitió las facturas o documentos similares."}, {"num": 238, "texto": "Una entidad reconocerá un derecho de facturar a clientes como un activo cuando:\na) se cumple la definición general del párrafo 22 y la definición específica\ncontenida en el párrafo 236;\nb) reconoció ingresos de actividades ordinarias de acuerdo con lo indicado en\nlos párrafos 522 a 526; y\nc) no emitió las facturas o documentos similares."}, {"num": 239, "texto": "Una entidad reconocerá otros créditos en moneda como un activo cuando se cumple\nla definición general del párrafo 22 y la definición específica contenida en el párrafo"}, {"num": 240, "texto": "Una entidad reconocerá un derecho de reembolso como un activo cuando:\na) exista un pasivo previamente reconocido que se relacione con tal derecho; y\nb) sea prácticamente segura su recepción una vez cumplida su obligación de\nefectuar un desembolso o pago.\n\nMedición inicial\n\nCréditos en moneda originados en operaciones que generan ingresos de actividades\nordinarias"}, {"num": 241, "texto": "Una entidad medirá inicialmente los créditos en moneda originados en ventas de\nbienes, prestaciones de servicios u otras operaciones entre partes independientes\nque generan ingresos de actividades ordinarias:\na) Al valor contado de la operación, cuando pacte componentes financieros\nexplícitos.\nb) A su valor nominal, cuando no segregue componentes financieros\nimplícitos, de acuerdo con lo establecido en el apartado “Segregación de\ncomponentes financieros implícitos” [ver los párrafos 130 a 135].\nc) Al valor descontado de los flujos de efectivo futuros o al precio contado cuando\nsegregue componentes financieros implícitos, según lo establecido en el\napartado “Segregación de componentes financieros implícitos” [ver los párrafos\n130 a 135].\n\nCréditos en moneda originados en transacciones financieras"}, {"num": 242, "texto": "Una entidad medirá inicialmente los créditos en moneda originados en transacciones\nfinancieras entre partes independientes:\na) Por el valor de las sumas entregadas (considerando los gastos incrementales),\ncuando:\n(i) la entidad es pequeña;\n(ii) la tasa de interés pactada no difiere significativamente del tipo de mercado\npara transacciones similares; o\n(iii) la totalidad de las cuotas pactadas vence en un plazo máximo de doce\nmeses, contado desde la fecha de la operación, excepto que opte por la\npolítica contable referida en el inciso siguiente (por ejemplo, porque las\ncondiciones pactadas no reflejan los términos usuales del mercado).\nb) Al valor descontado de los flujos de efectivo futuros, mediante una tasa de\ninterés de mercado, en los restantes casos.\n\nOtros créditos en moneda"}, {"num": 243, "texto": "Una entidad medirá inicialmente los demás créditos entre partes independientes en\nmoneda del siguiente modo:\na) Al valor de contado de la operación, cuando se pacte componentes\nfinancieros explícitos.\nb) A su valor nominal, cuando no segregue componentes financieros\nimplícitos, de acuerdo con lo establecido en el apartado “Segregación de\ncomponentes financieros implícitos” [ver los párrafos 130 a 135].\nc) Al valor descontado de los flujos de efectivo futuros o al precio contado cuando\nsegregue componentes financieros implícitos, según lo establecido en el\napartado “Segregación de componentes financieros implícitos” [ver los párrafos\n130 a 135].\n\nCréditos en moneda provenientes de transacciones entre partes relacionadas"}, {"num": 244, "texto": "Una entidad optará por medir los créditos en moneda provenientes de transacciones\nentre partes relacionadas de acuerdo con alguno de los siguientes criterios:\na) según las condiciones pactadas;\nb) al valor descontado de los flujos de efectivo futuros o al precio contado cuando\nsegregue componentes financieros implícitos, según lo establecido en el\napartado “Segregación de componentes financieros implícitos” [ver los párrafos\n130 a 135]; o\nc) al valor descontado de los flujos de efectivo futuros, cuando:\n(i) surge de transacciones financieras;\n(ii) la tasa de interés pactada difiere significativamente del tipo de mercado\npara transacciones similares; y\n(iii) al menos una de las cuotas pactadas vence en un plazo mayor a doce\nmeses, contado desde la fecha de la operación."}, {"num": 245, "texto": "Cuando una entidad opte por la política contable referida en los incisos b) o c) del\npárrafo anterior, contabilizará la contrapartida de forma similar a la establecido en los\npárrafos 509 y 510.\n\nDerechos de reembolso"}, {"num": 246, "texto": "Una entidad medirá inicialmente los derechos de reembolso, que cumplan las\ncondiciones establecidas en el párrafo 240, por el menor de los siguientes importes:\na) el correspondiente al pasivo reconocido;\nb) la suma que espera recuperar como consecuencia del desembolso futuro.\n\nMedición posterior"}, {"num": 247, "texto": "Una entidad medirá los créditos en moneda, distintos de los derechos de facturar a\nclientes y de los derechos de reembolso:\na) Al valor nominal, cuando la entidad no segregó componentes financieros\nimplícitos en el momento de su reconocimiento, de acuerdo con lo establecido\nen el apartado “Segregación de componentes financieros implícitos” [ver los\npárrafos 130 a 135].\nb) Al costo amortizado, en la medida en que no estén comprendidos en el inciso\nc) inmediato siguiente, cuando:\n(i) se pactaron componentes financieros explícitos;\n(ii) en el momento de la medición inicial la entidad segregó componentes\nfinancieros implícitos, de acuerdo con lo establecido en el apartado\n“Segregación de componentes financieros implícitos” [ver los párrafos 130\na 135]; o\n(iii) en el momento de la medición inicial la entidad aplicó el inciso b) del párrafo"}, {"num": 248, "texto": "Cuando la medición posterior se efectúe al costo amortizado, una entidad utilizará:\na) La misma tasa de interés que utilizó en el momento de la medición inicial, si el\ntipo pactado fuera fijo.\nb) La tasa de interés efectiva que sea consistente con la tasa que corresponda\naplicar según lo establecido en el contrato, si el tipo pactado fuera variable."}, {"num": 249, "texto": "Una entidad medirá los derechos de facturar a clientes por la sumatoria de los\nimportes reconocidos, en el presente ejercicio o en ejercicios anteriores, originados\nen ingresos de actividades ordinarias no facturados, según lo establecido en la\nsección “Reconocimiento de ingresos de actividades ordinarias procedentes de\ntransacciones (operaciones de intercambio)” [ver los párrafos 522 a 526 ]."}, {"num": 250, "texto": "Una entidad medirá los derechos de reembolso por el menor de los siguientes:\na) el importe originalmente reconocido;\nb) la suma que espera recuperar como consecuencia del desembolso futuro.\n\nComparación con el valor recuperable"}, {"num": 251, "texto": "A la fecha de los estados contables, una entidad evaluará si existen indicios de\ndesvalorización de los siguientes activos, excepto cuando se trate de créditos en\nmoneda contabilizados según la opción prevista en el inciso a) del párrafo 244:\na) Créditos en moneda medidos al valor nominal o al costo amortizado;\nb) Derechos de facturar a clientes.\nc) Derechos de reembolso."}, {"num": 252, "texto": "A los fines de determinar la necesidad de comparar la medición contable de los\ncréditos indicados en el párrafo 251 con su valor recuperable, una entidad\nconsiderará, entre otros, los siguientes indicios de deterioro:\na) Dificultades financieras significativas del deudor.\nb) Incumplimientos o infracciones de los acuerdos o contratos celebrados.\nc) Probabilidad de que el deudor inicie un proceso concursal o quiebre.\nd) Cambios adversos en el entorno económico, tecnológico o legal.\ne) Probabilidad de compensar los créditos con obligaciones futuras."}, {"num": 253, "texto": "Una entidad medirá las pérdidas por desvalorización de los créditos indicados en\nel párrafo 251, como la diferencia entre los siguientes importes, siempre que el\nindicado en a) resulte mayor que el indicado en b):\na) la medición contable del activo; y\nb) el valor de los flujos de efectivo esperados, que deben ser consistentes con las\nincobrabilidades y moras que se consideren probables con relación a dicho\nactivo, descontados mediante:\n(i) La tasa de interés utilizada para la medición inicial (que podría ser igual a\ncero en el caso de mediciones a valor nominal), si el tipo pactado fuera\nfijo.\n(ii) La tasa de interés efectiva al cierre, de acuerdo con lo establecido en el\ncontrato, si el tipo pactado fuera variable."}, {"num": 254, "texto": "Una entidad revertirá pérdidas por desvalorización reconocidas en períodos\nanteriores solo cuando, con posterioridad a la fecha de su contabilización, se\nincremente el valor recuperable estimado. En tal caso, aumentará la medición\ncontable de los créditos involucrados por un importe que sea el menor entre:\na) la medición contable que el crédito habría tenido si nunca se hubiese\nreconocido una pérdida por desvalorización; y\nb) su nuevo valor recuperable."}, {"num": 255, "texto": "Una entidad imputará tanto las pérdidas por desvalorización como sus reversiones\na los resultados del período.\n\nBaja en cuentas"}, {"num": 256, "texto": "Una entidad dará de baja un crédito en moneda cuando:\na) se cobre el crédito; o, en el caso de los derechos de facturar a clientes, se emita\nfactura o documento similar;\nb) expiren o liquiden todos los derechos contractuales sobre los flujos de efectivo\ndel crédito en moneda;\nc) transfiera dicho activo junto con todos los riesgos y ventajas inherentes a la\npropiedad del crédito, en los términos del inciso b) del párrafo 257; o\nd) acuerde una refinanciación con las características descriptas en el párrafo 258."}, {"num": 257, "texto": "Si una entidad transfiere créditos en moneda y:\na) Conserva el riesgo de crédito:\n(i) no dará de baja en cuentas a los activos transferidos; y\n(ii) contabilizará un pasivo como contrapartida de cualquier activo recibido.\nb) Transfiere sustancialmente todos los riesgos y ventajas inherentes a la\npropiedad del crédito en moneda:\n(i) reconocerá cualquier activo recibido;\n(ii) dará de baja al activo transferido; y\n(iii) reconocerá cualquier resultado puesto en evidencia por esta transacción."}, {"num": 258, "texto": "Si una entidad refinancia un crédito en moneda y el crédito después de la\nrefinanciación es sustancialmente diferente respecto del crédito antes de la\nrefinanciación:\na) dará de baja al activo preexistente;\nb) reconocerá un nuevo crédito, aplicando las normas sobre “Medición inicial” [ver\nlos párrafos 241 a 243], contenidas en la presente sección;\nc) reconocerá en el resultado del ejercicio de la refinanciación:\n(i) la diferencia entre los importes del crédito dado de baja y del nuevo\ncrédito; y\n(ii) cualquier costo incurrido en la refinanciación por la entidad."}, {"num": 259, "texto": "La condición de “sustancialmente diferente” establecida en el párrafo anterior se\ncumple si:\na) el valor descontado de los flujos de efectivo posteriores a la refinanciación,\nutilizando la misma tasa empleada para medir el crédito original, difiere en, por\nlo menos, un 10% respecto del valor contable del crédito refinanciado en la\nfecha de la refinanciación; o\nb) existen otros elementos de carácter cualitativo que permitan deducir que tal\ncambio es sustancial (por ejemplo, la constitución de nuevas garantías o la\nincorporación de cláusulas de cumplimiento contingente para el deudor)."}, {"num": 260, "texto": "Si la refinanciación no da lugar a la baja en cuentas del crédito original se considera\nque solo existe un cambio en la estimación de los cobros futuros. Para reflejar el\ncambio indicado, la entidad:\na) recalculará el valor contable como el valor actual de los nuevos flujos de\nefectivo descontados a la tasa de interés efectiva del crédito original;\nb) reconocerá inmediatamente en el resultado del ejercicio de la refinanciación la\ndiferencia entre el importe resultante de a) y el valor contable previo a la\nmodificación; y\nc) ajustará el importe del crédito adicionando cualquier costo incurrido en la\nrefinanciación, y lo amortizará a lo largo de la duración del nuevo crédito."}, {"num": 261, "texto": "Cuando se trate de una entidad que es pequeña o mediana podrá seguir el siguiente\nprocedimiento en reemplazo del indicado en el párrafo anterior, en la fecha de la\nrefinanciación:\na) mantendrá el valor contable del crédito, ajustado por los costos incurridos por\nla entidad a causa de la refinanciación; y\nb) modificará la tasa de interés de forma prospectiva, sin que dé lugar al\nreconocimiento de ningún resultado inmediato por la refinanciación.\n\nPresentación en los estados contables"}, {"num": 262, "texto": "En el estado de situación patrimonial, una entidad presentará separados del resto de\nlos activos y distinguiendo, de corresponder, entre activos corrientes y no corrientes:\na) las cuentas por cobrar a clientes y los derechos a facturar a clientes,\nidentificando los importes correspondientes cada una de estas partidas;\nb) los créditos impositivos distintos a los que surgen de aplicar el método del\nimpuesto diferido, que se presentarán de acuerdo con las definiciones de la\nsección “Reconocimiento, medición, presentación y revelación del impuesto a\nlas ganancias diferido” [ver los párrafos 578 a 599]; y\nc) los créditos con los propietarios y otras partes relacionadas; y\nd) los otros créditos en moneda."}, {"num": 263, "texto": "En el estado de resultados, una entidad presentará por separado las pérdidas por\ndesvalorización y las reversiones de dichas pérdidas (gastos por incobrables y\nsimilares)."}, {"num": 264, "texto": "Los demás resultados relacionados se presentarán de conformidad con la definido en\nla sección “Cuestiones referidas al estado de resultados” [ver los párrafos 628 a641].\n\nRevelación en notas"}, {"num": 265, "texto": "Una entidad describirá:\na) las políticas contables empleadas y los criterios de medición aplicados para\ncada clase de créditos en moneda; y\nb) las bases y métodos utilizados y los supuestos considerados en las mediciones\nbasadas en valores corrientes."}, {"num": 266, "texto": "Una entidad revelará información sobre la composición de los créditos que permita\nevaluar el importe, calendario e incertidumbre de los flujos de efectivo futuros,\nincluyendo:\na) su naturaleza e instrumentación jurídica;\nb) los importes de las cuentas a cobrar en moneda extranjera, si las hubiere, y\nlos tipos de cambio vigentes a la fecha de cierre;\nc) los importes, en función de los plazos de vencimiento de las cuotas pactadas,\ndistinguiendo entre:\n(i) plazo vencido;\n(ii) sin plazo establecido;\n(iii) con vencimiento en cada uno de los trimestres del ejercicio subsiguiente;\ny\n(iv) con vencimiento en cada uno de los ejercicios posteriores al subsiguiente.\nd) las tasas de interés, explícitas o implícitas, por categoría de crédito (pudiendo\ninformar el promedio por categoría en el caso de existir más de una tasa);\ne) las pautas de actualización, si las hubiere;\nf) los saldos con garantías que disminuyan el riesgo de la entidad;\ng) los saldos con entidades sobre las cuales tiene (o que tienen sobre la entidad)\ncontrol, control conjunto o influencia significativa; y\nh) las pérdidas por desvalorización (o las reversiones de dichas pérdidas)\nreconocidas y acumuladas."}, {"num": 267, "texto": "Una entidad pequeña o una entidad mediana podrá no revelar la información\nrequerida por los incisos c) y d) del párrafo anterior."}, {"num": 268, "texto": "Una entidad clasificará los otros créditos en moneda en función de su naturaleza (por\nejemplo, créditos por venta de bienes de uso, créditos por venta de propiedades de\ninversión, etc.).\n\nOtras normas aplicables"}, {"num": 269, "texto": "Para el tratamiento contable de los componentes de créditos una entidad deberá\ncontemplar, en tanto resulten pertinentes y no contradigan lo establecido en esta\nsección, otras disposiciones de esta Resolución Técnica u otras normas contables.\nPor ejemplo, y sin ánimo de ser exhaustivos, las referidas a:\na) “Medición de costos” [ver los párrafos 102 a 110].\nb) “Medición de valores corrientes” [ver los párrafos 117 a 122].\nc) “Mediciones en moneda extranjera” [ver los párrafos 124 a 128].\nd) “Tratamiento de componentes financieros” [ver los párrafos 129 a 142].\ne) “Expresión de los estados contables en moneda de cierre en un contexto de\ninflación (ajuste por inflación de los estados contables)” [ver los párrafos 176 a\n200].\n\nCRÉDITOS EN ESPECIE\n\nDefinición"}]}, {"id": "c3s4", "nombre": "Créditos en Especie", "parrafos": [{"num": 270, "texto": "A los fines del tratamiento de los activos referidos en esta sección, una entidad deberá\nconsiderar la siguiente definición:\n\nCréditos en especie: Son activos representativos de derechos que una entidad\nposee contra terceros para obtener bienes o servicios distintos del efectivo o de\nlas inversiones financieras, tal como se las define en la sección “Inversiones\nfinancieras” [ver los párrafos 212 a 235] (por ejemplo, derechos para obtener\nbienes de cambio; bienes de uso; intangibles; propiedades de inversión; para\nrecibir servicios que fueron pagados por anticipado; etc.), y de los que se\ncontabilicen aplicando la sección “Instrumentos derivados y operaciones de\ncobertura” [ver los párrafos 990 al 1020].\n\nReconocimiento"}, {"num": 271, "texto": "Una entidad reconocerá un crédito en especie cuando se cumpla la definición general\ndel párrafo 22 y la definición específica contenida en el párrafo 270."}, {"num": 272, "texto": "A efectos de dar cumplimiento a lo requerido en el párrafo anterior, una entidad\naplicará, en todo lo que resulte pertinente, lo dispuesto en el apartado\ncorrespondiente de la sección “Créditos en moneda” para el reconocimiento de\ncréditos en especie representativos de:\na) Cuentas a cobrar a clientes [ver el párrafo 237];\nb) Derechos de facturar a clientes [ver el párrafo 238]; y\nc) Otros créditos [ver el párrafo 239].\nd) Derechos de reembolso [ver el párrafo 240].\n\nMedición inicial"}, {"num": 273, "texto": "Una entidad medirá inicialmente los derechos a recibir bienes o servicios:\na) Cuando se originen en un anticipo parcial o total de efectivo o equivalentes de\nefectivo: por las sumas entregadas.\nb) Cuando se originen en trueques o canjes:\n(i) Si no proceden del “Reconocimiento de ingresos de actividades ordinarias\nprocedentes de transacciones (operaciones de intercambio)”: de forma\nconsistente con lo establecido en el inciso d) del párrafo 204.\n(ii) Si proceden del “Reconocimiento de ingresos de actividades ordinarias\nprocedentes de transacciones (operaciones de intercambio)”: de acuerdo\ncon lo establecido en el párrafo 525.\n\nMedición posterior"}, {"num": 274, "texto": "En la fecha de los estados contables, una entidad medirá los derechos a recibir\nbienes o servicios por el importe del reconocimiento inicial.\n\nComparación con el valor recuperable"}, {"num": 275, "texto": "Una entidad evaluará, a la fecha de los estados contables, si existen indicios de\ndesvalorización de los créditos en especie."}, {"num": 276, "texto": "A los fines de determinar la necesidad de comparar la medición contable de los\ncréditos con su valor recuperable, una entidad considerará, entre otros, los\nsiguientes indicios de deterioro:\na) Dificultades financieras significativas del deudor.\nb) Incumplimientos o infracciones de los acuerdos o contratos celebrados.\nc) Probabilidad de que el deudor inicie un proceso concursal o quiebre.\nd) Cambios adversos en el entorno económico, tecnológico o legal.\ne) Probabilidad de compensar los créditos con obligaciones futuras."}, {"num": 277, "texto": "Una entidad medirá las pérdidas por desvalorización de créditos en especie, como\nla diferencia entre los siguientes importes, siempre que el indicado en a) resulte mayor\nque el indicado en b):\na) la medición contable del activo; y\nb) el valor razonable de los bienes o servicios a recibir."}, {"num": 278, "texto": "Una entidad revertirá pérdidas por desvalorización reconocidas en períodos\nanteriores solo cuando, con posterioridad a la fecha de su contabilización, se\nincremente el valor recuperable estimado. En tal caso, aumentará la medición\ncontable de los créditos involucrados por un importe que sea el menor entre:\na) la medición contable que el crédito habría tenido si nunca se hubiese\nreconocido una pérdida por desvalorización; y\nb) su nuevo valor recuperable.\n\nBaja en cuentas"}, {"num": 279, "texto": "Una entidad dará de baja un crédito en especie:\na) distintos de los derechos a facturar a clientes, cuando expiren sus derechos o\nreciba los bienes o servicios comprometidos por la contraparte\nb) que sea un derecho a facturar a clientes, cuando ocurra lo indicado en el inciso\na) inmediato anterior, o se emita factura o documento similar, lo que ocurra\nantes.\n\nPresentación en los estados contables"}, {"num": 280, "texto": "En el estado de situación patrimonial, una entidad presentará los créditos en especie\ndistinguiendo, de corresponder, entre activos corrientes y activos no corrientes:\na) dentro de “bienes de cambio”, “bienes de uso”, “activos intangibles” o\n“propiedades de inversión” si representa un derecho a recibir tales bienes; o\nb) como un rubro separado, en los demás casos."}, {"num": 281, "texto": "En el estado de resultados, una entidad presentará por separado las pérdidas por\ndesvalorización y las reversiones de dichas pérdidas (gastos por incobrables y\nsimilares)."}, {"num": 282, "texto": "Los demás resultados relacionados se presentarán de conformidad con la definido en\nla sección “Cuestiones referidas al estado de resultados” [ver los párrafos 628 a 641].\n\nRevelación en notas"}, {"num": 283, "texto": "Una entidad describirá:\na) las políticas contables empleadas y los criterios de medición aplicados para\ncada clase de créditos en especie; y\nb) las bases y métodos utilizados y los supuestos considerados en las mediciones\nbasadas en valores corrientes."}, {"num": 284, "texto": "Una entidad revelará la siguiente información sobre la composición de los créditos en\nespecie:\na) su naturaleza e instrumentación jurídica;\nb) los saldos con garantías que disminuyan el riesgo de la entidad;\nc) los saldos con entidades sobre las cuales tiene (o que tienen sobre la entidad)\ncontrol, control conjunto o influencia significativa y\nd) las pérdidas por desvalorización (o las reversiones de dichas pérdidas)\nreconocidas y acumuladas."}, {"num": 285, "texto": "Una entidad clasificará los créditos en especie en función de su naturaleza (por\nejemplo, anticipos a proveedores no clasificables como bienes de cambio ni bienes\nde uso, seguros pagados por anticipado, etc.).\n\nOtras normas aplicables"}, {"num": 286, "texto": "Para el tratamiento contable de los créditos en especie, una entidad deberá\ncontemplar, en tanto resulten pertinentes y no contradigan lo establecido en esta\nsección, otras disposiciones de esta Resolución Técnica u otras normas contables.\nPor ejemplo, y sin ánimo de ser exhaustivos, las referidas a:\na) “Medición de costos” [ver los párrafos 102 a 110], y “Medición inicial de bienes\no servicios” [ver los párrafos 203 a 204]\nb) “Medición de valores corrientes” [ver los párrafos 117 a 122].\nc) “Mediciones en moneda extranjera” [ver los párrafos 124 a 128].\nd) “Expresión de los estados contables en moneda de cierre en un contexto de\ninflación (ajuste por inflación de los estados contables)” [ver los párrafos 176 a\n200].\n\nBIENES DE CAMBIO Y COSTO DE LOS BIENES VENDIDOS (O DE LOS SERVICIOS\nPRESTADOS)\n\nDefinición"}]}, {"id": "c3s5", "nombre": "Bienes de Cambio", "parrafos": [{"num": 287, "texto": "A los fines del tratamiento de los activos referidos en esta sección, una entidad deberá\nconsiderar la siguiente definición:\n\nBienes de cambio: Son los activos destinados a la venta en el curso habitual de\nla actividad ordinaria de la entidad, que se encuentran en proceso de\nproducción o construcción para dicha venta o que resultan generalmente\n\nconsumidos en la producción o construcción de los bienes o servicios que se\ndestinan a la venta.\n\nEste rubro:\na) incluye los bienes de cambio, de naturaleza tangible o intangible,\ndestinados a la venta en el curso habitual de la actividad ordinaria;\nb) excluye a:\n(i) las inversiones financieras; y\n(ii) los activos biológicos destinados para la venta.\n\nReconocimiento"}, {"num": 288, "texto": "Una entidad reconocerá un elemento como bien de cambio cuando:\na) cumpla con la definición general del párrafo 22 y la definición específica\ncontenida en el párrafo 287;\nb) su medición satisfaga el requisito de confiabilidad (credibilidad); y\nc) su contribución a los beneficios económicos futuros de la entidad resulte\nprobable."}, {"num": 289, "texto": "Una entidad reconocerá como gasto el costo de los bienes vendidos o servicios\nprestados, en el ejercicio correspondiente a la venta o prestación.\n\nMedición inicial"}, {"num": 290, "texto": "Una entidad medirá sus bienes de cambio mediante alguno de los siguientes criterios:\na) Bienes de cambio adquiridos: sobre la base de su costo de adquisición,\ndeterminado según lo establecido en el apartado “Medición de costos de\nadquisición” [ver el párrafo 103].\nb) Bienes de cambio producidos o construidos: en función del costo de\nproducción o del costo construcción, determinado según lo establecido en\nel apartado “Medición del costo de producción o del costo de construcción” [ver\nlos párrafos 104 a 110].\nc) Bienes de cambio recibidos mediante aportes o donaciones: de acuerdo con lo\nestablecido en el inciso c) del párrafo 204.\nd) Bienes de cambio recibidos mediante trueques o canjes: de acuerdo con lo\nestablecido en el inciso d) del párrafo 204.\ne) Productos agropecuarios al concluir la cosecha, recolección, obtención o\nfaena: sobre la base al costo atribuido que surge de aplicar el párrafo 1030.\n\nMedición posterior\n\nCaso general"}, {"num": 291, "texto": "Una entidad medirá los bienes de cambio adquiridos, o recibidos mediante aportes,\ndonaciones, trueques o canjes –excepto los comprendidos en el caso particular [ver\nel párrafo 295]– de acuerdo con alguno de los criterios siguientes:\na) costo de adquisición que resulte consistente con las técnicas referidas en el\ninciso a) del párrafo 301;\nb) costo de reposición; o\nc) costo de la última compra."}, {"num": 292, "texto": "Una entidad utilizará el mismo criterio para todos los bienes de cambio comprendidos\nen el párrafo 291, excepto que existan razones fundadas que justifiquen el uso de\ndistintos criterios. En este caso, la entidad informará en notas tal hecho y las razones\nque justifican el uso de criterios de medición distintos para los bienes de cambio\ncomprendidos en el párrafo anterior."}, {"num": 293, "texto": "Una entidad medirá los bienes de cambio producidos o construidos o que se\nencuentran en proceso de producción o construcción, mediante alguno de los criterios\nsiguientes:\na) costo de producción o costo de construcción; o\nb) costo de reproducción y/o reconstrucción."}, {"num": 294, "texto": "Una entidad utilizará el mismo criterio para todos los bienes de cambio comprendidos\nen el párrafo 293, excepto que existan razones fundadas que justifiquen el uso de\ndistintos criterios. En este caso, la entidad informará en notas tal hecho y las razones\nque justifican el uso de criterios de medición distintos para los bienes de cambio\ncomprendidos en el párrafo anterior.\n\nCaso particular\n\nAclaración (texto no integrante de la presente Resolución Técnica)\n\nLas Resoluciones Técnicas N° 17 y N° 41 establecían como “casos particulares” de medición\nposteriores de partidas comprendidas en el rubro “bienes de cambio”, siempre que se\nhubieran satisfecho ciertas condiciones, a las siguientes:\na) Valor neto de realización, para los bienes de cambio sobre los que se hayan recibido\nanticipos que fijan precio y las condiciones contractuales de la operación aseguren la\nefectiva concreción de la venta y de la ganancia.\nb) Valor neto de realización proporcionado de acuerdo con el grado de avance de la\nproducción o construcción y del correspondiente proceso de generación de resultados,\npara bienes de cambio en producción o construcción mediante un proceso prolongado\n(excepto activos biológicos) siempre que cumplan determinadas condiciones.\n\nDurante el desarrollo de la presente Resolución Técnica, CENCyA concluyó que la\naplicación de estos criterios genera información contraria a la intuición, dado que:\na) No existen argumentos de peso para sostener que el hecho de que la entidad haya\nrecibido anticipos que fijan precio y las condiciones contractuales de la operación\n\nAclaración (texto no integrante de la presente Resolución Técnica)\n\naseguren la efectiva concreción de la venta y de la ganancia debe cambiar la base de\nmedición de los bienes de cambio.\nb) Clasificar como bienes de cambio ciertos elementos que no siempre cumplen con la\ndefinición de “bienes de cambio”, y que proceden de un proceso prolongado de\nproducción o construcción utilizando al valor neto de realización proporcionado al grado\nde avance no permite representar la verdadera naturaleza de la operación (naturaleza\ntransaccional), dado que el resultado da cuenta de una entidad que “gana por la mera\ntenencia” en lugar de una entidad que genera ingresos por ventas a los cuales se les\nasocian costos para obtener tales ingresos.\n\nEsto no significa, bajo ningún aspecto, que los ingresos no puedan medirse en estos casos\nconsiderando el grado de avance de la producción o construcción y del correspondiente\nproceso de generación de resultados, sino que deben modificarse las contrapartidas.\n\nEjemplo:\n\nUna entidad acuerda con un cliente la construcción de cierto activo en un terreno propiedad\ndel cliente. El plazo de construcción se estimó en 2 años.\n\nLa entidad, que ha recibido anticipos que fijan precio (20% del precio total del acuerdo) tiene\nla capacidad financiera para finalizar la obra, y existe certidumbre respecto de la concreción\nde la ganancia.\n\nLos importes involucrados en el contrato son los siguientes:\n\nAño 1 Año 2 Acumulado\n\nCostos incurridos: 150 250 400\n\nGrado de avance: 37,5% 62,5% 100%\n\nPrecio total 700\n\nSolución aplicando los requerimientos de la RT N° 17 / RT N° 41\n\nAño 1 Año 2 Año 2 Acumulado\n(antes del (después\n“cierre de del “cierre\nobra”) de obra”\n\nBienes de cambio (1) 262,5 700 - -\n\nResultado por medición a VNR\n(2) 112,5 187,5 n/a 300\n\nIngresos por ventas - - n/a 700\n\nCosto de ventas - - n/a (700)\n\nGanancia neta (3) 112,5 187,5 n/a 300\n\nAclaración (texto no integrante de la presente Resolución Técnica)\n\nSolución aplicando los requerimientos de la presente Resolución Técnica\n\nAño 1 Año 2 Año 2 Acumulado\n(antes del (después\n“cierre de del “cierre\nobra”) de obra”\n\nBienes de cambio (1) n/c n/c n/c n/c\n\nDerechos de facturar a clientes\n(4) 262,5 700 - -\n\nResultado por medición a VNR\n(2) n/c n/c n/c n/c\n\nIngresos por ventas 262,5 437,5 n/a 700\n\nCosto de ventas (150) (250) n/a (400)\n\nGanancia neta (3) 112,5 187,5 n/a 300\n(1) Año 1: $700 x 37,5% = $262,5. Año 2: $700 x 100% = $700\n(2) Año 1: $262,5 - $150 = $112,5 Año 2: $700 – ($262,5 + $250) = $187,5\n(3) Sumatoria de los resultados.\n(4) Partida tratada en el apartado “Créditos en moneda” [ver los párrafos 236 a 269].\n\nn/a: no aplica; n/c: no corresponde.\n\nComo se puede observar, en ambos casos, la ganancia neta por el servicio de construcción\nes la misma cada año, al igual que la acumulada, son iguales. No obstante, el modo de\ncontabilizar requerido por la presente Resolución Técnica genera información que es una\nmejor aproximación a la realidad transaccional de la entidad."}, {"num": 295, "texto": "Una entidad:\na) podrá medir los bienes de cambio fungibles con mercado activo y\ncomercializables sin esfuerzo significativo, incluyendo los productos\nagropecuarios después de concluida la cosecha, recolección, obtención o\nfaena, por su valor neto de realización, de acuerdo con prácticas bien\nconsolidadas en cada sector de actividad; y\nb) en el caso de que una entidad mida estos bienes de cambio por su valor neto\nde realización, imputará la contrapartida de las variaciones acaecidas en este\nvalor en el resultado del periodo.\n\nComparación con el valor recuperable"}, {"num": 296, "texto": "A la fecha de los estados contables, una entidad comparará la medición contable\nde los bienes de cambio con su valor neto de realización, considerando su forma\nde utilización o comercialización. Por ejemplo:\na) Venta individual bien por bien.\nb) Bienes que se combinan para la producción de un nuevo bien.\nc) Venta a granel.\nd) Agrupación de productos complementarios en una única oferta.\ne) Venta de algunos productos por debajo de su costo para generar la venta de\notros productos."}, {"num": 297, "texto": "A los fines indicados en el párrafo anterior, una entidad realizará la comparación:\na) partida por partida; o\nb) si lo anterior fuera impracticable, agrupando partidas relacionadas con una\nlínea de productos cuyos componentes tengan propósito o uso similar y se\nproduzcan y/o comercialicen en la misma zona geográfica."}, {"num": 298, "texto": "Una entidad no reconocerá pérdidas por desvalorización:\na) De artículos que se venden junto con otros productos si el valor recuperable\ndel conjunto de bienes que se agrupan o complementan es superior a la\nmedición contable de todos ellos.\nb) De materias primas y productos en proceso, si se estiman recuperables\nmediante la realización de los productos terminados de los cuales formarán\nparte."}, {"num": 299, "texto": "Una entidad reconocerá tanto las pérdidas por desvalorización como su reversión\nimputando al resultado del período las diferencias entre la medición contable y valor\nrecuperable."}, {"num": 300, "texto": "Una entidad revertirá pérdidas por desvalorización reconocidas en períodos\nanteriores solo cuando, con posterioridad a la fecha de su determinación, se\nmodifiquen las estimaciones efectuadas para determinar el valor recuperable. En tal\ncaso, aumentará la medición contable de los bienes de cambio correspondientes por\nel menor de los siguientes importes:\na) la medición contable que el bien de cambio o grupo de bienes de cambio habría\ntenido si nunca se hubiese reconocido una pérdida por desvalorización; y\nb) su nuevo valor recuperable.\n\nCosto de bienes vendidos o servicios prestados"}, {"num": 301, "texto": "Una entidad podrá determinar el costo de bienes vendidos o servicios prestados, cuya\nmedición posterior se basa en el costo de adquisición, producción o\nconstrucción, mediante alguna de las siguientes alternativas:\na) costo correspondiente al momento del reconocimiento (menos las pérdidas\npor desvalorización contabilizadas), determinado mediante algunas de las\nsiguientes técnicas:\n(i) primero entrado, primero salido;\n(ii) identificación específica; o\n(iii) costo promedio ponderado; o\nb) en forma simplificada, mediante diferencias de inventario."}, {"num": 302, "texto": "Una entidad podrá determinar el costo de los bienes vendidos o servicios prestados,\ncuya medición posterior se basa en el costo de reposición, o costo de\nreproducción y/o reconstrucción, mediante alguna de las siguientes alternativas:\na) costo corriente en el momento de la venta de los bienes vendidos o servicios\nprestados; o\nb) en forma simplificada, mediante:\n(i) diferencias de inventario; o\n(ii) costo estimado multiplicando el importe de las ventas por un porcentaje\ncalculado sobre bases confiables en función del margen bruto."}, {"num": 303, "texto": "Una entidad podrá determinar el costo de los bienes vendidos o servicios prestados,\ncuya medición posterior se basa en el costo de la última compra, establecido por el\ninciso c) del párrafo 291, considerando:\na) lo establecido en los párrafos 301 y 302; y\nb) sus políticas contables referidas a bienes de cambio."}, {"num": 304, "texto": "Al seleccionar sus políticas contables, una entidad considerará preferibles aquellos\ncriterios que determinan el costo de bienes vendidos o servicios prestados en función\nde bases que resulten consistentes con las utilizadas para la medición posterior de\nbienes de cambio. Por ejemplo, son criterios preferibles para calcular el costo de los\nbienes vendidos o servicios prestados:\na) Costo de adquisición, costo producción y/o construcción, determinado en\nel momento del reconocimiento (menos pérdidas por desvalorización\nreconocidas), si la medición de los bienes de cambio se realiza sobre la base\ndel costo de adquisición, producción o construcción.\nb) Costo corriente en el momento de la venta, si la medición de los bienes de\ncambio se efectúa sobre la base del costo de reposición, o al costo de\nreproducción y/o reconstrucción."}, {"num": 305, "texto": "Una entidad determinará el costo de los bienes vendidos, cuya medición posterior se\nbasa en el valor neto de realización, mediante dicho criterio.\n\nResultados de tenencia y por cambios en el valor neto de realización"}, {"num": 306, "texto": "Una entidad que mide sus bienes de cambio a costo de reposición o a costo de\nreproducción y/o reconstrucción:\na) No determinará resultados de tenencia cuando calcule el costo de bienes\nvendidos o servicios prestados por diferencias de inventario.\nb) Determinará resultados de tenencia tanto de los bienes en existencia al cierre\ndel período como de los bienes vendidos cuando mida el costo de bienes\nvendidos o servicios prestados en función del costo corriente en el momento\nde la venta."}, {"num": 307, "texto": "Una entidad que mide sus bienes de cambio al valor neto de realización determinará\nel resultado de los cambios en dicho valor tanto en el momento de la medición como\nde la venta.\n\nPresentación en los estados contables"}, {"num": 308, "texto": "En el estado de situación patrimonial, una entidad:\na) Presentará los bienes de cambio separados del resto de los activos y\ndistinguiendo, de corresponder, entre activos corrientes y activos no\ncorrientes.\nb) Incluirá los anticipos a proveedores de este tipo de activos dentro del rubro\nbienes de cambio."}, {"num": 309, "texto": "En el estado de resultados, una entidad presentará por separado:\na) el costo de los bienes vendidos o servicios prestados a continuación de los\ningresos por ventas, con el fin de exponer el resultado bruto;\nb) los resultados por cambios en el valor neto de realización, distintos de los\nreferidos en el inciso d) siguiente, de este;\nc) los resultados de tenencia;\nd) las pérdidas por desvalorización y las reversiones de dichas pérdidas; y\ne) las pérdidas derivadas de improductividades físicas o ineficiencias en el uso de\nlos factores y de la ociosidad por operar debajo del nivel de actividad normal\ndentro de otros gastos.\n\nRevelación en notas\n\nRevelaciones sobre los bienes de cambio"}, {"num": 310, "texto": "Una entidad revelará en notas:\na) la política contable seleccionada para cada clase de bienes de cambio;\nb) las bases y métodos utilizados y los supuestos considerados en las mediciones\nbasadas en valores corrientes;\nc) los componentes principales del rubro bienes de cambio, considerando la\nnaturaleza de cada uno de sus componentes (por ejemplo, materias primas,\nproductos agropecuarios, productos en proceso, productos terminados,\nmercaderías de reventa, bienes de cambio de naturaleza intangible destinados\na la venta en el curso habitual de la actividad ordinaria, productos en tránsito,\nanticipos a proveedores de bienes de cambio); y\nd) las pérdidas (o reversión de pérdidas) por desvalorización reconocidas durante\nel período, explicando sus causas principales.\n\nRevelaciones sobre el costo de los bienes vendidos o servicios prestados"}, {"num": 311, "texto": "Una entidad revelará en notas:\na) el método utilizado para calcular el costo de los bienes vendidos o servicios\nprestados;\nb) el hecho de que el costo de los bienes vendidos o servicios prestados incluye\nmermas, faltantes y resultados de tenencia, si las bases utilizadas para medir\n\nlos activos no son consistentes con las empleadas para determinar dicho costo\n(por ejemplo, porque este último se calculó por diferencias de inventario);\nc) la medición de las partidas que inciden en el costo de los bienes vendidos o\nservicios prestados, distinguiendo:\n(i) la existencia inicial de cada componente;\n(ii) los costos de adquisición, producción o construcción, clasificados según\nla naturaleza de las partidas;\n(iii) otras variaciones no consideradas en los incisos anteriores de este\npárrafo, debiendo indicar, en el caso en que presente esta partida, los\nconceptos incluidos en ella;\n(iv) los resultados de tenencia reconocidos, en el caso de activos que se\nmiden a valores corrientes;\n(v) las transferencias por reclasificación; y\n(vi) la existencia final de cada componente.\n\nOtras normas aplicables"}, {"num": 312, "texto": "Para el tratamiento contable de los componentes de bienes de cambio una entidad\ndeberá contemplar, en tanto resulten pertinentes y no contradigan lo establecido en\nesta sección, otras disposiciones de esta Resolución Técnica u otras normas\ncontables. Por ejemplo, las referidas a:\na) “Medición de costos” [ver los párrafos 102 a 110], y “Medición inicial de bienes\no servicios” [ver los párrafos 203 a 204]\nb) “Medición de valores corrientes” [ver los párrafos 117 a 122].\nc) “Mediciones en moneda extranjera” [ver los párrafos 124 a 128].\nd) “Tratamiento de componentes financieros” [ver los párrafos 129 a 142].\ne) “Baja en cuentas” [ver los párrafos 46 a 48].\nf) “Expresión de los estados contables en moneda de cierre en un contexto de\ninflación (ajuste por inflación de los estados contables)” [ver los párrafos 176 a\n200].\n\nBIENES DE USO Y DEPRECIACIONES\n\nDefinición"}]}, {"id": "c3s6", "nombre": "Bienes de Uso y Depreciaciones", "parrafos": [{"num": 313, "texto": "A los fines del tratamiento de los activos referidos en esta sección, una entidad deberá\nconsiderar la siguiente definición.\n\nBienes de uso: Son activos tangibles:\na) destinados a ser utilizados en la actividad ordinaria de la entidad y no a\nla venta habitual (producción y suministro de bienes y servicios, o para\nfunciones relacionadas con la administración de la entidad); y\nb) que se espera utilizar durante más de un período.\nEste rubro incluye a:\na) los bienes de uso en proceso de producción, construcción, tránsito o\nmontaje;\nb) los activos biológicos utilizados como factor de producción en el\ncurso normal de las operaciones, con el alcance establecido en el\npárrafo 1029; y\nc) los bienes, distintos a propiedades de inversión, afectados a locación o\narrendamiento.\n\nEste rubro excluye a:\na) los inmuebles que cumplen la definición de “Propiedades de inversión”\n[ver el párrafo 359];\nb) los bienes de uso clasificados como “Activos no corrientes mantenidos\npara la venta” [ver el párrafo 416]; y\nc) los activos de naturaleza similar, pero expresamente incluidos en otra\nsección o apartado de esta Resolución Técnica, o en otras normas\ncontables.\n\nReconocimiento"}, {"num": 314, "texto": "Una entidad reconocerá un elemento como bien de uso cuando:\na) cumpla con la definición general del párrafo 22 y la definición específica\ncontenida en el párrafo 313;\nb) su medición satisfaga el requisito de confiabilidad (credibilidad); y\nc) su contribución a los beneficios económicos futuros de la entidad resulte\nprobable.\n\nMedición inicial"}, {"num": 315, "texto": "Una entidad medirá, en el momento del reconocimiento, los bienes de uso de acuerdo\ncon los criterios indicados a continuación:\na) Bienes de uso adquiridos: sobre la base de su costo de adquisición,\ndeterminado según lo establecido en el apartado “Medición de costos de\nadquisición” [ver el párrafo 103].\nb) Bienes de uso producidos o construidos: en función del costo de producción\no costo de construcción, determinado según lo establecido en el apartado\n“Medición del costo de producción o del costo de construcción” [ver los párrafos\n104 a 110].\nc) Bienes de uso recibidos mediante aportes o donaciones: de acuerdo con lo\nestablecido en el inciso c) del párrafo 204.\nd) Bienes de uso recibidos mediante trueques o canjes: de acuerdo con lo\nestablecido en el inciso d) del párrafo 204."}, {"num": 316, "texto": "A la medición realizada según lo establecido en el párrafo anterior, una entidad:\na) sumará la estimación inicial de los costos de desmantelamiento y retiro del\nelemento y de rehabilitación del lugar sobre el que se asienta; y\nb) estimará la obligación en la que incurre, debido a la adquisición del elemento o\nsu utilización con propósitos distintos al de producción de bienes de cambio\ndurante tal período, de conformidad con lo establecido en la sección\n“Previsiones y otros pasivos contingentes”, en los párrafos 489 a 492.\n\nTratamiento de los desembolsos subsiguientes"}, {"num": 317, "texto": "Con posterioridad a su puesta en marcha, una entidad sumará al costo los\ndesembolsos subsiguientes, siempre que:\na) Constituyan una mejora e incrementen la capacidad del activo para generar\nflujos de efectivo futuros; por ejemplo, debido a:\n(i) una extensión de la vida útil estimada (originalmente) del activo;\n(ii) un aumento en su capacidad de servicio;\n(iii) una mejora en la calidad de la producción; o\n(iv) una reducción en los costos de operación.\nb) Se originen en tareas de mantenimiento o reacondicionamiento mayores que\nsolo permitan recuperar la capacidad de servicio del activo para lograr su uso\ncontinuo. A este respecto, una entidad evaluará si:\n(i) una medición confiable indica que toda la erogación o parte de ella es\natribuible al reemplazo o reacondicionamiento de uno o más componentes\ndel activo identificados por la entidad;\n(ii) la depreciación inmediatamente anterior de dichos componentes no fue\ncalculada en función de la vida útil del activo del cual forman parte, sino\nde su propio desgaste o agotamiento y a efectos de reflejar el consumo de\nsu capacidad para generar beneficios que se restablece con las\nmencionadas tareas de mantenimiento; y\n(iii) es probable que, como consecuencia de la erogación, fluyan hacia la\nentidad los beneficios económicos futuros."}, {"num": 318, "texto": "Una entidad imputará las demás erogaciones como:\na) Costo del activo si está destinada al reemplazo de un componente significativo\ny la medición contable del elemento sustituido puede determinarse con\nconfiabilidad (para su baja en cuentas).\nb) Gasto del período, en los demás casos.\n\nMedición posterior"}, {"num": 319, "texto": "Una entidad optará por medir contablemente los bienes de uso de acuerdo con el\n“Modelo de costo” [ver el párrafo 321] o el “Modelo de revaluación” [ver los párrafos\n322 a 338]."}, {"num": 320, "texto": "Una entidad aplicará el mismo modelo al conjunto de activos de similar naturaleza y\nuso en las operaciones de una entidad (clase). Los siguientes son ejemplos de clase\nde bienes de uso:\na) Terrenos.\nb) Edificios.\nc) Maquinarias.\nd) Instalaciones.\ne) Equipos de oficina.\nf) Muebles y útiles.\ng) Rodados.\nh) Aeronaves.\ni) Embarcaciones.\nj) Activos biológicos utilizados como factor de producción en el curso\nnormal de las operaciones.\n\nModelo de costo"}, {"num": 321, "texto": "Cuando una entidad utilice el modelo de costo, medirá sus bienes de uso al costo\noriginal menos la depreciación acumulada y menos las pérdidas por\ndesvalorización acumuladas.\n\nModelo de revaluación\n\nDescripción general del modelo de revaluación"}, {"num": 322, "texto": "Cuando utilice el modelo de revaluación, una entidad:\na) medirá un elemento de bienes de uso por su valor revaluado, que es su valor\nrazonable, en el momento de la revaluación, menos la depreciación acumulada,\ny menos el importe acumulado de las pérdidas por desvalorización;\nb) tendrá en cuenta las guías para determinar el valor razonable proporcionadas\nen el apartado “Medición del valor razonable” [ver los párrafos 117 a 122];\nc) hará las revaluaciones con suficiente regularidad, para asegurar que la medición\ndel activo no difiera significativamente de la que podría determinarse aplicando\nel modelo de revaluación a la fecha de cierre; y\nd) revaluará todos los elementos que pertenezca a la misma clase de activos."}, {"num": 323, "texto": "Una entidad imputará la contrapartida de un aumento en la medición de un bien\nmedido según el modelo de revaluación:\na) cuando no reconoció pérdidas por disminución del valor razonable en los\nresultados de ejercicios previos (incluyendo pérdidas por desvalorización\nreconocidas de acuerdo con los párrafos 145 a 175), al saldo por revaluación\n(que es parte de los resultados diferidos); y\nb) cuando reconoció pérdidas por disminución del valor razonable en los\nresultados de ejercicios previos (incluyendo pérdidas por desvalorización\nreconocidas de acuerdo con los párrafos 145 a 175):\n(i) al resultado del ejercicio por un importe equivalente -como máximo- al de\nlas pérdidas previamente reconocidas (menos la depreciación adicional\nque hubiese contabilizado sin dicha desvalorización); y\n(ii) al saldo por revaluación por el exceso entre el mayor valor y la reversión\nreferida en el inciso anterior."}, {"num": 324, "texto": "Una entidad imputará una disminución en la medición de un bien medido según el\nmodelo de revaluación, incluyendo sus pérdidas por desvalorización:\na) En la medida en que no existiera en el patrimonio neto un saldo por\nrevaluación vinculado con ese activo, al resultado del período.\nb) Cuando existiera en el patrimonio neto un saldo por revaluación vinculado\ncon ese activo:\n(i) como una disminución del saldo por revaluación, por el menor entre:"}, {"num": 325, "texto": "A efectos de contabilizar la contrapartida (saldo por revaluación o resultados) de la\ndisminución de la medición contable del activo, tanto en el primer ejercicio de\naplicación del modelo como en los posteriores, una entidad efectuará las\ncomparaciones entre el importe revaluado y el importe en libros del activo a la fecha\nde la revaluación.\n\nTratamiento de la depreciación acumulada"}, {"num": 326, "texto": "Cuando revalúe un elemento integrante de bienes de uso, una entidad tratará la\ndepreciación acumulada a la fecha de la revaluación de cualquiera de las siguientes\nmaneras:\na) la volverá a calcular en forma proporcional a la revaluación que se practique\nsobre la medición original del bien, de manera que su valor residual después\nde la revaluación sea igual a su importe revaluado; o\nb) la eliminará contra la medición original del activo, de manera que la medición\nneta resultante sea equivalente al importe revaluado.\n\nTratamiento del saldo por revaluación"}, {"num": 327, "texto": "Una entidad podrá transferir directamente a resultados no asignados el saldo por\nrevaluación incluido en el patrimonio neto:\na) a medida que se consume el elemento (en cuyo caso el importe a transferir\nserá igual a la diferencia entre la depreciación calculada según el valor\n\nrevaluado del activo y la depreciación que se hubiera computado en función\nde su costo original);\nb) cuando se produce su baja, retiro, venta o disposición por otro motivo; o\nc) en cualquier momento posterior."}, {"num": 328, "texto": "Cuando una entidad esté alcanzada por lo establecido en el párrafo 323, para aplicar\nlos requerimientos indicados en el párrafo anterior tendrá en cuenta lo siguiente:\na) el saldo por revaluación se incrementará por disminución de un pasivo por\ndesmantelamiento y restauración relacionado con el activo revaluado, salvo\nque deba reconocerlo en el resultado del ejercicio por tratarse de la reversión\nde un déficit de revaluación en el activo que previamente reconoció en\nresultados; y\nb) el saldo por revaluación se reducirá por un incremento en un pasivo por\ndesmantelamiento y restauración relacionado con el activo revaluado."}, {"num": 329, "texto": "Una entidad no expondrá nunca en el resultado del ejercicio las transferencias desde\nel saldo por revaluación a los resultados no asignados."}, {"num": 330, "texto": "Una entidad tratará un cambio entre las alternativas de mantener o transferir el saldo\npor revaluación como una modificación de política contable y, por lo tanto, aplicará\nlo dispuesto en el apartado “Cambios en las políticas contables” [ver los párrafos 84\na 89]."}, {"num": 331, "texto": "Una entidad no distribuirá ni capitalizará el saldo por revaluación mientras\npermanezca como tal. Incluso si la totalidad o una parte de dicho saldo se relacionara\ncon activos consumidos o dados de baja, solo podrá distribuirlo o capitalizarlo a partir\ndel momento en que decida transferirlo a resultados no asignados."}, {"num": 332, "texto": "El saldo por revaluación representará, como mínimo, el valor residual de la\nrevaluación practicada a cada elemento revaluado, neto del pasivo por impuesto\ndiferido determinado según lo establecido en el apartado “Efecto de la revaluación\nsobre el impuesto a las ganancias” [ver los párrafos 334 a 336] (excepto que se trate\nde una entidad pequeña que opte por la política contable del párrafo 572)."}, {"num": 333, "texto": "Una entidad calculará la porción del saldo por revaluación contenida en el valor\nresidual de uno o más bienes revaluados para disminuirlo, cuando corresponda.\n\nEfecto de la revaluación sobre el impuesto a las ganancias"}, {"num": 334, "texto": "Una entidad contabilizará y expondrá los efectos de la revaluación de bienes de uso\nsobre el impuesto a las ganancias, derivadas de las diferencias entre la medición\ncontable y la base impositiva de los bienes revaluados de acuerdo con el apartado\n“Reconocimiento, medición, presentación y revelación del impuesto a las ganancias\ndiferido” [ver los párrafos 578 a 599]."}, {"num": 335, "texto": "Una entidad imputará:\na) contra el saldo por revaluación, el aumento en el pasivo por impuestos\ndiferidos generado por cada revaluación; y\nb) como resultado del ejercicio, la reducción del pasivo por impuestos diferidos\nproducido por la reversión de la diferencia temporaria que lo generó."}, {"num": 336, "texto": "Cuando opte por el criterio de transferir el saldo por revaluación a resultados no\nasignados, según establece el apartado “Tratamiento del saldo por revaluación” [ver\nlos párrafos 327 a 333], una entidad efectuará tales transferencias netas del\ncorrespondiente impuesto diferido.\n\nRequisitos para contabilizar las revaluaciones"}, {"num": 337, "texto": "Una entidad deberá tener la aprobación de su respectivo órgano de administración\npara la contabilización de revaluaciones de bienes de uso."}, {"num": 338, "texto": "El órgano de administración de la entidad aprobará los estados contables que\nincluyan bienes cuya medición se basa en el modelo de la revaluación, siempre que\nexista:\na) documentación de respaldo apropiada para dicha medición;\nb) una política contable escrita y aprobada por el mismo órgano de\nadministración, mediante la cual se describa el método o la técnica de\nvaluación adoptada; y\nc) mecanismos de monitoreo y confirmación de que dicha política contable fue\naplicada en la preparación de los estados contables.\n\nDepreciaciones"}, {"num": 339, "texto": "Una entidad reconocerá el cargo por depreciación:\na) como gasto del período; o\nb) como parte del costo de un activo, cuando deba computarla dentro del costo\nde producción, del costo de construcción o del costo de implantación de\nun bien."}, {"num": 340, "texto": "Una entidad comenzará a reconocer el cargo por depreciación a partir de la puesta\nen marcha del elemento de bien de uso."}, {"num": 341, "texto": "En el caso de los activos biológicos utilizados como factor de producción en el\ncurso normal de las operaciones, una entidad determinará la fecha de puesta en\nmarcha como el momento en que el activo comience la etapa de producción con\nvolúmenes y calidad comercial."}, {"num": 342, "texto": "Para el cómputo de las depreciaciones, una entidad considerará, para cada bien:\na) su medición contable;\nb) su naturaleza;\nc) su fecha de puesta en marcha, que es el momento a partir del cual deben\ncomputarse depreciaciones;\nd) la existencia de evidencias de pérdida de valor anteriores a la puesta en\nmarcha, que deberá reconocer;\ne) su capacidad de servicio, que estimará considerando, entre otros factores:\n(i) el tipo de explotación en la cual se utiliza el bien;\n(ii) la política de mantenimiento de la entidad; y\n(iii) la posible obsolescencia del activo debida, por ejemplo, a cambios\ntecnológicos o en el mercado de los bienes producidos mediante su\nempleo;\nf) el hecho de que algunas partes importantes del activo sufran un desgaste o\nagotamiento distinto al de los demás componentes;\ng) el valor neto de realización que estima tendrá el bien cuando se agote su\ncapacidad de servicio;\nh) la capacidad de servicio del bien ya utilizada debido al desgaste o agotamiento\nnormal; y\ni) los deterioros que pudiere haber sufrido el bien por averías u otras razones."}, {"num": 343, "texto": "Tras el reconocimiento de una pérdida por desvalorización o de una reversión de\nla pérdida de valor debido a la comparación con el valor recuperable [ver los párrafos\n145 a 175], una entidad adecuará los cargos por depreciación para distribuir la nueva\nmedición contable del activo (menos su valor recuperable final), de una forma\nsistemática a lo largo de la vida útil restante del bien."}, {"num": 344, "texto": "Cuando haya incorporado un activo mediante un arrendamiento financiero de\nacuerdo con la sección “Arrendamientos” [ver los párrafos 532 a 559] y la obtención\nde su propiedad por parte del arrendatario no esté razonablemente asegurada, una\nentidad depreciará totalmente dicho activo durante el menor de los siguientes plazos:\na) el del contrato; o\nb) el de su capacidad de servicio."}, {"num": 345, "texto": "Si apareciesen nuevas estimaciones -debidamente fundadas- acerca de la capacidad\nde servicio de los bienes, de su valor recuperable final o de cualquier otro elemento\nconsiderado para el cálculo de las depreciaciones, una entidad adecuará las\ndepreciaciones posteriores en función de las nuevas evidencias, a la fecha de\nexteriorización de tales elementos.\n\nComparación con el valor recuperable"}, {"num": 346, "texto": "A los fines indicados en este título, una entidad aplicará lo establecido en la sección\n“Comparación de la medición de ciertos activos con su valor recuperable” [ver los\npárrafos 145 a 175].\n\nCompensación por desvalorización, pérdida o abandono"}, {"num": 347, "texto": "Una entidad incluirá en el resultado del período, y cuando tales conceptos sean\nexigibles, las compensaciones procedentes de terceros por elementos de bienes de\nuso que:\na) hayan experimentado una desvalorización;\nb) se hayan perdido; o\nc) haya abandonado.\n\nPresentación en los estados contables"}, {"num": 348, "texto": "En el estado de situación patrimonial, una entidad:\na) Presentará bienes de uso separados del resto de los activos, como activos no\ncorrientes.\nb) Incluirá los anticipos a proveedores de este tipo de activos dentro del rubro\nbienes de uso."}, {"num": 349, "texto": "Excepto cuando esta Resolución Técnica u otras normas contables requieran y\npermitan algo diferente, una entidad presentará el cargo por depreciaciones dentro:\na) del costo de los bienes vendidos o servicios prestados, cuando las\ndepreciaciones forman parte del costo de producción o del costo de\nconstrucción; y\nb) de los demás gastos (comerciales, administrativos, etc.), en los restantes\ncasos."}, {"num": 350, "texto": "Una entidad presentará las pérdidas por desvalorización y las reversiones de\ndichas pérdidas en el estado de resultados, bajo un título específico para tales\nconceptos."}, {"num": 351, "texto": "Una entidad presentará los resultados surgidos de la baja en cuentas de estos\nactivos, por su disposición, bajo el título otros ingresos y gastos en el estado de\nresultados, separado de los resultados provenientes de los ingresos por actividades\nordinarias.\n\nRevelación en notas\n\nRevelaciones de carácter general"}, {"num": 352, "texto": "Una entidad revelará en notas:\na) las políticas contables empleadas y los criterios de medición aplicados para\ncada clase de bienes de uso; y\nb) las bases y métodos utilizados para la determinación de las depreciaciones."}, {"num": 353, "texto": "Una entidad revelará para cada clase de bienes de uso, separando valores originales\nde depreciaciones acumuladas, los siguientes importes:\na) saldos iniciales;\nb) altas (adiciones);\nc) revaluaciones;\nd) bajas;\ne) depreciaciones;\nf) pérdidas por desvalorización;\ng) recuperación de pérdidas por desvalorización;\nh) transferencias por reclasificaciones;\ni) otras variaciones no consideradas en los incisos anteriores de este párrafo,\ndebiendo indicar, en el caso en que presente esta partida, los conceptos\nincluidos en ella; y\nj) saldos finales."}, {"num": 354, "texto": "Una entidad individualizará, dentro de cada clase de bienes de uso, los importes\ncorrespondientes a los incorporados mediante arrendamientos financieros."}, {"num": 355, "texto": "Una entidad revelará los bienes de disponibilidad restringida individualizando:\na) las causas (legales, contractuales o situaciones de hecho) que limitan su\ndisponibilidad y las mediciones contables correspondientes; y\nb) los componen
