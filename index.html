 que\ngeneran pérdidas (contratos de carácter onerosos)” [ver los párrafos 527 a 531].\nb) En los restantes casos: evaluará si tales contratos califican como instrumentos\nderivados, en cuyo caso aplicará la sección “Instrumentos derivados y\noperaciones de cobertura” [ver los párrafos 990 a 1020].\n\nPresentación en los estados contables\n\nEstado de situación patrimonial"}, {"num": 1033, "texto": "En el estado de situación patrimonial, una entidad:\na) Presentará un rubro específico de “activos biológicos”.\nb) Podrá presentar los activos biológicos utilizados como factores de\nproducción en el curso normal de las operaciones:\n(i) en un rubro específico; o\n(ii) dentro del rubro “bienes de uso” (discriminándolos como una clase\nseparada).\nc) Presentará los productos agropecuarios dentro del rubro “bienes de cambio”.\n\nEstado de resultados"}, {"num": 1034, "texto": "Una entidad que mida sus activos biológicos a valor razonable menos los gastos\nestimados en el punto de venta, presentará el resultado de la producción\nagropecuaria, procedente de considerar el ingreso por la producción y sus costos\nasociados, en el cuerpo del estado de resultados del siguiente modo:\na) Cuando la actividad agropecuaria sea la predominante respecto del conjunto\nde las restantes actividades: en primer lugar.\nb) En los restantes casos: a continuación del resultado bruto por la venta de bienes\ny la prestación de servicios y antes de los resultados por medición de bienes de\ncambio al valor neto de realización, de corresponder (según el inciso c, del\npárrafo 629)."}, {"num": 1035, "texto": "Una entidad presentará los ingresos de actividades ordinarias procedentes de\ntransacciones (operaciones de intercambio) de conformidad con la sección\n“Reconocimiento de ingresos de actividades ordinarias procedentes de transacciones\n(operaciones de intercambio)” [ver los párrafos 522 a 526].\n\nRevelación en notas"}, {"num": 1036, "texto": "Una entidad revelará en notas:\na) las políticas contables empleadas y los criterios de medición aplicados para\nmedir los activos biológicos y los productos agropecuarios en el momento\nde la cosecha, recolección, obtención o faena; y\nb) las bases y métodos utilizados y los supuestos considerados en las mediciones\nbasadas en el valor razonable."}, {"num": 1037, "texto": "Una entidad informará el grado de incertidumbre asociado al proceso de medición del\nvalor razonable de sus activos biológicos y de sus productos agropecuarios en\nel momento de la cosecha, recolección, obtención o faena."}, {"num": 1038, "texto": "Una entidad revelará cualquier base de medición utilizada distinta del valor razonable\nmenos gastos estimados en el punto de venta admitidas por esta sección, junto con\nuna descripción de las limitaciones que la llevaron a utilizar ese otro criterio."}, {"num": 1039, "texto": "Una entidad revelará la composición de los ingresos por producción agropecuaria."}, {"num": 1040, "texto": "Una entidad revelará, mediante una nota o anexo, los costos de producción\nrelacionados con los ingresos de producción agropecuaria, clasificados por su\nnaturaleza y por su función.\n\nOtras normas aplicables"}, {"num": 1041, "texto": "Para el tratamiento contable de los rubros contemplados en esta sección, una entidad\ndeberá contemplar, en tanto resulten pertinentes y no contradigan lo establecido en\nesta sección, otras disposiciones de esta Resolución Técnica u otras normas\ncontables. Por ejemplo:\na) “Medición de costos” [ver los párrafos 102 a 110].\nb) “Medición inicial de bienes o servicios” [ver los párrafos 203 a 204].\nc) “Medición del valor razonable” [ver los párrafos 117 a 122].\nd) “Mediciones en moneda extranjera” [ver los párrafos 124 a 128].\ne) “Expresión de los estados contables en moneda de cierre en un contexto de\ninflación (ajuste por inflación de los estados contables)” [ver los párrafos 176 a\n200].\n\nCAPÍTULO 11\n\nESTADOS CONTABLES DE NEGOCIOS CONJUNTOS NO SOCIETARIOS: CUESTIONES\nESPECÍFICAS"}]}]}, {"id": "cap11", "num": 11, "nombre": "Negocios Conjuntos No Societarios", "icono": "🏢", "secciones": [{"id": "c11s1", "nombre": "Negocios Conjuntos", "parrafos": [{"num": 1042, "texto": "Resulta conveniente que un negocio conjunto no societario confeccione estados\ncontables que muestren el patrimonio en condominio de las partes y los resultados\ndel negocio conjunto no societario, de modo que cada una de sus partes pueda\nutilizarlos como base para reflejar, en sus propios estados contables, su\nparticipación en ellos."}, {"num": 1043, "texto": "En sus estados contables, un negocio conjunto no societario no incluirá como\nactivos los derechos de uso constituidos sobre bienes de propiedad de las partes."}, {"num": 1044, "texto": "En sus estados contables, un negocio conjunto no societario incluirá los aportes\nen activos intangibles:\na) sólo si, de acuerdo con las normas contables establecidas en esta Resolución\nTécnica u otras normas contables, estuvieran reconocidos previamente en la\ncontabilidad del aportante; y\nb) por el mismo valor al que se encuentran registrados en los libros del aportante."}, {"num": 1045, "texto": "Si los estados contables del negocio conjunto no societario hubieran sido emitidos\nen una moneda extranjera, se deberán convertir a moneda argentina aplicando\nlas normas de la sección “Conversión de estados contables” [ver los párrafos 752 al\n763].\n\nAPÉNDICE A: NORMAS DE TRANSICIÓN\n\nAlcance\n\nA1. Una entidad aplicará las disposiciones del presente Apéndice para la preparación de:\na) los estados contables correspondientes al primer ejercicio en que utilice los\nrequerimientos contenidos en la presente Resolución Técnica; y\nb) los estados contables de períodos intermedios comprendidos en el referido\nejercicio.\n\nDefiniciones\n\nA2. A los fines de este Apéndice, una entidad considerará las definiciones siguientes:\n\nFecha de aplicación inicial: Fecha de inicio del primer ejercicio en el cual una\nentidad utilice los requerimientos de esta Resolución Técnica para la preparación\nde sus estados contables (por ejemplo, para una entidad cuyos primeros\nestados contables preparados de acuerdo con los requerimientos de esta\nResolución Técnica sean los del ejercicio finalizado el 30 de junio de 2025, la\nfecha de aplicación inicial será el 1º de julio de 2024).\n\nInicio del año comparativo: Primer día del ejercicio comparativo incluido en los\nestados contables correspondientes al primer ejercicio en el cual una entidad\naplique los requerimientos de esta Resolución Técnica por primera vez (por\nejemplo, para una entidad cuyos primeros estados contables preparados de\nacuerdo con los requerimientos de esta Resolución Técnica sean los\ncorrespondientes al ejercicio finalizado el 30 de junio de 2025, la fecha de inicio\ndel año comparativo será el 1º de julio de 2023).\n\nNormas anteriores: Son las normas que utilizó la entidad para preparar los\nestados contables correspondientes al último ejercicio previo a la aplicación\ninicial los requerimientos de esta Resolución Técnica (por ejemplo, si el primer\nejercicio en el cual la entidad confecciona sus estados contables de acuerdo los\nrequerimientos de esta Resolución Técnica es el finalizado el 30 de junio de 2025,\ny en sus estados contables referidos al ejercicio finalizado el 30 de junio de 2024\nla norma de reconocimiento y medición general que utilizaba era la Resolución\nTécnica N° 41, las normas anteriores comprenden a la Resolución Técnica N° 41\ny todas las demás aplicadas para la emisión de tales estados contables).\n\nRequerimientos de esta Resolución Técnica: A los fines de este Apéndice, son\nlos contenidos en la presente Resolución Técnica.\n\nGuías para la aplicación de la presente Resolución Técnica por primera vez, en general\n\nClasificación de la entidad. Efectos.\n\nA3. En la fecha de la aplicación inicial, una entidad aplicará los párrafos 6 a 8 de esta\nResolución Técnica con el objeto de determinar su clasificación como:\na) entidad pequeña;\nb) entidad mediana; o\nc) una de las restantes entidades.\n\nA3A. A los fines de aplicar el párrafo A3, una entidad considerará que:\na) los ingresos obtenidos en el ejercicio inmediato anterior son los determinados de\nconformidad con las normas anteriores; y\nb) los importes con los cuales comparará los ingresos indicados en el inciso a)\ninmediato anterior son los que definirá la FACPCE de acuerdo con los párrafos 6\na 8.\nA4. Para aplicar los requerimientos de esta Resolución Técnica, incluyendo este Apéndice,\nuna entidad seleccionará políticas contables que sean consistentes con la clasificación\nque haya determinado de acuerdo con el párrafo anterior.\nA5. Cuando, en el primer ejercicio de aplicación de la presente Resolución Técnica, una\nentidad deba cambiar de categoría debido a lo establecido en los párrafos A3 y A3A:\na) no aplicará lo indicado en el inciso c) del párrafo 88; y\nb) considerará la aplicación de un nuevo criterio contable introducido por la presente\nResolución Técnica, de corresponder, como un cambio obligatorio de política\ncontable [ver el inciso a) del párrafo 84].\nA6. Una entidad considerará un cambio voluntario de política contable, y por lo tanto dará\ncumplimiento a lo establecido en el inciso b) del párrafo 84, cualquier modificación\nrespecto de los criterios utilizados en los últimos estados contables preparados\nconforme a normas anteriores, siempre que:\na) no resulte de los factores referidos en el párrafo anterior; y\nb) eran admitidos por las normas anteriores a la vez que son admitidos por esta\nResolución Técnica.\n\nAclaración (texto no integrante de la presente Resolución Técnica)\n\nExisten dos tipos de cambios que podrían tener lugar como consecuencia de la aplicación\ninicial de la presente Resolución Técnica:\na) Cambios de criterios que no podrían haberse efectuado aplicando las normas anteriores\n(“cambios tipo 1”).\nb) Cambios de criterios respecto de los utilizados en los últimos estados contables\npreparados conforme a normas anteriores, que podrían haberse efectuado aplicando las\nnormas anteriores (“cambios tipo 2”).\nEjemplos: Cambios “tipo 1”\nEjemplo 1\n\nUna entidad, al determinar su clasificación en la fecha de la aplicación inicial, pasa a ser\nconsiderada pequeña. De acuerdo con los parámetros de la Resolución Técnica N° 41, en el\nejercicio inmediato anterior, había sido clasificada como mediana.\nSi la entidad optara por no aplicar el método del impuesto diferido a causa de su nueva\ncategoría, al ser un cambio que no podría haber efectuado aplicando las normas anteriores,\nconsiderará tal modificación de criterio como si tratara de un cambio obligatorio de política\ncontable.\nEjemplo 2\n\nUna entidad, al determinar su clasificación en la fecha de la aplicación inicial, no cambió de\ncategoría.\nEsta Resolución Técnica permite medir sus bienes de cambio en función a las últimas\ncompras, mientras que la Resolución Técnica N° 17 no lo admitía. Si la entidad optara por\nmedir sus bienes de cambio en función a las últimas compras, considerará tal modificación de\ncriterio como si tratara de un cambio obligatorio de política contable.\nEl efecto es que la entidad no deberá justificar que el nuevo criterio produce mejor\ninformación que el aplicado de acuerdo con las normas anteriores para utilizarlo.\n\nEjemplos: Cambios “tipo 2”\n\nEjemplo 1\n\nUna entidad, al determinar su clasificación en la fecha de la aplicación inicial, es considerada\npequeña. De acuerdo con los parámetros de la Resolución Técnica N° 41 también había sido\nconsiderada pequeña.\n\nSi la entidad optara por no segregar componentes financieros, cuando antes los segregaba,\ndeberá tratar tal modificación de criterio como si un cambio voluntario de política contable.\n\nEjemplo 2\n\nUna entidad, al determinar su clasificación en la fecha de la aplicación inicial, pasa a ser\nconsiderada pequeña. De acuerdo con los parámetros de la Resolución Técnica N° 41, en el\nejercicio inmediato anterior había sido clasificado como mediana.\n\nEsta Resolución Técnica permite aplicar el modelo de revaluación, y las normas anteriores\ntambién se lo permitía. Si la entidad optara por medir una o más clases de sus bienes de uso\nutilizando el modelo de revaluación, considerará tal modificación de criterio como un cambio\nvoluntario de política contable.\n\nEl efecto es que la entidad deberá justificar que el nuevo criterio produce mejor\ninformación que el aplicado de acuerdo con las normas anteriores para utilizarlo, según\nel inciso b) del párrafo 87.\n\nA7. La decisión de aplicar la solución práctica establecida en los párrafos A15 a A17 de este\nApéndice no será considerado un cambio de política contable [ver el párrafo A15].\nA8. Al aplicar los tratamientos establecidos en el párrafo 573, el inciso a) (i) del párrafo 976,\no el inciso b) (ii) del párrafo 1027, la entidad deberá determinar si la condición de costo\no esfuerzo desproporcionado se cumple en la fecha de la aplicación inicial.\n\nEnfoques para la aplicación inicial\n\nA9. Para aplicar inicialmente los requerimientos de esta Resolución Técnica, una entidad:\na) Aplicará alguno de los siguientes enfoques:\n\n(I). enfoque retroactivo integral [ver los párrafos A11 y A12]; o\n(II). enfoque retroactivo simplificado [ver los párrafos A13 y A14].\nb) Sin perjuicio del enfoque que haya seleccionado de acuerdo con el inciso a) de\neste párrafo, podrá utilizar la solución práctica prevista en los párrafos A15 a A17.\n\nA10. En el ejercicio de aplicación inicial de los requerimientos de esta Resolución Técnica,\nuna entidad deberá revelar en notas:\na) El enfoque utilizado para efectuar tal aplicación inicial.\nb) Los criterios específicos seleccionados para aplicar el enfoque utilizado.\nc) En el caso de haber optado por aplicar el enfoque simplificado, el hecho de haber\nutilizado el enfoque integral para un rubro específico, tal como lo admite el inciso\na) del párrafo A14.\n\nEnfoque retroactivo integral\n\nA11. Al inicio del año comparativo, una entidad:\na) reconocerá todos los activos y pasivos cuyo reconocimiento sea requerido por\nesta Resolución Técnica u otras normas contables;\nb) no reconocerá partidas como activos o pasivos si esta Resolución Técnica u\notras normas contables no lo permiten;\nc) clasificará las partidas reconocidas aplicando las normas de presentación\ncontenidas en esta Resolución Técnica u otras normas contables; y\nd) aplicará esta Resolución Técnica u otras normas contables para medir todos\nlos activos y pasivos reconocidos.\n\nA12. Al aplicar el enfoque retroactivo integral, una entidad:\na) Expondrá su efecto sobre los saldos al inicio del año comparativo que se\npresenten en el estado de evolución de patrimonio neto y, cuando\ncorrespondiere, en el estado de flujos de efectivo, a excepción de los que surjan\nde aplicar la solución práctica establecida en los párrafos A15 a A17 de este\nApéndice.\nb) Adecuará las cifras correspondientes a los períodos previos que se incluyan\ncomo información comparativa.\nc) Además de todo lo requerido por esta Resolución Técnica sobre un cambio en\npolítica contable (por ejemplo, la revelación de motivos exigida por el inciso b)\ndel párrafo 84), describirá en notas las principales partidas que fueron afectadas\npor los cambios en criterios de reconocimiento, medición o presentación,\ndistinguiendo los efectos de:\n(i) Los cambios requeridos en sus políticas contables, de acuerdo con lo\nindicado en el párrafo A5 del presente Anexo.\n(ii) Los cambios admitidos en sus políticas contables, de acuerdo con lo\nindicado en el párrafo A6 del presente Anexo.\n\nEnfoque retroactivo simplificado\n\nA13. En la fecha de aplicación inicial, una entidad:\na) reconocerá todos los activos y pasivos cuyo reconocimiento sea requerido por\nesta Resolución técnica u otras normas contables;\nb) no reconocerá partidas como activos o pasivos si esta Resolución Técnica u\notras normas contables no lo permiten;\nc) clasificará las partidas reconocidas aplicando las normas de presentación\ncontenidas en esta Resolución Técnica u otras normas contables; y\nd) aplicará esta Resolución Técnica u otras normas contables para medir todos\nlos activos y pasivos reconocidos.\nA14. Al aplicar el enfoque retroactivo simplificado, una entidad:\na) Podrá aplicar a un rubro específico los criterios establecidos en los párrafos A11\ny A12. Tal decisión afecta solo a ese rubro, y no contradice el enfoque\nseleccionado.\nb) Adecuará las cifras comparativas incluidas en el estado de situación patrimonial\nde acuerdo con los criterios de reconocimiento y medición establecidos en esta\nResolución Técnica u otras normas contables, y las notas y anexos\nrelacionados. Sin embargo, no adecuará la información comparativa del estado\nde resultados, del estado de flujos de efectivo, del estado de evolución del\npatrimonio neto, y de las notas y anexos relacionados, para reflejar los cambios\nen criterios de reconocimiento y medición establecidos en la presente Resolución\nTécnica u otras normas contables, excepto que aplique la opción establecida\nen el inciso anterior de este párrafo.\nc) Adecuará las cifras que se incluyan como información comparativa de acuerdo\ncon los criterios de presentación establecidos en esta Resolución Técnica u\notras normas contables.\nd) Expondrá el efecto de aplicar este enfoque sobre los saldos a la fecha de\naplicación inicial que se presenten en el estado de evolución de patrimonio neto\ny, cuando correspondiere, en el estado de flujos de efectivo, incluyendo los que\nsurgen de aplicar solución práctica establecida en los párrafos A15 a A17 de este\nApéndice, excepto que utilice la opción establecida en el inciso a) de este\npárrafo, en cuyo caso expondrá solo los efectos relacionados con el rubro\nseleccionado al inicio del ejercicio comparativo,\ne) Además de lo establecido por esta Resolución Técnica respecto de un cambio\nen la política contable, (por ejemplo, la revelación de motivos exigida por el\ninciso b) del párrafo 84), una entidad describirá en notas:\n(i) Las principales partidas que fueron afectadas por cambios en criterios de\nreconocimiento, medición o presentación, distinguiendo:"}]}]}]}, {"id": "apendice", "nombre": "APÉNDICE", "capitulos": [{"id": "apA", "num": 99, "nombre": "Apéndice A: Normas de Transición", "icono": "📎", "secciones": [{"id": "apA_s1", "nombre": "Normas de Transición", "parrafos": [{"num": "A1", "texto": "Una entidad aplicará las disposiciones del presente Apéndice para la preparación de:\na) los estados contables correspondientes al primer ejercicio en que utilice los\n requerimientos contenidos en la presente Resolución Técnica; y\nb) los estados contables de períodos intermedios comprendidos en el referido\n ejercicio.\n\nDefiniciones"}, {"num": "A2", "texto": "A los fines de este Apéndice, una entidad considerará las definiciones siguientes:\n\n Fecha de aplicación inicial: Fecha de inicio del primer ejercicio en el cual una\n entidad utilice los requerimientos de esta Resolución Técnica para la preparación\n de sus estados contables (por ejemplo, para una entidad cuyos primeros\n estados contables preparados de acuerdo con los requerimientos de esta\n Resolución Técnica sean los del ejercicio finalizado el 30 de junio de 2025, la\n fecha de aplicación inicial será el 1º de julio de 2024).\n\n Inicio del año comparativo: Primer día del ejercicio comparativo incluido en los\n estados contables correspondientes al primer ejercicio en el cual una entidad\n aplique los requerimientos de esta Resolución Técnica por primera vez (por\n ejemplo, para una entidad cuyos primeros estados contables preparados de\n acuerdo con los requerimientos de esta Resolución Técnica sean los\n correspondientes al ejercicio finalizado el 30 de junio de 2025, la fecha de inicio\n del año comparativo será el 1º de julio de 2023).\n\n Normas anteriores: Son las normas que utilizó la entidad para preparar los\n estados contables correspondientes al último ejercicio previo a la aplicación\n inicial los requerimientos de esta Resolución Técnica (por ejemplo, si el primer\n ejercicio en el cual la entidad confecciona sus estados contables de acuerdo los\n requerimientos de esta Resolución Técnica es el finalizado el 30 de junio de 2025,\n y en sus estados contables referidos al ejercicio finalizado el 30 de junio de 2024\n la norma de reconocimiento y medición general que utilizaba era la Resolución\n Técnica N° 41, las normas anteriores comprenden a la Resolución Técnica N° 41\n y todas las demás aplicadas para la emisión de tales estados contables).\n\n Requerimientos de esta Resolución Técnica: A los fines de este Apéndice, son\n los contenidos en la presente Resolución Técnica.\n\nGuías para la aplicación de la presente Resolución Técnica por primera vez, en general\n\nClasificación de la entidad. Efectos."}, {"num": "A3", "texto": "En la fecha de la aplicación inicial, una entidad aplicará los párrafos 6 a 8 de esta\n Resolución Técnica con el objeto de determinar su clasificación como:\na) entidad pequeña;\nb) entidad mediana; o\nc) una de las restantes entidades.\n\nA3A. A los fines de aplicar el párrafo A3, una entidad considerará que:\na) los ingresos obtenidos en el ejercicio inmediato anterior son los determinados de\n conformidad con las normas anteriores; y\nb) los importes con los cuales comparará los ingresos indicados en el inciso a)\n inmediato anterior son los que definirá la FACPCE de acuerdo con los párrafos 6\n a 8."}, {"num": "A4", "texto": "Para aplicar los requerimientos de esta Resolución Técnica, incluyendo este Apéndice,\n una entidad seleccionará políticas contables que sean consistentes con la clasificación\n que haya determinado de acuerdo con el párrafo anterior."}, {"num": "A5", "texto": "Cuando, en el primer ejercicio de aplicación de la presente Resolución Técnica, una\n entidad deba cambiar de categoría debido a lo establecido en los párrafos A3 y A3A:\na) no aplicará lo indicado en el inciso c) del párrafo 88; y\nb) considerará la aplicación de un nuevo criterio contable introducido por la presente\n Resolución Técnica, de corresponder, como un cambio obligatorio de política\n contable [ver el inciso a) del párrafo 84]."}, {"num": "A6", "texto": "Una entidad considerará un cambio voluntario de política contable, y por lo tanto dará\n cumplimiento a lo establecido en el inciso b) del párrafo 84, cualquier modificación\n respecto de los criterios utilizados en los últimos estados contables preparados\n conforme a normas anteriores, siempre que:\na) no resulte de los factores referidos en el párrafo anterior; y\nb) eran admitidos por las normas anteriores a la vez que son admitidos por esta\n Resolución Técnica.\n\n Aclaración (texto no integrante de la presente Resolución Técnica)\n\n Existen dos tipos de cambios que podrían tener lugar como consecuencia de la aplicación\n inicial de la presente Resolución Técnica:\na) Cambios de criterios que no podrían haberse efectuado aplicando las normas anteriores\n (“cambios tipo 1”).\nb) Cambios de criterios respecto de los utilizados en los últimos estados contables\n preparados conforme a normas anteriores, que podrían haberse efectuado aplicando las\n normas anteriores (“cambios tipo 2”).\n Ejemplos: Cambios “tipo 1”\n Ejemplo 1\n\n Una entidad, al determinar su clasificación en la fecha de la aplicación inicial, pasa a ser\n considerada pequeña. De acuerdo con los parámetros de la Resolución Técnica N° 41, en el\n ejercicio inmediato anterior, había sido clasificada como mediana.\n Si la entidad optara por no aplicar el método del impuesto diferido a causa de su nueva\n categoría, al ser un cambio que no podría haber efectuado aplicando las normas anteriores,\n considerará tal modificación de criterio como si tratara de un cambio obligatorio de política\n contable.\n Ejemplo 2\n Una entidad, al determinar su clasificación en la fecha de la aplicación inicial, no cambió de\n categoría.\n Esta Resolución Técnica permite medir sus bienes de cambio en función a las últimas\n compras, mientras que la Resolución Técnica N° 17 no lo admitía. Si la entidad optara por\n medir sus bienes de cambio en función a las últimas compras, considerará tal modificación de\n criterio como si tratara de un cambio obligatorio de política contable.\n El efecto es que la entidad no deberá justificar que el nuevo criterio produce mejor\n información que el aplicado de acuerdo con las normas anteriores para utilizarlo.\n\n Ejemplos: Cambios “tipo 2”\n\n Ejemplo 1\n\n Una entidad, al determinar su clasificación en la fecha de la aplicación inicial, es considerada\n pequeña. De acuerdo con los parámetros de la Resolución Técnica N° 41 también había sido\n considerada pequeña.\n\n Si la entidad optara por no segregar componentes financieros, cuando antes los segregaba,\n deberá tratar tal modificación de criterio como si un cambio voluntario de política contable.\n\n Ejemplo 2\n\n Una entidad, al determinar su clasificación en la fecha de la aplicación inicial, pasa a ser\n considerada pequeña. De acuerdo con los parámetros de la Resolución Técnica N° 41, en el\n ejercicio inmediato anterior había sido clasificado como mediana.\n\n Esta Resolución Técnica permite aplicar el modelo de revaluación, y las normas anteriores\n también se lo permitía. Si la entidad optara por medir una o más clases de sus bienes de uso\n utilizando el modelo de revaluación, considerará tal modificación de criterio como un cambio\n voluntario de política contable.\n\n El efecto es que la entidad deberá justificar que el nuevo criterio produce mejor\n información que el aplicado de acuerdo con las normas anteriores para utilizarlo, según\n el inciso b) del párrafo 87."}, {"num": "A7", "texto": "La decisión de aplicar la solución práctica establecida en los párrafos A15 a A17 de este\n Apéndice no será considerado un cambio de política contable [ver el párrafo A15]."}, {"num": "A8", "texto": "Al aplicar los tratamientos establecidos en el párrafo 573, el inciso a) (i) del párrafo 976,\n o el inciso b) (ii) del párrafo 1027, la entidad deberá determinar si la condición de costo\n o esfuerzo desproporcionado se cumple en la fecha de la aplicación inicial.\n\nEnfoques para la aplicación inicial"}, {"num": "A9", "texto": "Para aplicar inicialmente los requerimientos de esta Resolución Técnica, una entidad:\na) Aplicará alguno de los siguientes enfoques:\n\n (I). enfoque retroactivo integral [ver los párrafos A11 y A12]; o\n (II). enfoque retroactivo simplificado [ver los párrafos A13 y A14].\nb) Sin perjuicio del enfoque que haya seleccionado de acuerdo con el inciso a) de\n este párrafo, podrá utilizar la solución práctica prevista en los párrafos A15 a A17.\nA10. En el ejercicio de aplicación inicial de los requerimientos de esta Resolución Técnica,\n una entidad deberá revelar en notas:\na) El enfoque utilizado para efectuar tal aplicación inicial.\nb) Los criterios específicos seleccionados para aplicar el enfoque utilizado.\nc) En el caso de haber optado por aplicar el enfoque simplificado, el hecho de haber\n utilizado el enfoque integral para un rubro específico, tal como lo admite el inciso\na) del párrafo A14.\n\nEnfoque retroactivo integral"}, {"num": "A17", "texto": "277\nA10. En el ejercicio de aplicación inicial de los requerimientos de esta Resolución Técnica,\n una entidad deberá revelar en notas:\na) El enfoque utilizado para efectuar tal aplicación inicial.\nb) Los criterios específicos seleccionados para aplicar el enfoque utilizado.\nc) En el caso de haber optado por aplicar el enfoque simplificado, el hecho de haber\n utilizado el enfoque integral para un rubro específico, tal como lo admite el inciso\na) del párrafo A14.\n\nEnfoque retroactivo integral"}, {"num": "A10", "texto": "En el ejercicio de aplicación inicial de los requerimientos de esta Resolución Técnica,\n una entidad deberá revelar en notas:\na) El enfoque utilizado para efectuar tal aplicación inicial.\nb) Los criterios específicos seleccionados para aplicar el enfoque utilizado.\nc) En el caso de haber optado por aplicar el enfoque simplificado, el hecho de haber\n utilizado el enfoque integral para un rubro específico, tal como lo admite el inciso\na) del párrafo A14.\n\nEnfoque retroactivo integral"}, {"num": "A14", "texto": "Enfoque retroactivo integral"}, {"num": "A11", "texto": "Al inicio del año comparativo, una entidad:\na) reconocerá todos los activos y pasivos cuyo reconocimiento sea requerido por\n esta Resolución Técnica u otras normas contables;\nb) no reconocerá partidas como activos o pasivos si esta Resolución Técnica u\n otras normas contables no lo permiten;\nc) clasificará las partidas reconocidas aplicando las normas de presentación\n contenidas en esta Resolución Técnica u otras normas contables; y\nd) aplicará esta Resolución Técnica u otras normas contables para medir todos\n los activos y pasivos reconocidos."}, {"num": "A12", "texto": "Al aplicar el enfoque retroactivo integral, una entidad:\na) Expondrá su efecto sobre los saldos al inicio del año comparativo que se\n presenten en el estado de evolución de patrimonio neto y, cuando\n correspondiere, en el estado de flujos de efectivo, a excepción de los que surjan\n de aplicar la solución práctica establecida en los párrafos A15 a A17 de este\n Apéndice.\nb) Adecuará las cifras correspondientes a los períodos previos que se incluyan\n como información comparativa.\nc) Además de todo lo requerido por esta Resolución Técnica sobre un cambio en\n política contable (por ejemplo, la revelación de motivos exigida por el inciso b)\n del párrafo 84), describirá en notas las principales partidas que fueron afectadas\n por los cambios en criterios de reconocimiento, medición o presentación,\n distinguiendo los efectos de:\n(i) Los cambios requeridos en sus políticas contables, de acuerdo con lo\n indicado en el párrafo A5 del presente Anexo.\n(ii) Los cambios admitidos en sus políticas contables, de acuerdo con lo\n indicado en el párrafo A6 del presente Anexo.\n\nEnfoque retroactivo simplificado"}, {"num": "A13", "texto": "En la fecha de aplicación inicial, una entidad:\na) reconocerá todos los activos y pasivos cuyo reconocimiento sea requerido por\n esta Resolución técnica u otras normas contables;\nb) no reconocerá partidas como activos o pasivos si esta Resolución Técnica u\n otras normas contables no lo permiten;\nc) clasificará las partidas reconocidas aplicando las normas de presentación\n contenidas en esta Resolución Técnica u otras normas contables; y\nd) aplicará esta Resolución Técnica u otras normas contables para medir todos\n los activos y pasivos reconocidos."}, {"num": "A14", "texto": "Al aplicar el enfoque retroactivo simplificado, una entidad:\na) Podrá aplicar a un rubro específico los criterios establecidos en los párrafos A11\n y A12. Tal decisión afecta solo a ese rubro, y no contradice el enfoque\n seleccionado.\nb) Adecuará las cifras comparativas incluidas en el estado de situación patrimonial\n de acuerdo con los criterios de reconocimiento y medición establecidos en esta\n Resolución Técnica u otras normas contables, y las notas y anexos\n relacionados. Sin embargo, no adecuará la información comparativa del estado\n de resultados, del estado de flujos de efectivo, del estado de evolución del\n patrimonio neto, y de las notas y anexos relacionados, para reflejar los cambios\n en criterios de reconocimiento y medición establecidos en la presente Resolución\n Técnica u otras normas contables, excepto que aplique la opción establecida\n en el inciso anterior de este párrafo.\nc) Adecuará las cifras que se incluyan como información comparativa de acuerdo\n con los criterios de presentación establecidos en esta Resolución Técnica u\n otras normas contables.\nd) Expondrá el efecto de aplicar este enfoque sobre los saldos a la fecha de\n aplicación inicial que se presenten en el estado de evolución de patrimonio neto\n y, cuando correspondiere, en el estado de flujos de efectivo, incluyendo los que\n surgen de aplicar solución práctica establecida en los párrafos A15 a A17 de este\n Apéndice, excepto que utilice la opción establecida en el inciso a) de este\n párrafo, en cuyo caso expondrá solo los efectos relacionados con el rubro\n seleccionado al inicio del ejercicio comparativo,\ne) Además de lo establecido por esta Resolución Técnica respecto de un cambio\n en la política contable, (por ejemplo, la revelación de motivos exigida por el\n inciso b) del párrafo 84), una entidad describirá en notas:\n(i) Las principales partidas que fueron afectadas por cambios en criterios de\n reconocimiento, medición o presentación, distinguiendo:\n\n 1. Los cambios requeridos en sus políticas contables, de acuerdo\n con lo indicado en el párrafo A5 del presente Anexo.\n 2. Los cambios admitidos en sus políticas contables, de acuerdo con\n lo indicado en el párrafo A6 del presente Anexo.\n(ii) De corresponder, el hecho de que los criterios aplicados a las cifras\n comparativas difieren de los utilizados para la preparación de las cifras del\n período actual y que tal hecho deberá ser considerado al analizar esos\n estados contables.\n(iii) Los rubros del estado de situación patrimonial y las partidas del estado\n de resultados afectados por la diferencia de criterios referida en el\n inciso anterior.\nSolución práctica: posibilidad de discontinuar la aplicación del modelo de revaluación\n(bienes de uso) o el modelo del valor neto de realización (propiedades de inversión)"}, {"num": "A12", "texto": "Tal decisión afecta solo a ese rubro, y no contradice el enfoque\n seleccionado.\nb) Adecuará las cifras comparativas incluidas en el estado de situación patrimonial\n de acuerdo con los criterios de reconocimiento y medición establecidos en esta\n Resolución Técnica u otras normas contables, y las notas y anexos\n relacionados. Sin embargo, no adecuará la información comparativa del estado\n de resultados, del estado de flujos de efectivo, del estado de evolución del\n patrimonio neto, y de las notas y anexos relacionados, para reflejar los cambios\n en criterios de reconocimiento y medición establecidos en la presente Resolución\n Técnica u otras normas contables, excepto que aplique la opción establecida\n en el inciso anterior de este párrafo.\nc) Adecuará las cifras que se incluyan como información comparativa de acuerdo\n con los criterios de presentación establecidos en esta Resolución Técnica u\n otras normas contables.\nd) Expondrá el efecto de aplicar este enfoque sobre los saldos a la fecha de\n aplicación inicial que se presenten en el estado de evolución de patrimonio neto\n y, cuando correspondiere, en el estado de flujos de efectivo, incluyendo los que\n surgen de aplicar solución práctica establecida en los párrafos A15 a A17 de este\n Apéndice, excepto que utilice la opción establecida en el inciso a) de este\n párrafo, en cuyo caso expondrá solo los efectos relacionados con el rubro\n seleccionado al inicio del ejercicio comparativo,\ne) Además de lo establecido por esta Resolución Técnica respecto de un cambio\n en la política contable, (por ejemplo, la revelación de motivos exigida por el\n inciso b) del párrafo 84), una entidad describirá en notas:\n(i) Las principales partidas que fueron afectadas por cambios en criterios de\n reconocimiento, medición o presentación, distinguiendo:\n\n 1. Los cambios requeridos en sus políticas contables, de acuerdo\n con lo indicado en el párrafo A5 del presente Anexo.\n 2. Los cambios admitidos en sus políticas contables, de acuerdo con\n lo indicado en el párrafo A6 del presente Anexo.\n(ii) De corresponder, el hecho de que los criterios aplicados a las cifras\n comparativas difieren de los utilizados para la preparación de las cifras del\n período actual y que tal hecho deberá ser considerado al analizar esos\n estados contables.\n(iii) Los rubros del estado de situación patrimonial y las partidas del estado\n de resultados afectados por la diferencia de criterios referida en el\n inciso anterior.\nSolución práctica: posibilidad de discontinuar la aplicación del modelo de revaluación\n(bienes de uso) o el modelo del valor neto de realización (propiedades de inversión)"}, {"num": "A15", "texto": "Una entidad que, de acuerdo con las normas anteriores, hubiese aplicado el modelo de\n revaluación para bienes de uso o el modelo de valor neto de realización para\n propiedades de inversión, podrá discontinuar su aplicación de forma prospectiva a partir\n de la fecha de la aplicación inicial. Esta discontinuación no será considerada un cambio\n de política contable."}, {"num": "A16", "texto": "Al aplicar la discontinuación a la que se refiere el párrafo anterior, una entidad:\na) ejercerá la opción, de forma independiente, para cada clase de bienes de uso y para\n el rubro propiedades de inversión;\nb) considerará al último importe revaluado o al último valor neto de realización, según\n corresponda, como costo atribuido de cada activo a la fecha de la aplicación inicial;\n y\nc) transferirá a resultados no asignados cualquier importe reconocido en el patrimonio\n neto dentro del rubro “saldo por revaluación”, relacionado con la clase para la que\n decida discontinuar el modelo de revaluación."}, {"num": "A17", "texto": "Si optara por utilizar la solución práctica prevista en esta sección, una entidad revelará\n tal aplicación en los primeros estados contables preparados de acuerdo con esta\n Resolución Técnica.\n\nGuías para la aplicación de la presente Resolución Técnica por primera vez, en particular\n\nConversión de estados contables"}, {"num": "A18", "texto": "En los primeros estados contables preparados de acuerdo con esta Resolución\n Técnica, una entidad aplicará los requerimientos establecidos en los párrafos 752 al 763:\na) a partir de la fecha de inicio del año comparativo, cuando haya seleccionado enfoque\n retroactivo integral [ver los párrafos A11 y A12]; o\nb) a partir de la fecha de aplicación inicial, cuando haya seleccionado el enfoque\n retroactivo simplificado [ver los párrafos A13 y A14]."}, {"num": "A19", "texto": "Cualquier diferencia de conversión acumulada que la entidad hubiera determinado por\n aplicación de las normas anteriores será considerada nula en la fecha que corresponda,\n según lo establecido en el párrafo anterior."}, {"num": "A20", "texto": "Además de lo establecido por esta Resolución Técnica, una entidad revelará las notas\n de los primeros estados contables preparados de acuerdo con esta Resolución\n Técnica:\na) Si los criterios aplicados a las cifras comparativas difieren de los utilizados para la\n conversión de las cifras del período actual, y en tal caso, que este hecho deberá\n ser considerado al analizar esos estados contables.\nb) Los rubros del estado de situación patrimonial y las partidas del estado de\n resultados afectados por la diferencia de criterios referida en el inciso anterior.\n\nPreparación de estados contables consolidados"}, {"num": "A21", "texto": "En los primeros estados contables preparados de acuerdo con esta Resolución\n Técnica, una entidad:\na) evaluará, en la fecha de aplicación inicial, qué entidades deben ser consolidadas,\n empleando el apartado “Definición de control (sobre otra entidad)” [ver los párrafos\n 770 a 771] y el apartado “Aplicación de la definición de control” [ver los párrafos 772\n a 783]; y\nb) consolidará todas las entidades que controle a la fecha de aplicación inicial:\n(i) a partir de la fecha de inicio del año comparativo, cuando haya\n seleccionado enfoque retroactivo integral [ver los párrafos A11 y A12]; o\n(ii) a partir de la fecha de aplicación inicial, cuando haya seleccionado el\n enfoque retroactivo simplificado [ver los párrafos A13 y A14]."}, {"num": "A22", "texto": "Cuando una entidad opte por consolidar las subsidiarias de acuerdo con el enfoque\n indicado en el inciso b) (ii) del párrafo anterior, presentará los primeros estados\n contables consolidados de acuerdo con esta Resolución Técnica sin incluir información\n comparativa, en la medida en que dicha información coincida con la contenida en los\n estados contables separados de la misma entidad."}, {"num": "A23", "texto": "Además de lo establecido por esta Resolución Técnica, una entidad revelará las notas\n de los primeros estados contables preparados de acuerdo con esta Resolución\n Técnica:\na) las principales partidas que fueron afectadas por cambios en criterios de\n consolidación;\nb) en caso de corresponder, que los criterios aplicados a las cifras comparativas\n difieren de los utilizados para la preparación de las cifras del período actual, y\n tal hecho deberá ser considerado al analizar esos estados contables; y\nc) los rubros del estado de situación patrimonial y las partidas del estado de\n resultados afectados por la diferencia de criterios referida en el inciso anterior.\n\nNegocios conjuntos"}, {"num": "A24", "texto": "En los primeros estados contables preparados de acuerdo con esta Resolución\n Técnica, una entidad:\na) en la fecha de aplicación inicial,\n(i) evaluará los negocios conjuntos en los que participa, empleando\n los párrafos 812 a 815;\n(ii) clasificará todos los negocios conjuntos de los que participa a esa\n fecha, de acuerdo con el párrafo 816\nb) medirá todos los negocios conjuntos, de conformidad con lo establecido en la\n presente Resolución Técnica:\n(i) a partir de la fecha de inicio del año comparativo, cuando haya\n seleccionado enfoque retroactivo integral [ver los párrafos A11 y\n A12]; o\n(ii) a partir de la fecha de aplicación inicial, cuando haya seleccionado\n el enfoque retroactivo simplificado [ver los párrafos A13 y A14].\nA25. Además de lo establecido por esta Resolución Técnica, una entidad revelará las notas\n de los primeros estados contables preparados de acuerdo con esta Resolución\n Técnica:\na) de corresponder, si los criterios aplicados a las cifras comparativas difieren de los\n utilizados para la preparación de las cifras del período actual y, en el caso de que\n así fuera, que tal hecho deberá ser considerado al analizar esos estados\n contables; y\nb) los rubros del estado de situación patrimonial y las partidas del estado de resultados\n afectados por la diferencia de criterios referida en el inciso anterior.\n\nParticipaciones en subsidiarias, asociadas y negocios conjuntos societarios"}, {"num": "A25", "texto": "Además de lo establecido por esta Resolución Técnica, una entidad revelará las notas\n de los primeros estados contables preparados de acuerdo con esta Resolución\n Técnica:\na) de corresponder, si los criterios aplicados a las cifras comparativas difieren de los\n utilizados para la preparación de las cifras del período actual y, en el caso de que\n así fuera, que tal hecho deberá ser considerado al analizar esos estados\n contables; y\nb) los rubros del estado de situación patrimonial y las partidas del estado de resultados\n afectados por la diferencia de criterios referida en el inciso anterior.\n\nParticipaciones en subsidiarias, asociadas y negocios conjuntos societarios"}, {"num": "A26", "texto": "En los primeros estados contables preparados de acuerdo con esta Resolución\n Técnica, una entidad, una entidad medirá todas las participaciones dentro del alcance de\n la sección “Participaciones en subsidiarias, asociadas y negocios conjuntos societarios”\n [ver los párrafos 824 a 871], de forma consistente con el enfoque seleccionado de\n acuerdo con el presente Apéndice [ver los párrafos A11 y A12, y A13 y A14], excepto por\n lo establecido en el párrafo siguiente."}, {"num": "A27", "texto": "Una entidad no estará obligada a modificar, de forma retroactiva, aquellas\n participaciones dentro del alcance de la sección “Participaciones en subsidiarias,\n asociadas y negocios conjuntos societarios” [ver los párrafos 824 a 871] de las que no\n fuere parte en la fecha de aplicación inicial de la presente Resolución Técnica."}, {"num": "A28", "texto": "Además de lo establecido por esta Resolución Técnica, una entidad revelará las notas\n de los primeros estados contables preparados de acuerdo con esta Resolución\n Técnica:\na) Las principales partidas que fueron afectadas por cambios en criterios para medir\n las participaciones dentro del alcance de esta sección.\nb) De corresponder, si los criterios aplicados a las cifras comparativas difieren de los\n utilizados para la preparación de las cifras del período actual y, en caso de que así\n fuere, que tal hecho deberá ser considerado al analizar esos estados contables.\nc) Los rubros del estado de situación patrimonial y las partidas del estado de\n resultados afectados por la diferencia de criterios referida en el inciso anterior.\n\nBeneficios a los empleados posteriores a la terminación laboral y otros beneficios a largo\nplazo"}, {"num": "A29", "texto": "Al aplicar la sección “Beneficios a los empleados posteriores a la terminación laboral y\n otros beneficios a largo plazo” [ver los párrafos 872 a 956] en los primeros estados\n contables preparados de acuerdo con esta Resolución Técnica, una entidad, imputará,\n de forma consistente con el enfoque seleccionado de acuerdo con el presente Apéndice\n [ver los párrafos A11 y A12, y A13 y A14]:\na) la baja en cuenta de cualquier partida surgida de aplicar el “método del corredor” que\n establecía la Resolución Técnica N° 23, en una partida de resultados diferidos\n acumulados: y\nb) cualquier otro cambio, en resultados no asignados.\nCombinaciones de negocios"}, {"num": "A30", "texto": "En los primeros estados contables preparados de acuerdo con esta Resolución\n Técnica, una entidad:\na) Aplicará los requerimientos establecidos en la sección “Combinaciones de\n negocios” [ver los párrafos 958 a 989] de forma prospectiva para contabilizar las\n combinaciones de negocios que ocurran a partir de la fecha de aplicación inicial.\nb) No revisará el tratamiento de las combinaciones de negocios, previamente\n reconocidas, de conformidad con normas anteriores.\nc) Dará de baja cualquier llave negativa que existiera a la fecha de aplicación inicial,\n que hubiera reconocido por haber empleado normas anteriores."}, {"num": "A31", "texto": "Además de lo establecido por esta Resolución Técnica, una entidad revelará en las notas\n de los primeros estados contables preparados de acuerdo con esta Resolución\n Técnica:\na) Las principales partidas que fueron afectadas por no revisar las combinaciones\n de negocios contabilizadas según normas anteriores.\nb) De corresponder, que los criterios aplicados a las cifras comparativas difieren de\n los utilizados en el período actual para contabilizar combinaciones de negocios,\n y que tal hecho deberá ser considerado al analizar esos estados contables.\n\nInstrumentos derivados y operaciones de cobertura"}, {"num": "A32", "texto": "En los primeros estados contables preparados de acuerdo con esta Resolución\n Técnica, una entidad:\na) aplicará los requerimientos de la sección “Instrumentos derivados y operaciones\n de cobertura” [ver los párrafos 990 a 1020] de forma prospectiva, a las nuevas\n relaciones de coberturas que designe; y\nb) continuará aplicando las disposiciones de las normas anteriores para las\n relaciones de cobertura:\n(i) existentes a la fecha de la aplicación inicial; y\n(ii) que continuarán existiendo luego de la fecha referida en el punto anterior.\nGLOSARIO\n\n Término Definición\n\nActivación A los fines de esta Resolución Técnica,\n representa el reconocimiento o incorporación\n adicional de costos en algún componente del\n activo\n\nActividad agropecuaria: Producción de bienes económicos a partir de la\n combinación del esfuerzo del hombre y la\n naturaleza, para favorecer la actividad biológica\n de plantas y animales; incluyendo su\n reproducción, mejoramiento, degradación y/o\n crecimiento que conforman su desarrollo\n biológico. La intervención del hombre en la\n gestión del desarrollo biológico implica que la\n cosecha, recolección u obtención de recursos\n no gestionados previamente y que sean\n meramente extractivas (tales como la pesca en\n el océano y la tala de bosques naturales) no\n constituyen actividad agropecuaria.\n\nActivo Es un recurso económico controlado por la\n entidad, como consecuencia de hechos ya\n ocurridos. Un recurso económico es un derecho\n que tiene la capacidad de generar beneficios\n económicos.\n\n Los beneficios económicos existen si el recurso\n tiene valor de uso o valor de cambio para la\n entidad.\n\nActivos aptos para la activación de Son activos que requieren de un prolongado\ncostos financieros proceso de producción, construcción, montaje o\n terminación antes de estar en condiciones de\n ser vendido o utilizado, lo que correspondiere\n según su destino.\n\n Estos activos comprenden, entre otros, bienes\n de cambio, bienes de uso, propiedades de\n inversión o activos intangibles.\n\nActivos biológicos Son plantas y animales vivientes utilizados en la\n actividad agropecuaria (por ejemplo, un árbol\n limonero). Excluye a los activos biológicos\n utilizados como factor de producción en el\n curso normal de las operaciones\n\nActivos biológicos en desarrollo: Son activos biológicos que no completaron su\n proceso de desarrollo y no pueden ser\n considerados como “en producción,\n consumibles o terminados” (por ejemplo:\n árboles frutales, bosques, terneros, alevines,\n sementeras, frutas inmaduras, etc., cuyo\n proceso biológico de crecimiento no concluyó,\n aunque se puedan obtener de los mismos\n bienes secundarios comercializables).\n\nActivos biológicos producidos o Son activos biológicos que han concluido su\nterminados proceso de desarrollo y se encuentra en\n condiciones de ser vendidos, transformados en\n productos agropecuarios o utilizados en otros\n procesos productivos (plantines"}]}]}]}], "lookup": {"1": {"cap": "intro", "sec": "intro_obj"}, "2": {"cap": "intr let currentCapId = null;

// === NAVIGATION HELPERS ===

// Navigate to any paragraph by number — works from anywhere
function navigateToPara(num) {
  const key = String(num);
  const loc = DATA.lookup[key];
  if (!loc) return;
  
  const isMobile = window.innerWidth <= 900;
  
  // Close mobile sidebar FIRST
  if (isMobile) {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('open');
  }
  
  // Load the chapter if not already loaded
  const needsLoad = currentCapId !== loc.cap;
  if (needsLoad) {
    selectCap(loc.cap, true);
  }
  
  // Update active section in sidebar
  document.querySelectorAll('.nav-sec').forEach(function(el) {
    el.classList.toggle('active', el.dataset.sec === loc.sec);
  });
  
  // Use manual scrollTop — scrollIntoView is unreliable inside overflow containers on mobile
  function doScroll() {
    const container = document.getElementById('mainContent');
    const target = document.getElementById('para-' + num);
    if (!container || !target) return;
    
    // Calculate target position relative to scroll container
    const containerRect = container.getBoundingClientRect();
    const targetRect = target.getBoundingClientRect();
    const currentScroll = container.scrollTop;
    const targetOffset = targetRect.top - containerRect.top + currentScroll;
    
    // Center the paragraph in the viewport
    const centered = targetOffset - (container.clientHeight / 2) + (target.offsetHeight / 2);
    container.scrollTop = Math.max(0, centered);
    
    // Highlight
    target.classList.add('highlighted');
    setTimeout(function() { target.classList.remove('highlighted'); }, 2500);
  }
  
  // Wait for: sidebar close animation (300ms) + DOM render
  const delay = isMobile ? 500 : (needsLoad ? 150 : 50);
  setTimeout(doScroll, delay);
}

// === BUILD SIDEBAR NAV ===

function buildNav() {
  const nav = document.getElementById('sidebarNav');
  let html = '';
  DATA.titulos.forEach(titulo => {
    html += '<div class="nav-titulo">' + titulo.nombre + '</div>';
    titulo.capitulos.forEach(cap => {
      const pc = cap.secciones.reduce((s,sec) => s + sec.parrafos.length, 0);
      const label = cap.num === 0 ? 'Introducci\u00f3n' : cap.num === 99 ? 'Ap\u00e9ndice A' : 'Cap. ' + cap.num + ': ' + cap.nombre;
      html += '<div class="nav-cap" data-cap="' + cap.id + '" onclick="selectCap(\'' + cap.id + '\')">' +
        '<span class="cap-icon">' + cap.icono + '</span>' +
        '<span>' + label + '</span>' +
        '<span class="cap-num">' + pc + '</span></div>';
      html += '<div class="nav-sections" data-cap-sections="' + cap.id + '">';
      cap.secciones.forEach(sec => {
        const r = sec.parrafos.length > 0 ? sec.parrafos[0].num + '\u2013' + sec.parrafos[sec.parrafos.length-1].num : '';
        html += '<a class="nav-sec" data-sec="' + sec.id + '" onclick="selectSec(\'' + cap.id + '\',\'' + sec.id + '\')">' + sec.nombre + ' <span class="sec-range">' + r + '</span></a>';
      });
      html += '</div>';

  });
  if (DATA.glosario && DATA.glosario.length) {
    html += '<div class="nav-glosario" id="navGlosario" onclick="showGlosario()">' +

  nav.innerHTML = html;
}

function findCap(id) {
  for (const t of DATA.titulos) for (const c of t.capitulos) if (c.id === id) return c;
  return null;
}

// === FORMAT PARAGRAPH TEXT ===

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Add clickable cross-references to paragraph text
function addCrossRefs(html) {
  // Match patterns like: "párrafo 50", "párrafos 50", "párrafos 50 a 60", "párrafos 50 y 60"
  // Also: "[ver el párrafo 50]", "[ver los párrafos 50 a 60]"
  
  // First handle ranges: "párrafos NNN a NNN" / "párrafos NNN y NNN"
  html = html.replace(
    /(p[aá]rrafos?)\s+(\d{1,4})\s+(a|y|al)\s+(\d{1,4})/gi,
    function(match, word, n1, conj, n2) {
      var link1 = DATA.lookup[n1]
        ? '<span class="para-ref" onclick="navigateToPara(' + n1 + ')">' + n1 + '</span>'
        : n1;
      var link2 = DATA.lookup[n2]
        ? '<span class="para-ref" onclick="navigateToPara(' + n2 + ')">' + n2 + '</span>'
        : n2;
      return word + ' ' + link1 + ' ' + conj + ' ' + link2;
    }
  );
  
  // Then handle single references: "párrafo NNN" (but not those already linked)
  html = html.replace(
    /(p[aá]rrafos?)\s+(\d{1,4})(?![^<]*<\/span>)/gi,
    function(match, word, num) {
      if (DATA.lookup[num]) {
        return word + ' <span class="para-ref" onclick="navigateToPara(' + num + ')">' + num + '</span>';
      }
      return match;
    }
  );
  
  return html;
}

function formatParaText(raw) {
  var text = escapeHtml(raw);
  var lines = text.split('\n');
  var result = [];
  var inBlock = false;
  
  for (var i = 0; i < lines.length; i++) {
    var trimmed = lines[i].trim();
    if (!trimmed) { if (result.length > 0) inBlock = true; continue; }
    if (/^\([ivxlc]+\)|^\(\d+\)/.test(trimmed)) { result.push('<span class="sub-inciso">' + trimmed + '</span>'); continue; }
    if (/^[a-zA-Z]\)\s/.test(trimmed)) { result.push('<span class="inciso">' + trimmed + '</span>'); continue; }
    if (inBlock) { result.push('<span class="bloque">' + trimmed + '</span>'); inBlock = false; }
    else if (result.length === 0) { result.push(trimmed); }
    else {
      var last = result[result.length - 1];
      if (last.endsWith('</span>')) {
        var ci = last.lastIndexOf('</span>');
        result[result.length - 1] = last.substring(0, ci) + ' ' + trimmed + '</span>';
      } else { result[result.length - 1] = last + ' ' + trimmed; }
    }
  }
  
  var joined = result.join('');
  // Add clickable cross-references
  joined = addCrossRefs(joined);
  return joined;
}

// === RENDER CHAPTER ===

function selectCap(capId, suppressScroll) {
  var cap = findCap(capId);
  if (!cap) return;
  currentCapId = capId;
  document.querySelectorAll('.nav-cap').forEach(function(el) { el.classList.toggle('active', el.dataset.cap===capId); });
  document.querySelectorAll('.nav-sections').forEach(function(el) { el.classList.toggle('open', el.dataset.capSections===capId); });
  document.querySelectorAll('.nav-sec').forEach(function(el) { el.classList.remove('active'); });
  var ng = document.getElementById('navGlosario'); if(ng) ng.classList.remove('active');

  var title = cap.num === 0 ? 'Introducci\u00f3n' : cap.num === 99 ? 'Ap\u00e9ndice A' : 'Cap\u00edtulo ' + cap.num;
  var html = '<div class="content-header"><h1>' + cap.icono + ' ' + title + '</h1><div class="ch-subtitle">' + cap.nombre + '</div></div>';
  cap.secciones.forEach(function(sec) {
    html += '<div class="section-block" id="sec-' + sec.id + '"><h2 class="section-title">' + sec.nombre + '</h2>';
    sec.parrafos.forEach(function(p) {
      html += '<div class="paragraph" id="para-' + p.num + '" data-num="' + p.num + '">' +
        '<span class="para-num" title="Copiar referencia" onclick="copyRef(\'' + p.num + '\')"><span class="bullet"></span>' + p.num + '</span>' +
        '<span class="para-text">' + formatParaText(p.texto) + '</span></div>';
    });
    html += '</div>';
  });
  document.getElementById('mainInner').innerHTML = html;
  if (!suppressScroll) document.getElementById('mainContent').scrollTop = 0;
  if (!suppressScroll) closeMobile();
}

function selectSec(capId, secId) {
  if (currentCapId !== capId) selectCap(capId);
  document.querySelectorAll('.nav-sec').forEach(function(el) { el.classList.toggle('active', el.dataset.sec===secId); });
  setTimeout(function() { var el = document.getElementById('sec-' + secId); if(el) { var container = document.getElementById('mainContent'); var cRect = container.getBoundingClientRect(); var eRect = el.getBoundingClientRect(); container.scrollTop = eRect.top - cRect.top + container.scrollTop - 20; } }, 50);
  closeMobile();
}

function copyRef(num) {
  navigator.clipboard.writeText('\u00a7'+num).catch(function(){});
  var el = document.getElementById('para-'+num);
  if(el){el.classList.add('highlighted');setTimeout(function(){el.classList.remove('highlighted')},1500)}
}

function showGlosario() {
  currentCapId = null;

  var html = '<div class="content-header"><h1>\ud83d\udcda Glosario</h1><div class="ch-subtitle">' + DATA.glosario.length + ' t\u00e9rminos definidos en la RT 59</div></div>';

    '<input type="text" class="glosario-input" placeholder="Filtrar t\u00e9rminos..." oninput="filterGlosario(this.value)" autocomplete="off">' +
    '</div></div><div id="glosarioList">' + renderGlosarioEntries(DATA.glosario) + '</div>';
  document.getElementById('mainInner').innerHTML = html;
  document.getElementById('mainContent').scrollTop = 0;

function renderGlosarioEntries(entries) {
  var html = '';
  var currentLetter = '';
  entries.forEach(function(e) {
    var letter = e.termino.charAt(0).toUpperCase();
    if (letter !== currentLetter) { currentLetter = letter; html += '<div class="glosario-letter">' + letter + '</div>'; }
    html += '<div class="glosario-entry"><div class="glosario-term">' + escapeHtml(e.termino) + '</div><div class="glosario-def">' + escapeHtml(e.definicion) + '</div></div>';
  });
  return html;
}

function filterGlosario(q) {
  var list = document.getElementById('glosarioList');
  if (!q.trim()) { list.innerHTML = renderGlosarioEntries(DATA.glosario); return; }
  var filtered = DATA.glosario.filter(function(e) { return e.termino.toLowerCase().includes(q.toLowerCase()) || e.definicion.toLowerCase().includes(q.toLowerCase()); });
  list.innerHTML = filtered.length ? renderGlosarioEntries(filtered) : '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:.85rem">Sin resultados</div>';
}

            pText = cap.secciones[si].parrafos[pi].texto.substring(0, 140);
            secName = cap.secciones[si].nombre;
            break;
          }
        }
      }
    }
    res.innerHTML = '<div style="padding:4px 12px 8px;font-size:.65rem;color:rgba(255,255,255,.25)">P\u00e1rrafo encontrado</div>' +
      '<div class="search-result" onclick="clearSearchAndGo(' + pNum + ')">' +
      '<div class="sr-para">' + pNum + '</div>' +
      '<div class="sr-text">' + escapeHtml(pText) + '\u2026</div>' +
      '<div class="sr-cap">' + capLabel + ' \u203a ' + secName + '</div></div>';
    return;
  }

  var hits = [];
  DATA.titulos.forEach(function(t) { t.capitulos.forEach(function(cap) { cap.secciones.forEach(function(sec) {
    sec.parrafos.forEach(function(p) {
      var pn = String(p.num);
      // For text search, check both section name and paragraph content
      var txt = p.texto.toLowerCase();
      var nm = sec.nombre.toLowerCase().includes(q);
      if (txt.includes(q) || nm) {
        hits.push({p:p, sec:sec, cap:cap, score: nm ? 50 : 10});
      }
    });
  }); }); });

  // Also search glossary
  if (DATA.glosario) {
    DATA.glosario.forEach(function(e) {
      if (e.termino.toLowerCase().includes(q) || e.definicion.toLowerCase().includes(q)) {
        hits.push({p:{num:'G',texto:e.termino+': '+e.definicion},sec:{nombre:'Glosario'},cap:{id:'_glosario',num:'G',nombre:'Glosario'},score:e.termino.toLowerCase().includes(q)?45:5,isGlosario:true});
      }
    });
  }

  hits.sort(function(a,b) { return b.score-a.score; });
  hits = hits.slice(0, 50);

  if (!hits.length) {
    res.innerHTML = '<div style="padding:20px;text-align:center;color:rgba(255,255,255,.3);font-size:.82rem">Sin resultados para "' + escapeHtml(query) + '"</div>';
    return;
  }

  var html = '<div style="padding:4px 12px 8px;font-size:.65rem;color:rgba(255,255,255,.25)">' + hits.length + ' resultado' + (hits.length>1?'s':'') + '</div>';
  hits.forEach(function(h) {
    var snip = getSnippet(h.p.texto, query);
    if (h.isGlosario) {
      html += '<div class="search-result" onclick="goToGlosario(\'' + escapeAttr(query) + '\')">' +
        '<div class="sr-para">\ud83d\udcda Glosario</div><div class="sr-text">' + snip + '</div></div>';
    } else {
      html += '<div class="search-result" onclick="clearSearchAndGo(' + h.p.num + ')">' +
        '<div class="sr-para">' + h.p.num + '</div><div class="sr-text">' + snip + '</div>' +
        '<div class="sr-cap">' + getCapLabel(h.cap.id) + ' \u203a ' + h.sec.nombre + '</div></div>';
    }
  });
  res.innerHTML = html;
}

function getCapLabel(capId) {
  var cap = findCap(capId);
  if (!cap) return '';
  if (cap.num === 0) return 'Intro';
  if (cap.num === 99) return 'Ap. A';
  return 'Cap. ' + cap.num;
}

function escapeAttr(s) { return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

function getSnippet(text, query) {
  var q = query.toLowerCase();
  var idx = text.toLowerCase().indexOf(q);
  if (idx === -1) return escapeHtml(text.substring(0,100)) + '\u2026';
  var s = Math.max(0, idx-40), e = Math.min(text.length, idx+query.length+60);
  var snip = (s>0?'\u2026':'') + text.substring(s,e) + (e<text.length?'\u2026':'');
  var re = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')','gi');
  return escapeHtml(snip).replace(re,'<mark>$1</mark>');
}

function clearSearchAndGo(pNum) {
  document.getElementById('searchInput').value = '';
  document.getElementById('sidebarNav').style.display = '';

function goToGlosario(query) {
  document.getElementById('searchInput').value='';

  document.getElementById('searchResults').classList.remove('visible');
  showGlosario();
  setTimeout(function() {
    var input = document.querySelector('.glosario-input');
    if (input) { input.value = query; filterGlosario(query); }
  }, 100);
}
