tes que no podrán ser enajenados hasta tanto se cancelen\ndeterminados pasivos, indicándose su medición contable y la medición de los\npasivos relacionados.\n\nRevelaciones sobre depreciaciones"}, {"num": 356, "texto": "Una entidad presentará el importe de las depreciaciones del período, clasificándolas\nde acuerdo con la función asignada a los bienes que las originaron; por ejemplo:\na) costo de producción o costo de construcción;\nb) gastos de administración; o\nc) gastos de comercialización.\n\nRevelaciones sobre la aplicación del modelo de revaluación"}, {"num": 357, "texto": "Una entidad expondrá la siguiente información en el caso de optar por el modelo de\nrevaluación:\na) fechas en las cuales revaluó cada una de las clases de bienes de uso;\nb) indicación acerca de si la revaluación se practicó con personal propio o los\nservicios de un tasador o especialista en valuaciones, idóneo e independiente\nrespecto de la entidad;\nc) detalle de los métodos e hipótesis significativas utilizadas en la estimación del\nvalor razonable de los bienes revaluados;\nd) manifestación acerca de las bases utilizadas para determinar el valor\nrazonable (precios observables en un mercado activo, transacciones de\nmercado recientes o técnicas de valuación);\ne) importe que hubiera correspondido informar en el estado de situación\npatrimonial para cada clase de bienes de uso revaluada, si no hubiese\nrevaluado tales activos;\nf) movimientos del saldo por revaluación registrados durante el ejercicio, así\ncomo la afirmación de que su saldo no es distribuible ni capitalizable mientras\npermanezca como tal;\ng) proporción de vida útil consumida correspondiente a dichos activos y el importe\nque la entidad podría haber transferido a resultados no asignados a la fecha\nde los estados contables, cuando opte por no transferir el saldo por\nrevaluación a los resultados no asignados en función al consumo o a la baja\nde los activos revaluados; y\nh) fecha de aprobación por organismos de control, cuando es requerida por\nregulaciones administrativas o legales.\n\nOtras normas aplicables"}, {"num": 358, "texto": "Para el tratamiento contable de los componentes de bienes de uso una entidad\ndeberá contemplar, en tanto resulten pertinentes y no contradigan lo establecido en\nesta sección, otras disposiciones de esta Resolución Técnica u otras normas\ncontables. Por ejemplo, y sin ánimo de ser exhaustivos, las referidas a:\na) “Medición de costos” [ver los párrafos 102 a 110], y “Medición inicial de bienes\no servicios” [ver los párrafos 203 a 204]\nb) “Medición de valores corrientes” [ver los párrafos 117 a 122].\nc) “Mediciones en moneda extranjera” [ver los párrafos 124 a 128].\nd) “Tratamiento de componentes financieros” [ver los párrafos 129 a 142].\ne) “Baja en cuentas” [ver los párrafos 46 a 48].\nf) “Expresión de los estados contables en moneda de cierre en un contexto de\ninflación (ajuste por inflación de los estados contables)” [ver los párrafos 176 a\n200].\ng) “Arrendamientos” [ver los párrafos 532 a 559].\n\nPROPIEDADES DE INVERSIÓN\n\nDefinición"}]}, {"id": "c3s7", "nombre": "Propiedades de Inversión", "parrafos": [{"num": 359, "texto": "A los fines del tratamiento de los activos referidos en esta sección, una entidad deberá\nconsiderar la siguiente definición.\n\nPropiedades de inversión: Son los inmuebles (terrenos y/o construcciones)\ndestinados a obtener renta (locación o arrendamiento) o acrecentamiento de su\nvalor, con independencia de si esa actividad constituye o no alguna de las\nactividades principales de la entidad.\n\nReconocimiento"}, {"num": 360, "texto": "Una entidad reconocerá un elemento como propiedades de inversión cuando:\na) cumpla con la definición general del párrafo 22 y la definición específica\ncontenida en el párrafo 359;\nb) su medición satisfaga el requisito de confiabilidad (credibilidad) y\nc) su contribución a los beneficios económicos futuros de la entidad resulte\nprobable.\n\nMedición inicial"}, {"num": 361, "texto": "Una entidad medirá, en el momento del reconocimiento, las propiedades de inversión\nde acuerdo con los criterios indicados a continuación:\na) Propiedades de inversión adquiridas: sobre la base de su costo de\nadquisición, determinado según lo establecido en “Medición de costos de\nadquisición” [ver el párrafo 103].\nb) Propiedades de inversión producidas o construidas: en función del costo de\nproducción o del costo de construcción, determinado según lo establecido\nen el apartado “Medición del costo de producción o del costo de construcción”\n[ver los párrafos 104 a 110].\nc) Propiedades de inversión recibidas mediante aportes o donaciones: de\nacuerdo con lo establecido en el inciso c) del párrafo 204.\nd) Propiedades de inversión recibidas mediante trueques o canjes: de acuerdo\ncon lo establecido en el inciso d) del párrafo 204.\n\nMedición posterior"}, {"num": 362, "texto": "Una entidad medirá sus propiedades de inversión de acuerdo con alguno de los\nsiguientes criterios:\na) al costo menos su depreciación acumulada (modelo de costo); o\nb) a su valor razonable (modelo de valor razonable)."}, {"num": 363, "texto": "Una entidad aplicará el criterio elegido uniformemente para todos los componentes\ndel rubro."}, {"num": 364, "texto": "Una entidad que aplique la política contable del inciso a), del párrafo 362,\nconsiderará los lineamientos descriptos en el apartado “Modelo de costo” [ver el\npárrafos 321] de la sección correspondiente a “Bienes de uso y depreciaciones” [ver\nlos párrafos 313 a 358]."}, {"num": 365, "texto": "Una entidad que aplique la política contable del inciso b), del párrafo 362 (modelo\nde valor razonable), deberá:\na) considerar los lineamientos descriptos en el apartado “Medición del valor\nrazonable” [ver los párrafos 117 a 122];\nb) reflejar, además de los supuestos que resultan de aplicar el inciso anterior, los\ningresos de los arrendamientos actuales; y\nc) imputar las diferencias de medición en el resultado del período."}, {"num": 366, "texto": "Cuando utilice el modelo de valor razonable, una entidad:\na) Aplicará la presunción refutable de que podrá medir, de forma fiable y continua,\nel valor razonable de una propiedad de inversión.\nb) Excepcionalmente, podrá medir una propiedad de inversión de acuerdo con lo\ndescripto en el apartado \"Modelo de costo\" [ver el párrafo 321] de la sección\ncorrespondiente a \"Bienes de uso y depreciaciones\", cuando se presenten las\nsiguientes condiciones:\n(i) adquiera por primera vez una propiedad de inversión, un inmueble existente\npreviamente clasificado como “Bienes de cambio” o “Bienes de uso” se\nconvierta por primera vez en propiedad de inversión o se trate de una obra\nen construcción;\n(ii) el mercado para propiedades similares está inactivo (porque existen pocas\ntransacciones recientes, las cotizaciones no son actuales o los precios\nobservados reflejan transacciones forzadas); y\n(iii) no puede aplicar técnicas de valuación para obtener el valor razonable de\nacuerdo con lo establecido en el párrafo 120 (por ejemplo, a partir de las\nproyecciones de flujos de efectivo descontados).\n\nDepreciaciones"}, {"num": 367, "texto": "Una entidad que aplique la política contable del inciso a), del párrafo 362,\nreconocerá el cargo por depreciación de propiedades de inversión mediante los\ncriterios establecidos en el apartado “Depreciaciones” [ver los párrafos 339 a 345] de\nla sección correspondiente a “Bienes de uso y depreciaciones” [ver los párrafos 313\na 358].\n\nComparación con el valor recuperable"}, {"num": 368, "texto": "A los fines indicados en este apartado, una entidad aplicará lo establecido en la\nsección “Comparación de la medición de ciertos activos con su valor recuperable” [ver\nlos párrafos 145 a 175]. Al aplicar este requerimiento, deberá considerar la excepción\nestablecida en el inciso b) del párrafo 146.\n\nCompensación por desvalorización, pérdida o abandono"}, {"num": 369, "texto": "Una entidad incluirá en el resultado del período, y cuando tales conceptos sean\nexigibles, las compensaciones procedentes de terceros por elementos de\npropiedades de inversión que:\na) hayan experimentado una desvalorización;\nb) se hayan perdido; o\nc) haya abandonado.\n\nTransferencias"}, {"num": 370, "texto": "Una entidad realizará transferencias a, o desde, propiedad de inversión cuando:\na) el activo empieza a cumplir o deja de cumplir la definición de propiedades de\ninversión; y\nb) existen evidencias de cambio de uso."}, {"num": 371, "texto": "A los fines de evaluar la existencia de las evidencias indicadas en el inciso b) del\npárrafo anterior, una entidad podrá considerar lo siguiente:\na) el comienzo de la ocupación o del desarrollo con intención de ocupación por\nparte de la misma entidad, en el caso de una transferencia desde propiedades\nde inversión a “bienes de uso”;\nb) el inicio de un desarrollo con intención de venta, en el caso de una transferencia\ndesde propiedades de inversión a “bienes de cambio”;\nc) el fin de la ocupación por parte de la entidad, en el caso de la transferencia desde\n“bienes de uso” a propiedades de inversión; o\nd) el inicio de una operación de arrendamiento operativo a un tercero, en el caso\nde una transferencia desde “bienes de cambio” a propiedades de inversión."}, {"num": 372, "texto": "Una entidad no reclasificará un inmueble y, por lo tanto, lo mantendrá dentro de\npropiedades de inversión cuando decida:\na) Su venta o disposición.\nb) El reinicio de su desarrollo con el fin de para mantenerlo como propiedad de\ninversión en el futuro."}, {"num": 373, "texto": "Cuando transfiera propiedades de inversión, contabilizadas según su valor\nrazonable, a “bienes de uso” o a “bienes de cambio” cuya medición se basa en el\ncosto, una entidad le asignará al valor razonable en la fecha de la transferencia el\ncarácter de costo atribuido."}, {"num": 374, "texto": "Cuando transfiera inmuebles clasificados como “bienes de uso” a propiedades de\ninversión que se contabilizarán por su valor razonable, una entidad:\na) aplicará las normas referidas a “bienes de uso” hasta la fecha del cambio de\ndestino; y\nb) tratará cualquier diferencia, a esa fecha, entre la medición contable de la\npropiedad y su valor razonable, como una revaluación según lo dispuesto en\nlos párrafos 322 a 338."}, {"num": 375, "texto": "Cuando transfiera inmuebles desde “bienes de cambio” a propiedades de inversión\nque se contabilizarán por su valor razonable, una entidad:\na) reconocerá en el resultado del período cualquier diferencia entre el valor\nrazonable de la propiedad y su medición contable a la fecha del cambio de\ndestino; y\nb) contabilizará la transferencia de modo consistente con el tratamiento de una\nventa de bienes de cambio."}, {"num": 376, "texto": "Cuando termine la construcción o desarrollo de una propiedad de inversión construida\npor la propia entidad, que vaya a ser contabilizada por su valor razonable, una\nentidad reconocerá en el resultado del período cualquier diferencia entre el valor\nrazonable de la propiedad a esa fecha y su medición contable anterior.\n\nPresentación en los estados contables"}, {"num": 377, "texto": "En el estado de situación patrimonial, una entidad:\na) Presentará las propiedades de inversión separadas del resto de los activos,\ncomo un activo no corriente.\nb) Incluirá los anticipos a proveedores de este tipo de activos dentro del rubro\npropiedades de inversión."}, {"num": 378, "texto": "En el estado de resultados, una entidad presentará las locaciones o arrendamientos\ndevengados como:\na) ingresos de actividades ordinarias cuando provengan de la actividad\nprincipal; y\nb) otros ingresos y egresos cuando constituyan una actividad secundaria."}, {"num": 379, "texto": "Una entidad que mida sus propiedades de inversión de acuerdo con el “Modelo de\ncosto” [ver los párrafos 321 y 364] presentará el cargo por depreciaciones:\na) dentro del costo de los servicios prestados, cuando las depreciaciones forman\nparte del costo de la actividad principal; o\nb) como parte de otros ingresos y egresos no operativos, cuando las\ndepreciaciones no forman parte del costo de la actividad principal."}, {"num": 380, "texto": "En el estado de resultados, una entidad presentará las pérdidas por\ndesvalorización y las reversiones de dichas pérdidas bajo un título específico para\ntales conceptos."}, {"num": 381, "texto": "En el estado de resultados, una entidad presentará las ganancias o pérdidas\nprocedentes de cambios en el valor razonable como una partida separada.\n\nRevelación en notas\n\nRevelaciones de carácter general"}, {"num": 382, "texto": "Una entidad revelará en notas:\na) las políticas contables empleadas y los criterios de medición aplicados a las\npropiedades de inversión; y\nb) cuando aplica el “Modelo de costo” [ver los párrafos 321 y 364], las bases y\nmétodos utilizados para la determinación de las depreciaciones."}, {"num": 383, "texto": "Una entidad revelará para cada clase de propiedades de inversión los siguientes\nimportes:\na) cualquiera sea la política seleccionada para la medición:\n(i) saldos iniciales;\n(ii) altas (adiciones);\n(iii) bajas;\n(iv) transferencias por reclasificaciones;\n(v) otras variaciones no consideradas en los incisos anteriores de este\npárrafo, debiendo indicar, en el caso en que presente esta partida, los\nconceptos incluidos en ella; y\n(vi) saldos finales.\nb) Si aplica el “Modelo de costo” [ver los párrafos 321 y 364] además deberá\ninformar sobre:\n(i) depreciaciones;\n(ii) pérdidas por desvalorización; y\n(iii) recuperación de pérdidas por desvalorización.\nc) Si aplica el “Modelo de costo” [ver los párrafos 321 y 364], revelará el valor\nrazonable de las propiedades de inversión, excepto que la entidad sea\npequeña o mediana."}, {"num": 384, "texto": "Una entidad individualizará, dentro de cada grupo de propiedades de inversión, los\nimportes correspondientes a los incorporados mediante arrendamientos financieros."}, {"num": 385, "texto": "Una entidad revelará los bienes de disponibilidad restringida individualizando:\na) Las causas (legales, contractuales o situaciones de hecho) que limitan su\ndisponibilidad y las mediciones contables correspondientes.\nb) Los componentes que no podrán ser enajenados hasta tanto se cancelen\ndeterminados pasivos, indicándose su medición contable y la de los pasivos\nrelacionados.\n\nRevelaciones sobre depreciaciones"}, {"num": 386, "texto": "Una entidad que aplica el “Modelo de costo” [ver los párrafos 321 y 364] presentará\nel importe de las depreciaciones del período, clasificándolas de acuerdo con la\nfunción asignada a los bienes que las originaron, como:\na) costo de los servicios prestados que aplique cuando los ingresos procedentes\nde estos activos se presenten como ingresos de actividades ordinarias; o\nb) otros ingresos y egresos, en los restantes casos.\n\nRevelaciones sobre valores razonables"}, {"num": 387, "texto": "Una entidad expondrá la siguiente información en el caso de optar por el modelo de\nvalor razonable [ver el párrafo 365]:\na) el detalle de los métodos e hipótesis significativas utilizadas en la estimación\ndel valor razonable;\nb) una manifestación acerca de las bases utilizadas para determinar el valor\nrazonable (precios observables en un mercado activo, transacciones de\nmercado recientes o técnicas de valuación); y\nc) una indicación acerca de si la estimación del valor razonable se practicó con\npersonal propio o los servicios de un tasador o especialista en valuaciones,\nidóneo e independiente respecto de la entidad.\n\nOtras normas aplicables"}, {"num": 388, "texto": "Para el tratamiento contable de los componentes de propiedades de inversión una\nentidad deberá considerar, en tanto resulten pertinentes y no contradigan lo\nestablecido en esta sección, otras disposiciones de esta Resolución Técnica u otras\nnormas contables. Por ejemplo, las referidas a:\na) “Medición de costos” [ver los párrafos 102 a 110], y “Medición inicial de bienes\no servicios” [ver los párrafos 203 a 204]\nb) “Medición de valores corrientes” [ver los párrafos 117 a 122].\nc) “Mediciones en moneda extranjera” [ver los párrafos 124 a 128].\nd) “Tratamiento de componentes financieros” [ver los párrafos 129 a 142].\ne) “Expresión de los estados contables en moneda de cierre en un contexto de\ninflación (ajuste por inflación de los estados contables)” [ver los párrafos 176 a\n200].\nf) “Baja en cuentas” [ver los párrafos 46 a 48].\ng) “Arrendamientos” [ver los párrafos 532 a 559].\n\nACTIVOS INTANGIBLES (DISTINTOS DE LA LLAVE DE NEGOCIO)\n\nDefinición"}]}, {"id": "c3s8", "nombre": "Activos Intangibles", "parrafos": [{"num": 389, "texto": "A los fines del tratamiento de los activos referidos en esta sección, una entidad deberá\nconsiderar la siguiente definición.\n\nActivos intangibles (distintos de la llave de negocio): Son activos identificables,\nde carácter no monetario y sin sustancia física, que no corresponde que sean\ntratados aplicando otros requerimientos contenidos en esta Resolución Técnica\no en otras normas contables.\n\nEste rubro incluye, entre otros:\na) Derechos de propiedad intelectual, patentes, marcas, licencias y similares.\nb) Costos de desarrollo.\nc) Excepcionalmente, aunque no cumplan los requisitos de la definición\nanterior, los costos de organización y los costos preoperativos.\nd) Los criptoactivos cuyo precio depende, exclusivamente, de la aceptación\nde los participantes del mercado.\n\nLas siguientes partidas no se tratarán como activos intangibles y, por lo tanto,\ndeberán imputarse como un gasto del período:\na) los desembolsos de investigaciones efectuadas con el propósito de\nobtener nuevos conocimientos científicos y técnicos;\nb) los desembolsos erogados en el desarrollo interno del valor llave, marcas,\nlistas de clientes y otros que, en sustancia, no puedan distinguirse del\ncosto de desarrollar un negocio tomado en su conjunto (o un componente\ndel negocio);\nc) los desembolsos de publicidad, promoción y reubicación o reorganización\nde una empresa;\nd) los desembolsos realizados en una fase de desarrollo que no cumplen las\ncondiciones para ser activados; y\ne) los costos de entrenamiento, excepto aquellos que por sus características\npuedan activarse como costos de organización o como costos\npreoperativos.\n\nReconocimiento"}, {"num": 390, "texto": "Una entidad reconocerá un elemento como un activo intangible (distinto de la llave de\nnegocio) cuando:\na) cumpla con la definición general del párrafo 22 y la definición específica\ncontenida en el párrafo 389;\nb) su medición satisfaga el requisito de confiabilidad (credibilidad); y\nc) su contribución a los beneficios económicos futuros de la entidad resulte\nprobable."}, {"num": 391, "texto": "En tanto se cumplan las condiciones indicadas en el párrafo anterior, una entidad\npodrá reconocer como un activo intangible a los desembolsos que respondan a:\na) costos para lograr la constitución de una nueva entidad y darle existencia legal\n(costos de organización);\nb) costos en que una nueva entidad o una entidad existente deban incurrir en\nforma previa al inicio de una nueva actividad u operación (costos\npreoperativos), siempre que:\n(i) sean costos directos atribuibles a la nueva actividad u operación y\nclaramente incrementales respecto de los costos de la entidad si la nueva\nactividad u operación no se hubiera desarrollado; y\n(ii) no corresponda incluir las erogaciones efectuadas como un componente\ndel costo de los bienes de uso.\n\nMedición inicial"}, {"num": 392, "texto": "Una entidad medirá inicialmente los activos intangibles:\na) Si se trata de activos intangibles adquiridos, sobre la base de su costo de\nadquisición, determinado según lo establecido en “Medición de costos de\nadquisición” [ver el párrafo 103].\nb) Si se trata de activos intangibles desarrollados, en función del costo de\ndesarrollo, determinado según lo establecido en “Medición del costo de\ndesarrollo” [ver el párrafo 111].\nc) Si se trata de activos intangibles recibidos mediante aportes o donaciones: de\nacuerdo con lo establecido en el inciso c) del párrafo 204.\nd) Si se trata de activos intangibles recibidos mediante trueques o canjes: de\nacuerdo con lo establecido en el inciso d) del párrafo 204."}, {"num": 393, "texto": "Cuando los costos se relacionan con la aplicación de conocimientos a un plan o\ndiseño para la producción de materiales, dispositivos, productos, procesos, sistemas\no servicios nuevos o sustancialmente mejorados (fase de desarrollo), una entidad\ndeberá:\na) probar su intención, factibilidad y capacidad para completar el desarrollo del\nintangible;\nb) demostrar:\n(i) la capacidad del activo para generar beneficios económicos futuros; y\n(ii) su capacidad para medir de forma fiable el desembolso atribuible al activo\ndurante su desarrollo."}, {"num": 394, "texto": "Una entidad:\na) contabilizará como un gasto aquellas erogaciones que no cumplan las\ncondiciones para computarse como costo de un activo; y\nb) no podrá activar posteriormente dicho gasto, aunque cambien las\ncircunstancias previamente imperantes.\n\nTratamiento de los desembolsos subsiguientes"}, {"num": 395, "texto": "Con posterioridad a su reconocimiento, una entidad sumará al costo de un activo\nintangible los desembolsos subsiguientes cuando:\na) pueda probarse que mejorarán el flujo de los beneficios económicos futuros; y\nb) puedan ser medidos sobre bases fiables."}, {"num": 396, "texto": "Una entidad imputará las demás erogaciones como gasto del período.\n\nMedición posterior"}, {"num": 397, "texto": "Una entidad medirá estos activos:\na) Al costo original, si tuvieran una vida útil indefinida.\nb) Al costo original menos amortizaciones acumuladas, si tuvieran una vida útil\ndefinida.\n\nAmortizaciones"}, {"num": 398, "texto": "Una entidad reconocerá el cargo por amortización:\na) como gasto del período; o\nb) como parte del costo de un activo, cuando deba computarla dentro del gasto\nde producción o construcción de otro bien."}, {"num": 399, "texto": "Una entidad computará las amortizaciones de estos activos considerando, respecto\nde cada bien:\na) su costo;\nb) su naturaleza y forma de explotación;\nc) la fecha de comienzo de su utilización o la que refleje su pérdida de valor, que\nes el momento a partir del cual deben computarse amortizaciones;\nd) si existen evidencias de pérdidas por desvalorización previas a su utilización,\ncaso en el cual debe reconocerlas; y\ne) la capacidad de servicio estimada del activo, dada por:\n(i) las unidades de producción a ser obtenidas mediante su empleo;\n(ii) el período durante el cual se espera utilizarlo;\n(iii) la existencia de algún plazo legal para su utilización, que marcará el límite\nde su capacidad de servicio, excepto cuando dicho plazo fuera renovable\ny la renovación fuese virtualmente cierta; y\n(iv) la capacidad de servicio ya utilizada."}, {"num": 400, "texto": "Si del análisis de las cuestiones a considerar para el cómputo de las amortizaciones\nresulta que la vida útil de un activo intangible es indefinida, la entidad no computará\nsu amortización, y realizará la comparación con su valor recuperable en cada cierre\nde ejercicio, excepto cuando sea una entidad pequeña o mediana que procede de\nacuerdo con lo establecido en el párrafo 148."}, {"num": 401, "texto": "Cuando existan activos intangibles con vida útil indefinida, la entidad analizará en\ncada cierre de ejercicio que los eventos y circunstancias que soportan esta definición\ncontinúan para esos activos. Si detectara que un activo con vida útil indefinida se\ntransformó en un activo con vida útil definida, la entidad tratará dicha situación como\nun cambio en una estimación contable debido a la obtención de nuevos elementos de\njuicio, de acuerdo con la sección “Cambios en las estimaciones contables” [ver el\npárrafo 90]."}, {"num": 402, "texto": "Una entidad asignará la amortización:\na) si fuera posible, a los períodos de vida útil del bien sobre una base sistemática\nque refleje el modo en que se consumen los beneficios producidos por el\nactivo; o\nb) mediante el método de la línea recta."}, {"num": 403, "texto": "Cuando opte por reconocer activos intangibles de conformidad con el párrafo 391, a\nlos fines del cálculo de las amortizaciones, una entidad:\na) presumirá sin admitir prueba en contrario que la vida útil de los costos de\norganización y costos preoperativos no es superior a los cinco años; y\nb) no podrá admitir ni aportar pruebas en contrario.\n\nComparación con el valor recuperable"}, {"num": 404, "texto": "A los fines indicados en este apartado, una entidad aplicará lo establecido en la\nsección “Comparación de la medición de ciertos activos con su valor recuperable” [ver\nlos párrafos 145 a 175].\n\nCompensación por desvalorización, pérdida o abandono"}, {"num": 405, "texto": "Una entidad incluirá en el resultado del período, y cuando tales conceptos sean\nexigibles, las compensaciones procedentes de terceros por activos intangibles que:\na) hayan experimentado una desvalorización;\nb) se hayan perdido; o\nc) haya abandonado.\n\nPresentación en los estados contables"}, {"num": 406, "texto": "En el estado de situación patrimonial, una entidad:\na) Presentará los activos intangibles separados del resto de los activos, como un\nactivo no corriente.\nb) Incluirá los anticipos a proveedores de este tipo de activos dentro del rubro\nactivos intangibles."}, {"num": 407, "texto": "Una entidad presentará el cargo por amortizaciones dentro del costo de los bienes\nvendidos o servicios prestados (cuando las amortizaciones forman parte del costo\nde producción o costo de construcción) y los demás gastos (comerciales,\nadministrativos, etc.)."}, {"num": 408, "texto": "En el estado de resultados, una entidad presentará las pérdidas por\ndesvalorización y las reversiones de dichas pérdidas bajo un título específico para\ntales conceptos."}, {"num": 409, "texto": "En el estado de resultados, una entidad presentará los resultados derivados de la\nbaja en cuentas de estos activos por su disposición bajo el título otros ingresos y\ngastos, separado de los ingresos por actividades ordinarias.\n\nRevelaciones en notas\n\nRevelaciones de carácter general"}, {"num": 410, "texto": "Una entidad revelará en notas:\na) las políticas contables empleadas y los criterios de medición aplicados para\ncada clase de activos intangibles; y\nb) las bases y métodos utilizados para la determinación de las amortizaciones."}, {"num": 411, "texto": "Una entidad revelará para cada clase de activos intangibles, separando valores\noriginales de amortizaciones acumuladas, los siguientes importes:\na) saldos iniciales;\nb) alta (adiciones);\nc) bajas;\nd) amortizaciones;\ne) pérdidas por desvalorización;\nf) recuperación de pérdidas por desvalorización;\ng) otras variaciones no consideradas en los incisos anteriores de este párrafo,\ndebiendo indicar, en el caso en que presente esta partida, los conceptos\nincluidos en ella; y\nh) saldos finales."}, {"num": 412, "texto": "Una entidad individualizará, dentro de cada uno de los grupos de activos, los importes\ncorrespondientes a los bienes incorporados mediante arrendamientos financieros."}, {"num": 413, "texto": "Una entidad revelará los activos intangibles de disponibilidad restringida\nindividualizando:\na) Las causas (legales, contractuales o situaciones de hecho) que limitan su\ndisponibilidad y las mediciones contables correspondientes y\nb) Los componentes que no podrán ser enajenados hasta tanto se cancelen\ndeterminados pasivos, indicándose su medición contable y de los pasivos\nrelacionados.\n\nRevelaciones sobre amortizaciones"}, {"num": 414, "texto": "Una entidad presentará el importe de las amortizaciones del período, clasificándolas\nde acuerdo con la función asignada a los bienes que las originaron; por ejemplo:\na) Costo de producción o costo de construcción.\nb) Gastos de administración.\nc) Gastos de comercialización.\n\nOtras normas aplicables"}, {"num": 415, "texto": "Para el tratamiento contable de los componentes de activos intangibles (distintos de\nla llave de negocio) una entidad deberá contemplar, en tanto resulten pertinentes y\nno contradigan lo establecido en esta sección, otras disposiciones de esta Resolución\nTécnica u otras normas contables. Por ejemplo, las referidas a:\na) “Medición de costos” [ver los párrafos 102 a 110], y “Medición inicial de bienes\no servicios” [ver los párrafos 203 a 204]\nb) “Medición de valores corrientes” [ver los párrafos 117 a 122].\nc) “Mediciones en moneda extranjera” [ver los párrafos 124 a 128].\nd) “Tratamiento de componentes financieros” [ver los párrafos 129 a 142].\ne) “Baja en cuentas” [ver los párrafos 46 a 48].\nf) “Expresión de los estados contables en moneda de cierre en un contexto de\ninflación (ajuste por inflación de los estados contables)” [ver los párrafos 176 a\n200].\ng) “Arrendamientos” [ver los párrafos 532 a 559].\n\nACTIVOS NO CORRIENTES MANTENIDOS PARA LA VENTA\n\nDefinición"}]}, {"id": "c3s9", "nombre": "Activos No Corrientes para la Venta", "parrafos": [{"num": 416, "texto": "A los fines del tratamiento de los activos referidos en esta sección, una entidad deberá\nconsiderar la siguiente definición.\n\nActivos no corrientes mantenidos para la venta: Incluye activos originalmente\nclasificados como no corrientes cuyo destino fue modificado con el fin de\nmantenerlos para la venta, que cumplen con las siguientes condiciones:\na) el activo debe estar disponible, en sus condiciones actuales, para su venta\ninmediata, en los términos usuales;\nb) su venta debe ser altamente probable; y\nc) debe esperarse que dicha venta se produzca dentro del año de la fecha de\nla clasificación.\n\nSe excluyen de esta sección las participaciones en otras entidades que se\ncontabilicen aplicando el párrafo 769."}, {"num": 417, "texto": "Con relación al requisito establecido en el inciso c) del párrafo anterior, cuando exista\nun retraso en la venta que esté causado por hechos o circunstancias fuera del control\nde la entidad y existen evidencias suficientes de que la entidad sigue comprometida\ncon su plan de venta del activo, una entidad estará eximida de aplicar el requisito de\nun año, si:\na) En la fecha en que la entidad se compromete con un plan para vender el activo,\nexiste una expectativa razonable de que otros terceros (distintos del\ncomprador) impondrán condiciones sobre la transferencia del activo que\nampliarán el período necesario para completar la venta, y:\n(i) las acciones necesarias para responder a esas condiciones no puedan\nser iniciadas hasta después de que se haya obtenido el compromiso\nfirme de compra; y\n(ii) es altamente probable un compromiso firme de compra en el plazo de\nun año.\nb) La entidad obtuvo un compromiso firme de compra y, como resultado, el\ncomprador u otros terceros impusieron de forma inesperada condiciones sobre\nla transferencia del activo clasificado previamente como mantenido para la\nventa, que extenderán el período exigido para completar la venta, y:\n(i) tomó a tiempo las acciones necesarias para responder a las condiciones\nimpuestas; y\n(ii) espera una resolución favorable de los factores que originan el retraso.\nc) Durante el período inicial de un año, surgen circunstancias que previamente\nfueron consideradas improbables y, como resultado, el activo previamente\nclasificado como mantenido para la venta no se ha vendido al final de ese\nperíodo, y:\n(i) durante el período inicial de un año, la entidad emprendió las acciones\nnecesarias para responder al cambio de las circunstancias,\n(ii) los activos no corrientes están siendo comercializados de forma activa a\nun precio razonable, dado el cambio en las circunstancias; y\n(iii) se cumplen los criterios establecidos en los incisos a) y b) del párrafo 416.\n\nClasificación"}, {"num": 418, "texto": "Una entidad clasificará un elemento como activo no corriente mantenido para la venta\ncuando se cumpla lo establecido en los párrafos 416 y 417."}, {"num": 419, "texto": "Cuando una entidad obtenga el control de un activo que, bajo otras circunstancias,\nhabría clasificado como parte de algún rubro del activo no corriente, exclusivamente\ncon el propósito de su posterior venta, clasificará dicho activo como mantenido para\nla venta, en la fecha de adquisición, solo si:\na) cumple los requisitos establecidos en los párrafos 416 y 417 en esa fecha; o\nb) es altamente probable que los requisitos establecidos en los párrafos 416 y 417\nno cumplidos a esa fecha se cumpla dentro de un corto período tras la\nadquisición (por lo general, en los tres meses siguientes).\n\nMedición inicial"}, {"num": 420, "texto": "Una entidad medirá inicialmente sus activos no corrientes mantenidos para la venta,\ndesde el momento de su clasificación como tal, por el menor de los siguientes\nimportes:\na) la medición de acuerdo con la política contable aplicada hasta el momento de\nla reclasificación; y\nb) su valor neto de realización.\n\nMedición posterior"}, {"num": 421, "texto": "Una entidad medirá posteriormente sus activos no corrientes mantenidos para la\nventa, desde el momento de su clasificación como tal, por el menor de los siguientes\nimportes:\na) su medición contable según lo establecido en el inciso a) del párrafo 420; y\nb) su valor neto de realización."}, {"num": 422, "texto": "Sin perjuicio de lo indicado en el párrafo inmediato anterior, una entidad reconocerá\nuna ganancia por cualquier incremento en el valor neto de realización hasta el límite\nde la pérdida por desvalorización reconocida a partir de la clasificación del activo\nno corriente como mantenido para la venta o antes de dicha clasificación."}, {"num": 423, "texto": "Cuando una entidad esté alcanzada por lo establecido en el párrafo 419, medirá\ninicialmente al activo por su valor neto de realización.\n\nCambios en un plan de ventas"}, {"num": 424, "texto": "Si un elemento clasificado como activo no corriente mantenido para la venta deja de\ncumplir con lo establecido en los párrafos 416 y 417, la entidad deberá medirlo al\nmenor importe entre:\na) su medición contable determinada antes de que el elemento fue clasificado como\nmantenido para la venta, ajustado por cualquier depreciación, amortización o\nrevaluación que se hubiera reconocido si el elemento no se hubiera clasificado\ncomo mantenido para la venta, y\nb) su importe recuperable en la fecha de la decisión posterior de no venderlo."}, {"num": 425, "texto": "Una entidad incluirá cualquier ajuste requerido a la medición contable de un activo no\ncorriente que deje de estar clasificado como mantenido para la venta, dentro de los\nresultados del período en el cual dejan de cumplir con lo establecido en los párrafos\n416 y 417, a menos que se trate de un bien de uso, revaluado de acuerdo con la\nsección “Bienes de uso y depreciaciones” [ver los párrafos 313 a 358] antes de su\nclasificación como mantenido para la venta, en cuyo caso el ajuste se tratará como\nun incremento o reducción del saldo por revaluación.\n\nComparación con el valor recuperable"}, {"num": 426, "texto": "Debido a la aplicación del párrafo 421, una entidad no necesitará comparar la\nmedición contable con el valor recuperable de estos activos.\n\nPresentación en los estados contables"}, {"num": 427, "texto": "En el estado de situación patrimonial, una entidad presentará el saldo de activos no\ncorrientes mantenidos para la venta:\na) dentro del rubro “otros activos” –corrientes o no corrientes, según lo establecido\nen los párrafos 416 y 417–, e identificarlos de forma separada de otros\nelementos incluidos en ese rubro en las notas;\nb) sin compensar con un pasivo relacionado con dichos activos, el cual se\nexpondrá como corriente."}, {"num": 428, "texto": "En el estado de resultados, una entidad presentará las pérdidas ocasionadas por la\nmedición y las reversiones de dichas pérdidas:\na) Dentro de los “Resultados procedentes de actividades u operaciones\ndiscontinuadas (o en discontinuación) [ver los párrafos 635 a 641], cuando se\nrelacionan con tales resultados.\nb) Bajo un título específico para tales conceptos, en los demás casos."}, {"num": 429, "texto": "Una entidad presentará los resultados procedentes de la baja en cuentas de estos\nactivos por su disposición por separado de los ingresos por actividades ordinarias:\na) Dentro de los “Resultados procedentes de actividades u operaciones\ndiscontinuadas (o en discontinuación) [ver los párrafos 635 a 641], cuando se\nrelacionan con tales resultados.\nb) Bajo un título específico para tales conceptos, en los demás casos.\n\nRevelación en notas\n\nRevelaciones de carácter general"}, {"num": 430, "texto": "Una entidad revelará en notas las opciones de política contable utilizada y los\ncriterios de medición aplicados a los activos no corrientes mantenidos para la venta."}, {"num": 431, "texto": "Una entidad revelará lo siguiente:\na) Una descripción de cada activo no corriente clasificado como mantenido para\nla venta.\nb) Una descripción de los hechos y circunstancias de la venta, o de los que hayan\nllevado a decidir la venta o disposición esperada, así como la forma y momento\nesperados para dicha disposición.\nc) La ganancia o pérdida presentadas de acuerdo con el párrafo 428."}, {"num": 432, "texto": "[Eliminado].\n\nRevelaciones sobre valor neto de realización"}, {"num": 433, "texto": "En los casos de medición sobre la base del valor neto de realización, una entidad\nrevelará la siguiente información:\na) fechas en las cuales midió cada uno de los activos no corrientes mantenidos\npara la venta (incluyendo los retirados de servicio);\nb) indicación acerca de si practicó la medición con personal propio o mediante los\nservicios de un tasador o especialista en valuaciones, idóneo e independiente\nrespecto de la entidad;\nc) detalle de los métodos e hipótesis significativas utilizadas en la estimación del\nvalor neto de realización;\nd) manifestación acerca de las bases utilizadas para medir el valor neto de\nrealización (precios observables en un mercado activo, transacciones de\nmercado recientes o técnicas de valuación); y\ne) sumas reconocidas en resultados como consecuencia de la medición a valor\nneto de realización o por el consumo de los activos no corrientes mantenidos\npara la venta (incluyendo los retirados de servicio).\n\nOtras normas aplicables"}, {"num": 434, "texto": "Para el tratamiento contable de los componentes de activos no corrientes mantenidos\npara la venta (incluyendo activos retirados de servicio) una entidad deberá\ncontemplar, en tanto resulten pertinentes y no contradigan lo establecido en esta\nsección, otras disposiciones de esta Resolución Técnica u otras normas contables.\nPor ejemplo, y sin ánimo de ser exhaustivos, las referidas a:\na) “Medición de costos” [ver los párrafos 102 a 110], y “Medición inicial de bienes\no servicios” [ver los párrafos 203 a 204]\nb) “Medición de valores corrientes” [ver los párrafos 117 a 122].\nc) “Mediciones en moneda extranjera” [ver los párrafos 124 a 128].\nd) “Tratamiento de componentes financieros” [ver los párrafos 129 a 142].\ne) “Baja en cuentas” [ver los párrafos 46 a 48].\nf) “Expresión de los estados contables en moneda de cierre en un contexto de\ninflación (ajuste por inflación de los estados contables)” [ver los párrafos 176 a\n200].\ng) “Arrendamientos” [ver los párrafos 532 a 559].\n\nOTRAS INVERSIONES\n\nDefinición"}]}, {"id": "c3s10", "nombre": "Otras Inversiones", "parrafos": [{"num": 435, "texto": "A los fines del tratamiento de los activos referidos en esta sección, una entidad deberá\nconsiderar la siguiente definición:\n\nOtras inversiones: Son colocaciones realizadas con el objetivo de obtener renta,\nganancias de capital u otros beneficios, explícitos o implícitos, en activos que:\na) no corresponda incluir en un rubro específico tratado en esta Resolución\nTécnica o en otras normas contables; y\nb) no están afectados a la generación de ingresos de actividades\nordinarias.\n\nEste rubro incluye, entre otros:\na) Obras de arte.\nb) Tenencias de oro.\n\nEste rubro excluye las tenencias de criptoactivos cuyo valor depende\nexclusivamente de la aceptación de los participantes del mercado.\n\nReconocimiento"}, {"num": 436, "texto": "Una entidad reconocerá un elemento como otra inversión cuando:\na) cumpla con la definición general del párrafo 22 y la definición específica\ncontenida en el párrafo 435;\nb) su medición satisfaga el requisito de confiabilidad (credibilidad); y\nc) su contribución a los beneficios económicos futuros de la entidad resulte\nprobable.\n\nMedición inicial"}, {"num": 437, "texto": "Una entidad medirá, en el momento del reconocimiento, las otras inversiones de\nacuerdo con los criterios indicados a continuación:\na) Cuando sean activos con un precio directamente observable:\n(i) a su valor razonable; o\n(ii) a su cotización sucedánea, cuando no pueda determinarse el valor\nrazonable.\nb) A su costo de adquisición, en los restantes casos."}, {"num": 438, "texto": "Cuando utilice alguno de los criterios indicados en el inciso a) del párrafo anterior para\nmedir estos activos en el reconocimiento, una entidad imputará a resultados los\ndesembolsos ocasionados por la compra.\n\nMedición posterior"}, {"num": 439, "texto": "Una entidad medirá estas inversiones, de manera consistente con lo establecido en\nel párrafo anterior, de acuerdo con los criterios que se indican a continuación:\na) Cuando sean activos con un precio directamente observable:\n(i) a su valor razonable; o\n(ii) a su cotización sucedánea, cuando no pueda determinarse el valor\nrazonable.\nb) A su costo de adquisición, en los restantes casos.\n\nComparación con el valor recuperable"}, {"num": 440, "texto": "Una entidad evaluará, a la fecha de los estados contables, si existen indicios de\ndesvalorización de las otras inversiones medidas por su costo de adquisición."}, {"num": 441, "texto": "En el caso de las otras inversiones que se miden al costo de adquisición, una\nentidad:\na) considera que su valor recuperable es equivalente al valor neto de\nrealización; y\nb) determinará pérdidas por desvalorización cuando el importe indicado en el\ninciso anterior es inferior a su medición contable."}, {"num": 442, "texto": "Una entidad revertirá pérdidas por desvalorización reconocidas en períodos\nanteriores solo cuando, con posterioridad a la fecha de su determinación, se\nmodifiquen las estimaciones efectuadas para determinar el valor recuperable. En tal\ncaso, aumentará la medición contable de las otras inversiones por un importe que sea\nel menor entre:\na) la medición contable que las inversiones habrían tenido si nunca se hubiese\nreconocido una pérdida por desvalorización; y\nb) su nuevo valor recuperable.\n\nPresentación en los estados contables"}, {"num": 443, "texto": "En el estado de situación patrimonial, una entidad presentará el saldo de otras\ninversiones como activos corrientes o activos no corrientes, según corresponda."}, {"num": 444, "texto": "En el estado de resultados, una entidad presentará las pérdidas por\ndesvalorización y las reversiones de dichas pérdidas bajo un título específico para\ntales conceptos."}, {"num": 445, "texto": "En el estado de resultados, una entidad presentará los gastos asociados a la compra\nreconocidos de acuerdo con el párrafo 438 y las ganancias o pérdidas derivadas de\ncambios en el valor razonable o la cotización sucedánea en una partida separada."}, {"num": 446, "texto": "Una entidad presentará los resultados derivados de la baja en cuentas de estos\nactivos por su disposición bajo el título otros ingresos y gastos, separado de los\nresultados provenientes de los ingresos por actividades ordinarias.\n\nRevelación en notas"}, {"num": 447, "texto": "Una entidad revelará en notas:\na) la política contable seleccionada para cada clase de otras inversiones;\nb) las bases y métodos utilizados y los supuestos considerados en las mediciones\nbasadas en valores corrientes;\nc) los componentes principales del rubro otras inversiones; y\nd) las pérdidas (o reversión de pérdidas) por desvalorización reconocidas durante\nel período, explicando sus causas principales.\n\nOtras normas aplicables"}, {"num": 448, "texto": "Para el tratamiento contable de los componentes de otras inversiones una entidad\ndeberá contemplar, en tanto resulten pertinentes y no contradigan lo establecido en\nesta sección, otras disposiciones de esta Resolución Técnica u otras normas\ncontables. Por ejemplo, y sin ánimo de ser exhaustivos, las referidas a:\na) “Medición de costos” [ver los párrafos 102 a 110], y “Medición inicial de bienes\no servicios” [ver los párrafos 203 a 204]\nb) “Medición de valores corrientes” [ver los párrafos 117 a 122].\nc) “Mediciones en moneda extranjera” [ver los párrafos 124 a 128].\nd) “Tratamiento de componentes financieros” [ver los párrafos 129 a 142].\ne) “Baja en cuentas” [ver los párrafos 46 a 48].\nf) “Expresión de los estados contables en moneda de cierre en un contexto de\ninflación (ajuste por inflación de los estados contables)” [ver los párrafos 176 a\n200].\n\nCAPÍTULO 4\n\nRECONOCIMIENTO, MEDICIÓN Y PRESENTACIÓN DE PARTIDAS DEL PASIVO Y DEL\nPATRIMONIO NETO\n\nINTRODUCCIÓN AL PRESENTE CAPÍTULO"}]}]}, {"id": "cap4", "num": 4, "nombre": "Partidas del Pasivo y Patrimonio Neto", "icono": "📊", "secciones": [{"id": "c4s0", "nombre": "Distinción Pasivo / PN", "parrafos": [{"num": 449, "texto": "En este capítulo se describen los requerimientos de clasificación, reconocimiento,\nmedición, presentación y revelación en notas de ciertas partidas del pasivo y del\npatrimonio neto."}, {"num": 450, "texto": "Los temas en los que se concentra el presente capítulo son generalmente temas de\nbaja complejidad contable, y se espera que estén presente en cualquier tipo de\nentidad que utilice esta Resolución Técnica.\n\nDISTINCIÓN ENTRE PASIVO Y PATRIMONIO NETO\n\nCriterio general"}, {"num": 451, "texto": "Una entidad clasificará cualquier instrumento financiero emitido (o sus partes\ncomponentes) entre el pasivo y el patrimonio neto basándose en la realidad\neconómica y en las características y definiciones de tales elementos."}, {"num": 452, "texto": "Cuando un instrumento financiero contenga tanto elementos integrantes del pasivo\ncomo del patrimonio neto (por ejemplo, una obligación negociable convertible en\nuna cantidad fija de acciones a cambio de una suma fija de efectivo en moneda\nnacional), una entidad los desagregará y tratará separadamente.\n\nAcciones preferidas rescatables"}, {"num": 453, "texto": "Una entidad considerará que las acciones preferidas emitidas integran el pasivo\ncuando sus cláusulas de emisión, directa o indirectamente:\na) obligan al emisor a su rescate; o bien\nb) otorgan al tenedor el derecho a solicitar su rescate, por un importe determinado\no determinable y en una fecha fija o determinable."}, {"num": 454, "texto": "Los intereses o dividendos correspondientes a las acciones preferidas que forman\nparte del pasivo integran los costos financieros a cuyo tratamiento se refiere la\nsección “Tratamiento de costos financieros” [ver los párrafos 129 a 142]."}, {"num": 455, "texto": "Las acciones preferidas rescatables a opción del emisor integran el patrimonio neto\nmientras la opción no haya sido decidida o no pueda ser efectivamente ejercida.\n\nAportes irrevocables para futuras suscripciones de acciones"}, {"num": 456, "texto": "Una entidad clasificará los aportes irrevocables para futuras suscripciones de\nacciones como pasivo o patrimonio neto de conformidad con lo establecido en los\npárrafos 504 y 505.\n\nPASIVOS CIERTOS (DEUDAS) EN MONEDA\n\nDefinición"}]}, {"id": "c4s1", "nombre": "Deudas en Moneda", "parrafos": [{"num": 457, "texto": "A los fines del tratamiento de los pasivos referidos en esta sección, una entidad\ndeberá considerar la siguiente definición:\n\nPasivos ciertos (deudas) en moneda: Son pasivos caracterizados por la\ninexistencia de incertidumbre sobre su cuantía y vencimiento, que representan\nuna obligación de entregar sumas de efectivo, equivalentes de efectivo o créditos\nciertos en moneda, siendo ineludible la salida de tales recursos económicos. Se\nexcluyen los pasivos que se contabilicen aplicando la sección “Instrumentos\nderivados y operaciones de cobertura” [ver los párrafos 990 al 1020].\n\nReconocimiento"}, {"num": 458, "texto": "Una entidad reconocerá un elemento como pasivo cierto (deuda) en moneda cuando\nse cumple la definición general del párrafo 23 y la definición específica contenida en\nel párrafo 457 (por ejemplo, cuando se produzca el evento contemplado en alguna\nley o reglamentación que origine una obligación de entregar sumas de efectivo,\nequivalentes de efectivo u otro activo financiero).\n\nMedición inicial\n\nPasivos ciertos (deudas) en moneda originados en la compra de bienes o servicios"}, {"num": 459, "texto": "Una entidad medirá inicialmente los pasivos ciertos (deudas) en moneda originados\nen compra de bienes o servicios entre partes independientes:\na) Al valor de contado de la operación, cuando pacte componentes financieros\nexplícitos.\nb) A su valor nominal, cuando no segregue componentes financieros\nimplícitos, de acuerdo con lo establecido en el apartado “Segregación de\ncomponentes financieros implícitos” [ver los párrafos 130 a 135]; o\nc) Al valor descontado de los flujos de efectivo futuros o al precio contado cuando\nsegregue componentes financieros implícitos, según lo establecido en el\napartado “Segregación de componentes financieros implícitos” [ver los párrafos\n130 a 135].\n\nPasivos ciertos (deudas) en moneda originados en transacciones financieras"}, {"num": 460, "texto": "Una entidad medirá inicialmente los pasivos ciertos (deudas) en moneda originados\nen transacciones financieras entre partes independientes:\na) Por el valor de las sumas recibidas (neto de los gastos deducidos), cuando:\n(i) la entidad es pequeña, excepto que opte por la política contable referida\nen el inciso b) siguiente;\n(ii) la tasa de interés pactada no difiere significativamente del tipo de mercado\npara transacciones similares; o\n(iii) la totalidad de las cuotas pactadas vence en un plazo máximo de doce\nmeses, contado desde la fecha de la operación, excepto que opte por la\npolítica contable referida en el inciso siguiente (por ejemplo, porque las\ncondiciones pactadas no reflejan los términos usuales del mercado).\nb) Al valor descontado de los flujos de efectivo futuros mediante una tasa de interés\nde mercado, en los restantes casos.\n\nOtros pasivos ciertos (deudas) en moneda"}, {"num": 461, "texto": "Una entidad medirá los demás pasivos ciertos (deudas) en moneda entre partes\nindependientes, del siguiente modo:\na) Al valor de contado de la operación, cuando pacte componentes financieros\nexplícitos.\nb) A su valor nominal cuando no segregue componentes financieros implícitos,\nde acuerdo con lo establecido en el apartado “Segregación de componentes\nfinancieros implícitos” [ver los párrafos 130 a 135].\nc) Al valor descontado de los flujos de efectivo futuros o al precio contado cuando\nsegregue componentes financieros implícitos, según lo establecido en el\napartado “Segregación de componentes financieros implícitos” [ver los párrafos\n130 a 135].\n\nPasivos (deudas) ciertas en moneda provenientes de transacciones entre partes\nrelacionadas"}, {"num": 462, "texto": "Una entidad optará por medir los pasivos ciertos (deudas) en moneda provenientes\nde transacciones entre partes relacionadas de acuerdo con alguno de los siguientes\ncriterios:\na) según las condiciones pactadas;\nb) al valor descontado de los flujos de efectivo futuros o al precio contado cuando\nsegregue componentes financieros implícitos, según lo establecido en el\napartado “Segregación de componentes financieros implícitos” [ver los párrafos\n130 a 135]; o\nc) al valor descontado de los flujos de efectivo futuros, cuando:\n(i) surge de transacciones financieras;\n(ii) la tasa de interés pactada difiere significativamente del tipo de mercado\npara transacciones similares; y\n(iii) al menos una de las cuotas pactadas vence en un plazo mayor a doce\nmeses, contado desde la fecha de la operación."}, {"num": 463, "texto": "Cuando una entidad opte por la política contable referida en los incisos b) o c) del\npárrafo anterior, contabilizará la contrapartida de forma similar a la establecida en los\npárrafos 509 y 510.\n\nMedición posterior"}, {"num": 464, "texto": "Una entidad medirá los pasivos ciertos (deudas) en moneda:\na) Al costo amortizado, cuando:\n(i) pactó componentes financieros explícitos; o\n(ii) segregó componentes financieros implícitos en el momento de su\nreconocimiento, según lo establecido en el apartado “Segregación de\ncomponentes financieros implícitos” [ver los párrafos 130 a 135].\n(iii) en el momento de la medición inicial la entidad aplicó el inciso b) del\npárrafo 460.\nb) Al valor nominal, en los restantes casos."}, {"num": 465, "texto": "Para la medición posterior del costo amortizado de los pasivos ciertos (deudas) en\nmoneda, una entidad utilizará:\na) La misma tasa de interés que utilizó en el momento de la medición inicial, si el\ntipo pactado fuera fijo.\nb) La tasa de interés efectiva que sea consistente con la tasa que corresponda\naplicar según lo establecido en el contrato, si el tipo pactado fuera variable.\n\nBaja en cuentas"}, {"num": 466, "texto": "Una entidad solo dará de baja en cuentas un pasivo cierto (deuda) en moneda (o una\nparte de él) cuando la obligación especificada se extinga por:\na) pago;\nb) cancelación,\nc) expiración; o\nd) refinanciación en los términos de los párrafos 467 a 470."}, {"num": 467, "texto": "Si una entidad refinancia un pasivo cierto (deuda) en moneda y el pasivo después\nde la refinanciación es sustancialmente diferente respecto del pasivo antes de la\nrefinanciación:\na) dará de baja al pasivo preexistente;\nb) reconocerá un nuevo pasivo, aplicando las normas sobre “Medición inicial” [ver\nlos párrafos 459 a 461], contenidas dentro de la presente sección;\nc) reconocerá en el resultado del ejercicio de la refinanciación:\n(i) la diferencia entre los importes del pasivo dado de baja y del nuevo\npasivo; y\n(ii) cualquier costo incurrido en la refinanciación por la entidad."}, {"num": 468, "texto": "La condición de “sustancialmente diferente” establecida en el párrafo anterior se\ncumple si:\na) el valor descontado de los flujos de efectivo posteriores a la refinanciación,\nutilizando la misma tasa empleada para medir el pasivo original, difiere en, por\n\nlo menos, un 10% respecto del valor contable del pasivo refinanciado en la\nfecha de la refinanciación; o\nb) existen otros elementos de carácter cualitativo que permitan deducir que tal\ncambio es sustancial (por ejemplo, la constitución de nuevas garantías o la\nincorporación de cláusulas de cumplimiento contingente para el deudor)."}, {"num": 469, "texto": "Si la refinanciación no da lugar a la baja en cuentas del pasivo original se considera\nque solo existe un cambio en la estimación de los pagos futuros. Para reflejar el\ncambio indicado, una entidad:\na) recalculará el valor contable como el valor actual de los nuevos flujos de efectivo\ndescontados a la tasa de interés efectiva del pasivo original;\nb) reconocerá inmediatamente en el resultado del ejercicio de la refinanciación la\ndiferencia entre el importe resultante de a) y el valor contable previo a la\nmodificación; y\nc) ajustará el importe del pasivo deduciendo cualquier costo incurrido en la\nrefinanciación, y lo amortizará durante la duración del pasivo refinanciado."}, {"num": 470, "texto": "Cuando se trate de una entidad que es pequeña o mediana podrá seguir el siguiente\nprocedimiento en reemplazo del indicado en el párrafo anterior, en la fecha de la\nrefinanciación:\na) mantendrá el valor contable del pasivo, ajustado por los costos incurridos por\nla entidad a causa de la refinanciación; y\nb) modificará la tasa de interés de forma prospectiva, sin que dé lugar al\nreconocimiento de ningún resultado inmediato por la refinanciación.\n\nPresentación en los estados contables"}, {"num": 471, "texto": "En el estado de situación patrimonial, una entidad presentará los pasivos ciertos\n(deudas) en moneda separados de las previsiones y distinguiendo, según\ncorresponda, entre pasivos corrientes y no corrientes."}, {"num": 472, "texto": "En el estado de situación patrimonial, una entidad clasificará los pasivos ciertos\n(deudas) en moneda en función de su naturaleza, distinguiendo categorías como las\nsiguientes:\na) Deudas con proveedores de bienes y servicios.\nb) Préstamos y otras deudas originadas en transacciones financieras.\nc) Deudas fiscales.\nd) Deudas laborales y previsionales.\ne) Deudas con propietarios u otras partes relacionadas.\nf) Otras deudas.\n\nRevelación en notas"}, {"num": 473, "texto": "Una entidad revelará en notas:\na) las políticas contables empleadas y los criterios de medición aplicados para\ncada clase de pasivo; y\nb) las bases y métodos utilizados y los supuestos considerados en las\nmediciones."}, {"num": 474, "texto": "Una entidad revelará información sobre la composición de los pasivos ciertos\n(deudas) en moneda que permita evaluar el importe, calendario e incertidumbre de\nlos flujos de efectivo futuros, incluyendo:\na) su naturaleza e instrumentación jurídica;\nb) los importes de los pasivos ciertos (deudas) en moneda extranjera, si los\nhubiere, y los tipos de cambio vigentes a la fecha de cierre;\nc) los importes, en función de los plazos de vencimiento de las cuotas pactadas,\ndistinguiendo entre:\n(i) plazo vencido;\n(ii) sin plazo establecido;\n(iii) con vencimiento en cada uno de los trimestres del período subsiguiente; y\n(iv) con vencimiento en cada uno de los ejercicios posteriores al subsiguiente.\nd) las tasas de interés, explícitas o implícitas, por categoría de pasivo (pudiendo\ninformar el promedio por categoría en el caso de existir más de una tasa);\ne) las pautas de actualización, si las hubiere;\nf) los saldos con garantías; y\ng) los saldos con entidades sobre las cuales tiene (o que tienen sobre la entidad)\ncontrol, control conjunto o influencia significativa."}, {"num": 475, "texto": "Una entidad pequeña o una entidad mediana podrá no revelar la información\nrequerida por el inciso c) y d) del párrafo anterior.\n\nOtras normas aplicables"}, {"num": 476, "texto": "Para el tratamiento contable de los componentes de pasivos ciertos (deudas) en\nmoneda, una entidad deberá contemplar, en tanto resulten pertinentes y no\ncontradigan lo establecido en esta sección, otras disposiciones de esta Resolución\nTécnica u otras normas contables. Por ejemplo:\na) “Medición de valores corrientes” [ver los párrafos 117 a 122].\nb) “Mediciones en moneda extranjera” [ver los párrafos 124 a 128].\nc) “Tratamiento de componentes financieros” [ver los párrafos 129 a 142].\nd) “Expresión de los estados contables en moneda de cierre en un contexto de\ninflación (ajuste por inflación de los estados contables)” [ver los párrafos 176 a\n200]”.\n\nPASIVOS CIERTOS (DEUDAS) EN ESPECIE\n\nDefinición"}]}, {"id": "c4s2", "nombre": "Deudas en Especie", "parrafos": [{"num": 477, "texto": "A los fines del tratamiento de los pasivos referidos en esta sección, una entidad\ndeberá considerar la siguiente definición.\n\nPasivos ciertos (deudas) en especie: Son pasivos caracterizados por la\ninexistencia de incertidumbre sobre su cuantía y vencimiento, representativos de\nla obligación de prestar servicios o entregar activos distintos del efectivo,\nequivalentes de efectivo o de créditos en moneda. Se excluyen los pasivos que\nse contabilicen aplicando la sección “Instrumentos derivados y operaciones de\ncobertura” [ver los párrafos 990 al 1020].\n\nReconocimiento"}, {"num": 478, "texto": "Una entidad reconocerá un pasivo cierto (deuda) en especie cuando se cumpla la\ndefinición general del párrafo 23 y la definición específica contenida en el párrafo 477.\n\nMedición inicial"}, {"num": 479, "texto": "Una entidad medirá inicialmente un pasivo cierto (deuda) en especie por la medición\ndeterminada del activo o servicio recibido que origina la obligación, de conformidad\ncon esta u otras normas contables.\n\nMedición posterior"}, {"num": 480, "texto": "En la fecha de los estados contables, una entidad medirá un pasivo cierto (deuda)\nen especie, por el mayor entre:\na) el importe del reconocimiento inicial; y\nb) el importe que surja de aplicar los requerimientos indicados en la sección\n“Compromisos que generan pérdidas (contratos onerosos)” [ver los párrafos\n527 a531].\n\nBaja en cuentas"}, {"num": 481, "texto": "Una entidad dará de baja un pasivo cierto (deuda) en especie cuando:\na) expire la obligación,\nb) entregue los bienes; o\nc) preste servicios comprometidos a la contraparte.\n\nPresentación en los estados contables"}, {"num": 482, "texto": "En el estado de situación patrimonial, una entidad presentará un pasivo cierto\n(deuda) en especie separado de las previsiones y distinguiendo, según corresponda,\nentre pasivos corrientes y no corrientes."}, {"num": 483, "texto": "En el estado de situación patrimonial, una entidad clasificará cualquier pasivo cierto\n(deuda) en especie en función de su naturaleza.\n\nRevelación en notas"}, {"num": 484, "texto": "Una entidad revelará en notas:\na) las políticas contables empleadas y los criterios de medición aplicados para\ncada clase de pasivo (deuda) en especie; y\nb) las bases y métodos utilizados y los supuestos considerados en las mediciones\nbasadas en valores corrientes."}, {"num": 485, "texto": "Una entidad revelará la siguiente información sobre la composición de cualquier\npasivo (deuda) en especie:\na) su naturaleza e instrumentación jurídica;\nb) los saldos con garantías; y\nc) los saldos con entidades en las que tiene (o que tienen sobre la entidad) control,\ncontrol conjunto o influencia significativa.\n\nOtras normas aplicables"}, {"num": 486, "texto": "Para el tratamiento contable de los componentes de pasivos ciertos una entidad\ndeberá contemplar, en tanto resulten pertinentes y no contradigan lo establecido en\nesta sección, otras disposiciones de esta Resolución Técnica u otras normas\ncontables. Por ejemplo:\na) “Medición de costos” [ver los párrafos 102 a 110], y “Medición inicial de bienes\no servicios” [ver los párrafos 203 a 204]\nb) “Medición de valores corrientes” [ver los párrafos 117 a 122].\nc) “Mediciones en moneda extranjera” [ver los párrafos 124 a 128].\nd) “Expresión de los estados contables en moneda de cierre en un contexto de\ninflación (ajuste por inflación de los estados contables)” [ver los párrafos 176 a\n200].\n\nPREVISIONES Y OTROS PASIVOS CONTINGENTES\n\nDefiniciones"}]}, {"id": "c4s3", "nombre": "Previsiones y Contingentes", "parrafos": [{"num": 487, "texto": "A los fines del tratamiento de los pasivos referidos en esta sección, una entidad\ndeberá considerar las definiciones siguientes.\n\nPrevisiones: Son pasivos caracterizados por:\na) incertidumbre sobre su cuantía y vencimiento, pues dependen de hechos\nfuturos que no están totalmente bajo el control de la entidad; y\nb) satisfacer los requisitos establecidos por esta Resolución Técnica para su\nreconocimiento.\n\nOtros pasivos contingentes: Son pasivos con las mismas características que las\nprevisiones, excepto porque:\na) no cumplen los criterios de reconocimiento del párrafo 488; y\nb) solo deben revelarse en notas.\n\nSe excluyen de esta sección los pasivos que se contabilizan aplicando la sección\n“Beneficios a los empleados posteriores a la terminación de la relación laboral y\notros beneficios a largo plazo” [ver los párrafos 872 al 956].\n\nReconocimiento"}, {"num": 488, "texto": "Una entidad reconocerá una previsión cuando la partida:\na) cumpla con la definición general del párrafo 23 y la definición específica\ncontenida en el párrafo 487;\nb) su medición satisfaga el requisito de confiabilidad (credibilidad); y\nc) resulte probable la salida de recursos económicos que den lugar al\ncumplimiento de las obligaciones inherentes a su definición.\n\nMedición inicial"}, {"num": 489, "texto": "Una entidad medirá inicialmente las previsiones:\na) A su valor nominal cuando:\n(i) la entidad es pequeña; o\n(ii) estima que la totalidad de los flujos de efectivo esperados vencerá en un\nplazo máximo de doce meses, contado desde la fecha de la estimación.\nb) Al valor descontado de los flujos de efectivo esperados si:\n(i) la entidad no es pequeña; y\n(ii) al menos uno de dichos flujos vence en un plazo mayor a doce meses,\ncontado desde la fecha de la estimación."}, {"num": 490, "texto": "Una entidad determinará el valor nominal de la previsión:\na) En función de su valor esperado (esperanza matemática), en el caso de que\nexistan varios desenlaces posibles (por ejemplo, una previsión que refleje la\nobligación de devolver productos a clientes insatisfechos).\nb) De acuerdo con su importe más probable, en el caso de que se trate de una\nobligación aislada (por ejemplo, la que surja de un juicio por el uso indebido de\nuna marca).\n\nMedición posterior"}, {"num": 491, "texto": "Una entidad realizará la medición posterior de las previsiones:\na) A su valor nominal cuando:\n(i) la entidad es pequeña; o\n(ii) estima que la totalidad de los flujos de efectivo esperados vencerá en un\nplazo máximo de doce meses, contado desde la fecha de la estimación.\nb) Al valor descontado de los flujos de efectivo esperados si:\n(i) la entidad no es pequeña; y\n(ii) al menos al menos uno de dichos flujos vence en un plazo mayor a doce\nmeses, contado desde la fecha de la estimación.\n\nBaja en cuentas"}, {"num": 492, "texto": "Una entidad dará de baja en cuentas una previsión cuando:\na) se transforme en pasivo (deuda) cierto por confirmación de los hechos futuros\nantes inciertos; o\nb) se extinga porque la probabilidad de los hechos futuros inciertos se reduce y\ndeja de cumplir con el requisito del inciso c), del párrafo 488.\n\nPresentación en los estados contables"}, {"num": 493, "texto": "En el estado de situación patrimonial, una entidad presentará las previsiones como\nun pasivo, separadas de los pasivos ciertos, y distinguiendo, si correspondiera, entre\npasivos corrientes y no corrientes."}, {"num": 494, "texto": "En el estado de resultados, una entidad presentará:\na) los gastos generados por el aumento de previsiones;\nb) los ingresos derivados de la disminución de previsiones, no originada por su\nconversión en pasivo cierto; y\nc) los resultados financieros producidos por devengar el componente financiero\nen previsiones que se miden al valor descontado.\n\nRevelación en notas"}, {"num": 495, "texto": "Una entidad revelará en notas:\na) las políticas contables empleadas y los criterios de medición aplicados para\ncada clase de previsión; y\nb) las bases y métodos utilizados y los supuestos considerados en las mediciones\nbasadas en valores corrientes."}, {"num": 496, "texto": "Una entidad revelará en notas la siguiente información acerca de contingencias\nreconocidas contablemente:\na) una breve descripción de su naturaleza;\nb) la existencia de eventuales reembolsos de la obligación a cancelar, informando\nademás el importe de cualquier activo reconocido por dichos reembolsos;\nc) una indicación de las incertidumbres relativas a sus importes y calendario de\nflujos de efectivo futuros;\nd) los importes correspondientes al saldo inicial, aumentos y disminuciones\ndurante el período y saldo final; y\ne) las causas de los aumentos y disminuciones, exponiendo por separado:\n(i) los aumentos generados por el efecto financiero, debido al transcurso del\ntiempo, en el caso de previsiones que se miden al valor descontado de los\nflujos de efectivo futuros estimados;\n(ii) las disminuciones originadas en reversiones; y\n(iii) las disminuciones derivadas de la conversión de previsiones en pasivos\nciertos."}, {"num": 497, "texto": "Una entidad informará acerca de circunstancias que tornan impracticable la\naplicación de alguno de los requerimientos del párrafo anterior."}, {"num": 498, "texto": "Cuando existan razones fundadas para suponer que la divulgación de alguna de las\ninformaciones requeridas en los párrafos anteriores resultare perjudicial para la\nentidad, esta podrá realizar una breve descripción de los factores que la generan."}, {"num": 499, "texto": "Una entidad revelará en notas la siguiente información acerca de las contingencias\nque incumplen las condiciones para su reconocimiento como pasivo y su probabilidad\nde ocurrencia no es remota:\na) una breve descripción de su naturaleza;\nb) una estimación de sus efectos patrimoniales, cuando sea posible cuantificarlos\nen moneda de manera adecuada;\nc) una descripción de las incertidumbres relativas a sus importes y calendario de\nflujos de efectivo futuros;\nd) una explicación de los motivos que impiden su reconocimiento; y\ne) una enunciación de la posibilidad de obtener reembolsos en caso de\ncancelación."}, {"num": 500, "texto": "Una entidad no reconocerá ni revelará las situaciones contingentes cuya probabilidad\nde ocurrencia estime remota.\n\nOtras normas aplicables"}, {"num": 501, "texto": "Para el tratamiento contable de los componentes de previsiones una entidad deberá\ncontemplar, en tanto resulten pertinentes y no contradigan lo establecido en esta\nsección, otras disposiciones de esta Resolución Técnica u otras normas contables.\nPor ejemplo:\na) “Mediciones en moneda extranjera” [ver los párrafos 124 a 128].\nb) “Tratamiento de componentes financieros” [ver los párrafos 129 a 142].\nc) “Expresión de los estados contables en moneda de cierre en un contexto de\ninflación (ajuste por inflación de los estados contables)” [ver los párrafos 176 a\n200].\n\nPATRIMONIO NETO\n\nDefiniciones"}]}, {"id": "c4s4", "nombre": "Patrimonio Neto", "parrafos": [{"num": 502, "texto": "A los fines del tratamiento de los componentes referidos en esta sección, una entidad\ndeberá considerar las definiciones siguientes:\n\nAportes de los propietarios: Comprende el capital suscripto, los aportes\nirrevocables a cuenta de futuros aumentos de capital y las primas de emisión.\n\nAportes irrevocables a cuenta de futuros aumentos de capital: Los aportes\nirrevocables a cuenta de futuros aumentos deben considerarse componentes del\npatrimonio neto cuando:\na) fueron efectivamente integrados;\nb) surgen de un acuerdo escrito entre el aportante y el órgano de\nadministración de la entidad mediante el cual se estipule:\n(i) que el aportante mantendrá su aporte, salvo cuando su devolución sea\ndecidida por la asamblea de accionistas (u órgano equivalente)\nmediante un procedimiento similar al requerido para la reducción del\ncapital social;\n(ii) que el destino del aporte sea su futura conversión en instrumentos de\ncapital; y\n(iii) las condiciones para dicha conversión en instrumentos de capital; y\nc) fueron aprobados por la asamblea de accionistas (u órgano equivalente);\no por su órgano de administración ad-referéndum de ella.\n\nAportes irrevocables para absorber pérdidas acumuladas: Los aportes\nefectivamente integrados, destinados a absorber pérdidas acumuladas,\nmodifican los resultados acumulados, siempre que sean aprobados por la\nasamblea de accionistas (u órgano equivalente) o por un órgano de\nadministración de la entidad ad-referéndum de la asamblea.\n\nCapital suscripto: Importe originado en la emisión de acciones, cuotas partes u\notros instrumentos de patrimonio como capital en el momento de suscripción de\ndichos instrumentos por los propietarios.\n\nDistribuciones a los propietarios: Los dividendos y otras distribuciones a los\npropietarios deben deducirse de los resultados no asignados.\n\nLos honorarios de directores, síndicos y otros funcionarios de la entidad:\na) no representan distribución de utilidades; y\nb) deberán reconocerse como gastos en el período durante el cual se\nprestaron los servicios, incluso si se requiere su posterior aprobación por\nparte de la asamblea de accionistas (u órgano equivalente).\n\nGanancias reservadas: Son las ganancias retenidas en la entidad por\ndisposiciones legales, estatutarias u otras o por explícita voluntad social.\nPatrimonio neto: Es la suma de:\na) los aportes de los propietarios o de los asociados (distintos de cuotas\nsociales que puedan considerarse como ingreso de actividades\nordinarias) de una entidad; y\nb) los resultados acumulados, no distribuidos.\n\nPrimas de emisión: Representan la diferencia entre los aportes realizados y el\nvalor nominal del capital suscripto.\n\nResultados acumulados: Comprenden las siguientes partidas:\na) ganancias reservadas;\nb) resultados no asignados; y\nc) resultados diferidos.\n\nResultados diferidos: Son resultados (ingresos y gastos) que, de acuerdo con lo\nexigido o permitido por esta Resolución Técnica u otras normas contables no\nse reconocen dentro del resultado del período. Los resultados diferidos se\nmantendrán como tales hasta que esta Resolución Técnico u otras normas\ncontables permitan o exijan su reclasificación a resultados del período o su\ntransferencia a resultados acumulados no asignados.\n\nResultados diferidos acumulados. Comprenden:\na) resultados diferidos no transferidos a resultados no asignados; y\nb) resultados diferidos no reclasificados a resultados.\n\nResultados no asignados: Los resultados no asignados son los resultados\nacumulados sin asignación específica. Los cambios de su saldo pueden surgir –\nentre otras causas– por:\na) aportes irrevocables para absorber pérdidas acumuladas;\nb) distribución de utilidades;\nc) transferencias a aportes de los propietarios;\nd) transferencias hacia y desde ganancias reservadas; y\ne) transferencias desde resultados diferidos.\n\nTransferencias a aportes de los propietarios: Los resultados no asignados\ndeberán transferirse a aportes de los propietarios cuando se apruebe la\ncapitalización por parte de la asamblea (u órgano equivalente).\n\nTransferencias hacia y desde ganancias reservadas: Las asignaciones de\nresultados hacia y desde resultados no asignados, hacia y desde ganancias\nreservadas, reducen este rubro e incrementan las ganancias reservadas o\nviceversa.\n\nReconocimiento\n\nAportes de capital y similares"}, {"num": 503, "texto": "Una entidad reconocerá los aportes provenientes de la emisión las acciones, cuotas\npartes, otros instrumentos de patrimonio y primas de emisión en el momento de la\nsuscripción por parte de los propietarios.\n\nAportes irrevocables para futuras suscripciones de acciones y similares"}, {"num": 504, "texto": "Una entidad reconocerá un aporte irrevocable para futuras suscripciones de acciones\no instrumentos similares en el patrimonio neto cuando:\na) hayan sido efectivamente integrados;\nb) surjan de un acuerdo escrito entre el aportante y el órgano de administración\nde la entidad mediante el cual se estipule:\n(i) que el aportante mantendrá su aporte, salvo cuando su devolución sea\ndecidida por la asamblea de accionistas (u órgano equivalente) de la\nentidad mediante un procedimiento similar al de reducción del capital\nsocial;\n(ii) que el destino del aporte es su futura conversión en acciones; y\n(iii) las condiciones para dicha conversión;\nc) hayan sido aprobados por la asamblea de accionistas (u órgano equivalente)\nde la entidad o por su órgano de administración ad-referéndum de ella."}, {"num": 505, "texto": "Una entidad reconocerá dentro del pasivo los aportes irrevocables a cuenta de\nfuturas suscripciones de acciones o instrumentos similares que incumplan los\nrequisitos establecidos en el párrafo anterior.\n\nAportes irrevocables para absorber pérdidas acumuladas"}, {"num": 506, "texto": "Una entidad reconocerá un aporte irrevocable para absorber pérdidas acumuladas\ncomo patrimonio neto, modificando los resultados acumulados, siempre que tales\naportes hayan sido:\na) efectivamente integrados; y\nb) aprobados por la asamblea de accionistas (u órgano equivalente) de la entidad\no por su órgano de administración ad-referéndum de ella.\n\nOtras partidas o transacciones que integran el patrimonio neto"}, {"num": 507, "texto": "Una entidad reconocerá en el momento de la aprobación por parte de asamblea de\naccionistas (u órgano equivalente) hechos tales como los siguientes:\na) Constitución de reservas.\nb) Desafectación de reservas.\nc) Distribución de utilidades a los accionistas o socios.\nd) Capitalización de resultados.\ne) Absorción de pérdidas."}, {"num": 508, "texto": "Una entidad reconocerá cualquier otra partida distinta de las enunciadas en los\npárrafos 503 a 507 como patrimonio neto, siempre que haya sido:\na) efectivamente integrada; y\nb) aprobada por la asamblea de accionistas (u órgano equivalente) de la entidad\no por su órgano de administración ad-referéndum de ella."}, {"num": 509, "texto": "Cuando los accionistas o socios condonan un crédito o asumen una deuda de la\nentidad, esta reconocerá dicha transacción como una contribución de capital, una vez\naprobada por los órganos societarios facultados para decidir sobre dicha materia."}, {"num": 510, "texto": "Cuando condona o asume una deuda de sus accionistas o socios, una entidad\nreconocerá dicha transacción como una reducción de capital o una distribución de\nutilidades, de acuerdo a lo dispuesto por los órganos societarios facultados para\naprobar dichas decisiones.\n\nMedición inicial"}, {"num": 511, "texto": "Una entidad medirá los aportes irrevocables a cuenta de futuros aumentos de capital\nque integren el patrimonio neto, en el momento del reconocimiento, por un importe\nequivalente a la medición inicial de los activos aportados."}, {"num": 512, "texto": "Una entidad medirá las primas de emisión, en el momento del reconocimiento, por la\ndiferencia entre la medición del aporte total y el valor nominal del capital suscripto."}, {"num": 513, "texto": "Una entidad medirá el capital y los demás elementos integrantes de patrimonio neto\nno comprendidos en los párrafos anteriores, en el momento del reconocimiento, por\nsu valor nominal.\n\nMedición posterior"}, {"num": 514, "texto": "Una entidad medirá sus elementos integrantes del patrimonio neto usando el mismo\ncriterio empleado para la medición inicial.\n\nPresentación en los estados contables"}, {"num": 515, "texto": "Una entidad:\na) expondrá el total del patrimonio neto en una línea dentro del estado de\nsituación patrimonial;\nb) consignará en dicho estado una referencia al estado de evolución del\npatrimonio neto; y\nc) presentará el saldo inicial de sus componentes, las variaciones del período y el\nsaldo final en el estado de evolución del patrimonio neto."}, {"num": 516, "texto": "En el estado de evolución del patrimonio neto, una entidad clasificará las partidas\nintegrantes del patrimonio neto de acuerdo con su origen del siguiente modo:\na) aportes de los propietarios; y\nb) los resultados acumulados, distinguiendo entre:\n(i) los resultados no asignados; y\n(ii) los resultados cuya distribución se encuentre restringida por normas\nlegales, contractuales o decisiones de la entidad (ganancias reservadas);\nc) los resultados diferidos acumulados."}, {"num": 517, "texto": "Una entidad discriminará, en el estado de evolución del patrimonio neto:\na) el valor nominal del capital; y\nb) el ajuste sobre el valor nominal del capital para expresar los estados\ncontables en moneda de cierre.\n\nRevelación en notas"}, {"num": 518, "texto": "Una entidad revelará lo referido al patrimonio neto según lo requerido por el Capítulo\n6 “Normas generales sobre presentación de estados contables”.\n\nOtras normas aplicables"}, {"num": 519, "texto": "Para aplicar los requerimientos establecidos en esta sección, una entidad deberá\ncontemplar, en tanto resulten pertinentes y no contradigan lo esta
