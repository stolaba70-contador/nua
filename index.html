ón sobre los saldos del estado\nde situación patrimonial tanto al inicio como al cierre del ejercicio anterior."}, {"num": 70, "texto": "La adecuación de la información comparativa no afectará al conjunto de estados\ncontables originalmente emitidos ni a las decisiones tomadas en función de la\ninformación contenida en ellos.\n\nBASES GENERALES PARA LA PREPARACIÓN DE ESTADOS CONTABLES\n\nPOLÍTICAS CONTABLES\n\nSelección y aplicación de políticas contables"}]}, {"id": "c1s6", "nombre": "Bases Generales", "parrafos": [{"num": 71, "texto": "Cuando una sección de esta Resolución Técnica u otras normas contables vigentes\nsean específicamente requeridas para el tratamiento de una transacción, evento o\ncondición, una entidad aplicará tales políticas contables."}, {"num": 72, "texto": "Una entidad seleccionará y aplicará sus políticas contables de manera uniforme\npara transacciones, otros eventos y condiciones similares, excepto que los\nrequerimientos de la presente Resolución Técnica u otras normas contables\nrequieran o admitan algo diferente."}, {"num": 73, "texto": "Al definir sus políticas contables:\na) Una entidad pequeña podrá aplicar una o más de las políticas contables\nestablecidas en esta Resolución Técnica u otras normas contables vigentes\npara las entidades medianas o para las restantes entidades, tal como se\ndefinen las entidades medianas y las restantes entidades en la presente\nResolución Técnica.\nb) Una entidad mediana podrá aplicar una o más de las políticas contables\nestablecidas en esta Resolución Técnica u otras normas contables para las\nrestantes entidades, tal como se definen las restantes entidades en la presente\nResolución Técnica."}, {"num": 74, "texto": "Una entidad que ejerza las opciones admitidas en el párrafo 73:\na) aplicará dichas opciones para todos los rubros o partidas de naturaleza similar;\ny\nb) revelará tal circunstancia en las notas a los estados contables.\n\nCuestiones no previstas"}, {"num": 75, "texto": "En ausencia de un requerimiento en esta Resolución Técnica u otras normas\ncontables que resulte aplicable específicamente a una transacción u otros eventos o\ncondiciones, una entidad se basará en el juicio de su dirección para seleccionar y\naplicar una política contable con el fin de suministrar información que sea relevante\ny fiable."}, {"num": 76, "texto": "La dirección de la entidad resolverá cuestiones de reconocimiento, baja en cuentas,\nmedición o presentación no contempladas expresamente en esta Resolución Técnica\nu otras normas contables basándose en las regulaciones o criterios establecidos a\ncontinuación y respetando el siguiente orden de prioridad:\na) otras secciones de esta Resolución Técnica que traten temas similares y\nrelacionados, aun cuando su aplicación no resulte obligatoria para ese tipo de\nentidad; salvo cuando la norma que se pretende utilizar prohíba su aplicación\nal caso particular que se intenta resolver;\nb) las otras normas contables emitidas y que se emitan en el futuro y traten\ntemas particulares de reconocimiento y medición; y\nc) la Resolución Técnica N° 16 (Marco conceptual de las normas contables\nprofesionales distintas de las contenidas en la Resolución Técnica Nº 26)."}, {"num": 77, "texto": "Cuando la cuestión no prevista no pueda resolverse recurriendo a las fuentes del\npárrafo anterior, por ejemplo, porque se trata de un tema muy específico o particular\nde un ramo o industria, la dirección de la entidad podrá formar su juicio considerando,\nen orden descendente, las siguientes fuentes supletorias, siempre que no entren en\nconflicto con las fuentes señaladas en el párrafo anterior, y hasta tanto la FACPCE\nemita una norma que regule el tema involucrado:\na) las reglas o principios contenidos en:\n(i) las Normas Internacionales de Información Financiera identificadas como\ntales en el punto 7 de la Norma Internacional de Contabilidad 1\n(Presentación de Estados Financieros) aprobadas por el Consejo de\nNormas Internacionales de Información Financiera (IASB); o\n(ii) la NIIF para las PYMES aprobada por el Consejo de Normas\nInternacionales de Información Financiera (IASB), cuando la entidad\ncalifique como pyme tal como se define en dicha norma;\nb) sin un orden preestablecido, los pronunciamientos más recientes de otros\nemisores que empleen un Marco Conceptual similar al de la FACPCE, las\nprácticas aceptadas en determinados ramos o industrias y la doctrina contable."}, {"num": 78, "texto": "Si un pronunciamiento del IASB, o de otro organismo emisor que emplee un Marco\nConceptual similar al de la FACPCE, permitiera para un caso específico y con carácter\ntemporal la aplicación de políticas contables que estén en conflicto con el Marco\nConceptual contenido en la Resolución Técnica N° 16 y con las guías que la\ndirección de una entidad emisora debe considerar para resolver una cuestión no\nprevista, ese pronunciamiento transitorio no podrá utilizarse como fuente supletoria."}, {"num": 79, "texto": "En caso de que el emisor de la fuente normativa supletoria modifique dicha norma, la\ndirección no necesitará reformular sus juicios originales. Si lo hiciera, el cambio se\ncontabilizará y expondrá como una modificación voluntaria de su política contable,\ndebiendo informar en notas las razones del cambio que permiten un mejor\ncumplimiento de los requisitos de la información contenida en los estados\ncontables."}, {"num": 80, "texto": "Cuando utilice las fuentes indicadas en los párrafos precedentes, una entidad:\na) revelará este hecho en la nota correspondiente;\nb) identificará la fuente utilizada; e\nc) informará los fundamentos tenidos en cuenta para su selección.\n\nSignificación"}, {"num": 81, "texto": "Una entidad podrá no aplicar una norma contenida en esta Resolución Técnica u\notras normas contables solo si la desviación no distorsiona significativamente la\ninformación contenida en los estados contables tomados en su conjunto."}, {"num": 82, "texto": "Para evaluar la significación de una desviación en estados contables de períodos\nintermedios, una entidad deberá:\na) estimar su incidencia en los estados contables del período afectado y no la\nque tendría sobre los referidos al ejercicio completo; y\nb) considerar que las mediciones de los estados contables intermedios pueden\nbasarse en estimaciones, en mayor medida que las contenidas en los estados\ncontables de ejercicio.\n\nCosto o esfuerzo desproporcionado\n\nAclaración (texto no integrante de la presente Resolución Técnica)\n\nEn el párrafo 83, se establecen las reglas para seleccionar un tratamiento contable\nalternativo con base en el principio de “costo o esfuerzo desproporcionado”. En síntesis,\npara aplicar este principio, una entidad evaluará:\na) cómo se espera que sus estados contables sean utilizados, con base en los usuarios\nde tales estados a la fecha de la aprobación por parte de la dirección; y\nb) el costo de aplicar el tratamiento que se pretende dejar de cumplir.\n\nAl aplicar el párrafo 83, una entidad evaluará los dos aspectos referidos en los incisos a) y\nb) precedentes, y no evaluará, de manera aislada, solo uno de ellos.\n\nEn esta Resolución Técnica se presentan tratamientos alternativos, basados en la\naplicación del párrafo 83, para los siguientes casos:\na) La aplicación del método del impuesto diferido en entidades medianas, de acuerdo con\nlo establecido en el párrafo 573.\nb) El reconocimiento de forma separada de activos intangibles que surgen de una\ncombinación de negocios, en los estados contables de la adquirente, de acuerdo con\nlo establecido en el inciso a) (i) del párrafo 976.\nc) La medición posterior de ciertos activos biológicos cuando se trate de una entidad\nmediana, de acuerdo con lo establecido en el inciso b) (ii) del párrafo 1027.\n\nDado que la selección de un tratamiento alternativo en función al párrafo 83 satisface las\nreglas establecidas en esta Resolución Técnica, los estados contables que se preparen\ncon arreglo a cualquier política contable seleccionada con base en lo definido por el párrafo\n83 y los párrafos específicos que lo invocan (573, 976 o 1027) son estados contables con\nfines generales."}, {"num": 83, "texto": "Una entidad quedará liberada de aplicar un tratamiento establecido en esta\nResolución Técnica u otras normas contables cuando el costo o esfuerzo requerido\npara su aplicación resulte desproporcionado respecto de los beneficios que la\ninformación obtenida por aplicar ese tratamiento brindaría a los usuarios de sus\nestados contables. Al aplicar este principio, la dirección de la entidad:\na) empleará el criterio de costo o esfuerzo desproporcionado de forma restrictiva;\nes decir, solo cuando esta Resolución Técnica u otras normas contables\nestablezcan un tratamiento permitido distinto del que se aplicaría cuando no se\npresentan las circunstancias previstas en este apartado;\nb) considerará sus circunstancias específicas y la evaluación que realice la\ndirección sobre los costos y beneficios de la aplicación de ese tratamiento\nconcreto, que podrán variar a lo largo del tiempo;\nc) concluirá que la aplicación de un tratamiento implica un costo o esfuerzo\ndesproporcionado solo si:\n(i) el incremento de costo (por ejemplo, honorarios de tasadores) o el\nesfuerzo adicional (por ejemplo, las tareas de los empleados) superan\nsustancialmente los beneficios que recibirían los usuarios de sus estados\ncontables por disponer de esa información; y\n(ii) las decisiones económico-financieras de los usuarios de sus estados\ncontables no resultan afectadas debido a la información que deje de\nproporcionar;\nd) revisará la evaluación de costo o esfuerzo desproporcionado en cada fecha de\nlos estados contables para asegurarse de que la aplicación de cualquier\ntratamiento permitido que dependa de esa evaluación responde a las\ncondiciones existentes a la fecha de los estados contables;\ne) actualizará la revisión indicada en el inciso anterior hasta la fecha de la\naprobación por parte de la dirección de sus estados contables, de\nconformidad con lo establecido en la sección “Consideración de los hechos\nposteriores en la preparación de los estados contables” [ver el párrafo 96];\nf) tratará como un cambio de circunstancias contables, y no de política contable,\nlos cambios en sus circunstancias específicas y en la evaluación realizada por\nla dirección sobre los costos y beneficios de aplicar ese tratamiento concreto;\ny\ng) revelará en notas:\n(i) el hecho de utilizar un tratamiento permitido con base en la evaluación\nprevista en este apartado;\n(ii) la descripción del tratamiento no utilizado;\n(iii) las razones por las que la aplicación del tratamiento no utilizado implica\nun costo o esfuerzo desproporcionado; y\n(iv) la advertencia de que la utilización del tratamiento permitido es una\ncircunstancia que deberá ser considerada en la evaluación e\ninterpretación de esos estados contables.\n\nCambios en las políticas contables"}, {"num": 84, "texto": "Una entidad cambiará una política contable solo si tal cambio:\na) es requerido por esta Resolución Técnica u otras normas contables; o\nb) es admitido por esta Resolución Técnica u otras normas contables y permite\nun mejor cumplimiento de los requisitos de la información contenida en los\nestados contables."}, {"num": 85, "texto": "Cuando una entidad cambie una política contable aplicará dicha modificación\nretroactivamente, excepto que una sección específica de esta Resolución Técnica u\notras normas contables prescriban un tratamiento diferente."}, {"num": 86, "texto": "Una entidad podrá aplicar anticipadamente una nueva resolución técnica,\ninterpretación, o la modificación de una existente en la medida en que tales normas\nno dispongan lo contrario."}, {"num": 87, "texto": "Una entidad revelará en notas:\na) los cambios introducidos en sus políticas contables; y\nb) los motivos para realizar los cambios previstos en el inciso b) del párrafo 84."}, {"num": 88, "texto": "Una entidad considerará que las siguientes situaciones no constituyen cambios en\nlas políticas contables:\na) la aplicación de una política contable para transacciones, otros eventos o\ncondiciones que difieren sustancialmente de los ocurridos con anterioridad;\nb) la aplicación de una nueva política contable para transacciones, otros eventos\no condiciones que no ocurrieron anteriormente o no eran significativos; o\nc) la aplicación de una política contable diferente debido a que la entidad cambió\nsu categoría, conforme a la clasificación del párrafo 5."}, {"num": 89, "texto": "La aplicación por primera vez de la política contable establecida en el apartado\n“Modelo de revaluación” [ver los párrafos 322 a 338] se contabilizará de forma\nprospectiva.\n\nCAMBIOS EN LAS ESTIMACIONES CONTABLES"}, {"num": 90, "texto": "Como resultado de las incertidumbres inherentes al mundo de los negocios, muchas\npartidas de los estados contables no pueden ser medidas con precisión, sino solo\nestimadas. El proceso de estimación implica la utilización de juicios basados en la\ninformación confiable disponible más reciente. Por ejemplo, una entidad podría hacer\nestimaciones para determinar:\na) las cuentas por cobrar de dudosa recuperación;\nb) la obsolescencia de los bienes de cambio;\nc) el valor razonable;\nd) la vida útil o las pautas de consumo esperadas de los beneficios económicos\nfuturos incorporados en los bienes de uso u otros activos depreciables; y\ne) las obligaciones por garantías concedidas."}, {"num": 91, "texto": "Una entidad reconocerá los efectos de un cambio en una estimación contable de\nforma prospectiva:\na) incluyéndolos en el resultado del período durante el cual se produce dicho\ncambio y de los períodos futuros, si la modificación afectara a todos ellos; y\nb) ajustando la medición contable de la correspondiente partida de activo, pasivo\no patrimonio neto.\n\nAclaración (texto no integrante de la presente Resolución Técnica)\n\nEn los párrafos 90 y 91, la expresión “estimación contable” se refiere a importes monetarios,\nen los estados contables, que están sujetos a incertidumbre en la medición.\n\nEn esta Resolución Técnica u otras normas contables, en ocasiones, se usa la expresión\n“estimación” de una forma distinta a la subyacente en los párrafos 90 y 91. Por ejemplo,\npuede aludir a datos de entrada que sirven de base para desarrollar estimaciones\ncontables.\n\nLa utilización de estimaciones razonables es una parte esencial de la elaboración de los\nestados contables, y no menoscaba el cumplimiento del requisito de confiabilidad\n(credibilidad).\n\nCORRECCIÓN DE ERRORES U OMISIONES DE PERÍODOS ANTERIORES"}, {"num": 92, "texto": "Una entidad corregirá los errores u omisiones de períodos anteriores de forma\nretroactiva, en los primeros estados contables que se emitan después de su\ndetección:\na) modificando la información comparativa para el período o períodos anteriores\nen los que se produjo el error; o\nb) si el error ocurrió con anterioridad al período más antiguo para el que se\npresenta información comparativa, corrigiendo los componentes\ncorrespondientes del patrimonio neto, al inicio de dicho período.\n\nRECLASIFICACIÓN DE ACTIVOS O PASIVOS"}, {"num": 93, "texto": "Excepto cuando esta Resolución Técnica u otras normas contables establezcan\notro tratamiento, una entidad imputará al resultado del período las diferencias de\nmedición que se originen cuando un activo o un pasivo:\na) deje de pertenecer a una categoría para cuya medición contable debió utilizar\nimportes históricos (por ejemplo, costo o costo menos depreciaciones); y\nb) comience a pertenecer a una categoría para cuya medición contable deba\nemplear valores corrientes."}, {"num": 94, "texto": "Una entidad medirá las diferencias referidas en el párrafo anterior a la fecha de la\nreclasificación."}, {"num": 95, "texto": "Al aplicar los dos párrafos precedentes, una entidad atribuirá al valor corriente de\nuna partida el carácter de costo atribuido cuando un activo o un pasivo:\na) deje de pertenecer a una categoría para cuya medición contable debió utilizar\nvalores corrientes; y\nb) comience a pertenecer a una categoría para cuya medición contable deba\nemplear una medición basada en el costo.\n\nCONSIDERACIÓN DE LOS HECHOS POSTERIORES EN LA PREPARACIÓN DE LOS\nESTADOS CONTABLES"}, {"num": 96, "texto": "Una entidad considerará los efectos de los siguientes hechos y circunstancias\nocurridos entre la fecha de los estados contables y la de su aprobación por parte\nde la dirección:\na) hechos posteriores confirmatorios, que proporcionan evidencia de las\ncondiciones que existían a la fecha de los estados contables e implican\najustes retroactivos; y\nb) hechos posteriores nuevos, que no requieren ajustes retroactivos pero que\ndeberán revelarse en notas en tanto afecten o puedan afectar\nsignificativamente la situación patrimonial, la evolución patrimonial o la\nevolución financiera de la entidad.\n\nUNIDAD DE MEDIDA"}, {"num": 97, "texto": "Una entidad emitirá sus estados contables:\na) Sin ajustar por inflación, en un contexto de estabilidad (para fines contables).\nb) En moneda de cierre (es decir, en moneda de poder adquisitivo\ncorrespondiente a la fecha de los estados contables), en un contexto de\ninflación (para fines contables)."}, {"num": 98, "texto": "Una entidad no considerará su situación particular para definir la existencia de un\ncontexto de inflación (para fines contables), sino que la necesidad de ajustar sus\nestados contables viene indicada por ciertas características que permiten calificar a\nuna economía como altamente inflacionaria. Para esta Resolución Técnica dichas\ncaracterísticas son las siguientes:\na) La tasa acumulada de inflación en tres años, considerando el índice indicado\nen el párrafo 179, alcanza o sobrepasa el 100%.\nb) Se produce una corrección generalizada de los precios y/o de los salarios.\nc) Los fondos en moneda argentina se invierten inmediatamente para mantener\nsu poder adquisitivo.\nd) La brecha existente entre la tasa de interés por las colocaciones realizadas en\nmoneda argentina y en una moneda extranjera es muy relevante.\ne) La población en general prefiere mantener su riqueza en activos no monetarios\no en una moneda extranjera relativamente estable."}, {"num": 99, "texto": "Con el fin de favorecer la evaluación consistente de distintas entidades, esta\nResolución Técnica establece que:\na) la pauta cuantitativa referida en el inciso a) del párrafo anterior es indicador\nclave y condición necesaria para expresar en moneda de cierre las cifras de\nlos estados contables; y\nb) todas las entidades empezarán a ajustar desde la misma fecha e interrumpirán\nel ajuste a partir de la misma fecha."}, {"num": 100, "texto": "Una entidad cumplirá la exigencia legal de emitir los estados contables en moneda\nconstante si satisface los requerimientos establecidos en el párrafo 97.\n\nCAPÍTULO 2\n\nPROCEDIMIENTOS CONTABLES DE APLICACIÓN GENERAL\n\nINTRODUCCIÓN AL PRESENTE CAPÍTULO"}]}]}, {"id": "cap2", "num": 2, "nombre": "Procedimientos de Aplicación General", "icono": "⚙️", "secciones": [{"id": "c2s1", "nombre": "Introducción", "parrafos": [{"num": 101, "texto": "En este capítulo se describen:\na) los criterios generales que una entidad utilizará en la medición de costos;\nincluyendo los referidos a:\n(i) la medición de costos en general;\n(ii) la medición del costo de adquisición;\n(iii) la medición del costo de producción o costo de construcción; y\n(iv) la medición del costo de desarrollo;\nb) los criterios generales que una entidad utilizará en la medición de valores\ncorrientes, incluyendo los referidos a:\n(i) el costo de reposición, el costo de reproducción y/o reconstrucción;\ny\n(ii) el valor razonable (que incluye al valor neto de realización);\nc) los criterios para efectuar mediciones de elementos originalmente denominados\nen moneda extranjera;\nd) el tratamiento de los componentes financieros, que incluye:\n(i) el tratamiento de los componentes financieros explícitos;\n(ii) la segregación de los componentes financieros implícitos;\n(iii) la consideración de los costos financieros como gastos o como parte de\nla medición de un activo apto para la activación de costos financieros;\ne) la consideración de hechos contingentes;\nf) la comparación de ciertos activos con su valor recuperable; y\ng) la expresión de los estados contables en moneda de cierre (ajuste por inflación\nde los estados contables).\n\nMEDICIÓN DE COSTOS\n\nMedición de costos, en general"}]}, {"id": "c2s2", "nombre": "Medición de Costos", "parrafos": [{"num": 102, "texto": "Una entidad medirá los costos en función de la suma de:\na) los importes de efectivo o sus equivalentes pagados o que se obliga a entregar;\ny\nb) el valor corriente de las contraprestaciones diferentes del efectivo o sus\nequivalentes entregados o que se obliga a entregar por, o como consecuencia\nde, la adquisición, producción o construcción de un activo.\n\nMedición del costo de adquisición"}, {"num": 103, "texto": "Una entidad medirá el costo de adquisición de bienes o servicios mediante la suma\nde los siguientes componentes:\na) el precio de adquisición, determinado de forma consistente con lo establecido\nen el apartado “Tratamiento de componentes financieros” [ver los párrafos 129\na 142], neto de descuentos comerciales y rebajas, incluyendo honorarios,\naranceles de importación e impuestos no recuperables;\nb) los costos directos de los servicios internos y externos necesarios para darle al\nactivo la ubicación y destino previstos por la dirección (por ejemplo, fletes,\nseguros, preparación del emplazamiento, costos de entrega, manipulación\ninicial e instalación); y\nc) la asignación de costos indirectos, que realizará sobre bases razonables.\n\nMedición del costo de producción o del costo de construcción"}, {"num": 104, "texto": "Una entidad aplicará el modelo de costeo completo a los fines de medir el costo\nde producción o el costo de construcción o el costo de implantación."}, {"num": 105, "texto": "Una entidad medirá el costo de producción, el costo de construcción o el costo\nde implantación de un activo mediante la suma de los siguientes componentes:\na) los costos de los materiales e insumos necesarios para su producción;\nb) los costos de conversión (mano de obra, servicios, depreciaciones y otras\ncargas), tanto variables como fijos;\nc) los costos directos que demande la puesta en marcha y/o las pruebas\ndestinadas a evaluar si el activo está en condiciones de utilizarse según el uso\ny las condiciones previstas en el proyecto de producción o construcción, neto\nde los ingresos que genere la venta de productos con valor comercial que se\nobtengan durante este período; y\nd) los costos financieros, si correspondiera computarlos según lo establecido en\nel apartado “Tratamiento de los costos financieros” [ver los párrafos 136 a 142]."}, {"num": 106, "texto": "Una entidad cesará la activación de costos de activos tales como bienes de uso,\npropiedades de inversión o similares cuando dichos activos alcancen las condiciones\n\nde operación previstas en el proyecto de producción, construcción o implantación,\nincluso si:\na) el bien es utilizado por debajo de su capacidad normal; o\nb) la operación genera pérdidas operativas o ganancias inferiores a las\nproyectadas."}, {"num": 107, "texto": "Una entidad no incluirá en el costo de producción, en el costo de construcción ni\nen el costo de implantación, de un activo ninguno de los siguientes conceptos:\na) las improductividades físicas o ineficiencias en el uso de los factores en\ngeneral; y\nb) la ociosidad producida por la falta de aprovechamiento de los factores fijos\ncomo consecuencia de la utilización de la capacidad de planta por debajo de\nsu nivel de actividad normal."}, {"num": 108, "texto": "Una entidad reconocerá los importes correspondientes a improductividades o\nineficiencias (tales como cantidades anormales de materiales, mano de obra u otros\ncostos de conversión desperdiciados), razonablemente determinables y que\ndistorsionen el costo de los bienes producidos, como resultados del período y no\ncomo componentes del costo."}, {"num": 109, "texto": "Una entidad determinará el nivel de actividad normal considerando que dicho nivel\ndebe:\na) equivaler a la producción que espera alcanzar en promedio durante varios\nperíodos bajo las circunstancias previstas; y\nb) representar un indicador realista, generalmente por debajo de su capacidad\ntotal."}, {"num": 110, "texto": "Para el cálculo del promedio referido en el párrafo anterior, una entidad tendrá en\ncuenta la naturaleza de sus negocios y otras circunstancias; por ejemplo, las\nvinculadas con los ciclos de su actividad o de sus productos y la precisión de los\npresupuestos.\n\nMedición del costo de desarrollo"}, {"num": 111, "texto": "Cuando corresponda, una entidad medirá el costo de desarrollo de un activo\nintangible mediante la suma de los siguientes componentes:\na) los costos de los materiales e insumos necesarios para su generación;\nb) los costos de conversión (mano de obra, servicios, depreciaciones y otras\ncargas), tanto variables como fijos;\nc) los gastos y honorarios necesarios para registrar los derechos legales;\nd) la amortización de patentes y licencias utilizadas para generar el intangible; y\ne) los costos financieros, si correspondiera computarlos según lo establecido en\nel apartado “Tratamiento de los costos financieros” [ver los párrafos 136 a 142]."}, {"num": 112, "texto": "Al medir el costo de desarrollo de un activo intangible, una entidad considerará, en\nlo que resulte pertinente, lo establecido en el apartado “Medición del costo de\nproducción o del costo de construcción” [ver los párrafos 104 a 110].\n\nMEDICIÓN DE VALORES CORRIENTES\n\nMedición de costos de reposición, o costos de reproducción y/o reconstrucción"}]}, {"id": "c2s3", "nombre": "Medición de Valores Corrientes", "parrafos": [{"num": 113, "texto": "Una entidad medirá el costo de reposición acumulando todos los componentes del\ncosto de adquisición [ver el párrafo 103], expresando cada uno de ellos en términos\nde su reposición, a la fecha de la medición."}, {"num": 114, "texto": "Una entidad medirá el costo de reproducción y/o reconstrucción acumulando\ntodos los componentes del costo de producción o costo de construcción de\nacuerdo con lo establecido en el apartado “Medición del costo de producción o del\ncosto de construcción” [ver los párrafos 104 a 110], expresando cada uno de ellos en\ntérminos de su reposición, a la fecha de la medición."}, {"num": 115, "texto": "Una entidad basará la medición del costo de reposición, o del costo de\nreproducción y/o reconstrucción en precios correspondientes a:\na) volúmenes normales o habituales de adquisición, producción o construcción,\ncuando se trate de operaciones repetitivas; o\nb) volúmenes similares a los adquiridos, producidos o construidos, en los demás\ncasos; y\nc) condiciones consistentes con la política contable seleccionada por la entidad\npara aplicar lo establecido en el apartado “Segregación de componentes\nfinancieros implícitos” [ver los párrafos 130 a 135].\n\n115A. Una entidad obtendrá los precios, correspondientes a la fecha de la medición o a\nuna fecha próxima a esta última, de fuentes directas y fiables, tales como las\nsiguientes:\na) cotizaciones o listas de precios de proveedores;\nb) costos de adquisición y costo de producción o costo de construcción\nreales;\nc) órdenes de compra colocadas y pendientes de recepción; o\nd) cotizaciones que resulten de la oferta y la demanda en mercados públicos o\nprivados, publicadas en boletines, periódicos, revistas o medios digitales."}, {"num": 116, "texto": "Cuando no pueda obtener los precios de fuentes directas y confiables, una entidad\npodrá emplear aproximaciones basadas en:\na) índices de precios específicos correspondientes a los componentes del costo;\nb) presupuestos actualizados de costos; o\nc) tasaciones de peritos independientes.\n\nMedición del valor razonable\n\nConsideraciones generales"}, {"num": 117, "texto": "Una entidad estimará el valor razonable en función de precios que, en la fecha de\nla medición:\na) sean:\n(i) observables directamente en el mercado principal o, si este no existiera,\nen el mercado más ventajoso; o\n(ii) estimados mediante técnicas de valuación, cuando no puedan estimarse\naplicando el inciso inmediato anterior; y\nb) consideren las características y condición actuales del elemento (activo,\npasivo o patrimonio neto) sujeto a medición."}, {"num": 118, "texto": "Una entidad seleccionará un mercado principal, o un mercado más ventajoso,\nsiempre que, en la fecha de la medición:\na) pueda acceder en forma regular a él (incluso si habitualmente no opera dentro\nde su ámbito); y\nb) dicho mercado opere como un mercado activo."}, {"num": 119, "texto": "Como se indicó en el inciso a) (ii) del párrafo 117 cuando, en la fecha de la medición,\nno existan precios directamente observables que surjan de un mercado activo, una\nentidad estimará el valor razonable mediante técnicas de valuación que resulten\napropiadas en función de las circunstancias, maximizando el uso de datos de entrada\nobservables y minimizando la utilización de datos no observables."}, {"num": 120, "texto": "A los fines indicados en el párrafo anterior, una entidad aplicará la técnica de\nvaluación que resulte más apropiada, debiendo basar su selección en los enfoques\nsiguientes:\na) Enfoque de mercado: precios de activos o pasivos similares o comparables,\ndebidamente ajustados en función de las características y condición del activo\no pasivo a medir.\nb) Enfoque de ingresos: valor descontado de los flujos de efectivo netos que\npuedan esperarse del activo o pasivo a medir.\nc) Enfoque del costo: costo que requeriría la adquisición, producción o\nconstrucción de un activo similar que reemplace la capacidad de servicio del\nactivo a medir."}, {"num": 121, "texto": "En la fecha de la medición, una entidad estimará el valor razonable de un activo\nconsiderando:\na) las características del activo que tendrían en cuenta los participantes del\nmercado para fijar su precio –entre ellas, su condición o estado a la fecha de\nla medición, su localización (computando los costos de transporte hasta el\nmercado principal o más ventajoso) y las restricciones sobre su venta o uso;\ny\nb) el precio que se fijaría por su máximo y mejor uso (en tanto resulte físicamente\nposible, legalmente admisible y financieramente factible), cuando se trate de\nactivos no financieros (tales como bienes de uso)."}, {"num": 122, "texto": "Una entidad no considerará en sus mediciones a valor razonable los contratos de\nventa a futuro que se hubiesen celebrado con el objetivo de entregar los productos\nen cumplimiento de lo establecido en dichos contratos.\n\nConsideración particular: medición del valor neto de realización"}, {"num": 123, "texto": "Esta Resolución Técnica u otras normas contables podrían requerir o permitir el uso\ndel valor neto de realización al medir un activo. Para determinar el valor neto de\nrealización de un activo, en la fecha de la medición, una entidad:\na) estimará el valor razonable de ese activo (que incluirá, cuando corresponda,\nlos ingresos adicionales, no atribuibles a la financiación, que la venta genere\npor sí misma –por ejemplo, un reembolso de exportación–, por relacionarse\ncon una característica del activo concreto), de conformidad con los párrafos\n117 al 122; y\nb) deducirá del valor razonable los costos ocasionados directamente por la venta\n(comisiones, impuesto a los ingresos brutos y similares).\n\nMEDICIONES EN MONEDA EXTRANJERA\n\nConversión de transacciones y saldos de activos y pasivos expresados en moneda\nextranjera"}]}, {"id": "c2s4", "nombre": "Mediciones en Moneda Extranjera", "parrafos": [{"num": 124, "texto": "A los fines de medir en moneda argentina una transacción o los saldos de activos y\npasivos en moneda extranjera, una entidad:\na) aplicará las normas de reconocimiento y medición correspondientes a cada\ntransacción o elemento; y\nb) convertirá a moneda argentina:\n(i) las transacciones, de modo que resulte una medición representativa de\nlas compras, ventas, pagos, cobros u otras transacciones; y\n(ii) los saldos al cierre de activos y pasivos de manera que resulte una\nmedición representativa de tales saldos."}, {"num": 125, "texto": "Una entidad contabilizará las diferencias de cambio, surgidas de la medición posterior\ndel efectivo en moneda extranjera, los derechos a recibir una suma en moneda\nextranjera y las obligaciones de entregar una suma en moneda extranjera, como\ningresos financieros, o costos financieros (de acuerdo con lo establecido por el\npárrafo 136), según corresponda."}, {"num": 126, "texto": "A los fines indicados en los dos párrafos precedentes, una entidad empleará el tipo\nde cambio correspondiente a:\na) la fecha de los estados contables cuando mida:\n(i) valores corrientes, expresados en moneda extranjera, de activos o\npasivos; o\n(ii) efectivo en moneda extranjera, derechos a recibir una suma en moneda\nextranjera y obligaciones de entregar una suma en moneda extranjera.\nb) las fechas de cada una de las transacciones, cuando contabilice compras,\nventas, pagos, cobros u otras transacciones.\n\nCuestiones particulares"}]}, {"id": "c2s5", "nombre": "Componentes Financieros y Contingencias", "parrafos": [{"num": 127, "texto": "Si existieran restricciones para el acceso al mercado oficial de cambios, y ciertos\nactivos o pasivos en moneda extranjera tuvieran que liquidarse o cancelarse\nutilizando mercados alternativos válidos para tal fin, pero a valores sustancialmente\ndistintos a los importes informados en los estados contables, o esto efectivamente\nhaya ocurrido después de la fecha de los estados contables y antes de la\naprobación de los estados contables, una entidad revelará tales circunstancias en\nlas notas a los estados contables."}, {"num": 128, "texto": "Cuando se pierda temporalmente la posibilidad de negociar dos monedas en\ncondiciones de mercado, una entidad utilizará el tipo de cambio que se fije en la\nprimera fecha posterior durante la cual resulte posible negociar las divisas, de\nacuerdo con las condiciones citadas.\n\nTRATAMIENTO DE COMPONENTES FINANCIEROS\n\nTratamiento de componentes financieros explícitos"}, {"num": 129, "texto": "Una entidad tratará los componentes financieros explícitos, pactados en operaciones\nde financiación recibida u otorgada, como costos financieros, o ingresos\nfinancieros, según corresponda.\n\nSegregación de componentes financieros implícitos"}, {"num": 130, "texto": "Una entidad pequeña podrá optar por no segregar componentes financieros\nimplícitos."}, {"num": 131, "texto": "Una entidad que no es pequeña segregará componentes financieros implícitos, en\noperaciones de cobro o pago diferido, cuando:\na) el plazo de, por lo menos, una de las cuotas pactadas supere los doce meses,\ncontado desde la fecha de la operación; o\nb) la entidad opte por aplicar tal política contable en el caso de operaciones cuyo\nplazo no cumpla con las características del inciso anterior (por ejemplo, porque\nlas condiciones pactadas no reflejan los términos usuales del mercado)."}, {"num": 132, "texto": "Una entidad segregará los componentes financieros implícitos de alguna de las\nsiguientes formas:\na) descontando los flujos de efectivo futuros, mediante una tasa que refleje las\nevaluaciones del mercado sobre el valor tiempo del dinero y los riesgos\nespecíficos de la operación; o\nb) utilizando el precio de contado de los bienes y/o servicios recibidos\n(entregados)."}, {"num": 133, "texto": "Una entidad tratará los componentes segregados como costos financieros, o\ningresos financieros, según corresponda."}, {"num": 134, "texto": "Una entidad aplicará la misma política de segregación de componentes financieros\nimplícitos:\na) para la totalidad de sus activos y pasivos; y\nb) tanto en el momento de la medición inicial como posterior."}, {"num": 135, "texto": "Cuando opte por no segregar componentes financieros implícitos, una entidad\nconsiderará que, a los fines de esta Resolución Técnica u otras normas contables,\nla medición efectuada de ese modo equivale a un precio de contado.\n\nTratamiento de los costos financieros"}, {"num": 136, "texto": "Una entidad contabilizará los costos financieros:\na) como gastos del período durante el cual se devenguen; o\nb) como parte del costo de un activo apto para activación de costos\nfinancieros generados por deudas computables (por ejemplo, préstamos,\nobligaciones negociables, etc.)."}, {"num": 137, "texto": "Una entidad no activará los costos financieros cuando el proceso de producción,\nconstrucción, montaje o terminación:\na) se prolongue por un tiempo que exceda el técnicamente requerido de acuerdo\ncon la naturaleza de dicho proceso;\nb) se encuentre interrumpido por razones que no resultan necesarias para\npreparar el activo para su uso o venta; o\nc) ya concluyó y, por lo tanto, el activo está en condiciones de ser vendido o\nutilizado."}, {"num": 138, "texto": "Una entidad que opte por activar los costos financieros deberá:\na) aplicar esta política contable de manera consistente, para todos los costos\nfinancieros generados por deudas computables y para todos los activos\naptos para la activación de costos financieros dentro de un rubro o\ncategoría determinada (bienes de cambio, bienes de uso, propiedades de\ninversión, activos intangibles, etc.);\nb) evaluar la activación para cada bien en particular, aunque la producción,\nconstrucción, montaje o terminación forme parte de un grupo mayor de activos.\nEn este caso, limitará la activación de los costos financieros a cada parte,\nuna vez terminada;\nc) imputar los costos financieros por mes o períodos más extensos, en tanto\nesta política sea aplicada consistentemente y no genere distorsiones\nsignificativas;\nd) activar en primer lugar todos los costos financieros incurridos por las deudas\ncomputables específicamente destinadas a la financiación total o parcial\n(deudas computables específicas) de los activos aptos para la activación\nde costos financieros; y\ne) activar en segundo término los costos financieros incurridos por las deudas\ncomputables no destinadas específicamente a la financiación (deudas\ncomputables no específicas) de activos aptos para la activación de costos\nfinancieros."}, {"num": 139, "texto": "Una entidad determinará el importe susceptible de activación, procedente de deudas\ncomputables específicas, detrayendo de los costos financieros la suma de\ningresos financieros generada por colocaciones transitorias de fondos provenientes\nde tales préstamos."}, {"num": 140, "texto": "Una entidad determinará el importe susceptible de activación, procedente de deudas\ncomputables no específicas, de la manera indicada a continuación:\na) del total de deudas computables excluirá las deudas computables\nespecíficas cuyos costos financieros asignó previamente;\nb) calculará una tasa promedio mensual de los costos financieros\ncorrespondientes a las deudas computables no específicas, determinadas\nsegún lo establecido en el inciso precedente;\nc) determinará el promedio mensual de los activos aptos para la activación de\ncostos financieros, excluidos aquellos que recibieron costos financieros\nprovenientes de una financiación específica;\nd) aplicará, a las mediciones contables de los activos determinados en el inciso\nc), la tasa de capitalización indicada en el inciso b); y\ne) calculará la activación, referida en el inciso procedente, sobre la parte no\nfinanciada específicamente de los activos parcialmente financiados con\ndeudas computables específicas."}, {"num": 141, "texto": "Una entidad no podrá activar (o, en su caso, deducir) un importe que exceda el total\nde costos financieros incurridos en el ejercicio."}, {"num": 142, "texto": "Cuando deba expresar sus estados contables en moneda de cierre de acuerdo con\nlo establecido en la sección “Expresión de los estados contables en moneda de cierre\nen un contexto de inflación (ajuste por inflación de los estados contables)” [ver los\npárrafos 176 a 200], y opte por la política contable del inciso b) del párrafo 136, una\nentidad activará los costos financieros netos del resultado por exposición al cambio\nen el poder adquisitivo de la moneda.\n\nCONSIDERACIÓN DE HECHOS CONTINGENTES"}, {"num": 143, "texto": "Hechos contingentes son aquellos cuya concreción o falta de concreción depende de\nhechos futuros, no controlables por la entidad."}, {"num": 144, "texto": "Una entidad tratará los efectos patrimoniales de hechos contingentes del siguiente\nmodo:\na) Reconocerá los desfavorables cuando:\n(i) deriven de situaciones o circunstancias existentes a la fecha de los\nestados contables;\n(ii) su materialización sea probable; y\n(iii) resulte posible cuantificarlos satisfaciendo el requisito de confiabilidad\n(credibilidad).\nb) Reconocerá los favorables solo cuando provengan del tratamiento de:\n(i) los impuestos diferidos tratados en la sección “Reconocimiento, medición,\npresentación y revelación del impuesto a las ganancias diferido” [ver los\npárrafos 578 a 599]; o\n(ii) los derechos de reembolso tratados en la sección “Créditos en moneda”\n[ver los párrafos 236 a 269] y en la sección “Créditos en especie” [ver el\npárrafo 272].\nCOMPARACIÓN DE LA MEDICIÓN DE CIERTOS ACTIVOS CON SU VALOR\nRECUPERABLE\n\nObjetivo"}]}, {"id": "c2s6", "nombre": "Comparación con Valor Recuperable", "parrafos": [{"num": 145, "texto": "Una entidad no deberá medir ningún activo o grupo homogéneo de activos por un\nimporte superior a su valor recuperable.\n\nAlcance"}, {"num": 146, "texto": "A efectos de dar cumplimiento al objetivo enunciado en el párrafo anterior, una\nentidad aplicará los requerimientos establecidos en los párrafos 148 a 175 a los\nactivos indicados a continuación:\na) Bienes de uso.\nb) Propiedades de inversión, cuando no se midan utilizando el modelo de valor\nrazonable [ver los párrafos 362 a 366].\nc) Activos intangibles.\nd) Llave de negocio surgida de una combinación de negocios.\ne) Participaciones medidas utilizando el método del valor patrimonial\nproporcional, para lo cual considerará, adicionalmente, lo indicado en el\napartado “Comparación con el valor recuperable” de la sección “Participaciones\nen subsidiarias, asociadas y negocios conjuntos societarios” [ver los párrafos\n864 y 865].\nf) Activos biológicos utilizados como factor de producción en el curso\nnormal de las operaciones."}, {"num": 147, "texto": "Una entidad realizará la comparación entre la medición contable de otros activos\ndistintos de los enunciados en el párrafo anterior con su correspondiente valor\nrecuperable según lo establecido en la sección destinada al tratamiento de cada uno\nde ellos (en los capítulos 3 y 5). Tales activos incluyen, entre otros, a los siguientes:\na) Créditos.\nb) Bienes de cambio.\nc) Activos no corrientes mantenidos para la venta (incluyendo los retirados de\nservicios).\nd) Activos por impuestos diferidos.\n\nProcedimiento general"}, {"num": 148, "texto": "Una entidad que es pequeña o mediana:\na) Comprobará si el importe en libros de un activo individual supera su valor\nrecuperable en el caso de que existan indicios de deterioro [ver el párrafo 151],\nexcepto cuando:\n(i) la medición del activo se base en el valor razonable; y\n(ii) sus costos directos de venta no son significativos.\nb) Comprobará si el importe en libros de un grupo de activos supera su valor\nrecuperable en el caso de que existan indicios de deterioro [ver el párrafo 151].\nc) No necesitará evaluar la existencia de indicios de deterioro [ver el párrafo 151].\nen el caso de que el resultado obtenido en cada uno de los últimos tres\nejercicios (incluido el actual) sea positivo.\n\n148A. Una entidad que no es pequeña o mediana:\na) Comprobará si el importe en libros de un activo individual supera su valor\nrecuperable en el caso de que existan indicios de deterioro [ver el párrafo\n151], excepto cuando:\n(i) la medición del activo se base en el valor razonable; y\n(ii) sus costos directos de venta no son significativos.\nb) Comprobará si el importe en libros de un grupo de activos supera su valor\nrecuperable en el caso de que existan indicios de deterioro [ver el párrafo\n151]."}, {"num": 149, "texto": "Una entidad que no es pequeña o mediana deberá efectuar anualmente la\ncomparación con el valor recuperable:\na) De los intangibles de vida útil indefinida o de cualquier grupo de activos al que\nasigne un activo intangible con vida útil indefinida.\nb) De cualquier grupo de activos al que se le asigne una llave de negocio de vida\nútil indefinida."}, {"num": 150, "texto": "A los fines de cumplir el objetivo establecido en el párrafo 145, una entidad:\na) Comparará, cuando corresponda de acuerdo con los párrafos 148 a 149, la\nmedición contable de los activos con su valor recuperable.\nb) Reconocerá:\n(i) Pérdidas por desvalorización cuando la medición contable de un activo\nsea superior a su valor recuperable.\n(ii) Reversiones de pérdidas por desvalorización previamente\ncontabilizadas, cuando cambien las estimaciones efectuadas para\ndeterminar el valor recuperable.\n\nIndicios de deterioro (o de su reversión)"}, {"num": 151, "texto": "A los fines de determinar la necesidad de comparar la medición contable de los\nactivos indicados en el párrafo 146 con su valor recuperable, una entidad\nconsiderará, entre otros, los siguientes indicios de deterioro (o reversión de un\ndeterioro):\na) De origen externo:\n(i) Declinaciones (aumentos) en los valores de mercado de los bienes\nsuperiores a las que deberían esperarse con motivo del mero transcurso\ndel tiempo.\n(ii) Cambios significativamente desfavorables (favorables) para la entidad,\nocurridos o esperados próximamente en sus entornos económico,\ntecnológico o legal.\n(iii) Aumentos (disminuciones) en las tasas de interés que afecten la tasa de\ndescuento utilizada para calcular el valor de uso del activo,\ndisminuyendo (aumentando) su valor recuperable de forma significativa.\n(iv) Disminución (aumento) del valor total de las acciones de la entidad no\natribuibles a las variaciones de su patrimonio neto contable.\nb) De origen interno:\n(i) Evidencias de obsolescencia o daño físico del activo.\n(ii) Cambios ocurridos o esperados próximamente por el modo de uso de sus\nactivos, como los motivados por planes de discontinuación o\nreestructuración de operaciones o por la decisión de venderlos antes de\nla fecha originalmente prevista (o por efectuarse mejoras que incrementan\nsus prestaciones).\n(iii) Evidencias de que las prestaciones de los activos son peores (mejores)\nque las previstas anteriormente.\n(iv) Expectativas (desaparición de expectativas) de pérdidas operativas\nfuturas.\nc) Las brechas observadas en anteriores comparaciones de las mediciones\ncontables con el valor recuperable de los bienes."}, {"num": 152, "texto": "Una entidad no necesitará volver a estimar el valor recuperable (incluso en aquellos\ncasos en que esta norma exija comparaciones anuales) cuando se cumplan,\nsimultáneamente, las siguientes condiciones:\na) el valor recuperable resultó, al momento de efectuarse la última comparación,\nsignificativamente mayor que la medición contable del activo; y\nb) después de la última comparación no se identificaron hechos o eventos cuya\nsignificación [ver los párrafos 81 y 82] pudiera revertir la diferencia, de modo\ntal que el valor recuperable sea inferior a la medición contable del activo o\ngrupo de activos."}, {"num": 153, "texto": "[Eliminado].\n\nMedición del valor recuperable: criterio general"}, {"num": 154, "texto": "Una entidad medirá el valor recuperable de un activo (o grupo de activos, según\ncorresponda) como el mayor entre:\na) el valor neto de realización, estimado de conformidad con el apartado\n“Medición del valor neto de realización” [ver el párrafo 123]; y\nb) el valor de uso."}, {"num": 155, "texto": "Una entidad no calculará:\na) el valor neto de realización si determinó el valor de uso y este es mayor que\nla medición contable del activo (o grupo de activos, según corresponda); o\nb) el valor de uso si determinó el valor neto de realización y este es mayor que\nla medición contable del activo (o grupo de activos, según corresponda).\n\nDeterminación del valor de uso\n\nDescripción de los factores que determinan el cálculo del valor de uso"}, {"num": 156, "texto": "Para calcular el valor de uso de un activo (o grupo de activos, según corresponda),\nuna entidad deberá:\na) estimar los ingresos y egresos netos de efectivo derivados del uso continuado\ndel activo y su disposición o realización final; y\nb) aplicar una tasa de descuento adecuada para dichos flujos de efectivo.\n\nProyección de los flujos de efectivo"}, {"num": 157, "texto": "Al calcular el valor de uso de un activo (o grupo de activos, según corresponda),\npara proyectar los flujos de efectivo futuros, una entidad deberá:\na) expresar los importes en moneda de la fecha de los estados contables;\nb) cubrir un período equivalente a la vida útil restante del activo individual o de los\nactivos principales de cada actividad generadora de efectivo, o una unidad\nmás pequeña que una actividad generadora de efectivo [ver los párrafos 164\ny 165];\nc) basarse en premisas que representen su mejor estimación acerca de las\ncondiciones económicas esperadas durante la vida útil restante de los activos;\nd) dar mayor peso a las evidencias externas;\ne) basarse en los presupuestos financieros más recientes que haya aprobado y\ncontemplen un período máximo de cinco años;\nf) basarse, para los períodos no contemplados por dichos presupuestos, en\nextrapolaciones de las proyecciones contenidas en ellos, usando una tasa de\ncrecimiento constante o declinante (incluso nula o menor a cero), a menos que\npueda justificarse el empleo de una tasa creciente;\ng) no utilizar tasas de crecimiento que superen el promedio de crecimiento en el\nlargo plazo para los productos, industrias o países correspondientes al entorno\nde la entidad o para los mercados donde emplea sus activos, salvo que el uso\nde una tasa mayor pueda justificarse debidamente;\nh) considerar las condiciones actuales de los activos;\ni) incluir:\n(i) las proyecciones de entradas de efectivo atribuibles al uso de los activos;\n(ii) las salidas de fondos necesarias para la obtención de tales entradas que\npuedan atribuirse a los activos sobre bases razonables y consistentes,\nincluyendo los pagos futuros necesarios para mantener el nivel de\nrendimiento originalmente previsto; y\n(iii) el valor neto de realización por la disposición de los activos; y\nj) excluir los flujos de efectivo esperados por:\n(i) las cancelaciones de pasivos ya reconocidos a la fecha de la estimación;\n(ii) las reestructuraciones futuras todavía no comprometidas;\n(iii) las mejoras futuras de la capacidad de servicio de los activos;\n(iv) los resultados de actividades financieras; y\n(v) los pagos o devoluciones del impuesto a las ganancias."}, {"num": 158, "texto": "Una entidad pequeña o mediana podrá reemplazar los presupuestos referidos en el\ninciso e) del párrafo anterior por una proyección basada en los resultados obtenidos\nen los últimos tres ejercicios (incluido el actual); excepto que evidencias externas\ndemuestren que dicha premisa debe modificarse.\n\nSelección de la tasa de descuento"}, {"num": 159, "texto": "Al calcular el valor de uso de un activo (o grupo de activos, según corresponda) una\nentidad aplicará tasas de descuento que:\na) reflejen las evaluaciones del mercado acerca del valor tiempo del dinero;\nb) computen el efecto de los riesgos específicos de los activos, no considerados\nal estimar los flujos de efectivo (con el fin de evitar duplicaciones); y\nc) resulten compatibles con las demás hipótesis utilizadas para proyectar los\nflujos de efectivo [ver el párrafo 157].\n\nNiveles de comparación\n\nTratamiento general"}, {"num": 160, "texto": "Una entidad realizará las comparaciones entre la medición contable y el valor\nrecuperable:\na) Si es pequeña o mediana, a nivel global.\nb) En los restantes casos, a nivel de cada activo o, si esto no fuera posible, a\nnivel de un grupo de activos [ver los párrafos 161 a 165].\n\nValor recuperable de activos que no generan flujos de efectivo propios"}, {"num": 161, "texto": "En el caso de los activos que no generan flujos de efectivo propios, una entidad que\nno aplica el enfoque global establecido en el inciso a) del párrafo 160 comparará la\nmedición de los activos con su valor recuperable:\na) al nivel de cada actividad generadora de efectivo [ver los párrafos 163 y 165];\no\nb) a nivel de una unidad más pequeña que una actividad generadora de\nefectivo [ver los párrafos 164 y 165]."}, {"num": 162, "texto": "De acuerdo con lo indicado en el inciso b) del párrafo 149, una entidad considerará\nsiempre a la llave de negocio como un activo intangible que no genera flujos de\nefectivo propios, y deberá asignarla:\na) a una actividad generadora de efectivo [ver los párrafos 163 y 165]; o\nb) a una unidad más pequeña que una actividad generadora de efectivo [ver\nlos párrafos 164 y 165]."}, {"num": 163, "texto": "Para definir cada actividad generadora de efectivo, una entidad:\na) en primer lugar, identificará actividades generadoras de efectivo que no\nincluyan los activos generales ni a la llave de negocio que estuviere\ncontabilizada;\nb) en segundo lugar, intentará asignar los activos generales y la llave de negocio\na las actividades generadoras de efectivo definidas o a grupos de ellas, y:\n(i) Si la asignación referida en el inciso anterior fuera posible, efectuará la\ncomparación para cada actividad generadora de efectivo, incluyendo en\nsu medición contable la porción asignada de los activos generales y de\nla llave.\n(ii) Si dicha asignación no fuera posible, hará dos comparaciones:"}, {"num": 164, "texto": "Una entidad podrá subdividir una actividad generadora de efectivo en unidades\nmás pequeñas, y efectuar la comparación con el valor recuperable a ese nivel,\nsiempre que dicha unidad más pequeña:\na) genere entradas de efectivo que sean en buena medida independientes de las\nproducidas por otros activos u otras actividades generadoras de efectivo;\nb) contenga solo los bienes que generan o se utilizan para generar dichas\nentradas de efectivo;\nc) no incluya activos sin relación entre sí, incorporados con el objeto de disimular\nlas pérdidas por desvalorización de algunos de ellos; y\nd) se base en un criterio de agregación que se aplica uniformemente de un\nejercicio a otro."}, {"num": 165, "texto": "A los fines indicados en los párrafos precedentes, una entidad:\na) aplicará los criterios para definir las actividades generadoras de efectivo o\nlas unidades más pequeñas consistentemente, excepto que un cambio en su\nconformación represente un mejor cumplimiento de los requisitos de la\ninformación contenida en los estados contables; y\nb) expondrá en notas los criterios utilizados para la definición de actividad\ngeneradora de efectivo o de las unidades más pequeñas [ver el párrafo 164].\n\nPerdidas por desvalorización\n\nImputación de pérdidas por desvalorización"}, {"num": 166, "texto": "Una entidad imputará las pérdidas por desvalorización:\na) Al resultado del período, si no se revirtieran valorizaciones incluidas en el saldo\npor revaluación.\nb) Como una disminución del saldo de revaluación, si se revirtieran valorizaciones\nincluidas en el saldo por revaluación."}, {"num": 167, "texto": "Cuando se produzca una disminución del valor de los activos debido a pérdidas por\ndesvalorización, una entidad imputará dichas pérdidas:\na) Como una reducción de la medición del activo que las originó, si provinieran\nde comparaciones al nivel de cada activo.\nb) De acuerdo con el siguiente orden, si provinieran de comparaciones al nivel de\nuna actividad generadora de efectivo o de una unidad más pequeña [ver el\npárrafo 164]:\n(i) a la llave de negocio asignada a dicha actividad; y\n(ii) si existiera un remanente, entre los restantes activos incluidos en la\nmedición contable que se compara, en proporción a sus mediciones\nprevias al cómputo de la desvalorización.\n\nReversión de pérdidas por desvalorización"}, {"num": 168, "texto": "Una entidad revertirá pérdidas por desvalorización reconocidas en períodos\nanteriores solo cuando, con posterioridad a la fecha de su determinación, cambien\nlas estimaciones efectuadas para determinar el valor recuperable. En tal caso,\naumentará la medición contable del activo o activos relacionados por un importe que\nsea el menor entre:\na) la medición contable que el activo o grupo de activos habría tenido si nunca se\nhubiese reconocido una pérdida por desvalorización; y\nb) su nuevo valor recuperable."}, {"num": 169, "texto": "Una entidad imputará las reversiones de pérdidas por desvalorización:\na) Cuando no se relacionen con activos revaluados, como un resultado del\nperíodo.\nb) Cuando se relacionen con activos revaluados:\n(i) como una ganancia, hasta el importe que hubiese tenido dicho activo si\nnunca se hubiese revaluado; y\n(ii) como un aumento del saldo de revaluación, por el importe restante."}, {"num": 170, "texto": "Cuando se produzca un aumento del valor de los activos distintos de la llave de\nnegocio debido a reversiones de pérdidas por desvalorización, una entidad\nimputará dichas ganancias:\na) Como un aumento de la medición del activo que las originó, si provienen de\ncomparaciones al nivel de cada activo.\nb) De acuerdo con el siguiente orden, si provienen de comparaciones al nivel de\nuna actividad generadora de efectivo o de una unidad más pequeña [ver el\npárrafo 164]:\n(i) a los activos distintos de la llave de negocio que integran la actividad\ngeneradora de efectivo o una unidad más pequeña [ver el párrafo 164],\nen proporción a sus mediciones contables y siempre que la medición de\nningún activo sea superior al menor importe entre:"}, {"num": 171, "texto": "Una entidad no revertirá pérdidas por desvalorización de la llave de negocio."}, {"num": 172, "texto": "Cuando una pérdida por desvalorización reconocida desaparezca total o\nparcialmente, una entidad evaluará la pertinencia de modificar la vida útil restante, el\nmétodo de amortización o el valor residual del activo.\n\nPresentación"}, {"num": 173, "texto": "En el estado de resultados, una entidad presentará las pérdidas por\ndesvalorización o la reversión de dichas pérdidas separada de los demás ingresos\ny gastos, bajo el título “pérdidas por desvalorización (o reversión de pérdidas)”.\n\nRevelación en notas"}, {"num": 174, "texto": "Cuando haya reconocido pérdidas por desvalorización (o reversión de pérdidas),\nuna entidad revelará:\na) si se trata de una pérdida por desvalorización (o reversión de pérdidas) de\nactivos individuales: su naturaleza y una breve descripción de dichos activos;\nb) si se trata de una pérdida por desvalorización (o reversión de pérdidas) de\nactividades generadoras de efectivo o de una unidad más pequeña [ver el\npárrafo 164]:\n(i) una descripción del grupo de activos considerado; y\n(ii) los cambios, si los hubo, en su conformación desde la anterior estimación\ndel valor recuperable, la conformación actual y anterior y las razones del\ncambio;\nc) los rubros y actividades generadoras de efectivo, o unidades más pequeñas\n[ver el párrafo 164], a los que pertenecen los respectivos activos;\nd) si el valor recuperable considerado es un valor neto de realización o valores\nde uso, informando:\n(i) el modo para estimar el valor neto de realización utilizado para el cálculo\ndel valor recuperable (por ejemplo, si adoptó precios de un mercado\nactivo o los estimó de otra manera); y\n(ii) la tasa de descuento empleada para estimar el valor de uso en el período\nactual y en el anterior;\ne) los hechos o circunstancias que motivaron el reconocimiento de las pérdidas\npor desvalorización (o reversión de pérdidas);\nf) los efectos de las pérdidas por desvalorización (o reversión de pérdidas);\ng) las razones que justifican la imposibilidad de comparar el valor recuperable al\nnivel de cada activo individual, cuando la comparación se realizó al nivel de\ncada actividad generadora de efectivo o de una unidad más pequeña [ver el\npárrafo 164]; y\nh) la composición de las pérdidas por desvalorización (o reversión de pérdidas)\nexpuestas en el estado de resultados, clasificándolas en función del tipo de\nactivo que las originó."}, {"num": 175, "texto": "Una entidad pequeña o mediana podrá no revelar la información requerida por los\nincisos a) y b) del párrafo anterior.\n\nEXPRESIÓN DE LOS ESTADOS CONTABLES EN MONEDA DE CIERRE EN UN\nCONTEXTO DE INFLACIÓN (AJUSTE POR INFLACIÓN DE LOS ESTADOS CONTABLES)\n\nObjetivo"}]}, {"id": "c2s7", "nombre": "Ajuste por Inflación", "parrafos": [{"num": 176, "texto": "En un contexto de inflación (para fines contables), la entidad emitirá sus estados\ncontables en moneda de poder adquisitivo correspondiente a la fecha de los\nestados contables (moneda de cierre)."}, {"num": 177, "texto": "La expresión de los estados contables en moneda de cierre tiene por objetivo\npresentar todas sus cifras, tanto las del período actual como las del período\ncomparativo, en moneda correspondiente a la fecha de los estados contables."}, {"num": 178, "texto": "Para identificar cuándo corresponde practicar tal ajuste, una entidad considerará lo\nindicado en los párrafos 97 a 100.\n\nÍndices a utilizar, coeficientes de ajuste y período de origen de las partidas"}, {"num": 179, "texto": "A los efectos de expresar los estados contables en moneda de cierre, una entidad\nutilizará el índice de precios FACPCE."}, {"num": 180, "texto": "Para expresar partidas en moneda de cierre, una entidad:\na) determinará la fecha de origen de cada saldo, descomponiéndolo en función\nde los períodos correspondientes al poder adquisitivo en que dicho saldo se\nencuentra expresado; y\nb) agrupará las partidas:\n(i) por mes de origen; o\n(ii) excepcionalmente y en tanto no se generen distorsiones significativas,\npor períodos con una extensión superior a la mensual."}, {"num": 181, "texto": "Para expresar una suma contabilizada en moneda de fecha anterior al cierre en un\nimporte en moneda de cierre, una entidad aplicará el coeficiente que resulta de dividir\nel valor del índice de precios FACPCE correspondiente a la fecha de los estados\ncontables por el valor del índice de precios FACPCE referido a la fecha o período\nde origen de la partida."}, {"num": 182, "texto": "En el caso de que las partidas se agrupen en períodos de origen cuya extensión sea\nsuperior a un mes, una entidad aplicará el coeficiente de ajuste computando como\ndenominador el promedio de los índices de precios FACPCE correspondientes a los\nmeses comprendidos en dicho período."}, {"num": 183, "texto": "Una entidad considerará que el índice referido al último mes del período por el cual\nse informa es representativo del índice de precios FACPCE correspondiente a la\nfecha de los estados contables.\n\nProcedimiento: cuestiones de aplicación general"}, {"num": 184, "texto": "Al ajustar por inflación sus estados contables, una entidad diferenciará:\na) la expresión de las cifras correspondientes al período actual en moneda de\ncierre; y\nb) la expresión de las cifras comparativas en moneda de cierre (correspondiente\nal período actual).\n\nAjuste de las cifras correspondientes al período actual en moneda de cierre\n\nProceso secuencial"}, {"num": 185, "texto": "Cuando emita sus estados contables en moneda de cierre en ejercicios posteriores\nal período durante el cual aplicó por primera vez o reanudó el ajuste por inflación, una\nentidad, a efectos de determinar globalmente el resultado del período y el resultado\npor exposición al cambio en el poder adquisitivo de la moneda, o el resultado\nfinanciero y por tenencia –incluyendo al resultado por exposición al cambio en el\npoder adquisitivo de la moneda–:\na) expresará el patrimonio neto determinado al cierre del ejercicio anterior en\nmoneda de cierre del período actual, mediante la aplicación del coeficiente\nanual;\nb) medirá los movimientos cuantitativos del patrimonio neto ocurridos en el\nperíodo, excluyendo los resultados de ese período, en moneda de cierre;\nc) medirá en moneda de cierre el activo y el pasivo al final del período, ajustando\nlas partidas que los componen;\nd) obtendrá el patrimonio neto al final del período objeto del ajuste en moneda\nde cierre, por diferencia entre el activo y el pasivo calculados en la etapa\nanterior;\ne) determinará el patrimonio neto al final del período en moneda de cierre,\nexcluido el resultado de dicho período, mediante la suma de los importes\nobtenidos de acuerdo con lo establecido en los incisos a) y b);\nf) medirá el resultado del período en moneda de cierre, por diferencia entre los\nimportes obtenidos por aplicación de los incisos d) y e) anteriores;\ng) expresará las partidas que componen el estado de resultados del período,\nexcepto la indicada en el inciso siguiente; y\nh) calculará el resultado por exposición al cambio en el poder adquisitivo de la\nmoneda (o el resultado financiero y por tenencia –incluyendo el resultado por\nexposición al cambio en el poder adquisitivo de la moneda, según el caso), por\ndiferencia entre el importe obtenido en el inciso f) y la suma algebraica de las\npartidas indicada en el inciso g).\n\nAjuste de activos y pasivos al cierre del período actual"}, {"num": 186, "texto": "A la fecha de los estados contables, una entidad identificará qué activos o pasivos\nse encuentran expresados en moneda de cierre y cuáles en moneda de una fecha\nanterior a la de cierre."}, {"num": 187, "texto": "Una entidad no modificará el importe de las partidas cuya medición esté expresada\nen moneda de cierre (por ejemplo, efectivo, créditos y deudas en moneda o activos y\npasivos que se miden a valores corrientes determinados a la fecha de los estados\ncontables)."}, {"num": 188, "texto": "Una entidad expresará en moneda de cierre el importe de las partidas medido en una\nfecha anterior (por ejemplo, bienes de uso u otros activos cuya medición se basa en\nel costo). Para tal fin:\na) identificará el período de origen de las partidas de acuerdo con lo establecido\nen el párrafo 180;\nb) calculará los coeficientes de ajuste correspondientes, según lo establecido en\nlos párrafos 179, 182 y 183; y\nc) multiplicará dichos coeficientes por los importes de las partidas clasificadas\nsegún lo establecido en el párrafo a), tal como se indica en el párrafo 181.\n\nAjuste de los componentes del patrimonio neto al cierre del período actual"}, {"num": 189, "texto": "Una entidad determinará el patrimonio neto al final del período actual en moneda de\ncierre restando de los activos existentes a esa fecha, expresados en moneda de\ncierre, los pasivos a esa fecha, también expresados en moneda de cierre."}, {"num": 190, "texto": "Para expresar en moneda de cierre las distintas partidas que integran el patrimonio\nneto, excluido el resultado del período actual, la entidad procederá de la siguiente\nmanera:\na) Expresará en moneda de cierre el saldo inicial de cada partida, utilizando el\ncoeficiente que refleje la evolución del índice de precios FACPCE desde la\nfecha en que se determinó el saldo inicial hasta la fecha de los estados\ncontables.\nb) Al importe obtenido en a), le sumará o restará, según corresponda, las\nvariaciones ocurridas durante el período, también expresadas en moneda de\ncierre, considerando para ello las pautas establecidas en los párrafos 191 a"}, {"num": 191, "texto": "Una entidad expresará las variaciones patrimoniales del siguiente modo:\na) Resultados y resultados diferidos\n\nPara ajustar cada uno de los componentes del resultado del período y los\nresultados diferidos del período, la entidad determinará la moneda en que tal\ncomponente se encuentra expresado. Para ello, la entidad clasificará y medirá\nlos componentes del resultado del período y los resultados diferidos del\nperíodo del siguiente modo:\n\nClasificación de los componentes del\nPara medir el componente en moneda de\nresultado del período y de los resultados\ncierre, una entidad:\ndiferidos del período\n\nResultados generados por transacciones (por Multiplicará el valor nominal del resultado por\nejemplo, ventas del período, gastos por el coeficiente correspondiente a la fecha de\nsueldos, impuesto a las ganancias corriente). origen de la medición de las transacciones\nreconocidas.\n\nResultados generados por consumo de Multiplicará su valor nominal por el coeficiente\nactivos adquiridos en una fecha anterior a la correspondiente a la fecha de la medición\nde su consumo, y medidos a su costo (por de los activos consumidos (que generalmente\nejemplo, depreciaciones de bienes de uso y coincidirá con la fecha de reconocimiento).\ncosto de lo vendido)\nEl período de reconocimiento de los activos\nconsumidos podrá estimarse en función del\ntiempo de permanencia promedio\ndeterminado por la rotación física de dichos\nactivos. Por ejemplo, en el caso de bienes de\ncambio que rotan en forma sistemática a lo\nlargo del tiempo.\n\nLas depreciaciones podrán calcularse\naplicando la cuota de depreciación del\nperíodo sobre el valor de origen expresado en\nmoneda de cierre.\n\nResultados generados por comparación de Multiplicará cada una de las magnitudes de\nmagnitudes, y al menos una de ellas se las partidas que se compararon en el cálculo\nefectuó en una fecha diferentes a la del original por el coeficiente correspondiente y,\nreconocimiento contable (por ejemplo: una vez expresadas en moneda de cierre,\nresultados por la venta de bienes de uso, volverá a compararlas para determinar el\nresultados generados por comparación de un resultado del período o el resultado diferido\nactivo con su valor recuperable, resultados en moneda de cierre.\nde la actividad agropecuaria, resultados por\ntenencia, etc.).\n\nResultados financieros (intereses y De conformidad con el párrafo 634, la entidad\ndiferencias de cambio). los determinará:\na) en términos reales; o\nb) multiplicando el valor nominal por el\ncoeficiente correspondiente, para expresarlos\nen moneda de cierre.\nb) Aportes y distribuciones\n\nUna entidad medirá los aumentos de capital, otros aportes, distribuciones y otras\nreducciones del patrimonio neto ocurridos durante el período del siguiente\nmodo (el listado no es exhaustivo):\n\nClasificación de los componentes\ncorrespondientes a aumentos de capital, otros Para medir el componente en moneda\naportes de los propietarios, distribuciones y de cierre, una entidad: …\notras reducciones\n\nSuscripción de nuevas acciones o cuotas sociales Multiplicará el valor nominal las acciones\n(incluyendo las primas de emisión relacionadas). o cuotas sociales emitidas por el\ncoeficiente correspondiente a la fecha de\nla suscripción.\n\nCapitalización de aportes irrevocables. Multiplicará el valor nominal de las\nacciones o cuotas sociales emitidas por el\ncoeficiente correspondiente a la fecha en\nque se expresó dicho valor nominal.\n\nCapitalización de resultados y otras variaciones Multiplicará el valor nominal de la\ncualitativas que afecten a los resultados variación por el coeficiente\nacumulados, tales como constitución y correspondiente a la fecha de cierre del\ndesafectación de reservas y absorción de ejercicio anterior.\npérdidas acumuladas.\n\nAportes irrevocables Multiplicará el valor nominal aportado por\nel coeficiente correspondiente:\na) a la fecha del aporte; o\nb) a la fecha en que se define la\nirrevocabilidad, si se tratara de la\nconversión de un pasivo en\npatrimonio neto.\n\nDistribución de dividendos en efectivo u otros Multiplicará el valor nominal de lo\nactivos. distribuido por el coeficiente\ncorrespondiente a la fecha de la\nasamblea que apruebe la distribución.\n\nReducción del capital para devolver a los Multiplicará el valor nominal de la\naccionistas. reducción por el coeficiente\ncorrespondiente a la fecha de la\naprobación.\n\nPresentación de los resultados financieros y por tenencia (incluyendo el resultado por\nexposición al cambio en el poder adquisitivo de la moneda) del período actual"}, {"num": 192, "texto": "Una entidad presentará, en el estado de resultados, los resultados financieros y por\ntenencia (incluyendo el resultado por exposición al cambio en el poder adquisitivo) en\nfunción a alguno de los siguientes criterios, de conformidad con los párrafos 631 a\n634:\na) presentando los resultados financieros y por tenencia, incluyendo el resultado\npor exposición al cambio en el poder adquisitivo de la moneda, en una sola\nlínea (enfoque “menos depurado”) [ver el inciso a) del párrafo 632)]; o\nb) segregando los resultados financieros, los resultados por tenencia y el\nresultado por exposición al cambio en el poder adquisitivo de la moneda y\nexponiendo cada una de tales partidas en moneda de cierre [ver el inciso b) del\npárrafo 632)].\n\nAjuste de las variaciones patrimoniales cualitativas del período actual"}, {"num": 193, "texto": "Sin perjuicio de lo establecido en el párrafo 198, una entidad expresará las\nvariaciones patrimoniales cualitativas utilizando un coeficiente basado en la fecha de\ncierre del ejercicio anterior (por ejemplo, para expresar en moneda de cierre la\nconstitución de reservas o la capitalización de resultados no asignados).\n\nEfectos fiscales del ajuste de los estados contables"}, {"num": 194, "texto": "Una entidad que aplique el método del impuesto diferido reconocerá los saldos por\nimpuestos diferidos proveniente de la comparación entre la medición contable de\nactivos y pasivos (en moneda de cierre) y su base fiscal, según lo establecido en la\nsección “Reconocimiento, medición, presentación y revelación del impuesto a las\nganancias diferido” [ver los párrafos 578 a 599]."}, {"num": 195, "texto": "Ajuste de las variaciones del patrimonio neto ocurridas durante el período actual"}, {"num": 196, "texto": "Al preparar sus estados contables en moneda de cierre, una entidad:\na) Expresará los cobros y los pagos en moneda de cierre multiplicando las cifras\noriginalmente expresadas en la moneda de la fecha de cobro o pago por el\ncoeficiente que surge de dividir el índice de precios FACPCE al cierre por el\nde la fecha de cobro o pago.\nb) Incorporará el resultado por cambios en el poder adquisitivo de la moneda\ngenerado por el efectivo y sus equivalentes según lo dispuesto en el apartado\n“Resultados financieros y de tenencia del efectivo y sus equivalentes” [ver los\npárrafos 659 a 661].\n\nAjuste de las cifras correspondientes al período comparativo en moneda de cierre (actual)"}, {"num": 197, "texto": "Al presentar los estados contables en moneda de cierre, la entidad expresará todas\nlas cifras comparativas, adecuadas –de corresponder– con los criterios de\nreconocimiento y medición utilizados en el período actual, aplicando el coeficiente que\nresulte de dividir el valor del índice correspondiente a la fecha de los estados\ncontables por el valor del índice referido a la fecha o período comparativo.\n\nProcedimiento: cuestiones de aplicación particular\n\nAplicación por primera vez o reanudación de su aplicación"}, {"num": 198, "texto": "Cuando aplique por primera vez o reanude la emisión de estados contables\najustados por inflación, luego de una interrupción, una entidad deberá:\na) medir el activo y el pasivo al inicio del período objeto de ajuste, en moneda de\ndicha fecha, ajustando las partidas correspondientes;\nb) obtener el patrimonio neto al inicio del período objeto del ajuste, en moneda\nde dicha fecha, por diferencia entre el activo y el pasivo calculados según lo\nestablecido en el inciso anterior;\nc) medir en moneda de esa misma fecha cada componente del patrimonio neto,\nexcluido el resultado acumulado;\nd) determinar el resultado acumulado al inicio del período, en moneda del inicio,\npor diferencia entre el patrimonio neto del punto b), y los componentes\nmedidos según el punto c);\ne) completar el proceso de ajuste de acuerdo con lo establecido en los párrafos\n185 al 197.\n\nInterrupción y reanudación de los ajustes"}, {"num": 199, "texto": "Si interrumpiera la emisión de sus estados contables ajustados por inflación, una\nentidad tratará a las cifras ajustadas al momento de interrupción como base para\nmedir los elementos en los estados contables subsiguientes."}, {"num": 200, "texto": "Si en un período posterior reanudara el ajuste, una entidad:\na) ajustará las cifras correspondientes al inicio del ejercicio comparativo más\nantiguo; y\nb) computará, para tal fin, las variaciones del índice de precios FACPCE desde\nel momento de la interrupción del ajuste hasta la fecha mencionada en el inciso\nanterior.\n\nCAPÍTULO 3\n\nRECONOCIMIENTO, MEDICIÓN Y PRESENTACIÓN DE PARTIDAS DEL ACTIVO\n\nINTRODUCCIÓN AL PRESENTE CAPÍTULO"}]}]}, {"id": "cap3", "num": 3, "nombre": "Partidas del Activo", "icono": "💰", "secciones": [{"id": "c3s0", "nombre": "Introducción y Cuestiones Comunes", "parrafos": [{"num": 201, "texto": "En este capítulo se describen requerimientos de clasificación, reconocimiento,\nmedición, presentación y revelación en notas para ciertos activos."}, {"num": 202, "texto": "Los temas en los que se concentra el presente capítulo son generalmente temas de\nbaja complejidad contable, y se espera que estén presente en cualquier tipo de\nentidad que utilice esta Resolución Técnica.\n\nCUESTIONES COMUNES A TODOS LOS RUBROS\n\nMedición inicial de bienes y servicios"}, {"num": 203, "texto": "Una entidad medirá inicialmente sus bienes y servicios según lo establecido en esta\nsección, excepto que esta u otras normas contables requieran o permitan un\ntratamiento diferente."}, {"num": 204, "texto": "En el momento del reconocimiento, una entidad medirá, los bienes y servicios de\nacuerdo con los criterios indicados a continuación:\na) Bienes o servicios adquiridos: sobre la base de su costo de adquisición.\nb) Bienes producidos o construidos: en función del costo de producción o costo\nde construcción.\nc) Bienes o servicios incorporados mediante aportes, donaciones o subsidios\ngubernamentales:\n(i) Por el importe establecido en la documentación que respalda la\ntransacción, cuando la entidad califica como pequeña o mediana y el\nimporte estuviera explicitado.\n(ii) En los demás casos, de acuerdo con la información disponible:"}]}, {"id": "c3s1", "nombre": "Caja y Bancos", "parrafos": [{"num": 205, "texto": "A los fines de esta sección, una entidad deberá considerar la definición siguiente:\n\nCaja y Bancos: Incluye el dinero en efectivo en caja y cuentas bancarias del país\ny del exterior y otros valores con similar liquidez y capacidad para actuar como\nmedios de pago.\n\nReconocimiento"}, {"num": 206, "texto": "Una entidad reconocerá un elemento como caja y bancos cuando se cumpla la\ndefinición general del párrafo 22 y la definición específica contenida en el párrafo 205.\n\nMedición inicial"}, {"num": 207, "texto": "Una entidad medirá las partidas de caja y bancos por su importe nominal.\n\nMedición posterior"}, {"num": 208, "texto": "Una entidad medirá las partidas de caja y bancos por su importe nominal.\n\nPresentación en los estados contables"}, {"num": 209, "texto": "En el estado de situación patrimonial, una entidad presentará el saldo de caja y\nbancos como corriente.\n\nRevelación en notas"}, {"num": 210, "texto": "Una entidad informará:\na) La composición del rubro de acuerdo con la naturaleza de sus componentes\n(dinero en caja, saldos en cuentas corrientes bancarias, saldos en cajas de\nahorro), distinguiendo entre saldos en moneda nacional y extranjera.\nb) Los importes en moneda extranjera y los tipos de cambio correspondiente
