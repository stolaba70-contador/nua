blecido en esta\nsección, otras disposiciones de esta Resolución Técnica u otras normas contables.\nPor ejemplo, las referidas a:\na) “Medición de costos” [ver los párrafos 102 a 110].\nb) “Medición de valores corrientes” [ver los párrafos 117 a 122].\nc) “Mediciones en moneda extranjera” [ver los párrafos 124 a 128].\nd) “Expresión de los estados contables en moneda de cierre en un contexto de\ninflación (ajuste por inflación de los estados contables)” [ver los párrafos 176 a\n200].\ne) “Cuestiones referidas al estado de resultados” [ver los párrafos 628 a 641].\n\nCAPÍTULO 5\n\nEFECTOS CONTABLES PROCEDENTES DE DETERMINADAS CIRCUNSTANCIAS,\nTRANSACCIONES O CONTRATOS\n\nINTRODUCCIÓN AL PRESENTE CAPÍTULO"}]}]}, {"id": "cap5", "num": 5, "nombre": "Transacciones y Contratos", "icono": "📝", "secciones": [{"id": "c5s1", "nombre": "Ingresos Ordinarios", "parrafos": [{"num": 520, "texto": "En este capítulo se describen requerimientos de reconocimiento, medición,\npresentación y revelación de determinadas circunstancias, transacciones o contratos."}, {"num": 521, "texto": "El contenido de este capítulo incluye temas de baja complejidad contable y se\nespera que estén presente en cualquier tipo de entidad que aplique esta Resolución\nTécnica u otras normas contables.\n\nRECONOCIMIENTO DE INGRESOS DE ACTIVIDADES ORDINARIAS PROCEDENTES DE\nTRANSACCIONES (OPERACIONES DE INTERCAMBIO)\n\nDefiniciones"}, {"num": 522, "texto": "A los fines del tratamiento de los ingresos de actividades ordinarias procedentes\nde transacciones (operaciones de intercambio), una entidad deberá considerar las\ndefiniciones siguientes.\n\nActividades de intermediación: Son aquellas que involucran dos partes:\na) El principal, comitente o mandante: entidad que encarga a un tercero (el\nintermediario) la realización de actividad o servicios comerciales por su\ncuenta. En general, el principal:\n(i) es el responsable ante el cliente por la venta del bien, la prestación del\nservicio o la construcción de un activo;\n(ii) asume el riesgo de inventario; y\n(iii) tiene capacidad para determinar el precio al cual está dispuesto a\nvender el bien o prestar el servicio.\nb) Intermediario, agente, consignatario: entidad o persona contratada por el\nprincipal para que realice actividades o servicios comerciales por su cuenta\ny cuya retribución consiste en una comisión o concepto similar. En general,\nel intermediario no asume los riesgos vinculados con la operación.\n\nIngresos de actividades ordinarias: Son los aumentos del patrimonio neto\noriginados en la producción o venta de bienes, en la prestación de servicios, la\nconstrucción de activos u otros hechos que hacen a las actividades principales\nde la entidad.\n\nEstas partidas incluyen:\na) los ingresos de actividades ordinarias procedentes de transacciones\n(operaciones de intercambio); y\nb) los ingresos generados por actividades internas, tales como el\ncrecimiento natural o inducido de determinados activos en una explotación\nagropecuaria [ver los párrafos 1021 a 1041] o la extracción de petróleo o\ngas en esta industria.\n\nIngresos de actividades ordinarias procedentes de transacciones (operaciones\nde intercambio): Son los ingresos de actividades ordinarias originados en\ntransacciones tales como las siguientes:\na) Venta de bienes.\nb) Prestación de servicios.\nc) Construcción, fabricación o desarrollo de activos.\nd) Actividades de intermediación.\n\nReconocimiento (devengamiento)"}, {"num": 523, "texto": "Una entidad reconocerá los ingresos de actividades ordinarias por transacciones\n(operaciones de intercambio) cuando dichas transacciones estén concluidas de\nacuerdo con la sustancia o realidad económica, la que deberá primar sobre su forma\nlegal o contractual. En función de ello, una entidad reconocerá:\na) Los ingresos por venta de bienes: en el momento de obtención del control de\ntales bienes por parte del cliente. Por ejemplo, cuando se produce la entrega\ndel activo y el cliente acepta el producto.\nb) Los ingresos procedentes de servicios:\n(i) De prestación continua: a lo largo del plazo durante el cual se realiza la\nprestación. Por ejemplo, a medida que restaura un edificio perteneciente\nal cliente.\n(ii) No contemplados en (i): al concluir su prestación. Por ejemplo, cuando\nuna consultora entrega el informe para cuya preparación fue contratada.\nc) Los ingresos procedentes de contratos de construcción:\n(i) Si se asemejan a venta de bienes, según lo dispuesto en el inciso a). Por\nejemplo, si construye departamentos bajo la modalidad “a pozo” en su\npropio terreno y transfiere dichas propiedades al terminar la obra.\n(ii) Si se asemejan a servicios de prestación continua, según lo dispuesto en\n(i) del inciso b). Por ejemplo, si construye un edificio sobre un terreno cuya\npropiedad pertenece al cliente.\nd) Un anticipo de clientes si:\n(i) se satisfacen las condiciones para el reconocimiento de los activos o la\nbaja de los pasivos que constituyen su contrapartida, establecidas en otras\nsecciones de esta Resolución Técnica u otras normas contables; y\n(ii) la transacción (operación de intercambio) no puede ser considerada\nconcluida desde el punto de vista de la realidad económica, según lo\nestablecido en los incisos previos, de este párrafo.\n\n523A. Una entidad reconocerá ingresos de actividades ordinarias por transacciones\n(operaciones de intercambio) en el momento en que el cliente obtiene, o a medida\nque obtiene, el control de los activos vendidos o los servicios prestados, según\ncorresponda. Un cliente obtendrá el control:\na) de un activo, en el momento en que adquiere, o a medida que adquiere, la\ncapacidad para:\n(i) dirigir o redirigir el uso del recurso económico (lo que incluye la capacidad\npara permitir o impedir que terceros puedan hacerlo); y\n(ii) obtener sustancialmente todos sus beneficios restantes (lo que incluye la\ncapacidad de impedir que terceros puedan hacerlo).\nb) de un servicio, en el momento en que adquiere, o a medida que adquiere, la\ncapacidad para aprovechar o utilizar la prestación realizada por la entidad."}, {"num": 524, "texto": "Cuando una transacción (operación de intercambio) involucre distintos componentes\nque generan ingresos de actividades ordinarias (por ejemplo, la venta de un\nproducto que incluye un servicio prolongado de posventa), una entidad que es\npequeña o mediana podrá:\na) no separar los ingresos de actividades ordinarias correspondientes a cada\nuno de dichos componentes; y\nb) reconocer la totalidad del ingreso cuando se devengue el correspondiente al\ncomponente principal.\n\nMedición"}, {"num": 525, "texto": "Una entidad medirá los ingresos de actividades ordinarias procedentes de\ntransacciones (operaciones de intercambio):\na) En general, por el precio convenido con sus clientes. Con tal finalidad:\n(i) considerará los criterios establecidos en esta Resolución Técnica u otras\nnormas contables para la medición de la contrapartida (es decir, de los\nactivos reconocidos -créditos por ventas, derechos a facturar a clientes- o\nde los pasivos -anticipos de clientes- dados de baja); y\n(ii) excluirá las sumas cobradas o a cobrar por cuenta de terceros (por\nejemplo, débitos fiscales del Impuesto al Valor Agregado).\nb) Si se originan en servicios de prestación continua o contratos de construcción\nasimilables a estos servicios, considerando:\n(i) el precio convenido con sus clientes, de acuerdo con lo dispuesto en el\ninciso inmediato anterior; y\n(ii) el grado de avance o cumplimiento.\nc) Si provienen de actividades de intermediación, por un importe equivalente a la\ncomisión o conceptos similares convenidos con sus clientes.\n\nOtras normas aplicables"}, {"num": 526, "texto": "Para aplicar los requerimientos establecidos para “Reconocimiento de ingresos de\nactividades ordinarias procedentes de transacciones (operaciones de intercambio)”,\nuna entidad deberá contemplar, en tanto resulten pertinentes y no contradigan lo\nestablecido en esta sección, otras disposiciones de esta Resolución Técnica u otras\nnormas contables. Por ejemplo, las referidas a:\na) “Medición de costos” [ver los párrafos 102 a 110].\nb) “Medición de valores corrientes” [ver los párrafos 117 a 122].\nc) “Mediciones en moneda extranjera” [ver los párrafos 124 a 128].\nd) “Tratamiento de componentes financieros” [ver los párrafos 129 a 142].\ne) “Créditos en moneda” [ver los párrafos 236 al 269].\nf) “Créditos en especie” [ver los párrafos 270 al 286].\ng) “Pasivos ciertos (deudas) en moneda” [ver los párrafos 457 al 476].\nh) “Pasivos ciertos (deudas) en especie” [ver los párrafos 477 al 486].\ni) “Expresión de los estados contables en moneda de cierre en un contexto de\ninflación (ajuste por inflación de los estados contables)” [ver los párrafos 176 a\n200].\nj) “Cuestiones referidas al estado de resultados” [ver los párrafos 628 a 641].\n\nCOMPROMISOS QUE GENERAN PÉRDIDAS (CONTRATOS DE CARÁCTER ONEROSO)\n\nDefinición"}, {"num": 527, "texto": "A los fines del tratamiento de los compromisos que generan pérdidas, una entidad\ndeberá considerar la definición siguiente.\n\nContrato de carácter oneroso: Es aquél en el cual los costos inevitables de\ncumplir con las obligaciones pendientes exceden a los beneficios económicos\nque se esperan recibir de este.\n\nReconocimiento y medición"}, {"num": 528, "texto": "Una entidad reconocerá y medirá como un pasivo la correspondiente pérdida que\nsurja de un contrato de carácter oneroso, de cumplimiento ineludible."}, {"num": 529, "texto": "Una entidad debe aplicar las normas contenidas en esta sección, por ejemplo, a\ncompromisos de comprar bienes o servicios en ciertas cantidades y a determinados\nprecios."}, {"num": 530, "texto": "Son costos inevitables de cumplir el contrato los representados por el menor de los\nsiguientes importes:\na) el costo de cumplir sus cláusulas; y\nb) la cuantía de las compensaciones o multas que se deriven de su\nincumplimiento.\n\nOtras normas aplicables"}, {"num": 531, "texto": "Para aplicar los requerimientos establecidos en esta sección, una entidad deberá\ncontemplar, en tanto resulten pertinentes y no contradigan lo establecido en esta\nsección, otras disposiciones de esta Resolución Técnica u otras normas contables.\nPor ejemplo, las referidas a:\na) “Medición de costos” [ver los párrafos 102 a 110].\nb) “Medición de valores corrientes” [ver los párrafos 117 a 122].\nc) “Mediciones en moneda extranjera” [ver los párrafos 124 a 128].\nd) “Expresión de los estados contables en moneda de cierre en un contexto de\ninflación (ajuste por inflación de los estados contables)” [ver los párrafos 176 a\n200].\ne) “Cuestiones referidas al estado de resultados” [ver los párrafos 628 a 641].\n\nARRENDAMIENTOS\n\nDefiniciones"}]}, {"id": "c5s2", "nombre": "Arrendamientos", "parrafos": [{"num": 532, "texto": "A los fines del tratamiento de los contratos de arrendamiento, una entidad deberá\nconsiderar las definiciones siguientes.\n\nArrendamiento: Acuerdo por el cual una parte (el arrendador) cede a otra (el\narrendatario) el derecho de uso de un activo durante un tiempo determinado, a\ncambio de una contraprestación (cuotas).\n\nArrendamiento financiero: Tipo de arrendamiento que transfiere sustancialmente\ntodos los riesgos y beneficios inherentes a la propiedad del activo arrendado,\ncuya titularidad puede transferirse o no. Como contraprestación, el arrendatario\nse obliga a efectuar uno o más pagos que cubren sustancialmente el valor\nrazonable del activo y las cargas financieras correspondientes.\n\nArrendamiento operativo: Cualquier arrendamiento no financiero.\n\nCostos iniciales directos: Son los costos incrementales directamente imputables\na la negociación y contratación de un arrendamiento, salvo en el caso de costos\nincurridos por un arrendador que sea a la vez fabricante o distribuidor.\n\nCuotas contingentes: Pagos por arrendamiento cuyo importe no es fijo sino que\nsu importe se basa en hechos futuros y factores que varían por razones distintas\ndel mero paso del tiempo (por ejemplo, un tanto por ciento de las ventas futuras,\ngrado de utilización futura, índices de precios futuros, tasas de interés de\nmercado futuras, etc.)\n\nCuotas mínimas: Pagos que el arrendatario está obligado a efectuar con motivo\ndel arrendamiento, excluyendo las cuotas contingentes, los servicios y los\nimpuestos, más:\na) En el caso del arrendatario: todo importe garantizado por él o por alguien\nrelacionado con él.\nb) En el caso del arrendador: cualquier valor residual que se le garantice (por\nel arrendatario, por alguien relacionado con éste o cualquier tercero\nindependiente).\nc) El pago necesario para ejercer la opción de compra, solo si el arrendatario\nposee dicha opción a un precio significativamente inferior al valor\nrazonable que se espera tenga el bien a la fecha de ejercicio.\n\nTasa de interés implícita en el arrendamiento: Tasa de descuento que, al\ncomienzo del arrendamiento, produce la igualdad entre:\na) la suma del valor razonable del activo arrendado y los costos iniciales\ndirectos del arrendamiento; y\nb) la suma de los valores descontados de las cuotas mínimas por el\narrendamiento y el valor residual no garantizado.\nValor residual no garantizado: Parte del valor residual del activo arrendado cuya\nrealización no está asegurada o queda garantizada exclusivamente por un\ntercero relacionado con el arrendador.\n\nVida económica: Período estimado, contado desde el comienzo del\narrendamiento, a lo largo del cual la empresa espera consumir los beneficios\neconómicos incorporados al activo arrendado.\n\nTipos de arrendamiento"}, {"num": 533, "texto": "Una entidad privilegiará la sustancia económica de los contratos celebrados antes\nque su forma jurídica para distinguir entre:\na) arrendamientos financieros; y\nb) arrendamientos operativos."}, {"num": 534, "texto": "Una entidad clasificará un arrendamiento como financiero cuando se presenten,\nindividualmente o en combinación, situaciones que constituyan indicios de la\ntransferencia de riesgos y beneficios. Entre ellas, las siguientes:\na) el contrato transfiere la propiedad del activo al arrendatario al final del\ntérmino del arrendamiento;\nb) el arrendatario tiene la opción de comprar el activo a un precio lo\nsuficientemente más bajo que el valor razonable esperado a la fecha de\nejercer la opción, de manera tal que, al inicio del arrendamiento, sea\nrazonablemente seguro ejercer la opción;\nc) el plazo del arrendamiento cubre la parte principal de la vida económica del\nactivo;\nd) el valor descontado de las cuotas mínimas equivale sustancialmente al\nvalor razonable del activo arrendado, al inicio del arrendamiento;\ne) la naturaleza de los activos arrendados permite suponer que solo el\narrendatario puede utilizarlos sin mayores modificaciones;\nf) el arrendatario tiene la posibilidad de resolver el contrato, haciéndose\ncargo de las pérdidas que tal cancelación motive;\ng) las ganancias y pérdidas motivadas por las fluctuaciones del valor\nresidual razonable del activo recaen sobre el arrendatario; o\nh) el arrendatario tiene la posibilidad de prorrogar el arrendamiento durante\nun segundo período, con cuotas menores que las del mercado."}, {"num": 535, "texto": "El arrendamiento de terrenos se presume operativo, sin admitir prueba en\ncontrario, cuando el contrato no prevé que la titularidad del activo pase al\narrendatario durante su vigencia o a su vencimiento.\n\nArrendamientos financieros\n\nArrendamientos financieros: contabilidad del arrendatario"}, {"num": 536, "texto": "Una entidad tratará los arrendamientos financieros del mismo modo que una\ncompra financiada y medirá inicialmente al activo por el menor de los siguientes\nimportes:\na) la suma del valor razonable del activo arrendado y los costos iniciales\ndirectos; y\nb) la suma de los valores descontados de las cuotas mínimas del\narrendamiento (desde el punto de vista del arrendatario)."}, {"num": 537, "texto": "Una entidad calculará los valores descontados mediante:\na) la tasa de interés implícita del arrendamiento; o\nb) si no pudiera estimar la tasa del inciso anterior, el tipo de interés que\ndebería asumir dicha entidad por incrementar su endeudamiento.\n\n537A. Después de su reconocimiento, una entidad tratará a los activos incorporados\nmediante arrendamientos de acuerdo con los requerimientos que resulten\naplicables en función de su naturaleza.\n\nArrendamientos financieros: contabilidad del arrendador cuando la entidad\nno es productora ni revendedora"}, {"num": 538, "texto": "Una entidad reconocerá los arrendamientos financieros como una cuenta por\ncobrar, por un importe igual al valor descontado de la suma de:\na) las cuotas mínimas por el arrendamiento (desde el punto de vista del\narrendador); y\nb) cualquier valor residual no garantizado."}, {"num": 539, "texto": "Una entidad calculará el valor descontado mediante la tasa de interés implícita\ndel arrendamiento."}, {"num": 540, "texto": "Una entidad deberá revisar periódicamente la medición del valor residual no\ngarantizado. De producirse su desvalorización permanente, una entidad\nrevisará la distribución de los resultados financieros a lo largo del plazo de\narrendamiento y reconocerá un resultado por cualquier diferencia entre:\na) la medición original más los resultados financieros devengados,\ncalculados considerando el valor residual anteriormente determinado; y\nb) la medición original más los resultados financieros devengados,\ncalculados considerando el nuevo valor residual.\n\nArrendamientos financieros: contabilidad del arrendador cuando la entidad\nes productora o revendedora"}, {"num": 541, "texto": "Una entidad arrendadora que es productora o revendedora reconocerá los\nresultados derivados de una venta considerando:\na) como precio de venta: el menor importe entre el valor razonable del\nactivo y el valor descontado de los pagos mínimos (desde el punto de\nvista del arrendador); y\nb) como costo del bien vendido: su medición contable menos el valor\ndescontado de su valor residual no garantizado."}, {"num": 542, "texto": "Una entidad calculará los valores descontados referidos en el párrafo anterior\nmediante una tasa que refleje las evaluaciones del mercado sobre el valor\ntiempo del dinero y los riesgos específicos de la operación\n\nArrendamientos operativos"}, {"num": 543, "texto": "Una entidad que es arrendataria imputará las cuotas de un arrendamiento:\na) como gastos del período durante el cual se generan sus obligaciones o\nse extinguen sus derechos (en el caso de pagos anticipados), si no\ncorresponde sumarlos como componente del costo de un activo; o\nb) como componente del costo del activo, si correspondiera."}, {"num": 544, "texto": "Una entidad que es arrendadora imputará las cuotas de un arrendamiento\ncomo ingresos del período durante el cual se genera su derecho a cobro o se\nextingue su obligación (en el caso de cobros anticipados).\n\nModificaciones contractuales"}, {"num": 545, "texto": "Una entidad contabilizará como un nuevo contrato cualquier modificación de\nlas condiciones o bases que permitieron calificar a un arrendamiento como\nfinanciero u operativo.\n\nVenta acompañada o seguida de arrendamiento"}, {"num": 546, "texto": "Una entidad que vende un activo y simultánea o seguidamente contrate con el\ncomprador el arrendamiento del mismo activo, aplicará las normas contenidas\nde los párrafos siguientes.\n\nVenta acompañada o seguida de arrendamiento: arrendamiento financiero"}, {"num": 547, "texto": "Cuando la venta seguida de arrendamiento califica como arrendamiento\nfinanciero, una entidad que es arrendataria contabilizará la operación como un\npréstamo otorgado por el arrendador al arrendatario, con el activo como\ngarantía. En tal caso:\na) mantendrá el activo en su contabilidad; y\nb) no reconocerá ningún resultado por la venta."}, {"num": 548, "texto": "Una entidad que es arrendataria tratará la diferencia entre el precio de venta y el\ntotal de las cuotas mínimas como un costo financiero, de acuerdo con lo\nestablecido en la sección “Tratamiento de componentes financieros” [ver los párrafos\n129 a 142]."}, {"num": 549, "texto": "Si el valor razonable del activo al momento de la venta fuera inferior a su\nmedición contable, una entidad no realizará ajuste alguno y analizará si dicha\ncircunstancia constituye un indicio de pérdidas por desvalorización.\n\nVenta acompañada o seguida de arrendamiento: arrendamiento operativo"}, {"num": 550, "texto": "Cuando la venta seguida de arrendamiento califica como arrendamiento\noperativo, una entidad que es arrendataria determinará en primer lugar si la\nmedición contable del bien a la fecha de la transacción es superior a su valor\nrazonable, en cuyo caso reconocerá las pérdidas por desvalorización\ncorrespondientes."}, {"num": 551, "texto": "Una vez realizada la tarea descripta en el párrafo anterior, una entidad que es\narrendataria procederá del siguiente modo:\na) Si el precio de venta del activo es igual o menor a su valor razonable y\nel resultado de la venta es positivo: reconocerá como resultado del\nperíodo la diferencia entre dicho precio y la medición contable del activo\na la fecha de la transacción.\nb) Si el precio de venta del bien es menor a su valor razonable, el resultado\nde la venta es negativo y los precios establecidos para las cuotas del\narrendamiento son iguales o superiores a los de mercado: reconocerá\nuna pérdida por la diferencia entre dicho precio y la medición contable\ndel activo a la fecha de la transacción.\nc) Si el precio de venta del bien es menor a su valor razonable, el resultado\nde la venta es negativo y los precios establecidos para las cuotas del\narrendamiento son inferiores a los de mercado:\n(i) determinará la medida en que el menor precio de venta se compensa\ncon los menores pagos futuros de cuotas de arrendamientos;\n(ii) reconocerá una pérdida por la diferencia entre el precio de venta y\nla medición contable del activo a la fecha de la transacción que no\nesté compensada por los ahorros en los futuros pagos de cuotas por\narrendamientos; y\n(iii) reconocerá como resultados a lo largo del plazo durante el cual se\nespera utilizar el activo arrendado las diferencias no reconocidas\ncomo resultados por aplicación del inciso (ii).\nd) Si el precio de venta del bien es mayor a su valor razonable:\n(i) reconocerá una ganancia por cualquier diferencia entre el valor\nrazonable del activo y su medición contable a la fecha de la\ntransacción; y\n(ii) reconocerá como resultado a lo largo del plazo durante el cual se\nespera utilizar el activo arrendado el exceso del precio de venta\nsobre el valor razonable del bien.\n\nPresentación y revelación\n\nPresentación y revelación: estados contables del arrendador"}, {"num": 552, "texto": "Una entidad que es arrendadora presentará la siguiente información por todos\nlos contratos de arrendamiento (financieros u operativos):\na) una descripción de las condiciones generales de los contratos;\nb) la desagregación por plazo de vencimiento del total de las cuotas mínimas y de\nsu valor actual; y\nc) el total imputado a resultados en concepto de cuotas contingentes."}, {"num": 553, "texto": "Una entidad que es arrendadora presentará por sus contratos de arrendamientos\nfinancieros:\na) una conciliación entre el total de activos por arrendamientos y el valor actual\nde las cuotas mínimas (desde el punto de vista del arrendador) a la fecha de\nlos estados contables;\nb) los ingresos financieros no devengados;\nc) los valores residuales no garantizados; y\nd) la previsión para desvalorización sobre las cuotas mínimas a cobrar."}, {"num": 554, "texto": "Una entidad pequeña o mediana podrá no revelar la información requerida por el\npárrafo anterior.\n\nPresentación y revelación: estados contables del arrendatario"}, {"num": 555, "texto": "Una entidad que es arrendataria presentará la siguiente información por todos\nlos contratos de arrendamiento (financieros u operativos):\na) una descripción de las condiciones generales de los contratos que incluya,\ncomo mínimo:\n(i) las bases de determinación de las cuotas contingentes;\n(ii) las cláusulas establecidas en materia de renovación del contrato,\nopciones de compra y aumento de precios; y\n(iii) las restricciones impuestas por los contratos firmados, tales como\nlas referidas a distribución de dividendos,endeudamiento, nuevos\ncontratos de arrendamiento; etc.;\nb) la desagregación por plazo de vencimiento del total de las cuotas mínimas y de\nsu valor actual, distinguiendo los siguientes plazos (contados desde la fecha\nde cierre de los estados contables):\n(i) un año o menos;\n(ii) entre uno y cinco años; y\n(iii) más de cinco años.\nc) el total imputado a resultados en concepto de cuotas contingentes; y\nd) el importe de las cuotas mínimas a cobrar por contratos de subarrendamientos\nno susceptibles de cancelación por los subarrendatarios."}, {"num": 556, "texto": "Una entidad que es arrendataria presentará, por sus contratos de arrendamiento\nfinanciero, una conciliación entre el total de las cuotas mínimas comprometidas\na la fecha de los estados contables y su valor actual."}, {"num": 557, "texto": "Una entidad pequeña o mediana podrá no revelar la información requerida por el\ninciso b) del párrafo 555 y por el párrafo 556."}, {"num": 558, "texto": "Una entidad que es arrendataria presentará, por sus contratos de arrendamiento\noperativo, los totales imputados al resultado del período en concepto de cuotas\nmínimas y cuotas por subarrendamientos.\n\nOtras normas aplicables"}, {"num": 559, "texto": "Para aplicar los requerimientos establecidos en esta sección, una entidad deberá\ncontemplar, en tanto resulten pertinentes y no contradigan lo establecido en esta\nsección, otras disposiciones de esta Resolución Técnica u otras normas contables.\nPor ejemplo, las referidas a:\na) “Medición de costos” [ver los párrafos 102 a 110].\nb) “Medición de valores corrientes” [ver los párrafos 117 a 122].\nc) “Mediciones en moneda extranjera” [ver los párrafos 124 a 128].\nd) “Expresión de los estados contables en moneda de cierre en un contexto de\ninflación (ajuste por inflación de los estados contables)” [ver los párrafos 176 a\n200].\ne) “Cuestiones referidas al estado de resultados” [ver los párrafos 628 a 641].\n\nSUBSIDIOS Y OTRAS AYUDAS GUBERNAMENTALES\n\nDefiniciones"}]}, {"id": "c5s3", "nombre": "Subsidios Gubernamentales", "parrafos": [{"num": 560, "texto": "A los fines de contabilizar los subsidios del gobierno y otras ayudas gubernamentales,\nuna entidad deberá considerar las siguientes definiciones:\n\nAyudas gubernamentales: Acciones realizadas por el sector público con el objeto de\nsuministrar beneficios económicos específicos a una entidad o tipo de entidades,\nseleccionadas bajo ciertos criterios.\n\nPréstamos con cláusula de condonación: Préstamos en los cuales el prestamista se\ncompromete a renunciar a su reembolso, bajo ciertas condiciones establecidas.\n\nSubsidios gubernamentales: Ayudas gubernamentales en forma de transferencias de\nrecursos a una entidad a cambio del cumplimiento pasado o futuro de ciertas\ncondiciones relacionadas con las actividades de operación de la entidad.\n\nLos subsidios gubernamentales excluyen:\na) formas de ayuda gubernamental a las que no cabe razonablemente asignar un\nvalor; y\nb) transacciones con el gobierno que no pueden distinguirse de las demás\noperaciones normales de la entidad.\n\nReconocimiento"}, {"num": 561, "texto": "Una entidad reconocerá un resultado procedente de un subsidio gubernamental no\nsujeto al cumplimiento de condiciones futuras cuando:\na) haya sido recibido; o\nb) su recepción sea probable."}, {"num": 562, "texto": "Si el subsidio gubernamental está sujeto al cumplimiento de condiciones futuras, una\nentidad reconocerá:\na) Un pasivo hasta que satisfaga los requisitos establecidos en el inciso siguiente.\nb) Un resultado desde el momento en que:\n(i) cumpla los requisitos exigidos; y\n(ii) su recepción:"}, {"num": 563, "texto": "Una entidad reconocerá un subsidio gubernamental procedente de un préstamo con\ncláusula de condonación cuando existe razonable seguridad de que la entidad\ncumplirá los términos exigidos para su condonación."}, {"num": 564, "texto": "Una entidad tratará el beneficio de un préstamo del gobierno a una tasa de interés\ninferior a la del mercado como un subsidio gubernamental."}, {"num": 565, "texto": "Una entidad contabilizará un subsidio gubernamental que se convierta en\nreembolsable como un cambio en una estimación contable.\n\nMedición"}, {"num": 566, "texto": "Una entidad medirá:\na) De acuerdo con lo establecido en el inciso c) del párrafo 204: los subsidios\ngubernamentales consistentes en transferencias de activos no monetarios,\ncomo terrenos u otros recursos.\nb) Por la diferencia entre el importe recibido y el valor descontado de los flujos de\nefectivo futuros calculado con base en una tasa de interés de mercado: los\nsubsidios gubernamentales consistentes en un préstamo del gobierno a una\ntasa inferior a la de mercado.\nc) Por un importe igual al valor contable del activo recibido: el resto de los\nsubsidios gubernamentales.\n\nPresentación de subsidios gubernamentales\n\nPresentación de los subsidios gubernamentales en el estado de situación patrimonial"}, {"num": 567, "texto": "En el estado de situación patrimonial, una entidad presentará los subsidios\ngubernamentales que no han sido reconocidas aun como resultados, incluyendo las\nde carácter no monetario a valor razonable, como pasivos en un rubro separado de\nlos demás.\n\nPresentación de los subsidios gubernamentales en el estado de resultados (o estado de\nrecursos y gastos)"}, {"num": 568, "texto": "En el estado de resultados, una entidad presentará los subsidios gubernamentales:\na) Cuando se relacionan con ingresos procedentes de las actividades\nprincipales, a continuación de los ingresos de actividades ordinarias.\nb) En los demás casos como:\n(i) otros ingresos; o\n(ii) reducción de los gastos con los cuales se relacionan.\n\nRevelación en notas"}, {"num": 569, "texto": "Una entidad revelará información sobre:\na) las políticas contables adoptadas respecto de los subsidios\ngubernamentales, incluyendo las formas de presentación adoptadas en el\nestado de resultados;\nb) la naturaleza y alcance de los subsidios gubernamentales reconocidas en los\nestados contables, así como una indicación de otras modalidades de ayudas\ngubernamentales, de las que se haya beneficiado directamente; y\nc) las condiciones incumplidas y otras contingencias relacionadas con las ayudas\ngubernamentales reconocidas.\n\nOtras normas aplicables"}, {"num": 570, "texto": "Para aplicar los requerimientos establecidos en esta sección, una entidad deberá\ncontemplar, en tanto resulten pertinentes y no contradigan lo establecido en esta\nsección, otras disposiciones de esta Resolución Técnica u otras normas contables.\nPor ejemplo, las referidas a:\na) “Medición de costos” [ver los párrafos 102 a 110].\nb) “Medición de valores corrientes” [ver los párrafos 117 a 122].\nc) “Mediciones en moneda extranjera” [ver los párrafos 124 a 128].\nd) “Expresión de los estados contables en moneda de cierre en un contexto de\ninflación (ajuste por inflación de los estados contables)” [ver los párrafos 176 a\n200].\ne) “Cuestiones referidas al estado de resultados” [ver los párrafos 628 a 641].\n\nCONTABILIZACIÓN DEL IMPUESTO A LAS GANANCIAS\n\nDefiniciones"}]}, {"id": "c5s4", "nombre": "Impuesto a las Ganancias", "parrafos": [{"num": 571, "texto": "A los fines de contabilizar las consecuencias económicas del impuesto a las\nganancias, una entidad deberá considerar las siguientes definiciones:\n\nBase fiscal: Valuación fiscal o medición de los activos y pasivos resultante de\naplicar las normas de la legislación referida al impuesto a las ganancias.\n\nDiferencias temporarias: Son las existentes entre la medición contable de activos\ny pasivos contables y la base fiscal de dichos activos y pasivos, a la fecha de\nlos estados contables.\nDiferencias temporarias deducibles: Son las diferencias temporarias que darán\nlugar a la reducción de los beneficios imponibles futuros.\n\nDiferencias temporarias imponibles: Son las diferencias temporarias que darán\nlugar al aumento de los beneficios imponibles futuros.\n\nImpuesto a las ganancias: Partida que refleja el efecto del gravamen que recae\nsobre las ganancias finales. Equivale a la suma algebraica del impuesto a las\nganancias corriente y el impuesto a las ganancias diferido (cuando este se\ncontabiliza).\n\nImpuesto a las ganancias corriente: Importe determinado en función de las\nganancias fiscales del período actual, según surge de la presentación impositiva.\n\nImpuesto a las ganancias diferido: Importe que se estima pagar o recuperar por\nlas ganancias o pérdidas fiscales de períodos futuros, debido a los efectos de\ntransacciones contabilizadas a la fecha de los estados contables.\n\nTasa (alícuota) fiscal: Alícuota que se espera rija en el momento estimado de\nreversión de las diferencias temporarias o compensación de pérdidas fiscales,\nde acuerdo con normas legales aprobadas a la fecha de los estados contables.\nCuando la legislación fiscal establezca escalas progresivas o similares, deberá\nutilizarse:\na) la tasa promedio que se estime aplicar, a la ganancia o a la pérdida fiscal,\nen los períodos en los que se esperen revertir las diferencias o compensar\nlos quebrantos; o\nb) la tasa promedio surgida de la liquidación del impuesto del período actual.\n\nReconocimiento, medición, presentación y revelación del impuesto a las ganancias\ncorriente\n\nReconocimiento de pasivos por impuesto corriente"}, {"num": 572, "texto": "Una entidad pequeña podrá reconocer exclusivamente el gasto y el pasivo por\nimpuesto a las ganancias corriente. En este caso, la entidad no reconocerá activos ni\npasivos por impuestos diferidos."}, {"num": 573, "texto": "En la medida en que reconocer activos y pasivos por impuestos diferidos implique un\ncosto o esfuerzo desproporcionado, según la evaluación establecida en el párrafo 83,\nuna entidad mediana podrá reconocer exclusivamente el gasto y el pasivo por\nimpuesto a las ganancias corriente.\n\nMedición de pasivos o activos por impuesto corriente"}, {"num": 574, "texto": "Una entidad medirá los pasivos o activos por impuestos corrientes a su valor nominal.\n\nPresentación y revelación de pasivos o activos y gasto o ingreso por impuesto a las\nganancias corriente"}, {"num": 575, "texto": "Una entidad compensará los pasivos y activos por impuesto a las ganancias corriente\nsolo si tiene el derecho, exigible legalmente, de compensar sus importes (por ejemplo,\n\nla obligación determinada en un ejercicio debe exponerse neta de anticipos,\nretenciones y otros pagos a cuenta)."}, {"num": 576, "texto": "Una entidad presentará el pasivo o activo neto por impuesto corriente y lo incluirá\ndentro de las deudas fiscales u otros créditos en moneda, según corresponda. En\neste último caso, a los fines de presentación en notas, se aplicará lo dispuesto en el\npárrafo 266."}, {"num": 577, "texto": "Una entidad presentará el gasto por impuesto a las ganancias corriente dentro de la\nmisma sección del estado de resultados o del estado de evolución del patrimonio neto\ndonde se exponen las partidas que le dieron origen. A esos fines expondrá netas del\nimpuesto a las ganancias\na) En el estado de resultados, partidas tales como:\n(i) los resultados de las operaciones que continúan; y\n(ii) los resultados de operaciones discontinuadas o en discontinuación.\nb) En el estado de evolución del patrimonio, partidas tales como:\n(i) los resultados diferidos; y\n(ii) los ajustes de resultados de ejercicios anteriores.\n\nReconocimiento, medición, presentación y revelación del impuesto a las ganancias\ndiferido\n\nReconocimiento de pasivos o activos por impuesto diferido"}, {"num": 578, "texto": "Una entidad que no es pequeña, de corresponder, aplicará el método del impuesto\ndiferido y reconocerá:\na) el gasto y el pasivo por impuesto a las ganancias corriente; y\nb) el gasto o ingreso y el pasivo o activo por impuesto a las ganancias diferido."}, {"num": 579, "texto": "Una entidad calculará el gasto o ingreso por impuesto a las ganancias diferido, al\nque se refiere el párrafo 578 como diferencia entre la medición de pasivos o activos\npor impuestos diferidos (netos) a la fecha de los estados contables y la medición\nde tales pasivos o activos (netos) al cierre del ejercicio anterior."}, {"num": 580, "texto": "Por aplicación del método del impuesto diferido una entidad reconocerá, con las\nlimitaciones establecidas en las secciones “Excepciones al reconocimiento de\npasivos por impuesto diferido” [ver el párrafo 582] y “Excepciones al reconocimiento\nde activos por impuesto diferido” [ver el párrafo 584]:\na) un pasivo por impuesto diferido (generado por diferencias temporarias\nimponibles), siempre que sea probable que la recuperación o la cancelación\nde la medición contable de un activo o pasivo vaya a producir pagos fiscales\nmayores;\nb) un activo por impuesto diferido (generado por diferencias temporarias\ndeducibles), siempre que sea probable que la recuperación o la cancelación\nde la medición contable de un activo o pasivo vaya a producir pagos fiscales\nmenores; y\nc) un activo por impuesto diferido cuando existan pérdidas fiscales o quebrantos\nimpositivos o créditos fiscales no utilizados siempre que resulte probable su\ndeducción de ganancias imponibles futuras."}, {"num": 581, "texto": "Una entidad reconocerá un activo por impuestos diferidos proveniente de pérdidas\nfiscales o quebrantos impositivos solo en la medida en que estime probable la\nobtención de ganancias imponibles futuras suficientes. Para evaluar la probabilidad\nde obtener tales ganancias, una entidad deberá considerar si:\na) las pérdidas o quebrantos fiscales han sido producidos por causas\nidentificables, cuya repetición es improbable;\nb) existen normas que establecen un límite temporal para la utilización de tales\nquebrantos;\nc) reconoció pasivos por impuestos diferidos que permitan estimar la existencia\nde futuros importes imponibles; o\nd) tiene oportunidades de planificación fiscal que le permita incrementar los\nbeneficios imponibles futuros (por ejemplo, intercambiando activos cuyos\ningresos están exentos por otros que generan ganancia gravada o eligiendo el\nmomento para la imputación de ciertos ingresos o gastos a los fines de la\ndeterminación de la ganancia imponible).\n\nExcepciones al reconocimiento de pasivos por impuesto diferido"}, {"num": 582, "texto": "Una entidad no reconocerá pasivos por impuestos diferidos procedentes de:\na) Un valor llave que no es deducible impositivamente;\nb) El reconocimiento inicial de un activo o de un pasivo en una transacción que:\n(i) no es una combinación de negocios; y\n(ii) a la fecha de la transacción no afecta el resultado contable ni el impositivo.\nc) Inversiones en sucursales, en sociedades controladas o vinculadas o en\nnegocios conjuntos si:\n(i) la inversora puede controlar los momentos de reversión de tales\ndiferencias temporarias; y\n(ii) es improbable que dichas diferencias se reviertan en un futuro previsible."}, {"num": 583, "texto": "Una entidad podrá no reconocer los pasivos por impuestos diferidos provenientes de:\na) Diferencias entre la medición contable y base fiscal de terrenos y otros activos\nno amortizables no destinados a la venta o negociación cuando es improbable\nque dichas diferencias se reviertan en un futuro previsible (por ejemplo, porque\nno se espera su venta en un plazo razonable).\nb) Diferencias entre la medición contable y base fiscal de ciertos tipos de hacienda\nque probablemente no generen mayores pagos fiscales en el momento de la\nventa debido a los requisitos establecidos por la legislación fiscal (por ejemplo,\nel mantenimiento del número de cabezas).\n\nExcepciones al reconocimiento de activos por impuesto diferido"}, {"num": 584, "texto": "Una entidad no reconocerá activos por impuestos diferidos procedentes de:\na) El reconocimiento inicial de un activo o de un pasivo en una transacción que:\n(i) no es una combinación de negocios; y\n(ii) a la fecha de la transacción no afecta el resultado contable ni el impositivo.\nb) Inversiones en sucursales, en sociedades controladas o vinculadas o en\nnegocios conjuntos si es improbable que:\n(i) las diferencias se reviertan en un futuro previsible; o\n(ii) la entidad espere ganancias imponibles suficientes contra las cuales\ncomputar tales diferencias.\n\nMedición inicial y posterior de los pasivos o activos por impuesto diferido"}, {"num": 585, "texto": "Para medir los pasivos (activos) por impuestos diferidos provenientes de diferencias\ntemporarias, una entidad deberá:\na) comparar la medición contable de los activos y pasivos con su respectiva base\nfiscal;\nb) determinar las diferencias temporarias imponibles (generadoras de pasivos por\nimpuestos diferidos) y las diferencias temporarias deducibles (generadoras de\nactivos por impuestos diferidos); y\nc) multiplicar tales diferencias temporarias por la tasa (alícuota) fiscal."}, {"num": 586, "texto": "Para medir los activos por impuestos diferidos procedentes de pérdidas fiscales, una\nentidad deberá:\na) calcular la pérdida fiscal; y\nb) multiplicar tal pérdida por la tasa (alícuota) fiscal."}, {"num": 587, "texto": "Una entidad podrá medir la totalidad de los pasivos y activos por impuestos diferidos:\na) a su valor nominal; o\nb) a su valor descontado utilizando una tasa del momento de la medición que\nrefleje las evaluaciones del mercado sobre el valor tiempo del dinero y los\nriesgos específicos de la operación.\n\nDeterminación de la base fiscal de activos y pasivos"}, {"num": 588, "texto": "Una entidad considerará que la base fiscal de un activo es igual a:\na) el importe que podrá deducirse de los beneficios fiscales futuros cuando\nrecupere la medición contable del activo mediante su venta o uso (por ejemplo,\nla valuación fiscal de mercaderías cuya venta genere ingresos gravados por el\nimpuesto); o\nb) su medición contable, cuando se trate de activos cuyos beneficios económicos\nno tributan porque están exentos o ya tributaron (por ejemplo, la cobranza de\n\nun crédito por ventas cuyo resultado fiscal se reconoció en el período de la\nventa)."}, {"num": 589, "texto": "Una entidad considerará que la base fiscal de un pasivo es igual a:\na) la medición contable del pasivo menos cualquier suma que podrá deducirse\nen el futuro para la determinación del resultado fiscal (por ejemplo: la base\nfiscal de un pasivo por multas no deducibles fiscalmente es equivalente a su\nmedición contable; la de una previsión para juicios que será deducible\nfiscalmente en ejercicios futuros es igual a cero); o\nb) su medición contable menos cualquier importe de ingresos que no resulte\nimponible en el futuro cuando se trate de anticipos de clientes (o similares) que\ntributaron en el ejercicio del cobro (por ejemplo, alquileres cobrados por\nadelantado)."}, {"num": 590, "texto": "Una entidad deberá tener en cuenta que algunas partidas no reconocidas en los\nestados contables pueden tener base fiscal.\n\nComparación con el valor recuperable de los activos por impuestos diferidos"}, {"num": 591, "texto": "Una entidad no podrá medir ningún activo por impuesto diferido por encima de su\nvalor recuperable, que es el importe máximo de beneficios imponibles futuros,\nesperados durante el lapso en el cual podrá computar las diferencias temporarias\ndeducibles o los quebrantos fiscales."}, {"num": 592, "texto": "Una entidad reconocerá pérdidas por desvalorización de sus activos por impuestos\ndiferidos cuando sea improbable su recuperación total o parcial."}, {"num": 593, "texto": "Una entidad revertirá la desvalorización de sus activos por impuestos diferidos en la\nmedida en que desaparezcan las causas que la motivaron."}, {"num": 594, "texto": "Una entidad imputará la contrapartida tanto de una pérdida por desvalorización\ncomo de una reversión de dicha pérdida al impuesto a las ganancias."}, {"num": 595, "texto": "Una entidad revertirá pérdidas por desvalorización reconocidas en períodos\nanteriores solo cuando, con posterioridad a la fecha de su determinación, se\nmodifiquen las estimaciones efectuadas para determinar el valor recuperable. En tal\ncaso, aumentará la medición contable de los activos por impuestos diferidos\nrelacionados por un importe que sea el menor entre:\na) la medición contable que dicho activo habría tenido si nunca se hubiese\nreconocido una pérdida por desvalorización; y\nb) su nuevo valor recuperable.\n\nPresentación y revelación de pasivos o activos, y pérdidas o ganancias, por impuesto\ndiferido"}, {"num": 596, "texto": "En el estado de situación patrimonial, una entidad compensará los pasivos y activos\npor impuesto a las ganancias diferido solo si tiene el derecho exigible legalmente de\ncompensar sus importes (por ejemplo, porque se vinculan con la misma autoridad\nfiscal)."}, {"num": 597, "texto": "En el estado de situación patrimonial, una entidad presentará el pasivo o activo por\nimpuesto diferido, según lo indicado en el párrafo anterior, como rubro no corriente y\nlo expondrá:\na) dentro de las deudas fiscales u otros créditos en moneda; o\nb) como una partida separada denominada “pasivos por impuestos diferidos” o\n“activos por impuestos diferidos”."}, {"num": 598, "texto": "Una entidad presentará el gasto o ingreso por impuesto a las ganancias diferido\ndentro de la misma sección del estado de resultados o del estado de evolución del\npatrimonio neto donde se exponen las partidas que le dieron origen. A esos fines\nexpondrá netas del impuesto a las ganancias:\na) En el estado de resultados, partidas tales como:\n(i) los resultados de las operaciones que continúan; y\n(ii) los resultados de operaciones discontinuadas o en discontinuación.\nb) En el estado de evolución del patrimonio neto, partidas tales como:\n(i) los resultados diferidos; y\n(ii) los ajustes de resultados de ejercicios anteriores."}, {"num": 599, "texto": "Una entidad deberá revelar en notas:\na) la composición del gasto o ingreso por impuesto a las ganancias,\ndistinguiendo entre impuesto corriente e impuesto diferido;\nb) por cada tipo de pasivo o activo por impuestos diferidos, clasificado según la\ndiferencia temporaria que le dio origen:\n(i) el saldo inicial;\n(ii) la variación del saldo durante el período; y\n(iii) el saldo final;\nc) una explicación de los cambios producidos durante el período en la tasa o tasas\nimpositivas aplicables;\nd) los motivos para reconocer activos por impuestos diferidos provenientes de\npérdidas fiscales cuando obtuvo pérdida en el ejercicio actual o en el\nprecedente;\ne) respecto de cada tipo de diferencias temporarias y de quebrantos impositivos\ny créditos fiscales no utilizados:\n(i) el importe de los créditos y deudas por impuestos diferidos reconocidos a\nla fecha de cada uno de los períodos presentados;\n(ii) el importe que afectó el resultado del período, si no surgiera con evidencia\nde la información sobre las variaciones de los importes reconocidos en los\nestados de situación patrimonial\nf) una conciliación entre el gasto o ingreso imputado a resultados y el impuesto\nteórico (que surge de multiplicar el resultado contable por la tasa fiscal vigente),\nexcepto que:\n(i) sea una entidad pequeña o mediana que opta por no presentar esta\nconciliación; o\n(ii) es cualquier entidad que prepara sus estados contables considerando lo\nestablecido en la sección “Expresión de los estados contables en\nmoneda de cierre en un contexto de inflación (ajuste por inflación de los\nestados contables)” [ver los párrafos 176 a 200], y la entidad opte por no\npresentar dicha conciliación.\ng) los pasivos o activos no reconocidos por aplicación de las secciones\n“Excepciones al reconocimiento de pasivos por impuestos diferidos” [ver el\npárrafo 582] y “Excepciones al reconocimiento de activos por impuestos\ndiferidos” [ver el párrafo 584];\nh) el importe y fecha de validez, si la tuviera, de las diferencias temporarias\ndeducibles y pérdidas fiscales no utilizadas para los cuales no se hayan\nreconocido activos por impuestos diferidos en el estado de situación\npatrimonial, en la medida en que la falta de reconocimiento no se derive de las\nexcepciones contempladas del párrafo 584;\ni) si la entidad optó por medir los activos y pasivos diferidos a su valor actual:\n(i) su valor nominal y su valor descontado clasificado por año durante el cual\nse estima tendrá lugar su reversión;\n(ii) la tasa de interés utilizada en el descuento.\n\nOtras normas aplicables"}, {"num": 600, "texto": "Para aplicar los requerimientos establecidos en esta sección, una entidad deberá\ncontemplar, en tanto resulten pertinentes y no contradigan lo establecido en esta\nsección, otras disposiciones de esta Resolución Técnica u otras normas contables.\nPor ejemplo, las referidas a:\na) “Mediciones en moneda extranjera” [ver los párrafos 124 a 128].\nb) “Expresión de los estados contables en moneda de cierre en un contexto de\ninflación (ajuste por inflación de los estados contables)” [ver los párrafos 176 a\n200].\nc) “Cuestiones referidas al estado de resultados” [ver los párrafos 628 a 641].\n\nREESTRUCTURACIONES\n\nDefiniciones\n\n600A. A los fines de aplicar la presente sección, una entidad deberá considerar la siguiente\ndefinición:\n\nReestructuración: es un programa de actuación, planificado y controlado por la\ndirección de la entidad, cuyo efecto es un cambio significativo en:\n\n(a) el alcance de la actividad llevada a cabo por la entidad; o\n\n(b) la manera en que tal actividad se lleva a cabo.\n\nReconocimiento y medición"}, {"num": 601, "texto": "Una entidad reconocerá un pasivo con contrapartida en el resultado del período\ncuando, a la fecha de los estados contables:\na) decidió un cambio del alcance de la actividad de la entidad o de la manera de\nllevarla a cabo, que incluye uno o más de los siguientes aspectos:\n(i) La reestructuración organizativa de la entidad, mediante eliminación de\nniveles gerenciales o reducción significativa de la cantidad del personal.\n(ii) La discontinuación de las actividades productivas o comerciales llevadas\na cabo en determinadas localizaciones.\n(iii) La eliminación de líneas de productos.\n(iv) La cancelación unilateral de contratos importantes;\nb) elaboró un programa detallado de reestructuración mediante el cual identifica:\n(i) las actividades involucradas (por ejemplo: las líneas de negocios que van\na ser vendidas o liquidadas);\n(ii) las principales localizaciones afectadas (por ejemplo: los países o\nregiones donde se efectúan actividades que serán discontinuadas o\ntrasladadas);\n(iii) el número aproximado de empleados que recibirán compensaciones por\nla finalización de sus servicios, así como los lugares donde trabajan y sus\nfunciones;\n(iv) los desembolsos a efectuar; y\n(v) el momento de implementación del plan;\nc) generó en terceros la expectativa válida de que la entidad llevará a cabo la\nreestructuración, mediante:\n(i) el comienzo de su implementación; o\n(ii) el anuncio de sus aspectos principales a las personas afectadas (por\nejemplo: clientes, proveedores, empleados o sindicatos); y\nd) prevé implementar el programa de reestructuración tan pronto como sea\nposible y lo completará en un lapso tal que haga improbable la introducción de\ncambios significativos al plan."}, {"num": 602, "texto": "Al reconocer un pasivo por reestructuración una entidad:\na) incluirá los costos directos que ella demande; y\nb) no computará:\n(i) los costos asociados con las actividades que se mantendrán (por ejemplo:\nlos que ocasionen la capacitación o la reubicación de los empleados que\ncontinuarán prestando servicios, los de comercialización o publicidad o las\ninversiones en nuevos sistemas informáticos y redes de distribución); y\n(ii) la ganancia esperada por la desafectación de activos que la\nreestructuración producirá."}, {"num": 603, "texto": "Una entidad verificará el valor recuperable correspondiente a los componentes que\nproyecta vender o dar de baja con motivo de la reestructuración y aplicar las normas\nreferidas a activos no corrientes mantenidos para la venta cuando tenga lugar el retiro\nde tales activos [ver los párrafos 416 a 434].\n\nOtras normas aplicables"}, {"num": 604, "texto": "Para aplicar los requerimientos establecidos en esta sección, una entidad deberá\ncontemplar, en tanto resulten pertinentes y no contradigan lo establecido en esta\nsección, otras disposiciones de esta Resolución Técnica u otras normas contables.\nPor ejemplo, las referidas a:\na) “Medición de costos” [ver los párrafos 102 a 110].\nb) “Medición de valores corrientes” [ver los párrafos 117 a 122].\nc) “Mediciones en moneda extranjera” [ver los párrafos 124 a 128].\nd) “Expresión de los estados contables en moneda de cierre en un contexto de\ninflación (ajuste por inflación de los estados contables)” [ver los párrafos 176 a\n200].\ne) “Cuestiones referidas al estado de resultados” [ver los párrafos 628 a 641].\n\nCAPÍTULO 6\n\nNORMAS GENERALES SOBRE PRESENTACIÓN DE ESTADOS CONTABLES\n\nINTRODUCCIÓN AL PRESENTE CAPÍTULO"}]}]}, {"id": "cap6", "num": 6, "nombre": "Presentación de Estados Contables", "icono": "📄", "secciones": [{"id": "c6s0", "nombre": "Normas Generales de Presentación", "parrafos": [{"num": 605, "texto": "En este capítulo se describen los requerimientos generales para la presentación de\nlos estados contables de entidades con y sin fines de lucro."}, {"num": 606, "texto": "Una entidad deberá presentar sus estados contables cumpliendo los requerimientos\nsobre presentación e información a revelar en notas establecidos en el presente\ncapítulo, en otras secciones de esta Resolución Técnica u otras normas contables.\n\nCUESTIONES REFERIDAS AL ESTADO DE SITUACIÓN PATRIMONIAL\n\nDefinición"}, {"num": 607, "texto": "A los fines de presentar el estado contable referido en esta sección, una entidad\ndeberá considerar la siguiente definición:\n\nEstado de situación patrimonial: estado contable mediante el cual una entidad\npresenta, a un momento determinado, sus activos, pasivos y patrimonio neto.\n\nEstructura"}, {"num": 608, "texto": "En el estado de situación patrimonial, una entidad incluirá los siguientes capítulos:\na) activo;\nb) pasivo; y\nc) patrimonio neto."}, {"num": 609, "texto": "En el estado de situación patrimonial, una entidad distinguirá, entre otros, los\nsiguientes rubros referidos al activo, clasificados como se indica en los párrafos 612\na 623:\na) Caja y bancos.\nb) Inversiones financieras.\nc) Cuentas por cobrar y derechos a facturar a clientes en moneda.\nd) Cuentas por cobrar a clientes en especie.\ne) Otras cuentas por cobrar en moneda.\nf) Otras cuentas por cobrar en especie.\ng) Bienes de cambio.\nh) Bienes de uso.\ni) Activos intangibles.\nj) Propiedades de inversión.\nk) Participaciones permanentes en otras entidades.\nl) Otras inversiones.\nm) Otros activos.\nn) Activo neto por impuesto diferido."}, {"num": 610, "texto": "En el estado de situación patrimonial, una entidad distinguirá los siguientes rubros\nreferidos al pasivo, clasificados como se indica en los párrafos 612 a 623:\na) Deudas con proveedores de bienes o servicios.\nb) Préstamos y otros pasivos financieros.\nc) Deudas fiscales.\nd) Deudas laborales y previsionales.\ne) Otras deudas.\nf) Pasivo neto por impuesto diferido.\ng) Previsiones."}, {"num": 611, "texto": "Una entidad expondrá, en el estado de situación patrimonial, el patrimonio neto en\nuna línea, y lo referenciará al estado de evolución del patrimonio neto.\n\nClasificación: selección de la base de presentación más relevante"}, {"num": 612, "texto": "Una entidad clasificará sus activos y pasivos como activos (pasivos) corrientes o\nactivos (pasivos) no corrientes, excepto por lo establecido en el párrafo siguiente."}, {"num": 613, "texto": "Cuando una presentación basada en el grado de liquidez (exigibilidad) proporcione\nuna información fiable que sea más relevante que la clasificación como corriente o no\ncorriente, una entidad:\na) Presentará:\n(i) todos los activos, ordenados de acuerdo con su liquidez (ascendente o\ndescendente); y\n(ii) todos los pasivos ordenados de acuerdo con:"}, {"num": 614, "texto": "Una entidad considerará que el tipo de presentación referido en el párrafo anterior es\npertinente si no suministra bienes ni presta servicios dentro de un plazo claramente\nidentificable. Normalmente es el caso de actividades tales como las desarrolladas por\nentidades financieras, fondos comunes de inversión o entidades aseguradoras."}, {"num": 615, "texto": "Cuando desarrolle actividades claramente diferenciadas (por ejemplo, fabricación de\nbienes o reventa de mercaderías y prestación de servicios financieros), una entidad\npodrá combinar:\na) una clasificación de partidas entre rubros corrientes y no corrientes para\nalgunas de ellas, según lo establecido en los párrafos 616 a 623; y\nb) una presentación de acuerdo con el grado de liquidez, según lo dispuesto en\nlos párrafos 613 a 614.\n\nClasificación de activos (pasivos) como corrientes o no corrientes"}, {"num": 616, "texto": "Cuando una entidad clasifique sus activos y pasivos como activos (pasivos)\ncorrientes, o activos (pasivos) no corrientes, lo hará en función a los criterios\nestablecidos en los párrafos 617 a 623."}, {"num": 617, "texto": "Una entidad clasificará un activo como corriente si representa efectivo de libre\ndisponibilidad o si espera que se convierta en efectivo o equivalentes en el plazo de\nun año, computado desde la fecha de los estados contables, o si ya lo son a esta\nfecha."}, {"num": 618, "texto": "En función a lo indicado en el párrafo anterior, se considerarán activos corrientes:\na) Los saldos de libre disponibilidad en caja y bancos a la fecha de los estados\ncontables.\nb) Otros activos cuya conversión en efectivo o equivalentes se estima que se\nproducirá dentro de los doce meses siguientes a la fecha de los estados\ncontables.\nc) Los bienes consumibles y derechos que evitarán salidas de efectivo o\nequivalentes en los doce meses siguientes a la fecha de los estados\ncontables, siempre que, por su naturaleza, no implicaron una futura\napropiación a activos inmovilizados.\nd) Los activos que por disposiciones contractuales o análogas deben destinarse\na cancelar pasivos corrientes."}, {"num": 619, "texto": "Los activos no corrientes comprenden a todos los que no puedan ser clasificados\ncomo corrientes, de acuerdo con lo indicado en el párrafo anterior."}, {"num": 620, "texto": "Una entidad clasificará un pasivo como corriente a los siguientes:\na) Los pasivos que son exigibles a la fecha de los estados contables.\nb) Los pasivos cuyo vencimiento o exigibilidad se producirá en los doce meses\nsiguientes a la fecha de los estados contables.\nc) Las previsiones que se estima convertir en obligaciones ciertas y exigibles cuyo\nvencimiento o exigibilidad se producirá en los doce meses siguientes a la fecha\nde los estados contables."}, {"num": 621, "texto": "Los pasivos no corrientes comprenden a todos los que no puedan ser clasificados\ncomo corrientes, de acuerdo con lo indicado en el párrafo anterior."}, {"num": 622, "texto": "Cuando un activo o un pasivo, en virtud de los períodos en los que habrá de\nproducirse su conversión en efectivo o equivalentes o su exigibilidad,\n\nrespectivamente, participa del carácter de corriente y no corriente, una entidad\nasignará sus respectivas porciones a cada grupo según corresponda."}, {"num": 623, "texto": "Además de lo indicado en los párrafos precedentes, a efecto de la clasificación de\nrubros como activos (pasivos) corrientes, o activos (pasivos) no corrientes, una\nentidad tendrá en cuenta lo siguiente:\na) La intención de los órganos de la entidad respecto de sus bienes, derechos u\nobligaciones.\nb) La información de índices de rotación, si no fuera posible una discriminación\nespecífica.\nc) La información adicional que pueda obtenerse hasta la fecha de aprobación de\nlos estados contables por parte de la dirección, que contribuya a clasificar\nlos rubros como activos (pasivos) corrientes, o activos (pasivos) no corrientes.\n\nPartidas de ajuste de la medición"}, {"num": 624, "texto": "Una entidad deducirá o adicionará, según corresponda, las partidas de ajuste de\nmedición de los rubros del activo y del pasivo (tales como depreciaciones o\namortizaciones acumuladas, componentes financieros explícitos o implícitos no\ndevengados, previsión para cuentas de cobro dudoso, etc.) directamente de las\ncuentas patrimoniales respectivas."}, {"num": 625, "texto": "Cuando las partidas de ajuste de la medición sean significativas, una entidad las\nidentificará en notas o en el cuerpo de los estados contables.\n\nCompensación de partidas"}, {"num": 626, "texto": "Una entidad expondrá las partidas relacionadas por su importe neto cuando:\na) su compensación futura sea legalmente admisible; y\nb) tenga la intención o la obligación de realizarla."}, {"num": 627, "texto": "Cuando las partidas compensadas sean significativas, una entidad identificará los\nimportes brutos compensados en las notas o en el cuerpo de los estados contables.\n\nCUESTIONES REFERIDAS AL ESTADO DE RESULTADOS\n\nDefinición"}]}, {"id": "c6s1", "nombre": "Estado de Resultados", "parrafos": [{"num": 628, "texto": "A los fines de presentar el estado contable referido en esta sección, una entidad\ndeberá considerar la siguiente definición:\n\nEstado de resultados: Es el estado contable que informa sobre las causas que\ngeneraron el resultado del período (ingresos, gastos, ganancias, pérdidas).\n\nPresentación de las partidas del resultado del período.\n\nCuestiones generales"}, {"num": 629, "texto": "Dentro de las partidas de resultados, una entidad distinguirá, entre otros, los\nsiguientes componentes:\na) los ingresos de actividades ordinarias [ver los párrafos 522 a 526];\ndistinguiendo entre:\n(i) los ingresos de actividades ordinarias procedentes de transacciones\n(operaciones de intercambio); y\n(ii) los otros ingresos de actividades ordinarias.\nb) el costo incurrido para obtener ingresos de actividades ordinarias;\nc) los resultados por medición de bienes de cambio al valor neto de realización;\nd) los gastos operativos, clasificados por función;\ne) los resultados de participaciones permanentes en otras entidades;\nf) otros ingresos y egresos;\ng) las pérdidas por desvalorización o la reversión de dichas pérdidas,\nclasificándolas en el cuerpo del estado o en notas de acuerdo con el activo\nque las originó;\nh) los resultados financieros y de tenencia (incluyendo el resultado por cambios\nen el poder adquisitivo de la moneda), de conformidad con lo establecido en\nlos párrafos 631 a634;\ni) el impuesto a las ganancias atribuible al resultado que corresponda a las\noperaciones que continúan; y\nj) el resultado de cualquier actividad discontinuada, neta del impuesto a las\nganancias atribuible a ella."}, {"num": 630, "texto": "Una entidad no presentará partida alguna como resultado extraordinario. No obstante,\nrevelará en notas la naturaleza y monto de aquellas partidas de resultados que son\ninusuales por su naturaleza, tamaño o incidencia.\n\nPresentación de reintegros, reembolsos y desgravaciones\n\n630A. Una entidad presentará en el cuerpo del estado los reintegros, reembolsos y\ndesgravaciones:\na) Si solo dependen de los ingresos de actividades ordinarias, adicionándolos\na ellos;\nb) Si dependen tanto de los ingresos de actividades ordinarias como de sus\ncostos:\n(i) Los imputará según su efecto sobre cada una de tales partidas, cuando\ndicha asignación sea posible.\n(ii) Los presentará por separado después del costo de lo vendido, formando\nparte del resultado bruto, cuando no resulta aplicable lo indicado en el\ninciso inmediato anterior.\nPresentación de los resultados financieros y de tenencia\n\nSelección de la política de presentación más relevante"}, {"num": 631, "texto": "Cuando ciertos resultados financieros y de tenencia se relacionan con los resultados\nde actividades ordinarias (por ejemplo, el resultado de tenencia de los bienes de\ncambio, o los intereses por financiación que forman parte de la estrategia de\nnegocios), una entidad podrá presentarlos fuera del acápite al que se refieren los\npárrafos 632 a 634 si con ello logra información más relevante.\n\nPresentación de ciertos resultados financieros y de tenencia en un acápite separado"}, {"num": 632, "texto": "Una entidad podrá presentar los resultados financieros y de tenencia (incluyendo el\nresultado por cambios en el poder adquisitivo de la moneda), distintos de los que se\npresentan de forma separada de conformidad con la presente Resolución Técnica u\notras normas contables:\na) en forma simplificada, exponiendo dichos resultados en una sola línea; o\nb) en forma más depurada, con mayor nivel de segregación."}, {"num": 633, "texto": "Cuando opte por exponer los resultados financieros y de tenencia de acuerdo con el\ninciso b) del párrafo anterior, una entidad podrá utilizar una o más de las modalidades\nindicadas a continuación:\na) Presentación por separado de las partidas generadas por activos y pasivos.\nb) Clasificación de los importes en función del rubro que generó el resultado.\nc) Presentación de cada componente por su naturaleza."}, {"num": 634, "texto": "Cuando la entidad aplique las normas sobre ajuste por inflación contenidas en la\nsección “Expresión de los estados contables en moneda de cierre en un contexto de\ninflación (ajuste por inflación de los estados contables)” [ver los párrafos 176 a 200] y\nutilice la presentación indicada en el inciso c) del párrafo anterior, seguirá alguno de\nlos siguientes criterios, de forma consistente con lo requerido en esa sección:\na) Presentación en términos reales, distinguiendo, entre otros:\n(i) intereses;\n(ii) diferencias de cambio;\n(iii) otros resultados financieros y de tenencia; y\n(iv) resultados por cambios en el poder adquisitivo de la moneda de las\npartidas monetarias que no generan los resultados referidos en los puntos\nprecedentes.\nb) Presentación de cada componente por el importe que surja de multiplicar el\nvalor nominal por el coeficiente correspondiente para expresarlos en moneda\nde cierre, distinguiendo, entre otros:\n(i) intereses;\n(ii) diferencias de cambio;\n(iii) otros resultados financieros; y\n(iv) resultados por cambios en el poder adquisitivo de la moneda.\n\nPresentación de resultados procedentes de actividades u operaciones discontinuadas (o\nen discontinuación)"}, {"num": 635, "texto": "A los efectos de la exposición de los resultados procedentes de actividades u\noperaciones discontinuadas (o en discontinuación), una entidad considerará que un\ncomponente cumple la condición de actividad u operación discontinuada (o en\ndescontinuación) cuando:\na) la entidad ha resuelto venderlo en conjunto o por partes, escindirlo o\nabandonarlo, sea totalmente o en una parte sustancial, según surge de:\n(i) un plan detallado, aprobado por el órgano administrador y anunciado al\npúblico, o\n(ii) hechos concretos, como la asunción de un compromiso de venta de la\ntotalidad de los activos del componente o de una parte sustancial de\nellos;\nb) constituye una línea separada de negocios o un área geográfica de\noperaciones; y\nc) puede ser distinguido tanto a los fines operativos como de preparación de\ninformación contable."}, {"num": 636, "texto": "Las siguientes actividades, por sí solas, no satisfacen el criterio establecido en el\ninciso a) del párrafo anterior:\na) La retirada gradual de una línea de productos o servicios.\nb) La paralización de la producción o venta de varios productos dentro de una\nlínea de actividad en marcha.\nc) Los cambios de un lugar a otro de las actividades de producción o\ncomercialización de una línea de actividad determinada.\nd) El cierre de instalaciones para mejorar la productividad.\ne) La venta de una sociedad controlada, cuyas actividades son similares a las de\nla controlante o a las de otras controladas.\n\n636A. Cuando una actividad cumpla los requisitos establecidos en el párrafo 635, una\nentidad presentará:\na) en el estado de resultados, un importe único con el resultado después de\nimpuestos de las operaciones discontinuadas; y\nb) en las notas, un desglose que incluya:\n(i) los ingresos de actividades ordinarias, los gastos, y el resultado antes\nde impuesto de las actividades discontinuadas;\n(ii) los resultados a los que se hace referencia en el inciso a) del párrafo 428,\no en el inciso a) del párrafo 429; y\n(iii) el gasto por impuesto a las ganancias correspondiente a los resultados\nreferidos en (i) y (ii).\n\n636B. A los fines comparativos, una entidad clasificará:\na) Como resultados procedentes de actividades discontinuadas o en\ndiscontinuación la información correspondiente tanto al período actual como al\nperíodo comparativo, cuando en un ejercicio determinado una actividad\nempieza a cumplir los requisitos para ser considerada como tal.\nb) Como resultados atribuibles a las actividades que continúan la información\ncorrespondiente tanto al período actual como al período comparativo, cuando\nen un ejercicio determinado una actividad deja de cumplir los requisitos para\nser considerada como discontinuada o en discontinuación."}, {"num": 637, "texto": "Con el objetivo de satisfacer el criterio del inciso b) del párrafo 635, una entidad:\na) Se basará en las diferentes líneas de productos o áreas geográficas que\ndistingue para el desarrollo y gestión de sus actividades.\nb) Podrá tomar como referencia un producto o línea de servicio que resulten\nsignificativos, si no distingue entre líneas de productos o áreas geográficas\npara el desarrollo y gestión de sus actividades."}, {"num": 638, "texto": "Un componente de una entidad puede ser distinguido a los fines operativos y para la\npreparación de la información contable, si sus activos y pasivos operativos, sus\nventas brutas y una mayoría de los gastos operativos, le puedan ser asignados\ndirectamente. Esta asignación directa es probable si los elementos atribuidos\ndesaparecieran cuando el componente en cuestión fuera vendido o desapropiado de\ncualquier forma."}, {"num": 639, "texto": "En general, el caso de descontinuación es un suceso relativamente infrecuente y es\nfactible que una entidad clasifique como reestructuraciones, de acuerdo con la\nsección “Restructuraciones” [ver los párrafos 601 a 603], cambios que no revele como\ndiscontinuación."}, {"num": 640, "texto": "A partir del período en que se adopta una decisión de discontinuar una operación y\nhasta el período en que se la completa o abandona, ambos inclusive, una entidad\nsuministrará información en notas sobre:\na) la descripción de la operación discontinuada o en discontinuación;\nb) [eliminado]:\nc) los hechos por los cuales se considera que la operación ha sido discontinuada\no está en discontinuación y las fechas de esos hechos;\nd) cuando fuere conocida o pudiere determinársela, la fecha o período en que\nse espera concluir con la discontinuación;\ne) los importes registrados (a la fecha de los estados contables) del total de\nactivos y del total de pasivos que se ha resuelto disponer o cancelar;\nf) en caso de existir activos cuya venta se ha comprometido, los importes\nregistrados para ellos a la fecha de los estados contables, su precio o rango\nde precios (menos costos de disposición) y el momento esperado del\ncorrespondiente flujo de fondos;\ng) las razones de los cambios en las estimaciones de importes y momentos de\nlos flujos de efectivo indicados en el inciso anterior, respecto de los\ninformados en estados contables anteriores;\nh) los importes que, dentro de los principales componentes del estado de flujo\nde efectivo corresponden a las operaciones discontinuadas o en\ndiscontinuación;\ni) en caso de abandono de un plan que en estados contables anteriores haya\nsido presentado como de discontinuación de una operación, dicho hecho y\nsus efectos."}, {"num": 641, "texto": "Una entidad también brindará esta información cuando la decisión de descontinuar\nuna operación se tome entre la fecha de los estados contables y la de su\naprobación por parte de la dirección. En caso de existir más de una operación\ndiscontinuada o en discontinuación, la entidad presentará la información indicada de\nforma separada para cada una de ellas.\n\nCUESTIONES REFERIDAS AL ESTADO DE EVOLUCIÓN DEL PATRIMONIO NETO\n\nDefinición"}]}, {"id": "c6s2", "nombre": "Evolución del Patrimonio Neto", "parrafos": [{"num": 642, "texto": "A los fines de presentar el estado contable referido en esta sección, una entidad\ndeberá considerar la siguiente definición:\n\nEstado de evolución del patrimonio neto: Estado contable mediante el cual una\nentidad informará la composición del patrimonio neto y las causas de los\ncambios ocurridos durante el período en las partidas que lo componen.\n\nEstructura"}, {"num": 643, "texto": "Una entidad clasificará las partidas integrantes del patrimonio neto de acuerdo con\nsu origen, diferenciando:\na) los aportes de los propietarios; y\nb) los resultados acumulados."}, {"num": 644, "texto": "Una entidad presentará los aportes de los propietarios discriminando sus\ncomponentes, tales como:\na) capital suscripto, a su valor nominal;\nb) el ajuste del capital;\nc) los aportes irrevocables; y\nd) las primas de emisión."}, {"num": 645, "texto": "Dentro de los resultados acumulados, una entidad expondrá en forma diferenciada:\na) los resultados del período acumulados, distinguiendo entre:\n(i) los resultados no asignados; y\n(ii) los resultados cuya distribución se encuentre restringida por normas\nlegales, contractuales o decisiones de la entidad (ganancias reservadas);\nb) los resultados diferidos acumulados."}, {"num": 646, "texto": "Para cada rubro integrante del patrimonio neto, una entidad presentará la siguiente\ninformación:\na) el saldo inicial del ejercicio actual, que debe coincidir con el saldo final del\nejercicio anterior (expresado en moneda de cierre correspondiente a la fecha\nde los estados contables);\nb) las variaciones procedentes de ajustes de períodos anteriores;\nc) las variaciones del período; y\nd) el saldo final del período.\n\n646A. A los efectos de presentar la información comparativa, una entidad podrá optar por\nexponer las cifras correspondientes al ejercicio anterior:\na) en forma detallada, con los datos correspondientes a todos los rubros del\npatrimonio neto; o\nb) en una sola columna, con los datos referidos al total del patrimonio neto.\n\nPresentación de las partidas de los resultados diferidos del período"}, {"num": 647, "texto": "Una entidad presentará, en el estado de evolución del patrimonio neto, las partidas\nde resultados diferidos del período según lo indicado a continuación:\na) clasificará dichas partidas por naturaleza (incluyendo la parte de los resultados\ndiferidos provenientes de asociadas y negocios conjuntos contabilizados\nmediante el valor patrimonial proporcional); y\nb) distinguirá, en el cuerpo del estado o en notas, las partidas que, según lo\nestablezca esta Resolución Técnica u otras normas contables:\n(i) no se reclasificarán posteriormente al resultado del período; y\n(ii) se reclasificarán posteriormente a resultados del período."}, {"num": 648, "texto": "Cuando reclasifique partidas reconocidas previamente como resultado diferido del\nperíodo, una entidad:\na) expondrá en esa sección los conceptos positivos y negativos de tales\nreclasificaciones o transferencias; y\nb) presentará la información de modo tal que permita a los usuarios identificar\npara cada componente de los resultados diferidos:\n(i) el importe bruto devengado en el período; y\n(ii) cualquier impuesto a las ganancias relacionado con dicho resultado.\n\nCUESTIONES REFERIDAS AL ESTADO DE FLUJOS DE EFECTIVO\n\nDefiniciones"}]}, {"id": "c6s3", "nombre": "Estado de Flujos de Efectivo", "parrafos": [{"num": 649, "texto": "A los fines de presentar el estado contable referido en esta sección, una entidad\ndeberá considerar las siguientes definiciones:\n\nActividades operativas: Son las principales actividades de la entidad que\nproducen ingresos y otras actividades no comprendidas en las actividades de\ninversión o de financiación.\n\nLas actividades operativas incluyen los pagos por compras (o cobros por ventas)\nde acciones o títulos de deuda destinados a negociación habitual.\n\nActividades de inversión: Corresponden a los movimientos de efectivo y sus\nequivalentes resultantes de la adquisición y enajenación de activos realizables a\nlargo plazo y de otras inversiones que no son equivalentes de efectivo, excepto\nlas mantenidas con fines de negociación habitual.\n\nActividades de financiación: Corresponden a los movimientos de efectivo y sus\nequivalentes resultantes de transacciones con los propietarios en su carácter de\ntales y con los proveedores de recursos financieros externos (tales como\npréstamos y obligaciones negociables).\n\nEstado de flujos de efectivo: Es el estado contable mediante el cual una entidad\ninformará sobre:\na) las variaciones del efectivo y de los equivalentes de efectivo; y\nb) las causas de dichas variaciones.\n\nEfectivo: Este concepto:\na) Incluye saldos en caja, bancos, depósitos a la vista y similares.\nb) Excluye efectivo con restricciones de uso (por ejemplo, saldos en cuentas\nbancarias embargadas).\n\nEquivalentes de efectivo: Son activos que se mantienen con el fin de cumplir\ncompromisos de corto plazo antes que con fines de inversión u otros propósitos.\n\nPara que una inversión pueda ser considerada un equivalente de efectivo debe:\na) caracterizarse por su alta liquidez;\nb) ser fácilmente convertible en importes conocidos de efectivo; y\nc) estar sujeta a riesgos insignificantes de cambios de valor, por ejemplo,\nporque:\n(i) el importe que se espera recibir en el rescate puede conocerse con\nrazonable aproximación; y\n(ii) la inversión se caracteriza por su baja o nula volatilidad.\n\nUna inversión solo podrá considerarse como equivalente de efectivo cuando\ntenga un plazo corto de vencimiento (ejemplo: tres meses o menos desde su\nfecha de adquisición o colocación).\n\nEstructura\n\nVariación del efectivo y sus equivalentes"}, {"num": 650, "texto": "Una entidad expondrá:\na) el saldo inicial del efectivo y sus equivalentes;\nb) la variación neta acaecida en el efectivo y sus equivalentes durante el período;\ny\nc) el saldo al cierre del efectivo y sus equivalentes.\nCausas de la variación del efectivo y sus equivalentes"}, {"num": 651, "texto": "Una entidad expondrá las causas de variación del efectivo y sus equivalentes por\nseparado para:\na) los flujos de efectivo de las actividades operativas;\nb) los flujos de efectivo de actividades de inversión;\nc) los flujos de efectivo de actividades de financiación; y\nd) cuando opte por su presentación separada, los resultados financieros y de\ntenencia generados por el efectivo y sus equivalentes, de acuerdo con lo\nrequerido por los párrafos 659 a 661.\n\nFlujos de efectivo y equivalentes provenientes de actividades operativas"}, {"num": 652, "texto": "Una entidad podrá exponer el efecto de las actividades operativas por:\na) el método directo; o\nb) el método indirecto."}, {"num": 653, "texto": "Cuando utilice el método directo, una entidad expondrá las principales clases de\nentradas y salidas brutas de efectivo y sus equivalentes. Por ejemplo:\na) Cobro a clientes procedentes de ventas, prestaciones de servicios u otros\ningresos de actividades ordinarias.\nb) Pago a proveedores de bienes y servicios.\nc) Pago de sueldos, aportes y contribuciones a los siste
