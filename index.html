 patrimonio neto consolidado la diferencia entre\nel importe por el que se ajusten las participaciones no controladoras y el valor\nrazonable de la contraprestación pagada o recibida y atribuida a los\npropietarios de la controladora.\n\nPresentación de las participaciones no controladoras"}, {"num": 805, "texto": "Una entidad controladora presentará:\na) El total del patrimonio neto, desagregando su importe entre la porción\ncorrespondiente a:\n(i) los propietarios de la controladora; y\n(ii) las participaciones no controladoras.\nb) El resultado del ejercicio, desagregando su importe entre la porción\ncorrespondiente a:\n(i) los propietarios de la controladora; y\n(ii) las participaciones no controladoras.\n\nRevelación en notas"}, {"num": 806, "texto": "Una entidad controladora revelará, en sus estados contables consolidados, la\nsiguiente información:\na) los juicios y supuestos significativos realizados (y cambios en esos juicios y\nsupuestos) para determinar si tiene control (o no) sobre otra entidad;\nb) la composición del grupo, incluyendo, de corresponder, la participación\nmantenida por la entidad controladora en el capital de una controlada\n(subsidiara);\nc) la naturaleza y alcance de restricciones significativas sobre su capacidad para\nacceder o utilizar activos, y liquidar pasivos, del grupo;\nd) la naturaleza de los riesgos asociados con su participación en entidades a la\nque controla en virtud de derechos distintos de los de voto;\ne) las consecuencias de cambios en su participación en la propiedad de una\ncontrolada (subsidiaria) que no dan lugar a una pérdida del control; y\nf) las consecuencias de la pérdida de control de una controlada (subsidiaria)\ndurante el periodo actual.\n\nCAPÍTULO 8\n\nRECONOCIMIENTO Y MEDICIÓN DE PARTIDAS PARTICULARES\n\nINTRODUCCIÓN AL PRESENTE CAPÍTULO"}]}]}, {"id": "cap8", "num": 8, "nombre": "Partidas Particulares", "icono": "🔢", "secciones": [{"id": "c8s1", "nombre": "Participaciones Permanentes", "parrafos": [{"num": 807, "texto": "En este capítulo se describen:\na) Los criterios que una entidad utilizará para:\n(i) Identificar si es parte de un negocio conjunto.\n(ii) Clasificar a un negocio conjunto como negocio conjunto no societario, o\nnegocio conjunto societario, y su tratamiento contable para cada caso.\nb) Las participaciones en otras entidades que:\n(i) la entidad medirá utilizando el método del valor patrimonial\nproporcional; y\n(ii) el procedimiento para aplicar el método del valor patrimonial\nproporcional.\nc) Los criterios para reconocer y medir beneficios a los empleados posteriores a\nla terminación de la relación laboral y otros beneficios a largo plazo.\n\nNEGOCIOS CONJUNTOS\n\nObjetivo"}, {"num": 808, "texto": "El objetivo de esta sección es prescribir los criterios que una entidad empleará para\nidentificar si es parte de un negocio conjunto y su tratamiento contable."}, {"num": 809, "texto": "Los requerimientos establecidos en esta sección:\na) Resultan de aplicación a:\n(i) Los estados contables consolidados o a los estados contables\nseparados, si la entidad es una controladora.\n(ii) Los estados contables individuales de una entidad que no es una\ncontroladora.\nb) No resultan de aplicación para la preparación de los estados contables del\npropio negocio conjunto. Un negocio conjunto preparará sus estados\ncontables según lo dispuesto en esta Resolución Técnica en general u otras\nnormas contables, y, además, cuando sea no societario, tendrá en cuenta lo\nestablecido en el capítulo “Estados contables de negocios conjuntos no\nsocietarios: cuestiones específicas” [ver los párrafos 1042 a 1045]"}, {"num": 810, "texto": "Para cumplir su objetivo, en esta sección se establecen:\na) Los requerimientos para identificar si una entidad es parte de un negocio\nconjunto [ver los párrafos 812 a 815].\nb) Las bases para clasificar un negocio conjunto [ver el párrafo 816] como:\n(i) negocio conjunto no societario; o\n(ii) negocio conjunto societario.\nc) La forma de reconocer, medir y revelar un negocio conjunto, de conformidad\ncon su clasificación [ver los párrafos 817 a 823].\n\nDefiniciones"}, {"num": 811, "texto": "A los fines de aplicar esta sección, una entidad deberá considerar las siguientes\ndefiniciones:\nConsentimiento unánime: Existe cuando cualquier parte que tiene el control\nconjunto de un negocio puede impedir que otra u otras partes tomen decisiones\nsin su consentimiento.\n\nControl conjunto: Reparto del control contractualmente decidido de un negocio\nconjunto, que existe sólo cuando las decisiones sobre las actividades relevantes\nrequieren el consentimiento unánime de las partes que comparten el control.\n\nControladora conjunta: Parte de un negocio conjunto, societario o no societario,\nque tiene control conjunto sobre éste.\n\nNegocio conjunto: Acuerdo por el cual dos o más partes tienen control conjunto.\nEl acuerdo se puede instrumentar a través de:\na) un contrato asociativo; o\nb) una sociedad u otra forma asociativa con personalidad jurídica.\n\nNegocio conjunto no societario: Negocio conjunto mediante el cual las partes que\nasumen control conjunto del negocio conjunto tienen, en caso de finalización del\nnegocio, derecho a determinados activos y obligación respecto de determinados\npasivos, relacionados con el negocio.\n\nNegocio conjunto societario: Negocio conjunto mediante el cual las partes que\nasumen el control conjunto del negocio tienen derecho, en caso de finalización\ndel negocio, sobre sus activos menos sus pasivos (activos netos).\n\nParte de un negocio conjunto: Entidad que participa de un negocio conjunto\ntenga o no control conjunto sobre dicho negocio.\n\nLas siguientes expresiones deberán emplearse tal como son definidas en los\npárrafos 765 u 827:\n• Actividades relevantes.\n• Control (sobre otra entidad).\n• Controlada (subsidiaria).\n• Decisiones sobre actividades relevantes.\n• Entidad.\n• Entidad controladora.\n• Grupo económico.\n• Método del valor patrimonial proporcional.\n• Participada.\n\nIdentificación de un negocio conjunto"}, {"num": 812, "texto": "Un negocio conjunto tiene las siguientes características:\na) las partes están obligadas por un acuerdo contractual que da lugar a entidades\ncon personalidad jurídica (acuerdo societario) o sin personalidad jurídica\n(acuerdo no societario); y\nb) el acuerdo contractual otorga a dos o más partes el control conjunto sobre el\nacuerdo."}, {"num": 813, "texto": "Un acuerdo contractual otorga a dos o más partes el control conjunto cuando:\na) esas partes deben actuar conjuntamente para dirigir las actividades que afectan\nde forma significativa a los rendimientos del acuerdo (es decir, las actividades\nrelevantes); y\nb) las decisiones sobre las actividades relevantes requieren del consentimiento\nunánime de las partes identificadas en el inciso inmediato anterior."}, {"num": 814, "texto": "Los acuerdos contractuales, societarios o no societarios, pueden ponerse de\nmanifiesto de diversas formas. Por ejemplo:\na) Uniones transitorias de empresas.\nb) Consorcios de cooperación.\nc) Agrupaciones de colaboración.\nd) Sociedades u otras figuras con personalidad jurídica."}, {"num": 815, "texto": "Para evaluar si tiene el control conjunto de un negocio, una entidad que es parte de\nun negocio podría tener que recurrir al juicio de la dirección para completar la\nevaluación indicada en los párrafos 812 a 814.\n\nClasificación de un negocio conjunto"}, {"num": 816, "texto": "Una entidad:\na) Clasificará un negocio conjunto, utilizando las definiciones descriptas en el\npárrafo 811.\nb) Aplicará, cuando la instrumentación jurídica no refleje la sustancia económica, el\njuicio de la dirección para determinar si un negocio conjunto es:\n(i) un negocio conjunto no societario; o\n(ii) un negocio conjunto societario.\n\nContabilización de un negocio conjunto\n\nNegocios conjuntos no societarios\n\nTratamiento en los estados contables de una controladora conjunta\n\nReconocimiento"}, {"num": 817, "texto": "En sus estados contables una controladora conjunta reconocerá:\na) sus activos, incluyendo su participación en los activos mantenidos conjuntamente;\nb) sus pasivos, incluyendo su participación en los pasivos incurridos conjuntamente;\nc) sus ingresos, incluyendo su participación en los ingresos generados\nconjuntamente; y\nd) sus gastos, incluyendo su participación en los gastos incurridos conjuntamente.\n\nMedición"}, {"num": 818, "texto": "Una controladora conjunta medirá los activos y pasivos referidos en el párrafo\nanterior:\na) Por el importe contable determinado como si no existiera el negocio conjunto, si\nconserva el control de los activos y la obligación por los pasivos.\nb) Multiplicando el porcentaje de su participación por el importe de los activos\nmantenidos y pasivos incurridos conjuntamente, determinado según lo establecido\nen esta Resolución Técnica u otras normas contables.\n\nTratamiento en los estados contables de una parte que no es controladora conjunta"}, {"num": 819, "texto": "Cuando es parte de un negocio conjunto no societario, pero no tiene control conjunto\nsobre este, una entidad reconocerá y medirá su participación en el negocio:\na) Según los párrafos 817 y 818 si esa parte tiene derecho a activos determinados\ny obligación respecto de pasivos determinados, relativos al negocio conjunto no\nsocietario.\nb) De acuerdo con las normas aplicables a esa participación, contenidas en la\npresente Resolución Técnica u otras normas contables, en los restantes casos.\n\nTratamiento de negocios conjuntos no societarios que son una entidad del exterior"}, {"num": 820, "texto": "Antes de aplicar lo descripto en los párrafos 817 y 818, una entidad convertirá la\ninformación contable de un negocio conjunto no societario que sea una entidad del\nexterior, de acuerdo con el párrafo 753, a la moneda argentina según lo establecido\nen la sección “Conversión de estados contables” [ver los párrafos 752 al 763].\n\nNegocios conjuntos societarios"}, {"num": 821, "texto": "Una controladora conjunta contabilizará su participación en un negocio conjunto\nsocietario de acuerdo con lo establecido en la sección “Participaciones en\nsubsidiarias, asociadas y negocios conjuntos societarios” [ver los párrafos 824 a 871]."}, {"num": 822, "texto": "Una entidad que es parte de un negocio conjunto societario, pero no tiene el control\nconjunto, contabilizará su participación según lo establecido en:\na) la sección “Participaciones en subsidiarias, asociadas y negocios conjuntos\nsocietarios” [ver los párrafos 824 a 871] de la presente Resolución Técnica, si\ntiene influencia significativa; o\nb) la sección “Inversiones Financieras” [ver los párrafos 212 a 235], en los demás\ncasos.\n\nRevelación en notas"}, {"num": 823, "texto": "Una entidad que es parte de un negocio conjunto revelará la siguiente información:\na) La naturaleza, alcance y efectos financieros de sus participaciones en negocios\nconjuntos, incluyendo la naturaleza y efectos de su relación contractual con las\notras partes con control conjunto.\nb) Para cada negocio conjunto significativo:\n(i) El nombre del negocio conjunto.\n(ii) La naturaleza de la relación de la entidad con el negocio conjunto.\n(iii) El domicilio principal donde el negocio conjunto desarrolla sus actividades\n(y país donde está constituido, si fuera diferente del domicilio principal).\n(iv) La proporción de participación en la propiedad, o la parte con que participa,\nmantenida por la entidad y, si fuera diferente, la proporción de derechos\nde voto mantenida.\nc) La naturaleza y alcance de restricciones significativas sobre su capacidad para\nacceder o utilizar activos y liquidar pasivos del negocio conjunto.\nd) La naturaleza de los riesgos asociados con su participación en negocios\nconjuntos.\n\nPARTICIPACIONES EN SUBSIDIARIAS, ASOCIADAS Y NEGOCIOS CONJUNTOS\nSOCIETARIOS\n\nObjetivo"}, {"num": 824, "texto": "El objetivo de esta sección es establecer las reglas de reconocimiento, medición, baja\nen cuentas, comparación con el valor recuperable, presentación en los estados\ncontables e información a revelar en notas:\na) para las participaciones en subsidiarias, en los estados contables separados\nde una entidad controladora; y\nb) para las participaciones en asociadas y en negocios conjuntos societarios,\ntanto en los estados contables separados como en los estados contables\nconsolidados de una entidad controladora, o en los estados contables\nindividuales de una entidad emisora de estados contables que no es\ncontroladora."}, {"num": 825, "texto": "La sección “Preparación de estados contables consolidados” [ver los párrafos 764 a\n806] prescribe las reglas para el tratamiento de las subsidiarias en los estados\ncontables consolidados de una entidad controladora."}, {"num": 826, "texto": "La sección “Negocios conjuntos” [ver los párrafos 808 a 823] prescribe las reglas para:\na) identificar un negocio conjunto;\nb) clasificarlo; y\nc) contabilizarlo de acuerdo con su clasificación.\n\nDefiniciones"}, {"num": 827, "texto": "A los fines del tratamiento de los activos referidos en esta sección, una entidad deberá\nconsiderar las siguientes definiciones:\n\nAsociada: Entidad sobre la que el inversor tiene una influencia significativa.\n\nInversor: Entidad propietaria de las inversiones en subsidiarias, asociadas o\nnegocios conjuntos societarios.\n\nInfluencia significativa: Poder de intervenir en las decisiones de política financiera\ny de operación de la participada, sin llegar a tener el control ni el control conjunto\nde esta.\n\nMétodo del valor patrimonial proporcional: Método de contabilización según el\ncual:\na) el inversor mide inicialmente la participación a su costo de adquisición; y\nb) modifica posteriormente el costo de adquisición para reconocer la parte\nque le corresponde en los cambios en el patrimonio neto de la participada\ndespués de la fecha de adquisición.\n\nAdemás, las siguientes expresiones deberán emplearse tal como son definidas\nen los párrafos 765 u 811, según corresponda:\n• Control.\n• Control conjunto.\n• Controlada (subsidiaria).\n• Controladora conjunta.\n• Entidad.\n• Entidad controladora.\n• Grupo económico.\n• Negocio conjunto.\n• Participada.\n\nAlcance"}, {"num": 828, "texto": "Una entidad aplicará esta sección a las participaciones en:\na) subsidiarias controladas de forma directa, al preparar sus estados contables\nseparados; y\nb) asociadas o negocios conjuntos societarios, para preparar:\n\n(I) tanto sus estados contables separados como sus estados contables\nconsolidados, cuando se trate de una entidad controladora; o\n\n(II) sus estados contables individuales, en los restantes casos."}, {"num": 829, "texto": "Sin perjuicio de lo indicado en el párrafo anterior, cuando una entidad adquiere y\nmantiene una participación en otra entidad con la intención de venderla o disponer de\nella dentro de un año desde la fecha de adquisición:\na) no aplicará los requerimientos de esta sección; y\nb) contabilizará esta inversión de acuerdo con los requerimientos de la sección\n“Inversiones Financieras” [ver los párrafos 212 a 235]."}, {"num": 830, "texto": "Una entidad podrá extender el plazo de venta o disposición de un año mencionado\nen el párrafo anterior si a la fecha de adquisición existieran circunstancias fuera del\ncontrol del inversor, que probablemente demanden mayor tiempo para la concreción\nde la venta o disposición (por ejemplo, debido a la existencia de obligaciones\ncontractuales con partes no relacionadas o disposiciones legales o reglamentarias).\n\nReconocimiento"}, {"num": 831, "texto": "Una entidad reconocerá una inversión en una subsidiaria directa en sus estados\ncontables separados desde la fecha de adquisición. En la sección “Preparación\nde estados contables consolidados” [ver los párrafos 764 a 806] se describen la\ndefinición de control (sobre otra entidad) y cómo aplicar tal definición."}, {"num": 832, "texto": "Una entidad reconocerá una inversión en un negocio conjunto societario desde la\nfecha de adquisición. En la sección “Negocios conjuntos” [ver los párrafos 808 a\n823] se describe la definición de control conjunto, a efectos de evaluar si la entidad\nes controladora conjunta en un negocio conjunto societario."}, {"num": 833, "texto": "Una entidad reconocerá una inversión en una asociada desde la fecha en la que tiene\ninfluencia significativa sobre ella.\n\nInfluencia significativa"}, {"num": 834, "texto": "Se presume que una entidad tiene influencia significativa si posee, directa o\nindirectamente (por ejemplo, a través de subsidiarias), el 20 por ciento o más del\npoder de voto de la participada, sin llegar a tener el control ni el control conjunto, a\nmenos que pueda demostrarse claramente que tal influencia no existe. A la inversa,\nse presume que la entidad no tiene influencia significativa si posee, directa o\nindirectamente (por ejemplo, a través de subsidiarias), menos del 20 por ciento del\npoder de voto de la participada, a menos que pueda demostrarse claramente que\nexiste tal influencia. La existencia de un inversor que posea una participación que le\notorgue control no impide necesariamente que otro inversor tenga influencia\nsignificativa."}, {"num": 835, "texto": "Aunque ninguna de las circunstancias sea concluyente ni la lista referida a\ncontinuación resulte taxativa, la influencia significativa de una entidad sobre otra\npuede ponerse de manifiesto a través de:\na) la representación en el órgano de administración de la entidad participada;\nb) la participación en los procesos de fijación de políticas, entre los que se incluyen\nlas participaciones en las decisiones sobre dividendos y otras distribuciones;\nc) la existencia de transacciones de importancia relativa entre la entidad y la\nparticipada;\nd) el intercambio de personal directivo; o\ne) el suministro de información técnica esencial."}, {"num": 836, "texto": "Cuando evalúe si tiene influencia significativa, una entidad tendrá en cuenta la\nexistencia y los efectos de los derechos de voto potenciales que sean, en ese\nmomento, ejercitables o convertibles, incluyendo los derechos de voto potenciales\nposeídos por otras entidades."}, {"num": 837, "texto": "Al evaluar si los derechos de voto potenciales contribuyen a la existencia de influencia\nsignificativa, una entidad examinará todos los hechos y circunstancias (incluyendo las\ncondiciones de ejercicio de tales derechos potenciales de voto y cualesquiera otros\nacuerdos contractuales, considerados aislada o conjuntamente) que afecten a los\nmismos, salvo la intención de la dirección y la capacidad financiera de ejercer o\nconvertir dichos derechos potenciales."}, {"num": 838, "texto": "Una entidad perderá la influencia significativa sobre la participada cuando carezca del\npoder de intervenir en las decisiones de política financiera y de operación de ésta. La\npérdida de influencia significativa puede tener lugar con o sin un cambio en los niveles\nabsolutos o relativos de propiedad. Podría ocurrir, por ejemplo,\na) cuando una asociada quedase sujeta al control de una administración pública,\ntribunal, administrador o regulador; o\nb) como resultado de un acuerdo contractual.\n\nAplicación del método del valor patrimonial proporcional\n\nMedición inicial"}, {"num": 839, "texto": "Una entidad medirá inicialmente las participaciones en subsidiarias en los estados\ncontables separados, las inversiones en negocios conjuntos societarios y las\ninversiones en asociadas, a su costo de adquisición, de acuerdo con lo establecido\nen los párrafos 840 a 848.\n\nDeterminación del costo de adquisición\n\nCaso general"}, {"num": 840, "texto": "Para determinar el costo de adquisición de una inversión dentro del alcance de esta\nsección, una entidad computará los siguientes conceptos:\na) los activos entregados, a sus valores razonables;\nb) los pasivos asumidos, a su valor descontado;\nc) las acciones que emita:\n(i) Al valor calculado en función a la participación que dichas acciones\notorguen en el neto de las mediciones asignadas a los activos y pasivos\nde la adquirida en la fecha de adquisición, si es pequeña o mediana.\n(ii) A su valor razonable, en los restantes casos.\nd) los ajustes al precio de adquisición que dependan de la concreción de uno o\nmás hechos futuros, por su valor razonable, excepto que se trate de una\nentidad pequeña o mediana; y\ne) el importe de los activos y pagos monetarios que la entidad adquirente deba\nentregar o efectuar por costos directos relacionados con la adquisición (emisión\ny registro de acciones, honorarios profesionales, etc.)."}, {"num": 841, "texto": "Si el valor razonable de los activos referidos en el inciso a) del párrafo anterior difiere\ndel importe en libros de dichos activos, un inversor computará cualquier diferencia\nentre ambos en el resultado del período.\n\nCaso particular"}, {"num": 842, "texto": "Una entidad podría estar obligada a utilizar el método del valor patrimonial\nproporcional para medir una inversión preexistente que no reunía, hasta ese\nmomento, los requisitos para aplicar tal método. Dicha situación podría ser una\nconsecuencia, entre otras causas, de:\na) Una nueva adquisición u otro evento que aumente su porcentaje de participación\nhasta un punto tal que deba medir toda la inversión en función del método del\nvalor patrimonial proporcional.\nb) Otros hechos (tales como acuerdos entre partes) que la obliguen a aplicar el\nmétodo del valor patrimonial proporcional, aunque no modifique su porcentaje\nde participación."}, {"num": 843, "texto": "Cuando se produzcan las circunstancias referidas en el párrafo anterior, un inversor\ndeterminará el costo atribuido del total de la inversión resultante computando:\na) los conceptos referidos en los párrafos 840 y 841; y\nb) el costo atribuido de la inversión preexistente, determinado de acuerdo con el\npárrafo siguiente."}, {"num": 844, "texto": "A los fines de aplicar lo dispuesto en el inciso b) del párrafo anterior, un inversor:\na) medirá el costo atribuido:\n(i) al valor de la participación que dichas acciones otorguen en el neto de las\nmediciones asignadas a los activos y pasivos de la adquirida en la fecha\nde adquisición, si es pequeña o mediana; o\n(ii) a su valor razonable, en los restantes casos; y\nb) reconocerá en el resultado del período cualquier pérdida o ganancia\nresultante de comparar la medición de la inversión determinada según lo\nestablecido en el párrafo 843 y el importe en libros de dicha inversión antes del\ncambio de circunstancias.\n\nSeparación del costo de adquisición"}, {"num": 845, "texto": "En el momento de la adquisición de la inversión, un inversor segregará el costo de la\nadquisición en los siguientes componentes:\na) La proporción sobre el valor de libros del patrimonio neto de la participada.\nb) La proporción sobre la diferencia entre los valores razonables y los valores de\nlibros de los activos identificables y los pasivos asumidos de la participada.\nc) La proporción sobre los activos y pasivos por impuestos diferidos, de acuerdo\ncon los requerimientos de la sección “Contabilización del Impuesto a las\nGanancias” [ver los párrafos 571 a 600]."}, {"num": 846, "texto": "Si el costo de adquisición es superior a la suma de los valores mencionadas en el\npárrafo anterior, un inversor segregará tal excedente como llave de negocio implícita,\nla cual formará parte del valor de la inversión."}, {"num": 847, "texto": "Si el costo de adquisición es inferior a la suma de mencionados en el párrafo 845,\nuna entidad que adquiere la inversión:\na) identificará y medirá nuevamente los activos y pasivos de la participada;\nb) volverá a medir el costo de adquisición; y\nc) reconocerá inmediatamente en el resultado del período, cualquier diferencia que\nresulte de la nueva evaluación.\n\nTratamiento durante el período de medición"}, {"num": 848, "texto": "Si la determinación y la segregación inicial del costo de adquisición, conforme al\npárrafo 845, está incompleta al final del período durante el cual la adquisición de la\ninversión tuvo lugar, una entidad adquirente:\na) A la fecha de los estados contables, reconocerá el importe provisional del\ncosto de adquisición y de cada uno de sus componentes, que serán\nsegregados, conforme al párrafo 845.\nb) En el período de medición:\n\n(I) ajustará los importes provisionales referidos en el inciso anterior para\nreflejar la nueva información obtenida sobre hechos y circunstancias que\nexistían a la fecha de adquisición de la inversión y que, si los hubiese\nconocido, habrían afectado la medición de los importes reconocidos en\nesa fecha;\n\n(II) segregará el valor patrimonial proporcional sobre activos y pasivos\nadicionales, si obtiene nueva información sobre hechos y circunstancias\nque existían a la fecha de adquisición de la inversión y que, si los hubiese\nconocido, habrían resultado en el reconocimiento de esos activos y\npasivos a esa fecha, en la proporción correspondiente a la entidad que\nadquiere la inversión; y\n\n(III) corregirá, como consecuencia de las tareas especificadas en los incisos\nanteriores, la medición contable asignada inicialmente a la llave de\nnegocios implícita o el resultado determinado según el párrafo 847, según\ncorresponda.\nc) Con posterioridad al período de medición, reconocerá, si correspondiera,\najustes a la contabilización inicial del costo de adquisición y de cada uno de\nlos componentes de este que deben ser segregados conforme los párrafos\nanteriores pertinentes de esta sección, únicamente para corregir errores u\nomisiones de períodos anteriores de acuerdo con lo establecido en esta\nResolución Técnica.\n\nMedición posterior"}, {"num": 849, "texto": "Una entidad medirá sus inversiones en subsidiarias, negocios conjuntos societarios o\nasociadas, modificando el costo de adquisición determinado conforme a los\npárrafos anteriores, por las siguientes causas:\na) Proporción que le corresponde en los resultados obtenidos por la participada\ndespués de la fecha de adquisición de la inversión, con contrapartida en el\nresultado del período.\nb) Proporción que le corresponde en los resultados diferidos obtenidos por la\nparticipada después de la fecha de adquisición de la inversión, con\ncontrapartida en el resultado diferido del período.\nc) Proporción que le corresponde en las distribuciones de ganancias acumuladas\ndecididas por la participada (que no sean dividendos en acciones).\nd) Proporción que le corresponde sobre cualquier otra variación cuantitativa del\nvalor de libros del patrimonio neto de la participada después de la fecha de\nadquisición de la inversión, diferentes a los enumerados en los incisos\nanteriores (ejemplos de los conceptos excluidos son los aportes o retiros de\ncapital del inversor en la participada).\ne) Proporción que le corresponde en la variación de los importes mencionados en\nlos incisos a) b) y c) del párrafo 845, posteriores a la fecha de adquisición de\nla inversión (por ejemplo, un inversor reconocerá la proporción que le\ncorresponda sobre la depreciación adicional sobre la diferencia entre el valor\nrazonable y el valor de libros de los bienes de uso adquiridos como parte del\npatrimonio neto de la participada).\nf) La amortización de la llave de negocio implícita, reconocida por aplicación del\npárrafo 846, si de acuerdo con los párrafos 986 y 987 concluye que es de vida\nútil definida."}, {"num": 850, "texto": "Una entidad determinará las proporciones del resultado y otros cambios en el\npatrimonio neto que le sean atribuibles sobre la base de las participaciones\nexistentes en la propiedad y no reflejarán el posible ejercicio o conversión de las\nopciones o instrumentos convertibles."}, {"num": 851, "texto": "Cuando el patrimonio neto de la participada estuviera integrado por aportes\nirrevocables a cuenta de futuras suscripciones de acciones, una entidad inversora\ntendrá en cuenta los efectos que las condiciones establecidas para su conversión en\nacciones podrían tener para el cálculo del valor patrimonial proporcional."}, {"num": 852, "texto": "Una entidad calculará el valor patrimonial proporcional:\na) en función de estados contables de las subsidiarias, negocios conjuntos y\nasociadas preparados a la fecha de los estados contables del inversor y\nabarcando igual período de tiempo. No es necesario que se trate de estados\ncontables de cierre de ejercicio, pudiendo prepararse estados contables\nespeciales a efectos del cálculo del valor patrimonial proporcional, o\nb) en función de los estados contables de la subsidiaria, negocio conjunto\nsocietario o asociadas a la fecha de los estados contables de tales entidades\ncuando\n(i) la diferencia entre ambos cierres no supere los tres meses; y\n(ii) la fecha de los estados contables de la participada sea anterior a la del\ninversor."}, {"num": 853, "texto": "En el caso descripto en el inciso b) del párrafo anterior, una entidad registrará ajustes\npara reflejar los efectos de:\na) las transacciones o eventos significativos para el inversor; y\nb) las transacciones entre el inversor y la participada, que modificaron el\npatrimonio neto de ésta última entre la fecha de los estados contables de la\nparticipada, y la del inversor."}, {"num": 854, "texto": "Con el propósito de computar estos ajustes, un inversor podrá utilizar como fuente de\ninformación informes económico-financieros emitidos por la dirección de la\nparticipada para el control de su gestión. En ningún caso registrará importes basados\nen cifras presupuestadas o pronosticadas."}, {"num": 855, "texto": "En su caso, una entidad considerará los cambios en el poder adquisitivo de la\nmoneda argentina, de acuerdo con lo previsto en la sección “Expresión de los\nestados contables en moneda de cierre en un contexto de inflación (ajuste por\ninflación de los estados contables)” [ver los párrafos 176 a 200]."}, {"num": 856, "texto": "Para calcular el valor patrimonial proporcional, una entidad convertirá los estados\ncontables de una entidad del exterior a moneda argentina, mediante la aplicación\nde las normas de la sección “Conversión de estados contables” [ver los párrafos 752\nal 763]."}, {"num": 857, "texto": "Los estados contables de las otras entidades, utilizados para el cálculo del valor\npatrimonial proporcional deben ser preparados, aplicando:\na) las mismas normas contables, cuando la participada sea una subsidiaria o un\nnegocio conjunto societario; o\nb) normas contables vigentes, cuando la participada sea una asociada."}, {"num": 858, "texto": "En caso de que existieran errores contables significativos en los estados contables\nde las subsidiarias, negocios conjuntos societarios o asociadas, utilizados para el\ncálculo del valor patrimonial proporcional, un inversor deberá ajustarlos\npreviamente."}, {"num": 859, "texto": "Antes de calcular el valor patrimonial proporcional, una entidad:\na) Eliminará del patrimonio neto de la participada las ganancias y pérdidas\nprocedentes de transacciones intragrupo que estén reconocidas en saldos\nfinales de activos, tales como bienes de cambio o bienes de uso.\nb) No realizará las eliminaciones del inciso anterior cuando los activos que los\ncontengan se encuentren medidos con base en algún valor corriente\ndeterminado de acuerdo con las pautas establecidas en esta Resolución Técnica\nu otras normas contables."}, {"num": 860, "texto": "Antes de calcular el valor patrimonial proporcional, una entidad considerará que\nlas pérdidas intragrupo podrían indicar una desvalorización que exija su\nreconocimiento de acuerdo con lo establecido en esta Resolución Técnica u otras\nnormas contables."}, {"num": 861, "texto": "Una entidad aplicará la sección “Contabilización del Impuesto a las Ganancias” [ver\nlos párrafos 571 a 600], por las diferencias temporarias que surjan de la eliminación\nde las ganancias y pérdidas procedentes de transacciones intragrupo."}, {"num": 862, "texto": "Cuando la participada posea acciones propias en cartera, una entidad:\na) Calculará la tenencia del inversor y de los votos posibles en las reuniones\nsociales ordinarias sobre la base de las acciones en circulación de la participada.\nb) Registrará el costo de adquisición de las acciones propias en cartera como una\nreducción del patrimonio neto."}, {"num": 863, "texto": "Si al aplicar el método del valor patrimonial proporcional, el valor de libros de la\ninversión en la subsidiaria, negocio conjunto societario o asociada es menor a cero\n\n(es decir, la participación del inversor en las pérdidas de la participada supera el valor\nde la inversión), un inversor:\na) Registrará su proporción en las pérdidas hasta que el valor de la inversión en la\nparticipada llegue a cero.\nb) Sólo reconocerá las pérdidas adicionales si a la fecha de estados contables, el\ninversor tiene intenciones de continuar financiando las operaciones de la\nparticipada y hubiera asumido compromisos para realizar aportes de capital en\nésta, para cubrir dichas pérdidas. En este caso, deberá registrar las deudas con\nla participada que surja de tales compromisos, según la sección “Compromisos\nque generan pérdidas (contratos de carácter oneroso)” [ver los párrafos 527 a\n531].\nc) Cuando lo referido en el inciso anterior implique que el inversor cubra las\npérdidas correspondientes a otros inversores, si en períodos posteriores la\nparticipada obtiene ganancias, asignará la totalidad de esas ganancias hasta\nrecuperar la porción de las pérdidas de los otros inversores previamente\nabsorbidas.\n\nComparación con el valor recuperable"}, {"num": 864, "texto": "A los fines de determinar la necesidad de comparar la medición contable de las\nparticipaciones dentro del alcance de esta sección con su valor recuperable, una\nentidad considerará, entre otros, los siguientes indicios de deterioro:\na) Dificultades financieras significativas de la subsidiaria, asociada o negocio\nconjunto societario.\nb) Infracciones contractuales en general, tales como incumplimientos o demoras en\nel pago por parte de la subsidiaria, asociada o negocio conjunto societario.\nc) La entidad, por razones económicas o legales relacionadas con dificultades\nfinancieras de su subsidiaria, asociada o negocio conjunto societario, otorga a\néstos concesiones que no le habría otorgado en otras circunstancias.\nd) Sea probable que la subsidiaria, asociada o negocio conjunto societario entren\nen quiebra o en otra forma de reorganización financiera.\ne) La desaparición de un mercado activo para la inversión neta debido a\ndificultades financieras de la subsidiaria, asociada o negocio conjunto societario."}, {"num": 865, "texto": "Cuando existan indicios de que una participación dentro del alcance de esta sección\npudiera estar deteriorada de conformidad con el párrafo anterior, una entidad aplicará\nlo establecido en la sección “Comparación de la medición de ciertos activos con su\nvalor recuperable” [ver los párrafos 145 a 175].\n\nDiscontinuación en la aplicación del método del valor patrimonial proporcional"}, {"num": 866, "texto": "Un inversor interrumpirá la aplicación del método del valor patrimonial proporcional\na partir de la fecha en que, como consecuencia de una venta parcial o por otras\ncircunstancias, la inversión deje de cumplir las condiciones para ser medida de\nacuerdo con este método."}, {"num": 867, "texto": "Cuando interrumpa el uso del método del valor patrimonial proporcional, una\nentidad transferirá al resultado del ejercicio todos los importes acumulados como\nresultados diferidos originados por esta inversión que sean objeto de reclasificación,\nde acuerdo con esta Resolución Técnica u otras normas contables.\n\nBaja en cuentas"}, {"num": 868, "texto": "Si se vende total o parcialmente la inversión, y esta deja de cumplir con la definición\nde inversión en subsidiaria, asociada o negocio conjunto societario, una entidad\nreconocerá el resultado por la venta. Para tal fin:\na) reclasificará a resultados los importes contenidos en resultados diferidos\nacumulados que hayan sido generados por esta inversión (por ejemplo,\ndiferencias de conversión); y\nb) deducirá del precio de venta la medición contable de la inversión al momento de\nla venta."}, {"num": 869, "texto": "En los casos en que la inversión se reduzca, pero continúe clasificándose como\ninversión en subsidiaria, asociada o negocio conjunto, una entidad reconocerá el\nresultado por la venta. Para tal fin:\na) reclasificará a resultados los importes contenidos en resultados diferidos\nacumulados que hayan sido generados por esta inversión, en la proporción\nvendida; y\nb) deducirá del precio de venta la proporción vendida de la medición contable de\nla inversión al momento de la venta.\n\nPresentación en los estados contables"}, {"num": 870, "texto": "Una entidad presentará:\na) En el estado de situación patrimonial, el saldo de participaciones en subsidiarias,\nnegocios conjuntos societarios y asociadas como un activo no corriente.\nb) En el estado de resultados:\n(i) el resultado por participación en subsidiarias, negocios conjuntos\nsocietarios y asociadas bajo un título específico;\n(ii) las pérdidas por desvalorización y las reversiones de dichas pérdidas\nbajo un título específico.\nc) En el estado de evolución del patrimonio neto, por separado, su participación en\nlos resultados diferidos de sus inversiones en subsidiarias, asociadas y\nnegocios conjuntos societarios.\n\nRevelación en notas"}, {"num": 871, "texto": "Una entidad que tiene una participación dentro del alcance de esta sección revelará\nen notas:\na) La naturaleza, alcance y efectos financieros de esas participaciones, incluyendo\nla naturaleza y efectos de su relación contractual con los otros participantes.\nb) Para cada participación significativa:\n(i) El nombre de la participada.\n(ii) La naturaleza de la relación de la entidad emisora de estados contables\ncon la participada.\n(iii) El domicilio principal donde la participada desarrolle las actividades (y país\ndonde está constituida, si fuera diferente del domicilio principal donde\ndesarrolle las actividades).\n(iv) La proporción de participación en la propiedad, o la parte con que\nparticipa, mantenida por la entidad y, si fuera diferente, la proporción de\nderechos de voto mantenida (si fuera aplicable).\n(v) Información contable resumida de los activos, pasivos, patrimonio, y\nresultados.\nc) Para aquellas participaciones no significativas exponer de forma agregada la\ninformación contable resumida.\nd) La naturaleza y alcance de restricciones significativas sobre su capacidad para\nacceder o utilizar activos, y liquidar pasivos, de la participada.\ne) La naturaleza de los riesgos asociados con su participación en otras entidades.\nf) En el caso de participaciones presentadas por un importe provisorio durante el\nperíodo de medición, tal hecho.\ng) Para una participación dentro del alcance de esta sección que se contabiliza\nutilizando el método del valor patrimonial proporcional, una entidad revelará\nel valor razonable si existe un precio de mercado cotizado para la inversión.\nh) Cuando los estados contables de una participada utilizados para aplicar el\nmétodo del valor patrimonial proporcional estén referidos a una fecha de\ncierre o periodo que difieran de la fecha de los estados contables o el período\ncubierto por los estados contables de la entidad inversora, una entidad revelará:\n(i) La fecha de los estados contables de la participada.\n(ii) El período cubierto por los estados contables de la participada.\n(iii) La razón para utilizar una fecha o periodo diferentes a los de la inversora.\ni) La parte no reconocida en las pérdidas de la participada, tanto para el periodo\nsobre el que se informa como de forma acumulada, si la entidad ha dejado de\nreconocer su parte de las pérdidas al aplicar el método de la participación.\n\nBENEFICIOS A LOS EMPLEADOS POSTERIORES A LA TERMINACIÓN DE LA RELACIÓN\nLABORAL Y OTROS BENEFICIOS A LARGO PLAZO\n\nObjetivo"}]}, {"id": "c8s2", "nombre": "Beneficios a Empleados", "parrafos": [{"num": 872, "texto": "El objetivo de esta sección es definir los criterios de reconocimiento, medición,\npresentación y revelación aplicables a:\na) los beneficios a largo plazo que las entidades otorgan a sus empleados con\nposterioridad a la terminación de la relación laboral, tales como:\n(i) beneficios por retiro;\n(ii) seguros de vida y atención médica; y\nb) otros beneficios a largo plazo cuya cancelación ocurre durante el período de la\nrelación laboral, tales como:\n(i) las ausencias remuneradas después de largos períodos de servicio;\n(ii) los beneficios especiales después de un largo tiempo de servicio;\n(iii) los beneficios por incapacidad; y\n(iv) si se pagan en un plazo de doce meses o más después del cierre del\nejercicio, la participación en las ganancias, incentivos y otro tipo de\ncompensación salarial diferida."}, {"num": 873, "texto": "Una entidad reconocerá:\na) un pasivo cuando un empleado ha prestado servicios que le otorgan el derecho\nde recibir beneficios posteriores a la terminación de su relación laboral; y\nb) un gasto a medida que la entidad consume el beneficio económico procedente\ndel servicio prestado por sus empleados a cambio de los beneficios a largo plazo\nen cuestión.\n\nDefiniciones"}, {"num": 874, "texto": "A los fines de la aplicación de esta sección, una entidad deberá considerar las\nsiguientes definiciones:\n\nActivos del plan: Estos activos comprenden:\na) los activos depositados en un fondo de beneficios a largo plazo para los\nempleados; y\nb) las pólizas de seguros aceptables.\n\nActivos depositados en un fondo de beneficios a largo plazo para empleados:\nSon activos (diferentes de los instrumentos financieros no transferibles emitidos\npor la entidad) que posee un fondo y que:\na) están disponibles únicamente para pagar o financiar beneficios post-\nrelación laboral; y\nb) no están disponibles para los acreedores de la entidad (ni siquiera en caso\nde quiebra) y no pueden retornar a la entidad salvo en los siguientes\nsupuestos:\n(i) cuando los activos remanentes que quedan en el fondo son\nsuficientes para cumplir todas las obligaciones del plan o de la\nentidad que estén relacionadas con los beneficios de los empleados;\no bien\n(ii) cuando los activos retornan a la entidad para reembolsarla de\nbeneficios a los empleados ya pagados por la entidad.\n\nBeneficios a empleados: Todas las retribuciones que una entidad proporciona a\nsus empleados a cambio de los servicios prestados, diferentes de las\nindemnizaciones y otros beneficios por terminación de la relación laboral y de las\nretribuciones y beneficios mediante instrumentos de capital propios, o de otra\nentidad del grupo.\nBeneficios a corto plazo a empleados: Beneficios cuyo pago debe ser atendido\nen el término de los doce meses siguientes al cierre del periodo en el cual los\nempleados han prestado sus servicios.\n\nBeneficios a largo plazo a empleados posteriores a la terminación de la relación\nlaboral (o “beneficios post-relación laboral”): Beneficios que se pagan una vez\nque el empleado cesa en el desempeño de sus funciones. Entre los beneficios\npost-relación laboral se incluyen, por ejemplo:\na) beneficios por retiro, tales como las pensiones; y\nb) otros beneficios tales como seguros de vida, atención médica,\ntratamientos odontológicos, asistencia legal, etc.\n\nBeneficios irrevocables a empleados: Remuneraciones que no están\ncondicionadas por la existencia de una relación de empleo o trabajo futuro del\nempleado.\n\nCosto de los servicios del período presente: Incremento en el valor presente de\nlas obligaciones por beneficios definidos que se produce como consecuencia de\nlos servicios prestados por los empleados en el periodo presente.\n\nCosto por servicios prestados en el pasado: Incremento en el valor presente de\nlas obligaciones por beneficios definidos derivadas del plan debido a servicios\nprestados por los empleados en períodos anteriores, puestos de manifiesto en\nel período presente por la introducción de nuevos beneficios post-relación laboral\no por la modificación de los ya existentes. El costo por servicios prestados en el\npasado puede generar aumentos de pasivos (si se introducen nuevos beneficios\no se mejoran los existentes) o reducciones de pasivo (si los beneficios existentes\nse reducen).\n\nFondo: Entidad fiduciaria, jurídicamente separada de la entidad, encargada de\nadministrar los activos del plan contribuidos por la entidad y eventualmente, por\nlos empleados, y de pagar directamente los beneficios post-relación laboral o de\ntransferir los activos del plan a otra entidad que se encargue del pago de tales\nbeneficios.\n\nGanancias y pérdidas actuariales: Aquellas que comprenden:\na) los ajustes por experiencia (que miden los efectos de las diferencias entre\nlos supuestos actuariales previos y los sucesos efectivamente ocurridos\nen relación con el plan); y\nb) los cambios en los supuestos actuariales.\n\nIndemnizaciones y otros beneficios por terminación de la relación laboral:\nRemuneraciones que reciben los empleados como consecuencia de:\na) una decisión del empleador de terminar la relación laboral antes de la edad\nde retiro del empleado; o bien\nb) una decisión del empleado de aceptar voluntariamente la conclusión de la\nrelación laboral a cambio de tales beneficios.\n\nInterés neto sobre el pasivo (activo) por beneficios definidos neto: Cambio\ndurante el periodo en el pasivo (activo) por beneficios definidos neto que surge\ndel paso del tiempo.\n\nNuevas mediciones del pasivo (activo) por beneficios definidos neto:\nComprenden:\na) ganancias y pérdidas actuariales;\nb) el rendimiento de los activos del plan, excluyendo los importes incluidos en\nel interés neto sobre el pasivo (activo) por beneficios definidos neto;\nc) los cambios en el efecto del techo del activo, excluyendo los importes\nincluidos en el interés neto sobre el pasivo (activo) por beneficios definidos\nneto.\n\nOtros beneficios a largo plazo a empleados: Retribuciones a los empleados\n(diferentes de los beneficios post-relación laboral, de las indemnizaciones y otros\nbeneficios por terminación de la relación laboral y de las retribuciones y\nbeneficios mediante instrumentos financieros de capital) cuyo pago no ha de ser\natendido dentro de los doce meses siguientes al cierre del periodo en el cual los\nempleados han prestado sus servicios.\n\nPlanes de beneficios definidos: Planes de beneficios post-relación laboral\ndiferentes de los planes de contribuciones definidas.\n\nPlanes de beneficios post-relación laboral: Acuerdos, formales o informales,\nmediante los cuales una entidad se compromete a brindar beneficios a\nempleados tras el término de su vida activa como tales. Los planes de beneficios\npost-relación laboral se pueden clasificar como planes de contribuciones\ndefinidas o planes de beneficios definidos, según la sustancia económica que se\nderive de los términos y condiciones contenidos en ellos.\n\nPlanes de contribuciones definidas: Planes de beneficios post-relación laboral en\nlos cuales una entidad realiza contribuciones de carácter predeterminado a un\nfondo, sin asumir obligación legal ni implícita de realizar contribuciones\nadicionales, en el caso que el fondo no mantuviese suficientes activos para\natender los beneficios a los que los empleados tengan derecho.\n\nPlanes multi-empleador: Planes de contribuciones definidas o planes de\nbeneficios definidos (diferentes de los planes administrados por el Estado) en los\ncuales se combinan los activos aportados por distintos empleadores no\nrelacionados, con el fin de utilizarlos para proporcionar beneficios a sus\nempleados, teniendo en cuenta que tanto las contribuciones como los importes\nde los beneficios se determinan sin tener en cuenta la identidad de los\nempleadores ni de los empleados cubiertos por el plan.\n\nPóliza de seguro aceptable: Póliza de seguro emitida por un asegurador que no\nes una parte relacionada con la entidad, cuando los activos generados por la\npóliza:\na) deben utilizarse solo con el fin de pagar o financiar beneficios a empleados\nen virtud de un plan de beneficios definidos;\nb) no están disponibles para los acreedores de la entidad (ni siquiera en caso\nde quiebra) y no pueden ser pagados a la entidad salvo en los siguientes\nsupuestos:\n(i) son activos excedentes, innecesarios para cumplir el resto de las\nobligaciones relacionadas con el plan de beneficios post-relación\nlaboral; o\n(ii) retornan a la entidad para reembolsarla de beneficios a empleados\nya pagados por la entidad.\nRendimiento de los activos del plan: Participación, dividendos y otros ingresos\nque provienen de los activos del plan, junto con las ganancias o pérdidas\nrealizadas y no realizadas de los activos del plan, menos:\na) los costos de gestión de los activos del plan; y\nb) los impuestos a pagar por el propio plan, distintos de los impuestos\nincluidos en los supuestos actuariales utilizados para medir el valor\npresente de la obligación por beneficios definidos.\nRetribuciones y beneficios mediante instrumentos de capital propios (o de otras\nentidades del grupo): Remuneraciones a los empleados por las que:\na) los trabajadores tienen derecho a recibir beneficios en forma de acciones\nu otros tipos de instrumentos de capital emitidos por la entidad empleadora\n(o por otra entidad relacionada); o\nb) el importe de la obligación de pago a los empleados depende del precio\nfuturo de las acciones u otros instrumentos de capital emitidos por la\nentidad empleadora (o por otra entidad relacionada).\n\nTecho del activo: Valor presente de cualesquiera beneficios económicos\ndisponibles en forma de reembolsos del plan o reducciones en las aportaciones\nfuturas al mismo.\n\nValor presente de las obligaciones por beneficios definidos: Valor neto\ndescontado, sin deducir activo alguno perteneciente al plan, de los pagos futuros\nesperados necesarios para cumplir con los beneficios comprometidos con los\nempleados por los servicios prestados por éstos en el período presente y en\nperíodos anteriores.\n\nAlcance"}, {"num": 875, "texto": "Una entidad aplicará esta sección para contabilizar\na) los beneficios a largo plazo a empleados, posteriores a la terminación de la\nrelación laboral, que surgen de:\n(i) planes u otro tipo de acuerdos formales celebrados entre una entidad y\nsus empleados, considerados individualmente, con grupos particulares\nde empleados o con sus representantes;\n(ii) exigencias legales o acuerdos tomados en determinados sectores\nindustriales, en virtud de los cuales una entidad se ve obligada a realizar\ncontribuciones a planes nacionales, provinciales, sectoriales u otros de\ncarácter multi-empleador;\n(iii) prácticas de la entidad no formalizadas que dan lugar a obligaciones\nasumidas voluntariamente; y\nb) otros beneficios a largo plazo a los empleados, anteriores a la terminación de\nla relación laboral, que normalmente no están sujetos al mismo grado de\nincertidumbre que afecta a los beneficios descriptos en el inciso a) de este\npárrafo, para los que se establece un método de registro contable simplificado."}, {"num": 876, "texto": "Una entidad aplicará las disposiciones de esta sección para tratar contablemente\nestos acuerdos, incluso si ellos implican el establecimiento de una entidad separada\npara recibir y administrar las contribuciones y realizar los pagos de los beneficios\ncomprometidos."}, {"num": 877, "texto": "Los beneficios a los empleados:\na) comprenden tanto los proporcionados a los trabajadores como a las personas\nque dependan de ellos (cónyuges, hijos u otros dependientes) o a las que ellos\ndesignen (tales como compañías de seguros); y\nb) pueden ser satisfechos mediante el pago de dinero, la entrega de bienes o la\nprestación de servicios."}, {"num": 878, "texto": "Los empleados pueden prestar sus servicios a la entidad a tiempo completo o a\ntiempo parcial, en forma permanente, ocasional o temporal. Para los propósitos de\nesta sección, el término “empleados” incluye a los directores y personal gerencial."}, {"num": 879, "texto": "Esta sección no trata las siguientes cuestiones:\na) beneficios a corto plazo para los empleados en actividad, tales como sueldos,\njornales y contribuciones a la seguridad social, ausencias remuneradas por\nenfermedad, vacaciones anuales y otras licencias, participación en ganancias e\nincentivos y beneficios no monetarios a corto plazo (tales como asistencia\nmédica, vivienda, automóviles, disposición de bienes o servicios subvencionados\no gratuitos);\nb) indemnizaciones a los empleados y otros beneficios por terminación de la\nrelación laboral;\nc) retribuciones y beneficios a los empleados mediante instrumentos financieros de\ncapital;\nd) información que deben suministrar los planes de beneficios a los empleados; y\ne) normas contables aplicables a entidades administradoras de fondos de\npensiones y otros beneficios a largo plazo a empleados.\n\nDistinción entre planes de contribuciones definidas y planes de beneficios definidos"}, {"num": 880, "texto": "Una entidad deberá distinguir entre planes de contribuciones definidas o planes de\nbeneficios definidos, según la sustancia económica que se derive de los términos y\ncondiciones contenidos en ellos."}, {"num": 881, "texto": "En los planes de contribuciones definidas, la obligación legal o implícita de la entidad\nse limita a la contribución que debe entregar al fondo. Esto implica que el riesgo\nactuarial (de que los beneficios sean menores que los esperados) y el riesgo de\ninversión (de que los activos invertidos sean insuficientes para cubrir los beneficios\nesperados) son asumidos por los empleados. De esta forma, el importe de los\nbeneficios a recibir por el empleado estará determinado por:\na) el importe de las contribuciones que realice la entidad (y eventualmente el\npropio empleado) al plan de beneficios post-relación laboral o a la compañía\nde seguros;\nb) el rendimiento obtenido por las inversiones efectuadas con los fondos\naportados al plan; y\nc) cuando estuviera previsto en el plan, la distribución entre las cuentas de los\nempleados beneficiarios de la porción de beneficios abandonados (no\nreclamados) por otros participantes."}, {"num": 882, "texto": "En los planes de beneficios definidos:\na) la obligación de la entidad consiste en suministrar los beneficios acordados a\nlos empleados presentes y anteriores; y\nb) el riesgo actuarial (de que los beneficios tengan un costo mayor que el\nesperado) y el riesgo de inversión son asumidos, esencialmente, por la entidad.\nPor lo tanto, si los resultados actuariales o de la inversión son peores de lo\nesperado, las obligaciones de la entidad pueden verse aumentadas.\n\nPlanes de contribuciones definidas\n\nReconocimiento"}, {"num": 883, "texto": "Cuando un empleado ha prestado sus servicios durante un periodo determinado, una\nentidad reconocerá la contribución a realizar al plan:\na) como un pasivo (obligaciones por gastos devengados), después de deducir\ncualquier importe ya satisfecho; o\nb) como un activo (gasto pagado por anticipado) si los importes pagados fueron\nsuperiores a las contribuciones que debían realizarse por los servicios\nprestados hasta la fecha de medición (en la medida que el pago por adelantado\nresulte en una reducción de los pagos a efectuar en el futuro o le otorgue el\nderecho a un reembolso en efectivo); y\nc) como un gasto del periodo o un componente de algún costo de algún activo,\nde acuerdo con lo establecido por esta Resolución Técnica u otras normas\ncontables.\n\nRevelación en notas"}, {"num": 884, "texto": "Una entidad revelará en notas a los estados contables una descripción general del\nplan y los grupos de empleados alcanzados, las bases para determinar las\ncontribuciones y el importe reconocido en cada período como gasto.\n\nPlanes de beneficios definidos\n\nReconocimiento"}, {"num": 885, "texto": "Los planes de beneficios definidos pueden estar cubiertos, total o parcialmente, por\ncontribuciones realizadas por la entidad, y eventualmente por los empleados, a un\nfondo, o pueden no estar cubiertos. El pago de los beneficios cubiertos a través de\nun fondo, cuando se convierten en exigibles, depende no sólo de la situación\nfinanciera y el rendimiento de las inversiones mantenidas por el fondo sino también\nde la capacidad y la voluntad de la entidad para cubrir cualquier insuficiencia de los\nactivos del fondo. Por lo tanto, una entidad:\na) es, en esencia, la tomadora de los riesgos actuariales y de inversión asociados\ncon el plan; y\nb) reconocerá el gasto en un período en relación con un plan de beneficios\ndefinidos por un importe que no será necesariamente igual a la cantidad de\ndinero que se contribuya al fondo en ese período."}, {"num": 886, "texto": "Para contabilizar un plan de beneficios definidos, una entidad:\na) utilizará técnicas actuariales para estimar de manera confiable el importe de los\nbeneficios que los empleados han acumulado (o devengado) debido a los\nservicios que han prestado en el período presente y en períodos anteriores. Para\ntal fin:\n(i) determinará el monto de los beneficios que resultan atribuibles al período\npresente y a períodos anteriores; y\n(ii) realizará las estimaciones pertinentes (supuestos actuariales) respecto a\nlas variables demográficas (tales como rotación de los empleados y\nmortalidad) y financieras (tales como incrementos futuros en los salarios y\nen los costos de asistencia médica) que influyen en el monto de los\nbeneficios a suministrar;\nb) descontará los beneficios determinados como se describe en el párrafo\nanterior utilizando el Método de Unidades de Beneficios Proyectados, a fin de\ncalcular el valor presente de las obligaciones por beneficios definidos y el\ncosto de los servicios del período presente;\nc) determinará:\n(i) el valor razonable de los activos del plan;\n(ii) el importe total de las pérdidas o ganancias actuariales;\n(iii) cuando se trate de un nuevo plan o se hayan cambiado las condiciones\nde un plan existente, el costo correspondiente por servicios prestados\nen el pasado; y\n(iv) cuando existan reducciones al plan o en caso de su terminación, la\nganancia o pérdida resultante."}, {"num": 887, "texto": "Si mantiene más de un plan de beneficios definidos, una entidad aplicará el\nprocedimiento señalado del párrafo anterior por separado para cada uno de los planes\nque se diferencien significativamente."}, {"num": 888, "texto": "En algunos casos, una entidad podrá utilizar estimaciones, promedios o métodos\nabreviados de cálculo, que pueden suministrar una aproximación confiable de los\nprocedimientos dentro del alcance de esta sección."}, {"num": 889, "texto": "Una entidad contabilizará no sólo sus obligaciones legales, según los términos\nformales del plan de beneficios definidos, sino también las obligaciones implícitas\nasumidas voluntariamente que se deriven de las prácticas que, no estando\nformalizadas, son habitualmente seguidas por la entidad. Estas prácticas de carácter\nno formalizado dan lugar a obligaciones implícitas asumidas voluntariamente,\nsiempre y cuando la entidad no tenga una alternativa viable diferente que la de\nafrontar los pagos de los correspondientes beneficios a los empleados. Un ejemplo\nde la existencia de una obligación implícita asumida voluntariamente es cuando la\nmodificación de las prácticas habituales seguidas por la entidad podría producir un\ndaño inaceptable en las relaciones que mantiene con sus empleados."}, {"num": 890, "texto": "Los términos y condiciones formales de un plan de beneficios definidos pueden\npermitir a la entidad retirarse del plan sin hacer frente a los compromisos que\nasumiera. No obstante, por lo general le resultará difícil cancelar el plan si desea\nseguir reteniendo a sus empleados. Por tanto, en ausencia de evidencias contrarias,\npara contabilizar los beneficios post-relación laboral se presume que una entidad que\notorgue tales beneficios en el presente continuará otorgándolos durante el resto de la\nvida activa de sus empleados.\nTratamiento en los estados contables\n\nEstado de situación patrimonial"}, {"num": 891, "texto": "Una entidad reconocerá un pasivo (activo) neto por beneficios definidos en el estado\nde situación patrimonial por un importe equivalente a:\na) el valor presente de las obligaciones por beneficios definidos a la fecha de los\nestados contables; menos\nb) el valor razonable, a la fecha de los estados contables, de los activos del\nplan con los que se planea liquidar directamente las obligaciones."}, {"num": 892, "texto": "Una entidad determinará el valor presente de las obligaciones por beneficios\ndefinidos, así como el valor razonable de los activos del plan, con la suficiente\nregularidad para que los saldos reconocidos en los estados contables no difieran,\nen forma significativa, de los importes que podrían determinarse en la fecha de los\nestados contables."}, {"num": 893, "texto": "Una entidad:\na) Medirá las obligaciones por beneficios post-relación laboral de carácter\nsignificativo sobre la base de las estimaciones de un actuario con experiencia\nen el tema.\nb) Por razones prácticas, podrá:\n(i) solicitar al actuario que efectúe las mediciones a una fecha anterior a la\nfecha de los estados contables con una anticipación no mayor a tres\nmeses; y\n(ii) ajustará tales mediciones para reflejar operaciones significativas o\ncambios en las circunstancias (incluyendo, por ejemplo, un cambio en la\ntasa de interés) hasta la fecha de los estados contables."}, {"num": 894, "texto": "Si el importe determinado según el párrafo 891 fuera deudor, una entidad medirá el\nactivo resultante por el menor de:\na) el importe determinado según el párrafo 891; y\nb) el valor presente de beneficios económicos disponibles en la forma de\nreembolsos procedentes del plan o reducciones en las contribuciones futuras al\nplan, utilizando para determinar este importe la tasa de descuento especificada\npara tal efecto en el párrafo 908."}, {"num": 895, "texto": "Al aplicar el párrafo anterior, una entidad imputará cualquier diferencia entre los\nimportes referidos en los incisos a) y b) (cuando el primero resulta mayor que el\nsegundo) en resultados diferidos. Una entidad no reclasificará a resultados los\nsaldos acumulados correspondientes a tales resultados diferidos.\n\nEstado de Resultados"}, {"num": 896, "texto": "Una entidad reconocerá como resultado el neto de los siguientes importes, a menos\nque se exija o permita la inclusión del importe determinado en el costo de un activo:\na) el costo de los servicios del período presente;\nb) el costo por servicios prestados en el pasado;\nc) el interés neto sobre el pasivo (activo)por beneficios definidos; y\nd) el efecto de cualquier tipo de reducción o terminación del plan.\n\nValor presente de las obligaciones por beneficios definidos y costo de los servicios del\nperíodo presente"}, {"num": 897, "texto": "A fin de medir el valor presente de las obligaciones por beneficios post relación\nlaboral, así como el correspondiente costo de los servicios del período presente,\nuna entidad:\na) aplicará un método de valuación actuarial;\nb) asignará los beneficios a los períodos de servicio; y\nc) efectuará supuestos actuariales.\n\nMétodo de valuación actuarial"}, {"num": 898, "texto": "Una entidad utilizará el Método de Unidades de Beneficios Proyectados para\ndeterminar:\na) el valor presente de sus obligaciones por beneficios definidos;\nb) el correspondiente costo de los servicios del período presente; y\nc) de corresponder, el costo por servicios prestados en el pasado."}, {"num": 899, "texto": "De acuerdo con el método referido en el párrafo anterior, cada período de servicio\ngenera una unidad adicional de derecho a ese beneficio y mide cada unidad\nseparadamente para determinar la obligación final."}, {"num": 900, "texto": "Una entidad descontará el importe total de la obligación por los beneficios post-\nrelación laboral.\n\nAsignación de los beneficios a los períodos de servicio"}, {"num": 901, "texto": "Al determinar el valor presente de sus obligaciones por beneficios definidos, así como\nel correspondiente costo de los servicios del período presente y, en su caso, los\ncostos de servicios prestados en el pasado, una entidad asignará los beneficios entre\nlos períodos de servicio utilizando la fórmula de asignación de los beneficios en el\ntiempo del plan. No obstante, si los servicios a prestar por un empleado en años\nfuturos van a originar un nivel de beneficios significativamente más alto que el nivel\nalcanzado en los años anteriores, una entidad repartirá linealmente el beneficio en el\nintervalo de tiempo que medie entre:\na) la fecha a partir de la cual el servicio prestado por el empleado le da derecho al\nbeneficio según el plan (con independencia de que los beneficios estén sujetos\no no a la prestación de servicios futuros); y\nb) la fecha en la que los servicios adicionales a prestar por el empleado no le\ngeneren derecho a importes adicionales significativos del beneficio según el\nplan, salvo por causa de los eventuales futuros incrementos salariales."}, {"num": 902, "texto": "Al aplicar el Método de Unidades de Beneficios Proyectados, una entidad:\na) atribuirá una parte de los beneficios, que ha de pagar en el futuro, al período\npresente (con el fin de determinar el costo de los servicios del período\npresente); y\nb) asignará el cargo por los beneficios a los períodos en los que surge la\nobligación por beneficios post-relación laboral, esto es, a medida que los\nempleados prestan sus servicios a cambio de los beneficios post-relación\nlaboral que la entidad ha comprometido pagarles en períodos futuros.\n\nSupuestos actuariales"}, {"num": 903, "texto": "Los supuestos actuariales constituyen las mejores estimaciones que una entidad\nposee sobre el comportamiento de las variables que determinarán el costo final de\notorgar los beneficios post-relación laboral. Los supuestos incluyen lo siguiente:\na) Hipótesis demográficas acerca de las características futuras de los empleados\nactuales y pasados (así como de sus beneficiarios) que tengan derecho a recibir\nlos beneficios. Las hipótesis demográficas incluyen las siguientes cuestiones:\n(i) mortalidad, tanto durante la relación laboral como con posterioridad al\ncese de ella;\n(ii) tasas de rotación de empleados, incapacidad y retiros anticipados;\n(iii) proporción de participantes del plan con beneficiarios con derecho a recibir\nlos beneficios; y\n(iv) tasas de solicitudes de atención en los planes por asistencia médica o\ntratamientos odontológicos.\nb) Hipótesis financieras que deben estar basadas en las expectativas de mercado,\na la fecha de los estados contables, para el período en el que las\nobligaciones deben ser cumplidas. Las hipótesis financieras incluyen las\nsiguientes cuestiones:\n(i) la tasa de descuento;\n(ii) los niveles futuros de sueldos y de beneficios, incluyendo en el caso de\nbeneficios por asistencia médica, odontológica, legal, etc., sus costos\nfuturos, y, cuando sean significativos, los costos de administración."}, {"num": 904, "texto": "Los supuestos actuariales deben ser objetivos y consistentes entre sí."}, {"num": 905, "texto": "Los supuestos actuariales se considerarán objetivos si cumplen con el requisito de\nneutralidad que integra los requisitos de la información contenida en los estados\ncontables."}, {"num": 906, "texto": "Los supuestos actuariales serán consistentes entre sí cuando reflejen las relaciones\neconómicas existentes entre factores tales como las tasas de aumento de los sueldos,\nrendimiento de los activos y tasas de interés."}, {"num": 907, "texto": "Una entidad establecerá la tasa de descuento y las demás hipótesis financieras en\ntérminos monetarios o en términos reales. La tasa de descuento no debe dar lugar a\nduplicar con los supuestos considerados en la determinación de los flujos de efectivo\na descontar.\n\nTasa de descuento"}, {"num": 908, "texto": "Para descontar los beneficios post-relación laboral, (tanto financiadas como no) una\nentidad estimará la tasa de descuento apropiada, para lo cual utilizará como\nreferencia:\na) los rendimientos del mercado, a la fecha de los estados contables,\ncorrespondientes a las emisiones de bonos u obligaciones empresariales de\nalta calidad;\nb) en monedas para las cuales no exista un mercado profundo para bonos\nempresariales de alta calidad, los rendimientos de mercado, a la fecha de los\nestados contables, de los bonos gubernamentales denominados en esa\nmoneda."}, {"num": 909, "texto": "La moneda y el plazo de los bonos corporativos o bonos gubernamentales serán\ncongruentes con la moneda y el plazo estimado de las obligaciones por beneficios\npost-empleo."}, {"num": 910, "texto": "Una entidad calculará el interés neto sobre el pasivo (activo) por beneficios definidos\nneto multiplicando la tasa de descuento determinada al principio del período actual\n(que coincidirá con la utilizada al cierre del período inmediato anterior), de acuerdo\ncon los párrafos 908 y 909, por el importe de ese pasivo (activo), teniendo en cuenta\ncualquier cambio significativo en su valor. Si, de conformidad con lo establecido en el\npárrafo 907, al estimar la tasa de descuento, consideró una tasa en términos reales,\nla entidad calculará la tasa para determinar el interés neto sobre el pasivo (activo)\nneto por beneficios definidos neto, ajustando la tasa de descuento para que refleje la\ninflación interanual esperada al principio del período actual.\n\nSueldos, beneficios y costos de asistencia médica, odontológica, legal y otros"}, {"num": 911, "texto": "Una entidad medirá las obligaciones por beneficios post-relación laboral de manera\nque reflejen:\na) los incrementos estimados de los sueldos en el futuro;\nb) los beneficios establecidos en el plan, a la fecha de los estados contables,\nsegún los términos del plan (o que resulten de cualquier obligación implícita); y\nc) los cambios futuros estimados en el monto de los beneficios gubernamentales,\nen la medida que afecten a los beneficios a pagar dentro del plan de beneficios\ndefinidos, sí y sólo sí:\n(i) tales cambios han sido incorporados a una norma legal antes de la fecha\nde los estados contables; o\n(ii) la historia pasada u otro tipo de evidencia confiable indican que tales\nbeneficios gubernamentales van a ser modificados de una forma\nprevisible, por ejemplo, consistentemente con futuros cambios en los\nniveles generales de precios o de salarios."}, {"num": 912, "texto": "Para estimar los incrementos futuros en los salarios, una entidad contemplará la\nantigüedad, las posibles promociones y otros factores relevantes, tales como la\nevolución de la oferta y la demanda en el mercado de trabajo."}, {"num": 913, "texto": "Si los términos formales de un plan (o cualquier obligación implícita) exigen cambiar\nlos beneficios en periodos futuros, una entidad medirá la obligación correspondiente\nde manera que refleje tales cambios."}, {"num": 914, "texto": "Una entidad no tendrá que considerar en los supuestos actuariales los cambios en\nlos beneficios futuros no establecidos formalmente en el plan (o en las obligaciones\nimplícitas) a la fecha de los estados contables. Tales cambios, cuando se\nproduzcan, pueden generar:\na) costos por servicios prestados en el pasado, en la medida que modifiquen los\nbeneficios por servicios prestados con anterioridad al cambio; o bien\nb) costos por servicios del período presente para periodos posteriores al cambio,\nen la medida que modifiquen beneficios por servicios a prestar con posterioridad\nal cambio."}, {"num": 915, "texto": "Algunos beneficios post-relación laboral están ligados a variables tales como el nivel\nde beneficios gubernamentales por retiro o por atención médica. Una entidad medirá\ntales beneficios reflejando los cambios esperados en las variables referidas,\nevaluados a partir de la historia pasada y otro tipo de evidencias confiables."}, {"num": 916, "texto": "Una entidad estimará los costos por atenciones médicas, odontológicas, legales y\notras sobre la base de:\na) hipótesis acerca de los cambios futuros estimados en el costo de tales servicios\nen términos reales (es decir, excluyendo los efectos de los cambios futuros en\nel poder adquisitivo de la moneda), derivados de las variaciones en los precios\nespecíficos de los citados beneficios;\nb) datos históricos, tomados de su propia experiencia, complementados si fuera\nnecesario con datos procedentes de otros empleadores, compañías de\nseguros, obras sociales, empresas de medicina prepaga u otras fuentes.\nc) el efecto de los avances tecnológicos;\nd) los cambios en la utilización de los beneficios de asistencia médica o patrones\nde demanda de atención sanitaria; y\ne) los cambios en la situación sanitaria de los participantes en el plan."}, {"num": 917, "texto": "Una entidad ajustará los datos históricos:\na) si la mezcla demográfica de la población beneficiaria difiere de la utilizada como\nbase para elaborar los datos históricos; o\nb) cuando hay evidencia confiable de que las tendencias históricas no continuarán\nen el futuro.\n\nPérdidas y ganancias actuariales"}, {"num": 918, "texto": "Una entidad medirá las pérdidas y ganancias actuariales, que proceden de\nincrementos o disminuciones en el valor presente de la obligación por beneficios\ndefinidos debidas a cambios en las suposiciones actuariales y ajustes por\nexperiencia. Las causas de las ganancias o pérdidas incluyen las siguientes:\na) tasas de rotación, de mortalidad, de retiros anticipados o de incremento de\nsalarios inesperadamente altas o bajas entre los empleados;\nb) variaciones en los beneficios (si las condiciones formales o implícitas\ncontemplan incrementos cuando haya inflación);\nc) cambios en los costos de atención médica;\nd) cambios en las estimaciones de las tasas futuras de rotación de mortalidad, de\nretiros anticipados o de incremento de salarios de los empleados;\ne) el efecto de las variaciones en los beneficios (si las condiciones formales o\nasumidas contemplan incrementos cuando haya inflación) o en los costos de\natención médica cubierta por el plan; y\nf) variaciones en la tasa de descuento."}, {"num": 919, "texto": "Al proceder a la medición de los pasivos por beneficios definidos de acuerdo con esta\nsección, una entidad reconocerá las ganancias y pérdidas actuariales en resultados\ndiferidos. Una entidad no reclasificará a resultados los saldos por ganancia y\npérdidas actuariales acumuladas.\n\nCostos por servicios prestados en el pasado"}, {"num": 920, "texto": "El costo por servicios prestados en el pasado aparece cuando la entidad introduce un\nplan de beneficios definidos o cambia los beneficios a recibir dentro de un plan ya\nexistente."}, {"num": 921, "texto": "Al medir sus pasivos por beneficios definidos, una entidad reconocerá el costo por\nservicios prestados en el pasado en resultados, en la primera de las siguientes\nfechas:\na) Cuando tiene lugar la modificación o reducción del plan.\nb) Cuando la entidad reconozca los costos por reestructuración relacionados, de\nacuerdo con lo establecido en la sección “Reestructuraciones” [ver los párrafos\n600A a 604]."}, {"num": 922, "texto": "Una entidad excluirá del costo por servicios prestados en el pasado:\na) el efecto de las diferencias entre los incrementos reales de los salarios y los\nincrementos proyectados (en este caso no hay costo por servicios prestados en\nel pasado, puesto que los supuestos actuariales deben tener en consideración\nlos incrementos de sueldos proyectados);\nb) sobre o subestimaciones de los incrementos de tipo discrecional en las\npensiones, en el caso de que la entidad tenga una obligación implícita de otorgar\ntales aumentos (en este caso no existe costo por servicios prestados en el\npasado, porque los supuestos actuariales deben tener en consideración dichos\naumentos);\nc) estimaciones de mejoras en los beneficios, como consecuencia de las\nganancias actuariales que hayan sido reconocidas en los estados contables,\nsiempre que la entidad esté obligado formalmente por los términos del plan (o\npor las obligaciones implícitas asumidas) o por la legislación, a utilizar a favor\nde los participantes del plan cualquier excedente que pueda producirse en el\nplan, incluso si los incrementos en los beneficios no han sido formalmente\notorgados (el aumento resultante en el valor de las obligaciones es una pérdida\nactuarial, no un costo por servicios prestados en el pasado);\nd) el incremento en los beneficios perfeccionados irrevocablemente cuando, en\nausencia de nuevos beneficios o mejoras, los empleados completan el período\nde perfeccionamiento (no se da, en este caso, costo por servicios prestados en\nel pasado porque el costo estimado de los beneficios fue reconocido en su\nmomento como costo de los servicios del período presente, a medida que los\nservicios correspondientes fueron prestados por los empleados); y\ne) el efecto de los ajustes en el plan cuyo efecto es reducir los beneficios\ncorrespondientes a servicios futuros (esto es, cuando se produce una\nreducción).\n\nActivos del plan\n\nValor razonable de los activos del plan"}, {"num": 923, "texto": "Una entidad deducirá el valor razonable de los activos del plan del valor presente de\nla obligación por beneficios definidos para determinar el importe que debe\nreconocerse en el estado de situación patrimonial."}, {"num": 924, "texto": "Una entidad no incluirá dentro de los activos del plan los siguientes conceptos:\na) las contribuciones pendientes que la entidad deba al fondo; y\nb) los instrumentos financieros intransferibles emitidos por la entidad y poseídos\npor el fondo."}, {"num": 925, "texto": "Una entidad deducirá de los activos del plan cualquier pasivo del fondo que no tenga\nrelación con los beneficios post-relación laboral de los empleados, como, por ejemplo,\nlas cuentas a pagar (sean o no de origen comercial), y los pasivos que procedan de\ninstrumentos financieros derivados."}]}, {"id": "c8s3", "nombre": "Instrumentos Derivados y Cobertura", "parrafos": [{"num": 926, "texto": "Cuando los activos del plan comprendan pólizas de seguro aceptables, cuyos flujos\nse correspondan exactamente, tanto en los importes como en el calendario de pagos,\ncon algunos o todos los beneficios post-relación laboral pagaderos dentro del plan,\nuna entidad considerará que el valor razonable de esas pólizas de seguro es igual\nal valor razonable de las obligaciones de pago conexas, (lo cual estará sujeto a\ncualquier eventual reducción que se requiera si los importes a recibir en virtud de las\npólizas de seguro no son totalmente recuperables).\nReembolsos"}, {"num": 927, "texto": "Cuando sea prácticamente cierto que un tercero reembolsará alguno o todos los\ndesembolsos requeridos para liquidar una obligación por beneficios definidos, la\nentidad:\na) Reconocerá su derecho al reembolso como un activo separado. La entidad\nmedirá el activo a su valor razonable.\nb) Desagregará y reconocerá los cambios en el valor razonable de su derecho\nal reembolso de la misma forma que los cambios en el valor razonable de los\nactivos del plan. Los componentes del costo de los beneficios definidos podrán\nreconocerse netos de los importes relativos a cambios en el importe en libros\ndel derecho al reembolso."}, {"num": 928, "texto": "Una entidad puede acordar con un tercero, como por ejemplo un asegurador, el pago\nde una parte o de la totalidad del desembolso exigido para cancelar una obligación\npor beneficios definidos. Las pólizas de seguro aceptables son activos del plan."}, {"num": 929, "texto": "Una entidad contabilizará las pólizas de seguro aceptables indicadas en el párrafo\nanterior de la misma forma que todos los demás activo
