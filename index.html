<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RT 59 — Norma Unificada Argentina de Contabilidad</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f2ed;--bg-card:#fffdf9;--bg-sidebar:#1a1a2e;--bg-sidebar-hover:#252542;
  --bg-sidebar-active:#2d2d52;--text:#2c2c2c;--text-muted:#6b6b6b;--text-sidebar:#c8c8d8;
  --text-sidebar-active:#fff;--accent:#8b5e3c;--accent-light:#c9956b;--accent-bg:rgba(139,94,60,.07);
  --border:#e0dbd4;--para-num:#8b5e3c;--highlight:#fef3c7;--shadow:0 1px 3px rgba(0,0,0,.06);
  --radius:10px;--sidebar-w:340px;--font-body:'DM Sans',system-ui,sans-serif;
  --font-display:'DM Serif Display',Georgia,serif;
}
html{font-size:15px;scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);display:flex;min-height:100vh;overflow:hidden}

.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);height:100vh;background:var(--bg-sidebar);
  display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:10;transition:transform .3s ease}
.sidebar-header{padding:24px 20px 16px;border-bottom:1px solid rgba(255,255,255,.06)}
.sidebar-brand{font-family:var(--font-display);font-size:1.3rem;color:#fff;line-height:1.2}
.sidebar-brand small{display:block;font-family:var(--font-body);font-size:.7rem;color:var(--text-sidebar);font-weight:400;margin-top:4px;opacity:.7;letter-spacing:.3px}

.search-box{padding:12px 16px}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.3);width:16px;height:16px;pointer-events:none;transition:color .2s}
.search-wrap:focus-within svg{color:var(--accent-light)}
.search-input{width:100%;padding:10px 12px 10px 38px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:8px;color:#fff;font-size:.82rem;font-family:var(--font-body);outline:none;transition:all .2s}
.search-input::placeholder{color:rgba(255,255,255,.28)}
.search-input:focus{background:rgba(255,255,255,.1);border-color:var(--accent-light)}

.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0 20px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent}
.sidebar-nav::-webkit-scrollbar{width:5px}
.sidebar-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:9px}

.nav-titulo{padding:16px 20px 6px;font-size:.62rem;font-weight:600;color:rgba(255,255,255,.3);letter-spacing:1.2px;text-transform:uppercase}
.nav-cap{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;color:var(--text-sidebar);font-size:.82rem;font-weight:500;transition:all .15s;border-left:3px solid transparent;user-select:none}
.nav-cap:hover{background:var(--bg-sidebar-hover);color:#e8e8f0}
.nav-cap.active{background:var(--bg-sidebar-active);color:var(--text-sidebar-active);border-left-color:var(--accent-light)}
.nav-cap .cap-icon{font-size:1rem;flex-shrink:0;width:22px;text-align:center}
.nav-cap .cap-num{font-size:.65rem;color:rgba(255,255,255,.25);font-weight:600;margin-left:auto;flex-shrink:0}
.nav-sections{overflow:hidden;max-height:0;transition:max-height .35s ease}
.nav-sections.open{max-height:800px}
.nav-sec{display:block;padding:7px 20px 7px 52px;font-size:.75rem;color:rgba(255,255,255,.4);cursor:pointer;transition:all .15s;text-decoration:none;border-left:3px solid transparent}
.nav-sec:hover{color:rgba(255,255,255,.7);background:rgba(255,255,255,.02)}
.nav-sec.active{color:var(--accent-light);border-left-color:var(--accent-light);background:rgba(139,94,60,.08)}
.nav-sec .sec-range{font-size:.62rem;opacity:.5;margin-left:4px}

.nav-glosario{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;color:var(--text-sidebar);font-size:.82rem;font-weight:500;transition:all .15s;border-left:3px solid transparent;user-select:none;border-top:1px solid rgba(255,255,255,.04);margin-top:4px}
.nav-glosario:hover{background:var(--bg-sidebar-hover);color:#e8e8f0}
.nav-glosario.active{background:var(--bg-sidebar-active);color:var(--text-sidebar-active);border-left-color:var(--accent-light)}

.search-results{display:none;flex:1;overflow-y:auto;padding:8px 12px}
.search-results.visible{display:block}
.search-result{padding:10px 12px;border-radius:6px;cursor:pointer;margin-bottom:2px;transition:background .15s}
.search-result:hover{background:rgba(255,255,255,.06)}
.search-result .sr-para{font-size:.68rem;color:var(--accent-light);font-weight:600}
.search-result .sr-text{font-size:.75rem;color:rgba(255,255,255,.5);margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.search-result .sr-text mark{background:transparent;color:var(--accent-light);font-weight:600}
.search-result .sr-cap{font-size:.62rem;color:rgba(255,255,255,.2);margin-top:3px}

.main{flex:1;height:100vh;overflow-y:auto;scroll-behavior:smooth}
.main-inner{max-width:800px;margin:0 auto;padding:36px 44px 100px}
.content-header{margin-bottom:32px;padding-bottom:20px;border-bottom:2px solid var(--border)}
.content-header h1{font-family:var(--font-display);font-size:1.75rem;color:var(--text);line-height:1.2}
.content-header .ch-subtitle{font-size:.82rem;color:var(--text-muted);margin-top:5px}
.section-block{margin-bottom:36px}
.section-title{font-family:var(--font-display);font-size:1.15rem;color:var(--accent);margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border);scroll-margin-top:20px}

.paragraph{margin-bottom:12px;padding:12px 16px;background:var(--bg-card);border-radius:var(--radius);border:1px solid transparent;box-shadow:var(--shadow);transition:all .25s;line-height:1.65;font-size:.8rem;position:relative;scroll-margin-top:20px}
.paragraph:hover{border-color:var(--border)}
.paragraph.highlighted{border-color:var(--accent-light);background:#fffbf5;box-shadow:0 0 0 3px rgba(139,94,60,.1)}

.para-num{display:inline-flex;align-items:center;gap:5px;font-weight:700;color:var(--para-num);font-size:.75rem;margin-right:8px;font-family:var(--font-body);user-select:none;cursor:pointer;vertical-align:top}
.para-num .bullet{width:6px;height:6px;border-radius:50%;background:var(--accent-light);flex-shrink:0;opacity:.7}
.para-num:hover .bullet{opacity:1}

.para-text{display:inline}
.para-text .inciso{display:block;padding-left:20px;text-indent:-20px;margin-top:3px}
.para-text .sub-inciso{display:block;padding-left:40px;text-indent:-20px;margin-top:1px}
.para-text .bloque{display:block;margin-top:6px}
.para-text mark{background:var(--highlight);padding:1px 2px;border-radius:2px}

/* Cross-reference links */
.para-ref{color:var(--accent);text-decoration:underline;text-decoration-style:dotted;text-underline-offset:2px;cursor:pointer;font-weight:500;transition:color .15s}
.para-ref:hover{color:var(--accent-light);text-decoration-style:solid}

/* Glossary */
.glosario-search{padding:0 0 20px;position:sticky;top:0;background:var(--bg);z-index:2}
.glosario-input{width:100%;padding:10px 14px 10px 38px;border:1px solid var(--border);border-radius:8px;font-size:.82rem;font-family:var(--font-body);background:var(--bg-card);outline:none;transition:border-color .2s}
.glosario-input:focus{border-color:var(--accent-light)}
.glosario-wrap{position:relative}
.glosario-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);width:16px;height:16px;pointer-events:none}
.glosario-entry{margin-bottom:10px;padding:12px 16px;background:var(--bg-card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid transparent;transition:border-color .2s}
.glosario-entry:hover{border-color:var(--border)}
.glosario-term{font-weight:700;color:var(--accent);font-size:.82rem;margin-bottom:4px}
.glosario-def{font-size:.78rem;line-height:1.6;color:var(--text)}
.glosario-letter{font-family:var(--font-display);font-size:1.4rem;color:var(--accent);margin:24px 0 10px;padding-bottom:4px;border-bottom:1px solid var(--border)}

.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;text-align:center;padding:40px}
.welcome-icon{margin-bottom:20px;color:var(--accent);opacity:.8}
.welcome h2{font-family:var(--font-display);font-size:1.7rem;color:var(--text);margin-bottom:12px}
.welcome p{color:var(--text-muted);font-size:.88rem;max-width:440px;line-height:1.6}
.welcome .stats{display:flex;gap:32px;margin-top:28px;flex-wrap:wrap;justify-content:center}
.welcome .stat{text-align:center}
.welcome .stat-num{font-family:var(--font-display);font-size:1.8rem;color:var(--accent)}
.welcome .stat-label{font-size:.72rem;color:var(--text-muted);margin-top:2px}
.welcome .hint{margin-top:24px;font-size:.75rem;color:var(--text-muted);opacity:.6}
.welcome .hint kbd{background:#e8e4de;padding:2px 6px;border-radius:4px;font-size:.7rem}

.back-top{position:fixed;bottom:24px;right:24px;width:40px;height:40px;border-radius:50%;background:var(--accent);color:#fff;border:none;cursor:pointer;font-size:1rem;box-shadow:0 4px 12px rgba(139,94,60,.3);opacity:0;transform:translateY(10px);transition:all .3s;display:flex;align-items:center;justify-content:center;z-index:20}
.back-top.visible{opacity:1;transform:translateY(0)}
.back-top:hover{background:var(--accent-light);transform:translateY(-2px)}

.mobile-header{display:none;position:fixed;top:0;left:0;right:0;height:54px;background:var(--bg-sidebar);z-index:30;padding:0 16px;align-items:center;gap:12px}
.hamburger{background:none;border:none;color:#fff;font-size:1.4rem;cursor:pointer;padding:4px}
.mobile-header .mh-title{color:#fff;font-family:var(--font-display);font-size:.95rem}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9}

.sidebar-tabs{display:flex;gap:0;margin-top:14px;border-radius:6px;overflow:hidden;border:1px solid rgba(255,255,255,.1)}
.sidebar-tab{flex:1;padding:7px 0;background:transparent;border:none;color:rgba(255,255,255,.35);font-size:.68rem;font-weight:600;letter-spacing:.8px;font-family:var(--font-body);cursor:pointer;transition:all .2s}
.sidebar-tab:hover{color:rgba(255,255,255,.6);background:rgba(255,255,255,.04)}
.sidebar-tab.active{background:rgba(255,255,255,.08);color:#fff}

.soporte-page{text-align:center;padding:60px 32px 40px}
.soporte-icon{margin-bottom:18px;color:var(--accent);opacity:.7}
.soporte-page h2{font-family:var(--font-display);font-size:1.5rem;color:var(--text);margin-bottom:10px}
.soporte-page .soporte-sub{color:var(--text-muted);font-size:.88rem;line-height:1.6;max-width:440px;margin:0 auto 32px}
.soporte-buttons{display:flex;flex-direction:column;gap:12px;max-width:360px;margin:0 auto}
.soporte-btn{display:flex;align-items:center;justify-content:center;gap:10px;padding:14px 20px;border-radius:10px;font-size:.88rem;font-weight:600;font-family:var(--font-body);text-decoration:none;transition:all .2s;border:none;cursor:pointer}
.soporte-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.15)}
.soporte-btn.whatsapp{background:#25D366;color:#fff}
.soporte-btn.whatsapp:hover{background:#1ebe5a}
.soporte-btn.whatsapp svg{flex-shrink:0}
.soporte-footer{margin-top:40px;font-size:.72rem;color:var(--text-muted);opacity:.5}

@media(max-width:900px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);z-index:20;width:300px;min-width:300px}
  .sidebar.open{transform:translateX(0)}
  .overlay.open{display:block}
  .mobile-header{display:flex}
  .main{padding-top:54px}
  .main-inner{padding:20px 16px 80px}
  .content-header h1{font-size:1.35rem}
  .section-title{font-size:1rem}
  .paragraph{padding:10px 14px;font-size:.78rem}
}
</style>
</head>
<body>
<div class="mobile-header">
  <button class="hamburger" onclick="toggleSidebar()">&#9776;</button>
  <span class="mh-title">RT 59 — NUA</span>
</div>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-brand">RT 59 <small>Norma Unificada Argentina de Contabilidad</small></div>
    <div class="sidebar-tabs">
      <button class="sidebar-tab active" id="tabNorma" onclick="switchTab('norma')">NORMA</button>
      <button class="sidebar-tab" id="tabSoporte" onclick="switchTab('soporte')">SOPORTE</button>
    </div>
  </div>
  <div class="search-box">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" class="search-input" id="searchInput" placeholder="Buscar p&aacute;rrafo, tema o palabra..." oninput="handleSearch(this.value)" autocomplete="off">
    </div>
  </div>
  <nav class="sidebar-nav" id="sidebarNav"></nav>
  <div class="search-results" id="searchResults"></div>
</aside>

<main class="main" id="mainContent">
  <div class="main-inner" id="mainInner"></div>
</main>

<button class="back-top" id="backTop" onclick="document.getElementById('mainContent').scrollTo({top:0,behavior:'smooth'})">&#8593;</button>

<script>
const DATA = {"titulo": "Resolución Técnica N° 59", "subtitulo": "T.O. RT 54 — Norma Unificada Argentina de Contabilidad", "glosario": [{"termino": "Activación", "definicion": "A los fines de esta Resolución Técnica, representa el reconocimiento o incorporación adicional de costos en algún componente del activo."}, {"termino": "Actividad agropecuaria", "definicion": "Producción de bienes económicos a partir de la combinación del esfuerzo del hombre y la naturaleza, para favorecer la actividad biológica de plantas y animales; incluyendo su reproducción, mejoramiento, degradación y/o crecimiento que conforman su desarrollo biológico. La intervención del hombre en la gestión del desarrollo biológico implica que la cosecha, recolección u obtención de recursos no gestionados previamente y que sean meramente extractivas (tales como la pesca en el océano y la tala de bosques naturales) no constituyen actividad agropecuaria."}, {"termino": "Actividad generadora de efectivo", "definicion": "Es la actividad o línea de negocio identificable, cuyo desarrollo por parte de la entidad genera entradas de efectivo independientes de otras actividades o líneas de negocio (por ejemplo, actividad industrial, agropecuaria, comercial, servicios, frutihortícola, etc.)."}, {"termino": "Activo", "definicion": "Es un recurso económico controlado por la entidad, como consecuencia de hechos ya ocurridos. Un recurso económico es un derecho que tiene la capacidad de generar beneficios económicos. Los beneficios económicos existen si el recurso tiene valor de uso o valor de cambio para la entidad."}, {"termino": "Activo financiero", "definicion": "Activo representado por: a) efectivo; b) derecho a recibir efectivo u otro activo financiero de otra entidad; o c) instrumento de patrimonio de otra entidad."}, {"termino": "Activos aptos para la activación de costos financieros", "definicion": "Son activos que requieren de un prolongado proceso de producción, construcción, montaje o terminación antes de estar en condiciones de ser vendido o utilizado, lo que correspondiere según su destino. Estos activos comprenden, entre otros, bienes de cambio, bienes de uso, propiedades de inversión o activos intangibles."}, {"termino": "Activos biológicos", "definicion": "Son plantas y animales vivientes utilizados en la actividad agropecuaria (por ejemplo, un árbol limonero). Excluye a los activos biológicos utilizados como factor de producción en el curso normal de las operaciones."}, {"termino": "Activos biológicos en desarrollo", "definicion": "Son activos biológicos que no completaron su proceso de desarrollo y no pueden ser considerados como 'en producción, consumibles o terminados' (por ejemplo: árboles frutales, bosques, terneros, alevines, sementeras, frutas inmaduras, etc., cuyo proceso biológico de crecimiento no concluyó, aunque se puedan obtener de los mismos bienes secundarios comercializables)."}, {"termino": "Activos biológicos producidos o terminados", "definicion": "Son activos biológicos que han concluido su proceso de desarrollo y se encuentra en condiciones de ser vendidos, transformados en productos agropecuarios o utilizados en otros procesos productivos (plantines para su venta como tales, novillos terminados, frutos maduros, bosques aptos para la tala, etc.). Ciertos activos pueden calificar como “activos biológicos en desarrollo” en una actividad y como “activos biológicos producidos o terminados” en otra, de acuerdo con la extensión del ciclo biológico. Por ejemplo, los plantines pueden estar destinados a la venta o ser utilizados en explotaciones de bosques."}, {"termino": "Activos biológicos utilizados como factor de producción en el curso normal de las operaciones", "definicion": "Son activos biológicos que cumplen la definición de “plantas productoras”, “animales productores” o “animales reproductores”. a) Animales productores: son activos que: (i) Se utilizan, en forma predominante, para la obtención de sus frutos como productos pecuarios (lana, leche, etc.); (ii) se espera que su vida productiva dure más de un período; y (iii) cuya probabilidad de su venta como activos biológicos es remota, excepto por las ventas al final de su período reproductivo como animales de descarte. b) Animales reproductores: son activos que: (i) se utilizan, predominantemente, para la reproducción de su especie; (ii) se espera que su vida reproductiva dure más de un período; y (iii) cuya probabilidad de su venta como activos biológicos es remota, excepto por las ventas al final de su período reproductivo como animales de descarte."}, {"termino": "Activos generales", "definicion": "Activos que contribuyen a la obtención de flujos de efectivo futuros en todas las actividades generadoras de efectivo existentes y son distintos del valor llave (por ejemplo: los edificios de la administración general o del área de tecnología de la información)."}, {"termino": "Activos identificables", "definicion": "Un activo es identificable si: a) es separable, es decir, susceptible de ser separado o escindido de la entidad y vendido, transferido, dado en explotación, arrendado o intercambiado, ya sea individualmente o junto con un contrato relacionado, activo o pasivo identificable con los que guarde relación, independientemente de que la entidad tenga la intención de llevar a cabo la separación; o b) surge de derechos contractuales o de otros derechos de tipo legal, con independencia de que esos derechos sean transferibles o separables de la entidad o de otros derechos y obligaciones."}, {"termino": "Aportes", "definicion": "Es la suma de: a) el capital suscripto (aportado o comprometido a aportar); y b) los aportes no capitalizados."}, {"termino": "Componentes financieros implícitos", "definicion": "Representan, en operaciones de compra (o venta) de bienes o servicios, la diferencia entre los precios de compra (o venta) al contado de bienes o servicios y los correspondientes a operaciones a plazo que no se encuentran explicitadas en la documentación que respalda la operación."}, {"termino": "Confiabilidad (credibilidad)", "definicion": "La información debe ser creíble para sus usuarios, de manera que estos la acepten para tomar sus decisiones. Una información confiable reúne los requisitos de aproximación a la realidad y verificabilidad."}, {"termino": "Contrato", "definicion": "Acuerdo entre dos o más partes que crea derechos y obligaciones exigibles. Pueden ser escritos, orales o estar implícitos en las prácticas de negocios de la entidad."}, {"termino": "Costo", "definicion": "El costo de un activo es el sacrificio económico necesario para ponerlo en condiciones de ser vendido o utilizado, lo que corresponda en función de su destino."}, {"termino": "Costo amortizado", "definicion": "Es la suma algebraica de: a) el importe de la medición inicial de un crédito, inversión o deuda más b) los componentes financieros devengados menos c) las cobranzas de créditos e inversiones o el pago de deudas. A los fines de calcular los componentes financieros devengados, se utilizará la tasa efectiva que iguale la medición inicial de los activos o pasivos con los flujos de efectivo por cobrar o por pagar, respectivamente (método de la tasa efectiva). Cuando una entidad opte por la política contable establecida en esta u otras normas contables de medir ciertos activos o pasivos procedentes de transacciones con partes relacionadas según las condiciones pactadas, la tasa efectiva a la que se refiere el párrafo inmediato precedente será consistente con la referida política contable."}, {"termino": "Costo atribuido", "definicion": "Importe que representa un sustituto del costo a una fecha determinada. Por ejemplo, el valor corriente utilizado para medir inicialmente un activo recibido por donación o aporte que luego deberá medirse en función del costo."}, {"termino": "Costo corriente en el momento de la venta", "definicion": "Costo de reposición, costo de reproducción y/o reconstrucción de los bienes de cambio vendidos, en el momento de la venta."}, {"termino": "Costo de adquisición", "definicion": "Es la suma de los costos necesarios para adquirir un activo o servicio."}, {"termino": "Costo de construcción", "definicion": "Es la suma de los costos necesarios para construir un activo."}, {"termino": "Costo de desarrollo", "definicion": "Es la suma de los costos necesarios para desarrollar un activo intangible mediante la aplicación de conocimientos científicos o de los resultados de una investigación a un plan o diseño para la producción de materiales, dispositivos, productos, métodos, procesos o sistemas nuevos, o sustancialmente mejorados, antes del comienzo de su producción o utilización comercial."}, {"termino": "Costo de implantación", "definicion": "Es la suma de los costos necesarios para implantar una planta productora. Contempla todas las erogaciones necesarias desde la preparación del suelo hasta que la planta está en condiciones de producir frutos en cantidad y calidad suficiente para una explotación comercial, en cuyo momento debe cesar la activación. Incluye entre otros los siguientes conceptos: preparación de los suelos, plantines, mano de obra, riego, productos químicos, etc."}, {"termino": "Costo de producción", "definicion": "Es la suma de los costos necesarios para producir un activo o prestar un servicio."}, {"termino": "Costo de reposición", "definicion": "Es el importe que surge de acumular todos los componentes del costo de adquisición expresando cada uno de ellos en términos de su reposición, a la fecha de la medición."}, {"termino": "Costo de reproducción y/o reconstrucción", "definicion": "Es el importe que surge de acumular todos los componentes del costo de producción o costo de construcción expresando cada uno de ellos en términos de su reposición, a la fecha de la medición"}, {"termino": "Costo original", "definicion": "Importe asignado a un elemento en oportunidad de su reconocimiento inicial, más los desembolsos subsiguientes que sean activados hasta alguna fecha determinada según esta Resolución Técnica u otras normas contables."}, {"termino": "Costos financieros", "definicion": "Se considerarán como tales a los intereses (explícitos o implícitos que se hayan segregado), actualizaciones monetarias, diferencias de cambio, premios por seguros de cambio o similares derivados de la utilización de capital ajeno, netos, en su caso, del correspondiente resultado por exposición al cambio en el poder adquisitivo de la moneda."}, {"termino": "Cotización sucedánea", "definicion": "Es el precio directamente observable que se recibiría por vender un activo (es decir, un precio de salida) o que se pagaría por transferir"}, {"termino": "Deudas computables", "definicion": "Deudas cuyos costos financieros pueden contabilizarse como parte del costo de un activo apto para activación de costos financieros. Comprenden obligaciones tales como las contraídas con los proveedores de préstamos, tenedores de obligaciones negociables o bonos similares, y las originadas en compras de bienes y/o servicios cuando los plazos de financiación convenidos excedan a los habituales de mercado."}, {"termino": "Diferencias de inventario", "definicion": "Es la técnica consistente en medir el costo de los bienes vendidos o servicios prestados mediante la siguiente fórmula: a) Medición de la existencia inicial de bienes de cambio. b) (más) Compras de bienes de cambio. c) (más) Gastos de producción o construcción. d) (más / menos) otras variaciones no consideradas en los incisos anteriores, debiendo indicar, en el caso en que presente esta partida, los conceptos incluidos en ella; e) (menos) Medición de la existencia final."}, {"termino": "Dirección", "definicion": "Persona o grupo de personas con atribuciones y responsabilidad legal para la emisión de estados contables. En general, coincidirá con el órgano de administración de una entidad."}, {"termino": "Empresa en marcha", "definicion": "Es aquella que está en funcionamiento y se espera continuará con sus actividades dentro del futuro previsible."}, {"termino": "Entidad del exterior", "definicion": "Entidad que: a) utiliza una moneda extranjera para la preparación de sus estados contables; y b) es controlada, controlada conjuntamente o asociada de la entidad emisora de los estados contables."}, {"termino": "Entidad emisora de estados contables", "definicion": "Cualquier entidad que está obligada, o elige, presentar estados contables."}, {"termino": "Estados contables", "definicion": "Presentación estructurada de información contable histórica, que incluye notas explicativas, cuya finalidad es la de informar sobre los recursos económicos y las obligaciones de una entidad en un momento determinado o sobre los cambios registrados en ellos en un período de tiempo, de conformidad con un marco de información contable. Las notas explicativas normalmente incluyen un resumen de las políticas contables significativas y otra información explicativa. El término “estados contables” normalmente se refiere a un conjunto completo de estados contables establecido por los requerimientos del marco de información contable aplicable, pero también puede referirse a un solo estado contable."}, {"termino": "Estados contables consolidados", "definicion": "Son los estados contables donde se presentan los activos, pasivos, componentes del patrimonio neto, ingresos, gastos, ganancias, pérdidas y flujos de efectivo de la controladora y sus controladas (identificadas como un grupo) como si fueran los de una sola entidad económica."}, {"termino": "Estados contables individuales", "definicion": "Son los estados contables que elabora una entidad individual que no controla a ninguna otra"}, {"termino": "Estados contables separados", "definicion": "Son los estados contables elaborados por una entidad individual que es una entidad controladora. En tales estados contables, la entidad mide sus participaciones en entidades controladas, negocios conjuntos en los que tiene control conjunto o asociadas utilizando el método del valor patrimonial proporcional."}, {"termino": "Evolución financiera", "definicion": "El concepto de recursos financieros a ser utilizado como base para la preparación de las informaciones contables referidas a la evolución financiera debería integrarse con: a) el efectivo; b) los equivalentes de efectivo, considerándose como tales a las inversiones de alta liquidez que son fácilmente convertibles en efectivo y están sujetas a riesgos insignificantes de cambios de valor. Las variaciones del efectivo y sus equivalentes constituyen:"}, {"termino": "Evolución patrimonial", "definicion": "A lo largo de un período, la cuantía del patrimonio neto de una entidad varía como consecuencia de las transacciones con los propietarios en su carácter de tales (o sus equivalentes, en las entidades sin fines de lucro) y el resultado de un período, que es la variación patrimonial no atribuible a dichas transacciones. El resultado del período se compone de los siguientes elementos: a) ingresos, gastos, ganancias y pérdidas; b) impuestos que gravan las ganancias finales. El resultado del período se denomina ganancia o superávit cuando aumenta el patrimonio neto y pérdida o déficit en el caso contrario. Algunas operaciones no alteran la cuantía del patrimonio neto, por tratarse de variaciones patrimoniales cualitativas (por ejemplo, constitución/desafectación de reservas o capitalización de resultados acumulados)."}, {"termino": "Fecha de adquisición (de otra entidad)", "definicion": "Fecha en la que una entidad obtiene control, participación en un negocio conjunto o influencia significativa sobre otra entidad."}, {"termino": "Fecha de la medición", "definicion": "Es la fecha correspondiente al momento en el cual se mide un elemento sobre el cual se informa en los estados contables."}, {"termino": "Fecha de los estados contables", "definicion": "Es la fecha correspondiente al final del período sobre el cual informan los estados contables. Dicha fecha coincidirá con la fecha de cierre de ejercicio o con la fecha final del período intermedio al cual se refieren dichos estados."}, {"termino": "Ganancia", "definicion": "Es el aumento del patrimonio neto debido a operaciones secundarias u otras transacciones, hechos o circunstancias, no proveniente de ingresos o transacciones con los propietarios en su carácter de tales que, de acuerdo con esta Resolución Técnica u otras normas contables, no se reconocen en los resultados diferidos."}, {"termino": "Gasto", "definicion": "Gasto es la disminución del patrimonio neto no derivada de transacciones con los propietarios en su carácter de tales, relacionada con las actividades principales de la entidad."}, {"termino": "Impracticable", "definicion": "A una entidad le resultará impracticable modificar la información de períodos anteriores por un cambio de norma o política contable o por corrección de un error cuando: a) los efectos de la aplicación retroactiva no son determinables (por ejemplo, si en el período cuya información deba modificar no hubiese recopilado los datos necesarios para tal modificación y no resulte factible su reconstrucción); b) necesite estimaciones significativas relativas a transacciones, eventos o condiciones de ese período anterior y no cuente con evidencias acerca de las circunstancias para efectuar tales estimaciones; o c) no pueda establecer si las evidencias disponibles ya existían a la fecha en que los estados contables a modificar fueron originalmente emitidos o si están basadas en información posterior, a la que no corresponde dar efecto retroactivo."}, {"termino": "Ingreso", "definicion": "Es el aumento del patrimonio neto no derivado de transacciones con los propietarios en su carácter de tales y generado por: a) la producción o venta de bienes, prestación de servicios, contratos de construcción u otros hechos vinculados con las actividades principales de la entidad; y b) actividades internas, tales como el crecimiento natural o inducido de la extracción de petróleo o gas."}, {"termino": "Ingresos de actividades ordinarias", "definicion": "Son los aumentos del patrimonio neto originados en la producción o venta de bienes, en la prestación de servicios, la construcción de activos u otros hechos que hacen a las actividades principales de la entidad. Incluyen:"}, {"termino": "Ingresos financieros", "definicion": "Se considerarán como tales a los intereses (explícitos o implícitos que se hayan segregado), actualizaciones monetarias y diferencias de cambio (netas de premios por seguros de cambio) derivados de las inversiones financieras realizadas y de los créditos en moneda otorgados a terceros, netos, en su caso, del correspondiente resultado por exposición al cambio en el poder adquisitivo de la moneda."}, {"termino": "Instrumento financiero", "definicion": "Es un contrato que genera un activo financiero para una entidad y un pasivo financiero o un instrumento de patrimonio para otra entidad."}, {"termino": "Mercado activo", "definicion": "Es el mercado en el cual las transacciones de los activos o pasivos tienen lugar con frecuencia y volumen suficiente para proporcionar información para fijar precios sobre una base de negocio en marcha."}, {"termino": "Mercado más ventajoso", "definicion": "Es el mercado activo donde se maximiza el precio de venta de un activo o minimiza el precio de transferencia de un pasivo, neto de los costos de transacción y transporte."}, {"termino": "Mercado principal", "definicion": "Es el mercado activo con el mayor volumen de transacciones para el activo o pasivo."}, {"termino": "Modelo de costeo completo", "definicion": "Es el resultante de computar los costos de materiales e insumos y conversión tanto variables como fijos, sean directos o indirectos, correspondientes a la función producción y considerados sobre una base normal. El costo unitario completo resulta de la suma de:"}, {"termino": "Moneda argentina", "definicion": "Es la moneda de curso legal en Argentina."}, {"termino": "Moneda extranjera", "definicion": "Es cualquier moneda distinta de la moneda argentina."}, {"termino": "Método de la tasa efectiva", "definicion": "Es el método que se utiliza para el cálculo del costo amortizado de un activo financiero, o un pasivo financiero, y para la distribución y reconocimiento de los ingresos por intereses, o gastos por intereses, en el resultado del periodo a lo largo del periodo correspondiente."}, {"termino": "Otras normas contables", "definicion": "Comprenden: a) las resoluciones técnicas, distintas de la RT N° 26 y de la presente Resolución Técnica; b) las interpretaciones; y c) cualquier norma emitida por la Mesa Directiva o la Junta de Gobierno de acuerdo con las previsiones reglamentarias."}, {"termino": "Partes relacionadas", "definicion": "Una parte se considera relacionada con otra parte si una de ellas tiene la posibilidad de: a) ejercer el control, individual o conjunto, sobre la otra; o b) ejercer influencia significativa sobre ella al tomar sus decisiones operativas y financieras. [Al respecto, ver las definiciones establecidas en párrafo 673 de esta Resolución Técnica]."}, {"termino": "Pasivo", "definicion": "Es una obligación de entregar activos o prestar servicios a terceros, como consecuencia de hechos ya ocurridos. Un pasivo puede incluir obligaciones: a) legales, que son las originadas en: (i) la legislación; (ii) contratos o acuerdos entre partes; o (iii) alguna otra causa legal; o b) voluntarias, que son los compromisos o responsabilidades asumidas por una entidad: (i) como consecuencia de un patrón de comportamiento, políticas empresariales de dominio público o declaraciones suficientemente concretas; y"}, {"termino": "Pasivo financiero", "definicion": "Pasivo representado por obligación de entregar efectivo u otro activo financiero a otra entidad."}, {"termino": "Patrimonio neto", "definicion": "Es la suma de: a) los aportes de los propietarios o de los asociados (distintos de cuotas sociales que puedan considerarse como ingreso de actividades ordinarias) de una entidad; y b) los resultados acumulados. Por su origen, el patrimonio neto puede desagregarse del siguiente modo (excepto en las entidades sin fines de lucro que no tengan aportes): Patrimonio neto = Aportes + Resultados acumulados Conceptualmente, podría determinarse del siguiente modo: Patrimonio neto = Activo- Pasivo"}, {"termino": "Período de medición", "definicion": "Plazo de doce meses contado desde la fecha de adquisición de la participación en una subsidiaria, asociada o negocio conjunto societario. Durante este plazo la entidad adquirente puede ajustar los importes provisionales utilizados en el reconocimiento y la medición inicial."}, {"termino": "Política(s) contable(s)", "definicion": "Principios específicos, bases, reglas y procedimientos adoptados por una entidad para la elaboración y presentación de sus estados contables."}, {"termino": "Precio convenido", "definicion": "Importe convenido por una entidad con sus clientes o proveedores, de acuerdo con las prácticas imperantes, para la operación de que"}, {"termino": "Probable", "definicion": "Cuando en esta Resolución Técnica se utiliza este término como condición para el reconocimiento de una partida determinada, deberá entenderse equivalente a que tiene más probabilidad de que ocurra que de lo contrario. Para fines prácticos, una entidad considerará que un evento es más probable cuando la probabilidad de que ocurra es mayor al 50%, y es improbable cuando su probabilidad de ocurrencia es del 50% o menor."}, {"termino": "Productos agropecuarios", "definicion": "Son productos resultantes de la acción descripta en el punto “Obtención de productos agropecuarios” (por ejemplo: cereales cosechados, leche, lana, madera, frutos cosechados, etc.)."}, {"termino": "Pérdida", "definicion": "Es la disminución del patrimonio neto generada por operaciones secundarias u otras transacciones, hechos o circunstancias, no proveniente de gastos o transacciones con los propietarios en su carácter de tales que, de acuerdo con esta Resolución Técnica u otras normas contables, no se reconocen en los resultados diferidos."}, {"termino": "Pérdida(s) por desvalorización", "definicion": "Una pérdida por desvalorización de un activo surge cuando su medición contable resulta superior a su valor recuperable."}, {"termino": "Requisitos de la información contenida en los estados contables", "definicion": "Los requisitos de la información contenida en los estados contables están definidos en la sección 3 de la Resolución Técnica N° 16. En dicha Resolución Técnica se establecen los siguientes requisitos: a) Atributos: (i). Pertinencia (atingencia). (ii). Confiabilidad (credibilidad). 1. Aproximación a la realidad. a. Esencialidad (sustancia sobre forma). b. Neutralidad (objetividad o ausencia de sesgos). c. Integridad. 2. Verificabilidad. (iii). Sistematicidad. (iv). Comparabilidad. (v). Claridad. b) Restricciones que condicionan el cumplimiento de los requisitos: (i). Oportunidad. (ii). Equilibrio entre costos y beneficios."}, {"termino": "Resultados diferidos", "definicion": "Son resultados que, de acuerdo con lo exigido o permitido por esta u otras normas contables, no se reconocen dentro del resultado del período. Los resultados diferidos se mantendrán como tales hasta que esta Resolución Técnica u otras normas contables permitan o exijan su reclasificación a resultados o su transferencia a resultados acumulados no asignados."}, {"termino": "Saldo por revaluación", "definicion": "Partida a la cual se imputan las diferencias entre el valor razonable de los bienes de uso y su medición contable cuando se aplica el modelo de la revaluación."}, {"termino": "Significación", "definicion": "Criterio por el cual una entidad podrá no aplicar una norma contenida en esta Resolución Técnica u otras normas contables cuando tal desviación no distorsiona significativamente la información contenida en los estados contables tomados en su conjunto"}, {"termino": "Situación patrimonial", "definicion": "Los elementos relacionados directamente con la situación patrimonial son los activos, los pasivos y el patrimonio neto a una fecha determinada."}, {"termino": "Tasa efectiva", "definicion": "Es la tasa de descuento que iguala los siguientes importes: a) el valor descontado de los pagos o cobros de efectivo futuros estimados durante la vida esperada del activo financiero o pasivo financiero; y b) la medición contable del activo financiero (antes de computar, de corresponder, su desvalorización) o del pasivo financiero. Para calcular la tasa de interés efectiva, una entidad estimará para cada instrumento financiero (o grupo de instrumentos financieros similares): a) los flujos de efectivo esperados; y b) la vida esperada. Para estimar los flujos de efectivo esperados una entidad: a) tendrá en cuenta todos los términos contractuales del instrumento financiero (por ejemplo, pagos anticipados, duración, opciones de compra y similares); b) incluirá todas las comisiones y puntos básicos de interés, pagados o recibidos por las partes del contrato, los costos de"}, {"termino": "Temas de baja complejidad contable", "definicion": "Son aquellos implicados en la preparación de una entidad emisora de estados contables que presenta, generalmente, una o más de las siguientes características: a) no está alcanzada por la Ley de Entidades Financieras y no realiza operaciones de capitalización o ahorro ni requiere recursos del público con promesa de prestaciones o beneficios futuros; b) no es una entidad aseguradora bajo el control de la Superintendencia de Seguros de la Nación; c) no es una sociedad anónima con participación estatal mayoritaria o de economía mixta; d) no es una controladora de un grupo económico; e) no posee participaciones que le otorgan control conjunto o influencia significativa sobre otras entidades; f) no cuenta con una estructura organizativa, de propiedad o de supervisión complejas; g) sus transacciones o el sistema de información y los procesos relacionados relevantes para preparar los estados contables de la entidad no son complejos; o"}, {"termino": "Transacciones financieras", "definicion": "Son operaciones de otorgamiento u obtención de recursos financieros (efectivo y equivalentes). Incluyen otorgamiento de préstamos, obtención de préstamos, emisión de bonos u obligaciones negociables y similares."}, {"termino": "Usuarios", "definicion": "Son quienes, a una fecha determinada, se espera razonablemente que podrían tener interés en los estados contables de una entidad. Entre ellos se incluyen: a) Los usuarios tipo. b) Otros usuarios, distintos de los usuarios tipos, que exigen o solicitan que la entidad les presente sus estados contables por diversas razones. Por ejemplo: (i) los órganos de control societario; o (ii) los organismos de recaudación fiscal o previsional."}, {"termino": "Usuarios tipo", "definicion": "Son usuarios tipo de los estados contables: a) En el caso de las entidades en general, sus inversores, prestamistas, y otros acreedores, tanto actuales como potenciales. Entre ellos, y sin constituir un listado exhaustivo, se encuentran los siguientes ejemplos: (i) Un inversor que no participa de la gestión. (ii) Un banco ante el cual se presentan los estados contables a efectos de obtener financiación. (iii) Un organismo gubernamental o una entidad privada que utiliza los estados contables para tomar decisiones de inversión, financiación o similares (por ejemplo, adjudicar una licitación o celebrar un contrato de prestación de bienes o servicios). b) En el caso de las entidades sin fines de lucro no gubernamentales, las personas o entidades que les proveen o les podrían suministrar recursos (por ejemplo, los socios de una asociación civil)."}, {"termino": "Valor corriente", "definicion": "Es una gama de valores basados en el mercado; entre ellos, los siguientes: a) Costo de reposición. b) Costo de reproducción y/o reconstrucción. c) Valor neto de realización. d) Valor razonable. e) Valor descontado en función una tasa de interés correspondiente al momento de la medición."}, {"termino": "Valor de uso", "definicion": "Es el valor actual de los flujos netos de efectivo esperados que deberían surgir del uso de los bienes y de su disposición al final de su vida útil (o de su venta anticipada, si ella hubiera sido resuelta)."}, {"termino": "Valor neto de realización", "definicion": "En su determinación se considerarán: a) El valor razonable (que incluye los ingresos adicionales, no atribuibles a la financiación, que la venta genere por sí misma –por ejemplo, un reembolso de exportación–); y b) los costos ocasionados directamente por la venta (comisiones, impuesto a los ingresos brutos y similares)."}, {"termino": "Valor patrimonial proporcional", "definicion": "Según el método del valor patrimonial proporcional, en el reconocimiento inicial la participación en una subsidiaria (en los estados contables separados) en una asociada o negocio conjunto se registrará al costo, y el importe en libros se incrementará o disminuirá para reconocer la parte del inversor en el resultado del periodo de la participada, después de la fecha de adquisición. La parte del inversor en el resultado del periodo de la participada se reconocerá en el resultado del periodo del inversor. Las distribuciones recibidas de la participada reducirán el importe en libros de la inversión. Podría ser necesaria la realización de ajustes al importe por cambios en la participación proporcional del inversor en la participada que surjan por cambios en los resultados diferidos de la participada. La parte que corresponda al inversor en esos cambios se reconocerá en resultados diferidos."}, {"termino": "Valor razonable", "definicion": "Es el precio que se recibiría por vender un activo (es decir, un precio de salida) o que se pagaría por transferir un pasivo en una transacción ordenada entre participantes del mercado en la fecha de la medición. El valor razonable: a) Debe referirse a un activo o pasivo concreto. Por ejemplo, corresponderá tener en cuenta (i) En el caso de los activos no financieros: su condición o estado de conservación, su localización y las restricciones para su venta. (ii) En el caso de los activos y pasivos financieros: su riesgos crediticios, cambiarios y similares. b) No debe contemplar los costos de transacción, porque no son inherentes al activo o pasivo, sino al intercambio."}, {"termino": "Valor recuperable", "definicion": "Es el mayor importe entre el valor neto de realización y el valor de uso de un activo."}, {"termino": "Índice de precios FACPCE", "definicion": "Es el resultante de combinar los siguientes índices publicados por el INDEC: a) el índice de precios internos mayoristas (IPIM) hasta diciembre de 2016, según lo establecido por la Resolución (JG) 517/2016; y b) el índice de precios al consumidor (IPC) nacional, mes base: diciembre de 2016."}], "titulos": [{"id": "t1", "nombre": "TÍTULO I — NORMAS GENERALES", "capitulos": [{"id": "intro", "num": 0, "nombre": "Introducción: Objetivo y Alcance", "icono": "📖", "secciones": [{"id": "intro_obj", "nombre": "Objetivo", "parrafos": [{"num": 1, "texto": "El objetivo de esta Resolución Técnica consiste en prescribir las bases para preparar\nlos estados contables con fines generales, de forma tal que satisfagan los\nrequisitos de la información contenida en los estados contables."}, {"num": 2, "texto": "Para lograr su objetivo, esta Resolución Técnica establece requerimientos sobre\nreconocimiento, baja en cuentas, medición, presentación y revelación de los\nelementos sobre los que una entidad informa mediante sus estados contables.\n\nAlcance"}]}, {"id": "intro_alc", "nombre": "Alcance", "parrafos": [{"num": 3, "texto": "Una entidad aplicará esta Resolución Técnica si no aplica la Resolución Técnica Nº\n26 [“Adopción de las Normas Internacionales de Información Financiera (NIIF) del\nConsejo de Normas Internacionales de Contabilidad (IASB) y de la Norma\nInternacional de Información Financiera para Pequeñas y Medianas Entidades (“NIIF\npara las pymes”)”]."}, {"num": 4, "texto": "Una entidad que cumpla con las disposiciones de esta Resolución Técnica efectuará\nuna declaración en notas, de forma clara y explícita, de dicho cumplimiento,\ndestacando su categoría de acuerdo con la clasificación del párrafo siguiente."}, {"num": 5, "texto": "Esta Resolución Técnica prescribe normas para:\na) entidades pequeñas;\nb) entidades medianas; y\nc) las restantes entidades."}, {"num": 6, "texto": "A los fines de esta Resolución Técnica u otras normas contables, una entidad es\npequeña si:\na) en el ejercicio actual:\n(i) no está alcanzada por la Ley de Entidades Financieras y no realiza\noperaciones de capitalización o ahorro ni requiere recursos del público con\npromesa de prestaciones o beneficios futuros;\n(ii) no es una entidad aseguradora bajo el control de la Superintendencia de\nSeguros de la Nación; o\n(iii) no es una sociedad anónima con participación estatal mayoritaria o de\neconomía mixta;\nb) en el ejercicio inmediato anterior obtuvo ingresos iguales o inferiores a un importe\nque definirá la Federación Argentina de Consejos Profesionales de Ciencias\nEconómicas (FACPCE); y\nc) no se trata de una entidad:\n(i) controladora de otra entidad excluida por los incisos anteriores del\npresente párrafo;\n(ii) controlada por otra entidad excluida por los incisos anteriores del presente\npárrafo;\n(iii) controladora de otra entidad alcanzada por la Resolución Técnica Nº 26;\no\n(iv) controlada por otra entidad alcanzada por la Resolución Técnica Nº 26."}, {"num": 7, "texto": "A los fines de esta Resolución Técnica u otras normas contables, una entidad es\nmediana si:\na) en el ejercicio actual:\n(i) no está alcanzada por la Ley de Entidades Financieras y no realiza\noperaciones de capitalización o ahorro ni requiere recursos del público con\npromesa de prestaciones o beneficios futuros;\n(ii) no es una entidad aseguradora bajo el control de la Superintendencia de\nSeguros de la Nación; o\n(iii) no es una sociedad anónima con participación estatal mayoritaria o de\neconomía mixta;\nb) en el ejercicio inmediato anterior obtuvo ingresos:\n(i) superiores a los que definirá la FACPCE, de acuerdo con el inciso b) del\npárrafo inmediato anterior; y\n(ii) menores o iguales a un importe que definirá la FACPCE; y\nc) no se trata de una entidad:\n(i) controladora de otra entidad excluida por los incisos anteriores del\npresente párrafo;\n(ii) controlada por otra entidad excluida por los incisos anteriores del presente\npárrafo;\n(iii) controladora de otra entidad alcanzada por la Resolución Técnica Nº 26;\no\n(iv) controlada por otra entidad alcanzada por la Resolución Técnica Nº 26."}, {"num": 8, "texto": "Los importes que sean establecidos de acuerdo con los párrafos 6 o 7 estarán\nexpresados en poder adquisitivo de un determinado mes. Para su aplicación, la\nentidad:\na) Actualizará dicho importe multiplicándolo por un coeficiente que refleje la\nvariación del índice de precios FACPCE, hasta la fecha de cierre del ejercicio\ninmediato anterior a la fecha de los estados contables.\nb) En el caso de que el ejercicio inmediato anterior hubiera tenido duración irregular,\nanualizará las cifras correspondientes."}, {"num": 9, "texto": "Una entidad informará en notas si:\na) En el presente ejercicio modificó sus políticas contables, o comenzó o cesó\nla aplicación de algún tratamiento permitido, como consecuencia de un cambio\nde categoría por la aplicación del inciso b) del párrafo 6 o del inciso b) del\npárrafo 7.\nb) A partir del ejercicio siguiente deberá modificar su categoría, según lo dispuesto\nlos párrafos 6 o 7:\n(i) como consecuencia de los ingresos obtenidos en el presente ejercicio; o\n(ii) debido a hechos ocurridos luego de la fecha de los estados contables,\nde acuerdo con lo establecido en el párrafo 96.\n\nRESOLUCIÓN TÉCNICA N°54\n\nTITULO I\n\n~NORMAS GENERALES~\n\nCAPÍTULO 1\n\nCUESTIONES DE APLICACIÓN GENERAL\n\nINTRODUCCIÓN AL PRESENTE CAPÍTULO"}]}]}, {"id": "cap1", "num": 1, "nombre": "Cuestiones de Aplicación General", "icono": "📋", "secciones": [{"id": "c1s1", "nombre": "Introducción", "parrafos": [{"num": 10, "texto": "Los estados contables constituyen uno de los elementos más importantes para\ncomunicar, de manera efectiva, información sobre la situación patrimonial, la\nevolución patrimonial y la evolución financiera de entidades públicas o privadas,\ntengan o no fines de lucro."}, {"num": 11, "texto": "La situación patrimonial, la evolución patrimonial y la evolución financiera de\nuna entidad interesa a diversas partes que tienen necesidades de información no\ntotalmente coincidentes."}, {"num": 12, "texto": "Siendo imposible que los estados contables satisfagan los requerimientos\ninformativos de todos los potenciales usuarios, en esta Resolución Técnica se\nconsideran como usuarios tipo:\na) Cualquiera fuere la entidad emisora: sus inversores y acreedores, tanto\nactuales como potenciales.\nb) Adicionalmente:\n(i) En los casos de entidades sin fines de lucro no gubernamentales: quienes\nle proveen o le podrían suministrar recursos (por ejemplo, los asociados\nde una asociación civil).\n(ii) En los casos de entidades gubernamentales: los correspondientes\ncuerpos legislativos y de fiscalización."}, {"num": 13, "texto": "En este capítulo se describen:\na) las premisas fundamentales consideradas en la preparación de los estados\ncontables;\nb) los elementos sobre los que se informa en los estados contables;\nc) el contenido de un conjunto completo de estados contables;\nd) las operaciones fundamentales para la preparación de los estados contables;\ny\ne) las bases generales que una entidad considerará al preparar sus estados\ncontables.\n\nPREPARACIÓN DE ESTADOS CONTABLES: PREMISAS FUNDAMENTALES\n\nEmpresa en marcha"}]}, {"id": "c1s2", "nombre": "Premisas Fundamentales", "parrafos": [{"num": 14, "texto": "Una entidad elaborará sus estados contables bajo la premisa de empresa en\nmarcha, a menos que pretenda liquidarse o cesar su actividad, o no exista alternativa\nmás realista que proceder de alguna de estas formas."}, {"num": 15, "texto": "Al evaluar si la premisa de empresa en marcha resulta apropiada, la dirección de\nuna entidad tendrá en cuenta toda la información disponible sobre el futuro, la que\ndeberá cubrir como mínimo los doce meses posteriores a la fecha de los estados\ncontables, sin limitarse a dicho período."}, {"num": 16, "texto": "Cuando, al realizar esta evaluación, la dirección de una entidad advierta la existencia\nde incertidumbres importantes, relativas a eventos o condiciones que aporten dudas\nsignificativas sobre la posibilidad de seguir funcionando normalmente, procederá a\nrevelarlas en los estados contables, junto con sus causas."}, {"num": 17, "texto": "Una entidad que decida liquidarse o cesar su actividad, o no tenga alternativa más\nrealista que proceder de alguna de estas formas:\na) cambiará la base de preparación de los estados contables1; incluso si los\nhechos que evidencian la necesidad de cambiar la base contable surgen por\naplicar las disposiciones del apartado “Consideración de los hechos posteriores\nen la preparación de los estados contables” [ver el párrafo 96].\nb) revelará en notas:\n(i) el hecho de que ha dejado de cumplir la premisa de empresa en marcha;\n(ii) una explicación de los motivos por los cuales ha dejado de cumplir con tal\npremisa; y\n(iii) las políticas contables adoptadas.\n\nEn el documento “Guías orientativas para la preparación de estados contables de entidades que no cumplen con el\nprincipio de empresa en marcha (EnM)” de la FACPCE, se analiza qué normas podría aplicar la entidad que no cumple\ncon el principio de EnM. Básicamente desarrolla:\n\n(a) normas aplicables;\n\n(b) si las EnM son aquellas que están en liquidación legal;\n(c) qué normas corresponde aplicar;\n\n(d) revelaciones;\n\n(e) cuándo aplicar una base de EnM;\n\n(f) si una EnM puede indicar que sus estados contables están de acuerdo con las NCA o NIIF;\n\n(g) cómo medir los elementos de los estados contables; y\n\n(h) qué aspectos de presentación debe considerar.\n\nDevengado"}, {"num": 18, "texto": "Una entidad elaborará sus estados contables utilizando la base de acumulación o\ndevengado, salvo que esta Resolución Técnica u otras normas contables requieran\no permitan algún tratamiento diferente."}, {"num": 19, "texto": "De acuerdo con lo establecido en el párrafo anterior, una entidad reconocerá los\nefectos patrimoniales de las transacciones u otros hechos en el período en el cual\nocurren, con independencia del momento durante el cual se produzcan las entradas\ny salidas de efectivo relacionadas.\n\nELEMENTOS DE LOS ESTADOS CONTABLES"}]}, {"id": "c1s3", "nombre": "Elementos de los EECC", "parrafos": [{"num": 20, "texto": "Una entidad comunicará, a través de sus estados contables, información sobre:\na) su situación patrimonial a la fecha de los estados contables;\nb) la evolución patrimonial durante el período que concluye en la fecha indicada\nen el inciso anterior, incluyendo un resumen de las causas del resultado\ncorrespondiente a dicho lapso; y\nc) la evolución financiera por el mismo período, expuesta de modo que permita\nconocer las consecuencias de las actividades de operación, inversión y\nfinanciación."}, {"num": 21, "texto": "Para describir su situación patrimonial, una entidad deberá informar sobre los\nsiguientes elementos:\na) activo;\nb) pasivo; y\nc) patrimonio neto."}, {"num": 22, "texto": "Activo es un recurso económico, controlado por la entidad como consecuencia de\nhechos ya ocurridos. Un recurso económico es un derecho que tiene la capacidad de\ngenerar beneficios económicos. Los beneficios económicos existen si el recurso tiene\nvalor de uso o valor de cambio para la entidad.\n\n22A. Una entidad tendrá el control de un activo si tiene la capacidad presente de:\na) dirigir o redirigir el uso del recurso económico (lo que incluye la capacidad para\npermitir o impedir que terceros puedan hacerlo); y\nb) obtener sustancialmente todos sus beneficios restantes (lo que incluye la\ncapacidad de impedir que terceros puedan hacerlo)."}, {"num": 23, "texto": "Pasivo es una obligación de entregar activos o prestar servicios a terceros, como\nconsecuencia de hechos ya ocurridos. Un pasivo puede incluir obligaciones:\na) legales, que son las originadas en:\n(i) la legislación;\n(ii) contratos o acuerdos entre partes; o\n(iii) alguna otra causa legal; o\nb) voluntarias, que son los compromisos o responsabilidades asumidas por una\nentidad:\n(i) como consecuencia de un patrón de comportamiento, políticas\nempresariales de dominio público o declaraciones suficientemente\nconcretas; y\n(ii) mediante los cuales crea en terceros expectativas de que va a cumplir\ndichos compromisos o responsabilidades."}, {"num": 24, "texto": "Patrimonio neto es la suma de:\na) los aportes de los propietarios o asociados de una entidad;\nb) los resultados acumulados, que incluyen:\n(i) las ganancias reservadas;\n(ii) los resultados no asignados; y\n(iii) los resultados diferidos."}, {"num": 25, "texto": "Para describir su evolución patrimonial, una entidad deberá informar sobre los\nsiguientes elementos:\na) las transacciones con los propietarios o asociados de la entidad, cuando actúan\nen su carácter de tales;\nb) un resumen de las causas que generan el resultado del período, distinguiendo\nlas siguientes partidas:\n(i) ingresos;\n(ii) gastos;\n(iii) ganancias;\n(iv) pérdidas; y\n(v) el impuesto a las ganancias;\nc) un resumen de las causas que generan los resultados diferidos."}, {"num": 26, "texto": "Ingreso es el aumento del patrimonio neto no derivado de transacciones con los\npropietarios en su carácter de tales y generado por:\na) la producción o venta de bienes, prestación de servicios, contratos de\nconstrucción u otros hechos vinculados con las actividades principales de la\nentidad; y\nb) actividades internas, tales como el crecimiento natural o inducido de activos\nbiológicos o la extracción de petróleo o gas."}, {"num": 27, "texto": "Gasto es la disminución del patrimonio neto no derivada de transacciones con los\npropietarios en su carácter de tales, relacionada con las actividades principales de la\nentidad."}, {"num": 28, "texto": "Ganancia es el aumento del patrimonio neto debido a operaciones secundarias u\notras transacciones, hechos o circunstancias, no proveniente de ingresos o\ntransacciones con los propietarios en su carácter de tales que, de acuerdo con esta\nResolución Técnica u otras normas contables, no se reconocen en los resultados\ndiferidos."}, {"num": 29, "texto": "Pérdida es la disminución del patrimonio neto generada por operaciones\nsecundarias u otras transacciones, hechos o circunstancias, no proveniente de gastos\no transacciones con los propietarios en su carácter de tales que, de acuerdo con esta\nResolución Técnica u otras normas contables, no se reconocen en los resultados\ndiferidos."}, {"num": 30, "texto": "Resultados diferidos son resultados que, de acuerdo con lo exigido o permitido por\nesta Resolución Técnica u otras normas contables, no se reconocen dentro del\nresultado del período. Los resultados diferidos se mantendrán como tales hasta que\nesta Resolución Técnica u otras normas contables permitan o exijan su\nreclasificación a resultados o su transferencia a resultados no asignados."}, {"num": 31, "texto": "Para describir su evolución financiera, una entidad deberá informar sobre las\nentradas y salidas del efectivo y sus equivalentes, clasificándolas en función de las\nactividades que les dan origen:\na) actividades operativas;\nb) actividades de inversión; y\nc) actividades de financiación.\n\n31A. Una entidad podría tener que presentar otras causas por separado de las tres\nactividades referidas, según lo establezca la presente Resolución Técnica u otras\nnormas contables.\n\nCONJUNTO COMPLETO DE ESTADOS CONTABLES\n\nComponentes de un conjunto completo de estados contables correspondientes a una\nentidad individual"}]}, {"id": "c1s4", "nombre": "Conjunto Completo de EECC", "parrafos": [{"num": 32, "texto": "Un conjunto completo de estados contables comprende:\na) el estado de situación patrimonial o balance general;\nb) el estado de resultados (estado de recursos y gastos, en las entidades sin fines\nde lucro);\nc) el estado de evolución del patrimonio neto;\nd) el estado de flujos de efectivo; y\ne) las notas, con un resumen de las políticas contables significativas y cualquier\notra información explicativa que permita al conjunto completo satisfacer los\nrequisitos de la información contenida en los estados contables.\n\nEstados contables consolidados"}, {"num": 33, "texto": "Una entidad presentará estados contables consolidados, además de sus estados\ncontables separados, de acuerdo con lo establecido en la sección “Preparación de\nestados contables consolidados” de esta Resolución Técnica [ver los párrafos 764 a\n806].\n\nPREPARACIÓN DE ESTADOS CONTABLES: OPERACIONES FUNDAMENTALES"}]}, {"id": "c1s5", "nombre": "Operaciones Fundamentales", "parrafos": [{"num": 34, "texto": "Las operaciones fundamentales que rigen la preparación de un conjunto completo de\nestados contables son las siguientes:\na) reconocimiento;\nb) baja en cuentas;\nc) medición; y\nd) presentación y revelación en notas."}, {"num": 35, "texto": "Una entidad usará las descripciones de los párrafos que siguen en la medida en que\nesta Resolución Técnica u otras normas contables aplicables no establezcan\nrequerimientos específicos que entren en conflicto con ellas. En tal caso, dará\nprevalencia a los requerimientos específicos.\n\nReconocimiento"}, {"num": 36, "texto": "Una entidad reconocerá un activo cuando:\na) la partida cumpla la definición del párrafo 22;\nb) su medición satisfaga el requisito de confiabilidad (credibilidad); y\nc) su contribución a los beneficios económicos futuros sea probable, excepto que\nesta Resolución Técnica u otras normas contables establezcan un umbral de\nprobabilidad diferente para partidas determinadas."}, {"num": 37, "texto": "Una entidad reconocerá un pasivo cuando:\na) la partida cumpla la definición del párrafo 23;\nb) su medición satisfaga el requisito de confiabilidad (credibilidad); y\nc) la salida de recursos económicos que den lugar al cumplimiento de esas\nobligaciones sea probable, excepto que esta Resolución Técnica u otras\nnormas contables establezcan un umbral de probabilidad diferente para\npartidas determinadas."}, {"num": 38, "texto": "Una entidad reconocerá las transacciones con los propietarios en su carácter de tales,\nlos resultados y los resultados diferidos cuando se produzcan los hechos\nsustanciales generadores de las correspondientes variaciones patrimoniales. A estos\nfines, deberá priorizar:\na) la sustancia económica de los hechos antes que a su forma; y\nb) la definición de activos, pasivos y patrimonio neto antes que a la correlación\nde ingresos y gastos."}, {"num": 39, "texto": "En la medida en que se cumpla lo indicado en el párrafo anterior, una entidad imputará\na resultados:\na) los costos relacionados con un ingreso, en el mismo período durante el cual\nse reconoce el ingreso;\nb) los costos que no pueden asociarse con un ingreso, pero se vinculan con un\nperíodo, en dicho período; y\nc) los demás costos, en forma inmediata."}, {"num": 40, "texto": "Una entidad reconocerá los ingresos de actividades ordinarias procedentes de\ntransacciones (operaciones de intercambio) de acuerdo con lo establecido en la\n\nsección “Reconocimiento de ingresos de actividades ordinarias procedentes de\ntransacciones (operaciones de intercambio)” [ver los párrafos 522 a 526]."}, {"num": 41, "texto": "Una entidad reconocerá los resultados por acrecentamientos, valorizaciones o\ndesvalorizaciones provenientes de acontecimientos internos o externos a la entidad\nque motiven cambios en las mediciones contables de activos o pasivos, de acuerdo\ncon los criterios establecidos en esta Resolución Técnica o en otras normas\ncontables."}, {"num": 42, "texto": "Una entidad medirá los ingresos, gastos, ganancias y pérdidas empleando los\ncriterios de medición contable de las contrapartidas que deba reconocer o dar de baja,\nsegún corresponda."}, {"num": 43, "texto": "Una entidad reconocerá y medirá los impuestos sobre las ganancias de conformidad\ncon lo establecido en la sección “Contabilización del impuesto a las ganancias” [ver\nlos párrafos 571 a 600]."}, {"num": 44, "texto": "En los estados contables intermedios, una entidad aplicará los mismos criterios de\nreconocimiento de variaciones patrimoniales que en los estados contables de cierre\nde ejercicio, salvo que una norma particular indique lo contrario."}, {"num": 45, "texto": "Cuando no pueda reconocer un elemento por incumplimiento de los requisitos de\nconfiabilidad (credibilidad) o probabilidad de concreción, una entidad deberá\ninformar sobre tal circunstancia en los estados contables.\n\nBaja en cuentas"}, {"num": 46, "texto": "La baja en cuentas es la eliminación, total o parcial, de un activo o un pasivo\nreconocido en el estado de situación patrimonial de una entidad."}, {"num": 47, "texto": "Normalmente, la baja en cuentas tendrá lugar:\na) en el caso de un activo, cuando la entidad transfiere o pierde el control total o\nparcial de un activo reconocido, por su venta o su disposición por otras causas;\ny\nb) en el caso de un pasivo, cuando la entidad deja de tener una obligación por un\npasivo reconocido, por la totalidad o una parte de dicho pasivo, según\ncorresponda."}, {"num": 48, "texto": "Al contabilizar la baja de un elemento, una entidad reconocerá simultáneamente, si\ncorrespondiera, los nuevos activos o pasivos e imputará al resultado del período la\ndiferencia entre las mediciones contables netas de:\na) los nuevos activos o pasivos; y\nb) los activos o pasivos dados de baja.\n\nMedición"}, {"num": 49, "texto": "Una entidad cuantificará en términos monetarios los elementos reconocidos en los\nestados contables, en función de lo que establezcan las normas específicas para\ncada uno de ellos y los momentos en que efectúe la medición."}, {"num": 50, "texto": "Una entidad realizará:\na) la medición inicial, en el momento del reconocimiento o incorporación de un\nelemento; y\nb) la medición posterior, a la fecha de los estados contables o en cualquier\nfecha distinta a la del reconocimiento.\n\nPresentación, e información a revelar\n\nAspectos generales"}, {"num": 51, "texto": "La comunicación efectiva de la información contenida en los estados contables\npermite que esa información sea más relevante y contribuye a una presentación\nrazonable. Esta comunicación también mejora la comprensibilidad y comparabilidad\nde la información en los estados contables."}, {"num": 52, "texto": "La comunicación efectiva de la información de los estados contables requiere:\na) centrarse en los objetivos y principios de presentación e información a revelar\nen lugar de enfocarse en reglas;\nb) clasificar la información de manera que las partidas similares se agrupen y las\npartidas diferentes se presenten en forma separada; y\nc) agregar información que no confunda con detalles innecesarios o excesivos."}, {"num": 53, "texto": "Al presentar sus estados contables, una entidad expresará la información en ellos\ncontenida:\na) en la moneda que prevé esta Resolución Técnica; o\nb) en un múltiplo de dicha moneda (por ejemplo, miles de pesos, millones de\npesos)."}, {"num": 54, "texto": "Una entidad:\na) Indicará la moneda en la que están expresados los estados contables.\nb) Podrá redondear las cifras no significativas.\n\nSíntesis y flexibilidad"}, {"num": 55, "texto": "Una entidad presentará el estado de situación patrimonial o balance general, el\nestado de resultados (estado de recursos y gastos, en las entidades sin fines de\nlucro), el estado de evolución del patrimonio neto, y el estado de flujos de efectivo en\nforma sintética para brindar una adecuada visión de conjunto, revelando en notas la\ninformación relevante no incluida en el cuerpo de dichos estados."}, {"num": 56, "texto": "Una entidad aplicará estas normas de manera flexible y podrá:\na) Adicionar o suprimir elementos de información, teniendo en cuenta su\nrelevancia.\nb) Introducir cambios en la denominación, apertura o agrupamiento de cuentas.\nc) Utilizar paréntesis para indicar las cifras negativas, con relación al activo,\npasivo, resultados, resultados diferidos y flujos de efectivo y equivalentes de\nefectivo.\n\nReferencias a la información en notas"}, {"num": 57, "texto": "Una entidad incluirá en cada rubro o partida de los estados contables una referencia\nque permita identificar la nota u otra información vinculada con dicho rubro o partida.\n\nInformación comparativa"}, {"num": 58, "texto": "Una entidad presentará los importes de los estados contables en, por lo menos, dos\ncolumnas."}, {"num": 59, "texto": "Una entidad presentará en la primera columna los datos del período actual, y en la\nsegunda, la información comparativa referida a continuación:\na) Cuando se trate de ejercicios completos, la del ejercicio precedente.\nb) Cuando se trate de períodos intermedios:\n(i) la información comparativa del estado de situación patrimonial será la\ncorrespondiente a la fecha de cierre del ejercicio completo precedente; y\n(ii) la información comparativa de los estados de resultados (o de recursos y\ngastos), de evolución del patrimonio neto y de flujos de efectivo será la del\nperíodo equivalente del ejercicio precedente.\n\n59A. Cuando prepare los estados contables de un período intermedio, una entidad podrá\npresentar, en el estado de resultados (o de recursos y gastos), de forma separada la\ninformación referida a:\na) Los resultados acumulados desde el inicio del ejercicio hasta la fecha del\nperíodo intermedio actual, junto con sus cifras comparativas.\nb) Los resultados devengados en el período intermedio actual, junto con sus cifras\ncomparativas.\n\nAclaración (texto no integrante de la presente Resolución Técnica)\n\nEn el párrafo 59A se establece que una entidad tiene la opción, en un período intermedio,\nde presentar el estado de resultados (o de recursos y gastos) de tal forma que la\ninformación referida a los resultados acumulados desde el inicio del ejercicio hasta el final\nde ese período intermedio se muestre de forma separada de los resultados devengados en\nel periodo intermedio actual (todo ello, junto con la respectiva información comparativa).\n\nPor ejemplo, supongamos el siguiente caso:\na) Una entidad cierra ejercicio el 31 de diciembre de cada año.\nb) Esa entidad presenta información intermedia con frecuencia trimestral, referida al 31\nde marzo, 30 de junio y 30 de septiembre de cada año.\n\nSi utilizara la opción prevista en el párrafo 59A, en los estados contables correspondientes\nal cierre intermedio referido al:\na) 31 de marzo, la entidad presentará sus resultados a dos columnas: los acumulados\ndesde el inicio del ejercicio actual hasta el 31 de marzo del mismo año (período\nintermedio del ejercicio actual) de forma comparativa con los acumulados desde el\ninicio del ejercicio precedente hasta el 31 de marzo del año anterior (período intermedio\ncomparativo).\nb) 30 de junio, la entidad presentará sus resultados a cuatro columnas:\n(i) los acumulados desde el inicio del ejercicio actual hasta el 30 de junio del\nmismo año (período intermedio del ejercicio actual) de forma comparativa con\nlos acumulados desde el inicio del ejercicio precedente hasta el al 30 de junio\ndel año anterior (período intermedio comparativo); y\n(ii) los devengados entre el 1 de abril y el 30 de junio ese año (los del período\nintermedio actual) de forma comparativa con los devengados entre 1 de abril y\nel 30 de junio del ejercicio precedente (los del período intermedio comparativo\nequivalente).\nc) 30 de septiembre, la entidad presentará sus resultados a cuatro columnas:\n(i) los acumulados desde el inicio del ejercicio actual hasta el 30 de septiembre\ndel mismo año (período intermedio del ejercicio actual) de forma comparativa\ncon los acumulados desde el inicio del ejercicio precedente hasta el al 30 de\nseptiembre del año anterior (período intermedio comparativo); y\n(ii) los devengados entre el 1 de julio y el 30 de septiembre ese año (los del\nperíodo intermedio actual) de forma comparativa con los devengados entre 1\nde julio y el 30 de septiembre del ejercicio precedente (los del período\nintermedio comparativo equivalente)."}, {"num": 60, "texto": "En negocios o actividades caracterizadas por estacionalidad, una entidad presentará\nen el estado de situación patrimonial de períodos intermedios una tercera columna o\nuna nota con los datos correspondientes a la misma fecha del ejercicio precedente."}, {"num": 61, "texto": "Una entidad:\na) Presentará, con los mismos criterios utilizados para preparar la información del\nperíodo actual, toda la información comparativa que sea relevante para los\nusuarios, excepto cuando esta Resolución Técnica u otras normas contables\npermitan o requieran la utilización de un criterio diferente.\nb) No presentará información comparativa cuando:\n(i) no haya tenido obligación de emitir el estado contable del período con el\ncual se exige la comparación; o\n(ii) esta Resolución Técnica u otras normas contables la dispensen de ello."}, {"num": 62, "texto": "Una entidad preparará y expondrá los datos de períodos anteriores aplicando las\nmismas políticas contables de medición, unidad de medida, agrupamiento de datos\ny revelación en notas utilizadas para preparar y exponer los del período actual,\nexcepto por lo dispuesto en el párrafo anterior. Por lo tanto, los datos comparativos\npodrán diferir de los expuestos en el conjunto de estados contables original\ncorrespondiente a sus períodos cuando, en el período actual, la entidad:\na) aplique las normas sobre “Modificación de la información de ejercicios\nanteriores” [ver los párrafos 66 a 70];\nb) utilice nuevas normas contables referidas al contenido y forma de los estados\ncontables; o\nc) modifique el contenido de los componentes de los estados contables cuya\nexposición sea especialmente requerida por esta Resolución Técnica u otras\nnormas contables (por ejemplo, la lista de operaciones discontinuadas o en\ndiscontinuación)."}, {"num": 63, "texto": "Cuando la aplicación por primera vez de una norma o política contable o la\ncorrección de un error exija modificar la información de períodos anteriores a exponer\nen forma comparativa, una entidad procederá a efectuar dicha modificación, salvo\nque sea impracticable determinar los efectos del cambio. En este caso, revelará en\nnotas:\na) el hecho de que la información comparativa no pudo ser modificada;\nb) las circunstancias que hicieron impracticable tal modificación; y\nc) la fecha a partir de la cual efectuó las modificaciones."}, {"num": 64, "texto": "A una entidad le resultará impracticable modificar la información de períodos\nanteriores por un cambio de norma, una modificación de su política contable o por\ncorrección de un error cuando:\na) los efectos de la aplicación retroactiva no son determinables (por ejemplo, si\nen el período cuya información deba modificar no hubiese recopilado los datos\nnecesarios para tal modificación y no resulte factible su reconstrucción);\nb) necesite estimaciones significativas relativas a transacciones, eventos o\ncondiciones de ese período anterior y no cuente con evidencias acerca de las\ncircunstancias para efectuar tales estimaciones; o\nc) no pueda establecer si las evidencias disponibles ya existían a la fecha en que\nlos estados contables a modificar fueron originalmente emitidos o si están\nbasadas en información posterior, a la que no corresponde dar efecto\nretroactivo."}, {"num": 65, "texto": "Una entidad describirá en notas la existencia de circunstancias que limiten la\ncomparabilidad de la información; por ejemplo, debido a:\na) diferencias en la duración del ejercicio o período actual;\nb) efectos de la estacionalidad de sus actividades; u\nc) otros hechos.\n\nModificación de la información de ejercicios anteriores"}, {"num": 66, "texto": "Una entidad modificará la información de ejercicios anteriores cuando:\na) cambie el modo de presentación o clasificación de las partidas (modificaciones\nque implican una variación cualitativa); o\nb) ajuste uno o más componentes del patrimonio neto de dichos ejercicios\n(modificaciones que implican una variación cuantitativa). En este caso:\n(i) expondrá su efecto sobre los saldos iniciales que se presenten en el\nestado de evolución de patrimonio neto y, cuando correspondiere, en el\nestado de flujos de efectivo; y\n(ii) adecuará las cifras correspondientes a los períodos previos que se\nincluyan como información comparativa."}, {"num": 67, "texto": "Cada vez que se modifique la información de ejercicios anteriores, una entidad\nrevelará en notas:\na) la naturaleza del cambio;\nb) el importe de cada partida o grupo de partidas modificadas; y\nc) el motivo de la modificación."}, {"num": 68, "texto": "Cuando resulte impracticable determinar los efectos de algún cambio introducido en\nesta Resolución Técnica u otras normas contables, de una política contable o de\nla corrección de un error sobre la información comparativa en uno o más períodos\nanteriores para los que se presente información, una entidad:\na) modificará los saldos iniciales de los activos y pasivos al principio del período\nmás antiguo para el que sea practicable la modificación retroactiva, que podría\ncoincidir con el período actual; y\nb) efectuará el correspondiente ajuste a los saldos iniciales de cada componente\ndel patrimonio neto de ese período."}, {"num": 69, "texto": "A una entidad le resultará impracticable la aplicación retroactiva, a menos que sea\nposible determinar el efecto acumulado de tal aplicaci
