mas de seguridad social,\ny obras sociales.\nd) Pago de impuestos y tasas.\ne) Pago (reembolso o recuperación) de impuesto a las ganancias."}, {"num": 654, "texto": "Cuando utilice el método indirecto, una entidad expondrá:\na) el resultado del período; y\nb) las partidas de ajuste necesarias para obtener el flujo neto del efectivo y sus\nequivalentes proveniente de las actividades operativas. Estas partidas\nincluyen:\n(i) las que integran el resultado del período, pero nunca afectarán al efectivo\ny sus equivalentes (por ejemplo, depreciaciones de los bienes de uso);\n(ii) las que integran el resultado del período, pero cuyos flujos de efectivo\ndeben exponerse por separado dentro de:"}, {"num": 655, "texto": "Una entidad podrá exponer las partidas de ajuste:\na) en el cuerpo del estado; o\nb) en notas.\n\nFlujos de efectivo y equivalentes provenientes de actividades de inversión"}, {"num": 656, "texto": "Dentro de estas actividades, una entidad presentará, entre otros, los siguientes flujos\nde efectivo y sus equivalentes:\na) Pagos por compras de bienes de uso o propiedades de inversión.\nb) Pagos por compras de activos intangibles.\nc) Cobros por ventas de bienes de uso o propiedades de inversión.\nd) Cobros por ventas de activos intangibles.\ne) Pagos por adquisición de acciones, títulos u otros instrumentos de deuda o\npatrimonio que no califican como equivalentes de efectivo.\nf) Cobros por ventas o reembolsos de acciones, títulos u otros instrumentos de\ndeuda o patrimonio que no califican como equivalentes de efectivo.\ng) Cobros y reembolsos de préstamos a terceros.\nh) Cobros de subsidios relacionados con la adquisición de activos de largo plazo."}, {"num": 657, "texto": "Una entidad presentará en forma separada los flujos de efectivo y sus equivalentes\ngenerados por actividades de inversión relacionadas con la adquisición o la\nenajenación de entidades controladas u otras unidades de negocio.\n\nFlujos de efectivo y equivalentes provenientes de actividades de financiación"}, {"num": 658, "texto": "Dentro de estas actividades, una entidad presentará, entre otros, los siguientes flujos\nde efectivo y sus equivalentes:\na) Cobros procedentes de la emisión de acciones, aportes de cuotas sociales u\notros instrumentos de patrimonio.\nb) Cobros por obtención de préstamos, emisión de obligaciones negociables u\notros instrumentos de deuda.\nc) Pagos y/o reembolso de préstamos u otros instrumentos de deuda.\nd) Pagos de cuotas de arrendamientos financieros, efectuadas por los\narrendatarios.\n\nResultados financieros y de tenencia del efectivo y sus equivalentes"}, {"num": 659, "texto": "Una entidad presentará en el cuerpo del estado una conciliación que revele las\ndiferencias entre:\na) los flujos de efectivo y sus equivalentes procedentes de las actividades\noperativas, de inversión y financiación; y\nb) la variación total del efectivo y sus equivalentes."}, {"num": 660, "texto": "Las diferencias entre los importes de los incisos a) y b) del párrafo anterior provienen\nde resultados financieros y de tenencia del efectivo y sus equivalentes, tales como:\na) intereses y diferencias de cambio, que modifican el importe del efectivo y sus\nequivalentes en términos nominales; y\nb) el resultado por exposición al cambio en el poder adquisitivo de la moneda, en\nla medida que modifique al importe del efectivo y sus equivalentes en términos\nreales."}, {"num": 661, "texto": "Una entidad podrá no presentar la conciliación requerida por el párrafo 659 e incluir\nlos resultados financieros y por tenencia del efectivo y sus equivalentes dentro de las\nactividades operativas:\na) si es pequeña o mediana; o\nb) siempre que prepare sus estados contables aplicando la sección “Expresión\nde los estados contables en moneda de cierre en un contexto de inflación\n(ajuste por inflación de los estados contables)” [ver los párrafos 176 a 200].\n\nIntereses, dividendos e impuesto a las ganancias"}, {"num": 662, "texto": "Una entidad presentará por separado, y clasificará individualmente de un período a\notro:\na) los flujos de efectivo y sus equivalentes por intereses y dividendos recibidos y\npagados; y\nb) los flujos de efectivo y sus equivalentes por el impuesto a las ganancias\npagado."}, {"num": 663, "texto": "Una entidad podrá asignar los flujos de efectivo y sus equivalentes por intereses y\ndividendos pagados a:\na) las actividades operativas; o\nb) las actividades de financiación."}, {"num": 664, "texto": "Una entidad podrá asignar los flujos de efectivo y sus equivalentes por intereses y\ndividendos cobrados a:\na) las actividades operativas; o\nb) las actividades de inversión."}, {"num": 665, "texto": "Una entidad asignará los flujos de efectivo y sus equivalentes por pagos relacionados\ncon el impuesto a las ganancias a las actividades operativas, excepto que pueda\nasociarlos específicamente a actividades de inversión o de financiación.\n\nPresentación simplificada en un contexto de inflación"}, {"num": 666, "texto": "Cuando prepare sus estados contables según lo establecido en la sección\n“Expresión de los estados contables en moneda de cierre en un contexto de inflación\n(ajuste por inflación de los estados contables)” [ver los párrafos 176 a 200], cualquier\nentidad –excepto que se trate de una entidad sin fines de lucro o de una cooperativa,\ncomprendidas en la clasificación del inciso c) del párrafo 5– podrá presentar el estado\nde flujos de efectivo en forma sintética informando los siguientes importes:\na) El saldo inicial del efectivo y sus equivalentes.\nb) El saldo final del efectivo y sus equivalentes.\nc) La variación neta del efectivo y sus equivalentes.\nd) El total de las variaciones netas del efectivo y sus equivalentes originadas en:\n(i) las actividades operativas;\n(ii) las actividades inversión; y\n(iii) las de actividades de financiación."}, {"num": 667, "texto": "Cuando opte por la simplificación referida en el párrafo anterior, una entidad:\na) no efectuará la conciliación requerida en el párrafo 659;\nb) mantendrá los resultados financieros y de tenencia del efectivo y sus\nequivalentes dentro del total de actividades operativas; y\nc) revelará en notas que la utilización de esta simplificación limita la información\ndisponible:\n(i) para el análisis e interpretación de los estados contables; y\n(ii) sobre la capacidad de la entidad para generar fondos y la forma en que\nlos aplica."}, {"num": 668, "texto": "[Eliminado]."}, {"num": 669, "texto": "[Eliminado]."}, {"num": 670, "texto": "[Eliminado].\n\nCompensación de partidas"}, {"num": 671, "texto": "Una entidad podrá exponer por su importe neto, los cobros y pagos en efectivo y sus\nequivalentes:\na) efectuados por cuenta de terceros; o\nb) procedentes de partidas de rotación rápida, montos significativos y\nvencimientos en lapsos breves.\n\nRevelación en notas"}, {"num": 672, "texto": "Una entidad expondrá en notas:\na) la conciliación entre el efectivo y sus equivalentes considerados en el estado\nde flujo de efectivo y las partidas correspondientes informadas en el estado de\nsituación patrimonial; y\nb) las transacciones de inversión y financiación significativas que no generan\nflujos de efectivo en el período actual; entre ellas:\n(i) Compra de bienes de uso asumiendo pasivos o celebrando contratos de\narrendamiento financiero.\n(ii) Conversión de deuda en patrimonio neto.\n(iii) Aportes en especie.\n\nCUESTIONES REFERIDAS A LA REVELACIÓN MEDIANTE NOTAS\n\nDefiniciones"}]}, {"id": "c6s4", "nombre": "Notas a los EECC", "parrafos": [{"num": 673, "texto": "A los fines referidos en esta sección, una entidad deberá considerar las siguientes\ndefiniciones:\n\nControl: Tal como se define en el apartado “Definiciones” del Capítulo 7 de esta\nResolución Técnica.\n\nControl conjunto: Tal como se define en el apartado “Definiciones” del Capítulo\n8 de esta Resolución Técnica.\n\nFamiliares cercanos de una persona humana: Son aquellos familiares cuyo\nvínculo permite prever que influyen sobre la persona en cuestión o serán influidos\npor ella, en sus relaciones con la entidad. Tales familiares incluyen a:\na) Su cónyuge, conviviente e hijos.\nb) Los hijos del cónyuge o del conviviente de la persona en cuestión.\nc) Los familiares a cargo de la persona en cuestión o familiares a cargo de\nsu cónyuge o conviviente.\n\nInfluencia significativa: Tal como se define en el apartado “Definiciones” del\nCapítulo 8 de esta Resolución Técnica.\n\nNotas a los estados contables: Es la información que es parte de un conjunto\ncompleto de estados contables y contiene todos los datos que, siendo\nnecesarios para la adecuada comprensión de la situación patrimonial, la\nevolución patrimonial, los resultados de la entidad y los flujos de efectivo, no\nse encuentran expuestos en el cuerpo de dichos estados contables.\n\nParte relacionada: Una parte se considera relacionada con otra parte si una de\nellas tiene:\na) control o control conjunto sobre la otra; o\nb) influencia significativa sobre ella al tomar sus decisiones operativas y\nfinancieras.\n\nTransacción entre partes relacionadas: Es toda transferencia de recursos,\nservicios u obligaciones entre partes relacionadas, con independencia de que\nse realice en forma onerosa o gratuita. Tales transacciones tienen, entre otras,\nlas siguientes características:\na) Pueden incidir sobre la situación patrimonial y los resultados de la\nentidad.\nb) Pueden comprender transacciones que otras partes sin relación no\nemprenderían.\nc) Pueden efectuarse por importes diferentes de los que se realizarían entre\npartes independientes, en condiciones de mercado (incluyendo\noperaciones a título gratuito).\n\nEstructura"}, {"num": 674, "texto": "Una entidad revelará en las notas:\na) las bases para la preparación de los estados contables;\nb) la categoría de la entidad, según lo dispuesto en los párrafos 6 y 7 de esta\nResolución Técnica;\nc) las políticas contables significativas utilizadas,\nd) los criterios empleados:\n(i) en virtud de la categoría informada según el inciso b) de este párrafo; o\n(ii) por aplicación de lo establecido en el párrafo 83, respecto de cualquier\nevaluación de costo o esfuerzo desproporcionado;\ne) la información requerida por esta u otras normas contables que no haya sido\nincluida en otro lugar de los estados contables; y\nf) cualquier otra información que no se presente en ninguno de los estados\ncontables, pero que sea relevante para entender cualquiera de ellos."}, {"num": 675, "texto": "Esta u otras normas contables establecen diversos requerimientos sobe\ninformación a revelar. Además de la información a revelar requerida por esas normas,\nuna entidad deberá incluir en las notas a los estados contables la información\nrequerida en esta sección."}, {"num": 676, "texto": "Una entidad presentará las notas, en la medida en que sea practicable, de una forma\nsistemática. Para la determinación de una forma sistemática, la entidad considerará\nel efecto sobre la comprensibilidad y comparabilidad de sus estados contables. Una\nentidad hará referencia cruzada de cada partida incluida en el cuerpo de los estados\ncontables con cualquier información relacionada en las notas."}, {"num": 677, "texto": "Una entidad expondrá la información requerida en notas en:\na) el encabezamiento de los estados contables; o\nb) en una sección específica que contenga información cualitativa y cuantitativa\n(por ejemplo, presentada mediante tablas o anexos)."}, {"num": 678, "texto": "En el encabezamiento, una entidad identificará los estados contables que se\nexponen e incluirá una síntesis de los datos relativos a dicha entidad."}, {"num": 679, "texto": "Una entidad:\na) expondrá el resto de las notas mediante descripciones o cuadros anexos,\nsegún cuál sea el modo de expresión más adecuada en cada caso; y\nb) no revelará información cuyo contenido carezca de significación, incluso si\nfuera requerida por esta Resolución Técnica u otras normas contables.\n\nInformación a revelar\n\nIdentificación de los estados contables"}, {"num": 680, "texto": "Una entidad identificará la fecha de cierre y el período comprendido por los estados\ncontables que se exponen. Esto implica identificar si se trata de un ejercicio, un\nperíodo intermedio o un período irregular.\n\nIdentificación de la unidad de medida en la que están presentados los estados contables"}, {"num": 681, "texto": "Respecto de la unidad de medida, una entidad informará sobre:\na) la moneda en la que se expresan los estados contables;\nb) los criterios utilizados para cumplir con lo requerido por la sección “Expresión\nde los estados contables en moneda de cierre en un contexto de inflación\n(ajuste por inflación de los estados contables)” [ver los párrafos 176 a 200]; y\nc) la identificación del índice general de precios utilizado, así como la variación\nporcentual de dicho índice durante el periodo actual y el comparativo.\n\nIdentificación de la entidad"}, {"num": 682, "texto": "La entidad informará claramente, cada vez que sea necesario:\na) su denominación, domicilio legal, forma legal y duración;\nb) su registro en cualquier organismo de control que corresponda;\nc) la identificación de su controladora, indicando denominación y domicilio legal,\nsi la entidad fuera una entidad controlada;\nd) los cambios en la composición de la entidad durante los períodos expuestos,\nsea que se trate de variaciones en las entidades que lo conforman o de aquellos\ncuyos estados contables se consolidan; y\ne) una descripción de sus actividades y de las actividades de las entidades en las\ncuales participa, en la medida en que resulten significativas.\n\nUso del juicio profesional. Causas de incertidumbre en las estimaciones"}, {"num": 683, "texto": "Una entidad revelará, junto con sus políticas contables significativas u otras notas,\nlos juicios profesionales que ha realizado la dirección en el proceso de aplicación de\nlas políticas contables de la entidad y que tienen el efecto más significativo sobre\nlos importes reconocidos en los estados contables."}, {"num": 684, "texto": "Una entidad revelará información sobre los supuestos realizados acerca del futuro y\notras causas de incertidumbre en la estimación a la fecha de los estados contables,\nque tengan un riesgo significativo de ocasionar ajustes significativos en el valor\ncontable de los activos o pasivos dentro del período contable siguiente. Con respecto\na esos activos y pasivos, las notas incluirán detalles de:\na) su naturaleza; y\nb) su valor contable a la fecha de los estados contables.\n\nCapital de la entidad"}, {"num": 685, "texto": "Una entidad expondrá:\na) el monto y composición del capital; y\nb) la cantidad y características de las distintas clases de acciones en circulación\ny en cartera, si correspondiera."}, {"num": 686, "texto": "Una entidad cuyo capital está representado por acciones revelará, por cada clase de\nacciones:\na) el número de acciones autorizadas;\nb) el número de acciones suscriptas e integradas totalmente, así como las\nsuscriptas, pero aún no integradas en su totalidad;\nc) el valor nominal de las acciones;\nd) una conciliación entre el número de acciones en circulación al principio y al final\ndel período;\ne) los derechos, privilegios y restricciones correspondientes a cada clase de\nacciones, incluyendo las restricciones sobre la distribución de dividendos y el\nreembolso del capital;\nf) las acciones de la entidad que estén en su poder o bien en el de sus\nsubsidiarias o asociadas; y\ng) las acciones cuya emisión está reservada como consecuencia de la existencia\nde opciones o contratos para la venta de acciones, incluyendo las condiciones\ne importes correspondientes."}, {"num": 687, "texto": "Una entidad cuyo capital no está representado por acciones, según corresponda a su\nforma societaria o fiduciaria, revelará información equivalente a la requerida en el\npárrafo anterior, mostrando los cambios producidos durante el período en cada una\nde las categorías que componen el patrimonio neto y los derechos, privilegios y\nrestricciones asociados a cada una.\n\nReservas"}, {"num": 688, "texto": "Una entidad describirá la naturaleza y destino de cada reserva que figure en el\npatrimonio neto.\n\nInformación a revelar acerca de circunstancias que afecten la comparabilidad"}, {"num": 689, "texto": "Una entidad informará sobre cambios en su composición o en sus actividades o sobre\notros hechos que, ocurridos durante los períodos comprendidos por los estados\ncontables, afecten o podrían afectar la comparabilidad:\na) de los estados contables actuales con los de ejercicios previos; o\nb) de los estados contables actuales con los que presentará en ejercicios\nfuturos."}, {"num": 690, "texto": "Cuando se presenten estados contables anuales y en su preparación se modifiquen\nsustancialmente las estimaciones efectuadas para la preparación de estados\ncontables correspondientes a períodos intermedios del mismo ejercicio, una entidad\ninformará la naturaleza de dichos cambios y su efecto sobre las mediciones de los\nprincipales rubros afectados.\n\nComposición o evolución de los rubros"}, {"num": 691, "texto": "Una entidad informará:\na) la composición de los rubros significativos que no incluyó en el cuerpo de los\nestados contables; y\nb) la evolución de los rubros de mayor significación y permanencia, tales como\nbienes de uso y activos intangibles.\n\nBienes de disponibilidad restringida. Gravámenes sobre activos"}, {"num": 692, "texto": "Una entidad informará sobre:\na) los activos que no podrán ser enajenados hasta tanto se cancelen\ndeterminados pasivos, indicándose su valor contable y el de los pasivos\nrelacionados;\nb) lo activos cuya disponibilidad está limitada por razones legales, contractuales\no situaciones de hecho, con indicación de su valor y de las causas que motivan\nsu indisponibilidad.\nRestricciones para la distribución de ganancias"}, {"num": 693, "texto": "Una entidad informará cualquier restricción (legal, reglamentaria, contractual o de otra\níndole) a la distribución de ganancias, sus razones y los momentos en que ellas\ncesarán.\n\nModificación a la información de ejercicios anteriores"}, {"num": 694, "texto": "Cuando no esté explicitado en los estados contables, una entidad deberá incluir en\nlas notas:\na) la causa de la “Modificación de la información de ejercicios anteriores” [ver los\npárrafos 66 a 70]; y\nb) la cuantificación de su efecto sobre los componentes de los estados contables\n(rubros del patrimonio, de resultados del período, causas de variación del\nefectivo) al inicio o al cierre del ejercicio anterior, los que correspondieren."}, {"num": 695, "texto": "Una entidad referirá la nota en la que se describa la modificación aludida en el párrafo\nanterior en los rubros modificados de los estados contables."}, {"num": 696, "texto": "Cuando la modificación se origine en un cambio en las normas contables aplicadas,\nla entidad describirá el método anterior, el nuevo y la justificación del cambio."}, {"num": 697, "texto": "Cuando como consecuencia de un cambio de norma o de criterio contable o de la\ncorrección de un error de ejercicios anteriores corresponda modificar la información\nde ejercicios anteriores, pero resulte impracticable la determinación del efecto\nacumulado sobre los saldos al inicio de uno o más períodos anteriores y, por lo tanto,\nno pueda adecuarse la información a exponer en forma comparativa, la entidad\nexpondrá como información complementaria:\na) el motivo que hace impracticable la adecuación de las cifras comparativas,\nuna descripción de cómo y desde cuándo se ha aplicado el cambio en la\npolítica contable o se ha realizado la corrección del error; y\nb) la naturaleza de las modificaciones que tendrían que haberse realizado en caso\nde no existir la impracticabilidad.\n\nAspectos formales"}, {"num": 698, "texto": "Una entidad:\na) asignará un título a cada nota, que permita identificar claramente su contenido;\ny\nb) expondrá cada nota en el mismo orden que aparecen las referencias a cada\nuna de ellas en los correspondientes rubros o partidas de los estados\ncontables.\n\nInformación a revelar sobre partes relacionadas\n\nRequerimientos generales"}, {"num": 699, "texto": "Si realizó transacciones con partes relacionadas, una entidad revelará:\na) la naturaleza de las relaciones existentes con las partes involucradas;\nb) los tipos de transacciones efectuadas;\nc) las condiciones pactadas;\nd) las políticas contables adoptadas para dichas transacciones; y\ne) la información necesaria para una adecuada comprensión de sus estados\ncontables; por ejemplo:\n(i) los importes de las transacciones, informando los totales por cada tipo de\ntransacción; y\n(ii) los saldos originados por tales transacciones."}, {"num": 700, "texto": "Una entidad revelará la información referida en el párrafo anterior, en forma separada,\npara cada una de las siguientes categorías de partes relacionadas:\na) controladora;\nb) entidades que tienen control conjunto sobre la entidad que informa;\nc) controladas;\nd) entidades en las que tiene influencia significativa, o que tienen influencia\nsignificativa sobre la entidad que informa;\ne) negocios conjuntos en los que la entidad es un socio;\nf) personal clave de la dirección; y\ng) otras partes relacionadas."}, {"num": 701, "texto": "Cuando sea controladora, una entidad revelará la identidad de las entidades\ncontroladas, incluso si no existieran transacciones entre ellas."}, {"num": 702, "texto": "Una entidad podrá agrupar las partidas de contenido similar, a menos que su\ndesagregación sea necesaria para comprender los efectos de las operaciones entre\npartes relacionadas."}, {"num": 703, "texto": "En sus estados contables consolidados, una entidad:\na) No tendrá obligación de revelar información sobre las transacciones entre\nentidades del grupo que se consolidan, ya que en ellos se da información de la\ncontroladora y las subsidiarias como si fueran una sola entidad y dicha\nrevelación se realiza en los estados contables separados de la controladora.\nb) Revelará en forma separada información sobre las transacciones con\nentidades que no se consolidan, ya sea, por ejemplo, porque son controladas\nno significativas, o son entidades en las que se tiene influencia significativa que\nse miden y presentan por el método del valor patrimonial proporcional."}, {"num": 704, "texto": "Una entidad aplicará las disposiciones comprendidas en el párrafo 699 únicamente\ncuando las partes relacionadas sean las siguientes:\na) entidades que, directa o indirectamente, controlen (en forma exclusiva o\nconjunta) o sean controladas por o estén bajo el control común de la entidad\nque informa. Esto incluye a:\n(i) las entidades controladoras;\n(ii) a las controladas; y\n(iii) las que posean una controladora común (aunque no estén vinculadas\nentre sí por participaciones en el capital);\nb) entidades en las que se tiene influencia significativa, o que tienen influencia\nsignificativa sobre la entidad que informa;\nc) individuos que posean, directa o indirectamente, una participación en el poder\nde voto de la entidad que informa que les permita ejercer influencia significativa;\nd) miembros clave de la dirección, tales como personas con autoridad o\nresponsabilidad en la planificación, el gerenciamiento y el control de las\nactividades de la entidad que informa. Normalmente comprende integrantes del\nórgano de dirección y primera línea gerencial;\ne) los familiares cercanos de las personas mencionadas en los incisos c) y d);\nf) entidades de las que participan personas descriptas en los incisos c), d) o e)\ncon capacidad sustancial sobre el poder de voto, directo o indirecto, o sobre\nlos cuales tales personas puedan ejercer influencia significativa. Esto incluye:\n(i) entidades propiedad de miembros del órgano de dirección o accionistas\nimportantes de la entidad que informa; y\n(ii) entidades que tienen en común con la entidad que informa algún miembro\nclave en su dirección;\ng) negocio conjunto del cual la entidad es socia;\nh) fondos constituidos para planes de retiro en beneficio de los empleados de la\nentidad o cualquier parte relacionada."}, {"num": 705, "texto": "Una entidad considerará cada posible relación de vinculación poniendo énfasis en la\nsustancia de la relación y no meramente en su forma legal."}, {"num": 706, "texto": "Una entidad no considerará partes relacionadas, a los fines indicados en el párrafo\n699 a:\na) dos entidades que tienen un directivo común, solo por el hecho de tenerlo;\naunque evaluará la posibilidad y probabilidad de que dicho directivo pueda\ninfluir en las políticas de ambas entidades por sus relaciones mutuas;\nb) los proveedores de financiación, sindicatos de trabajadores, empresas de\nservicios públicos u organismos gubernamentales por sus relaciones normales\ncon la entidad (aunque puedan condicionar la libertad de acción de la entidad\no participar en su proceso de toma de decisiones); y\nc) cualquier cliente, proveedor, concesionario, distribuidor o agente exclusivo con\nlos que la entidad realiza un significativo volumen de transacciones (aunque se\ngeneren situaciones de dependencia económica debido a tales relaciones).\n\nExención a los requerimientos generales"}, {"num": 707, "texto": "Una entidad está exenta de los requerimientos de información a revelar de los\npárrafos 699 a 706 en relación con transacciones y saldos pendientes, incluyendo\ncompromisos, con:\na) un gobierno que tiene control, o control conjunto o influencia significativa sobre\nla entidad que informa; y\nb) otra entidad que sea una parte relacionada, porque el mismo gobierno tiene\ncontrol, o control conjunto o influencia significativa tanto sobre la entidad que\ninforma como sobre la otra entidad."}, {"num": 708, "texto": "Si una entidad aplica la exención del párrafo anterior, revelará la siguiente información\nsobre las transacciones y saldos pendientes relacionados a los que hace referencia\nese párrafo:\na) el nombre del gobierno y la naturaleza de su relación con la entidad que informa\n(es decir control, control conjunto o influencia significativa);\nb) la siguiente información con suficiente detalle para permitir a los usuarios de\nlos estados contables de la entidad interpretar el efecto de las transacciones\ncon partes relacionadas en sus estados contables:\n(i) la naturaleza e importe de cada transacción individualmente significativa; y\n(ii) para otras transacciones que sean significativas de forma colectiva, pero no\nindividual, una indicación cualitativa o cuantitativa de su alcance.\n\nPRESENTACIÓN DE ESTADOS CONTABLES DE ENTIDADES SIN FINES DE LUCRO\n\nIntroducción a la presente sección"}]}, {"id": "c6s5", "nombre": "Entidades Sin Fines de Lucro", "parrafos": [{"num": 709, "texto": "En esta sección se describen los requerimientos particulares para la presentación de\nlos estados contables de entidades sin fines de lucro, excepto las entidades\ncooperativas."}, {"num": 710, "texto": "A los fines de presentar sus estados contables, una entidad sin fines de lucro deberá\naplicar las disposiciones establecidas en:\na) esta sección;\nb) los demás requerimientos incluidos en el presente capítulo, en todo lo que\nresulte aplicable; y\nc) otras normas contables que se refieran a cuestiones de presentación y\nrevelación."}, {"num": 711, "texto": "Una entidad sin fines de lucro aplicará lo dispuesto en el párrafo 56 con el objeto de\nadaptar la presentación y denominación de elementos a las particularidades de su\nactividad."}, {"num": 712, "texto": "En caso de conflicto entre las disposiciones referidas en el párrafo anterior, una\nentidad sin fines de lucro dará prevalencia a lo establecido en esta sección."}, {"num": 713, "texto": "Una entidad cooperativa no estará alcanzada por las disposiciones de esta sección."}, {"num": 714, "texto": "Una entidad que constituye un organismo autárquico, del sector gubernamental,\npodrá presentar estados contables de acuerdo con las disposiciones de esta\nsección.\n\nDefinición"}, {"num": 715, "texto": "A los fines de presentar los estados contables regulados por esta sección, una\nentidad deberá considerar la siguiente definición:\n\nEntidades sin fines de lucro: Comprende asociaciones civiles sin fines de lucro y\nlas fundaciones y organismos paraestatales creados por ley para el cumplimiento\nde fines especiales. Incluye, entre otras, a:\na) Instituciones deportivas (clubes, asociaciones de clubes, federaciones,\netc.).\nb) Mutuales.\nc) Cámaras empresariales.\nd) Entidades no lucrativas de salud, como las obras sociales.\ne) Clubes sociales.\nf) Sindicatos.\ng) Asociaciones de profesionales.\nh) Entidades educativas y universidades.\ni) Asociaciones vecinales.\nj) Organizaciones religiosas.\nk) Entidades benéficas.\nl) Consejos profesionales.\n\nConjunto completo de estados contables de una entidad sin fines de lucro"}, {"num": 716, "texto": "Una entidad sin fines de lucro presentará un conjunto completo de estados\ncontables, que comprende:\na) el estado de situación patrimonial o balance general;\nb) el estado de recursos y gastos;\nc) el estado de evolución del patrimonio neto;\nd) el estado de flujos de efectivo; y\ne) las notas, con un resumen de las políticas contables significativas y cualquier\notra información explicativa que permita al conjunto completo satisfacer los\nrequisitos de la información contenida en los estados contables.\n\nCuestiones referidas al estado de situación patrimonial de entidades sin fines de lucro"}, {"num": 717, "texto": "A los fines de presentar el estado de situación patrimonial, una entidad sin fines de\nlucro aplicará los requerimientos de esta sección y los establecidos en la sección\n“Cuestiones referidas al estado de situación patrimonial” [ver los párrafos 607 a 627].\n\nCréditos"}, {"num": 718, "texto": "Una entidad incluirá dentro de este rubro, entre otros, los compromisos de subsidios\nasumidos por autoridades nacionales, provinciales o municipales."}, {"num": 719, "texto": "Una entidad discriminará los créditos originados de forma tal que se pueda identificar\nsu naturaleza. Por ejemplo:\na) Cuentas por cobrar a asociados o entidades afiliadas:\n(i) por servicios prestados; y\n(ii) cuotas sociales, financiaciones de aranceles especiales, derechos de\ningreso, promesas de donación y compromisos de aportes.\nb) Cuentas por cobrar a terceros por servicios prestados y derechos a recibir\nprestaciones de servicio:\n(i) vinculadas con actividades principales de la entidad; y\n(ii) otras actividades (tales como publicidad, subsidios, donaciones, depósitos\nen garantía, etc.)."}, {"num": 720, "texto": "A continuación, se proporcionan ejemplos de discriminación de créditos según su\nnaturaleza, que resultan de aplicar el párrafo anterior:\na) Una entidad que es un club deportivo reconocerá créditos como los siguientes:\n(i) Cuotas sociales por cobrar.\n(ii) Cuotas por cobrar por facilidades.\n(iii) Aranceles a percibir.\nb) Una entidad que es una institución educativa reconocerá créditos como los\nsiguientes:\n(i) Deudores por servicios de enseñanza.\n(ii) Matrículas por cobrar.\n(iii) Cuotas por cobrar de biblioteca.\nc) Una entidad que es un sindicato reconocerá créditos como los siguientes:\n(i) Aportes de empresas a cobrar.\n(ii) Cuotas mensuales por cobrar.\n(iii) Subsidios pendientes de recepción.\nd) Una entidad que presta servicios vinculados con la salud reconocerá créditos\ncomo los siguientes\n(i) Cuentas por cobrar a pacientes.\n(ii) Deudores por cuotas de medicina mensual.\n(iii) Prestaciones a obras sociales a percibir.\n\nBienes para consumo o comercialización"}, {"num": 721, "texto": "Una entidad incluirá dentro de este rubro:\na) los bienes destinados a la venta o al consumo en el curso habitual de su\nactividad; y\nb) los anticipos a proveedores por compra de tales activos."}, {"num": 722, "texto": "Una entidad deberá distinguir entre existencias:\na) de bienes para consumo interno; y\nb) de bienes de cambio para su comercialización."}, {"num": 723, "texto": "Como ejemplos de los requerimientos establecidos en los párrafos 721 y 722, se citan\nlos siguientes:\na) Una entidad que es un club deportivo reconocerá dentro de este rubro, entre\notros:\n(i) Como bienes destinados al consumo:"}, {"num": 724, "texto": "Una entidad reconocerá dentro de este rubro fondos recibidos para aplicar a destinos\nespecíficos, tales como la prestación de un servicio o suministro de bienes a\nasociados, a ciertos sectores de la comunidad o la comunidad en general. Incluye:\na) Aportes obtenidos directamente.\nb) Importes netos generados mediante la realización de actividades con fines\nrecaudatorios específicos."}, {"num": 725, "texto": "Una entidad reconocerá estos fondos como recursos cuando cumplan el fin o ejecute\nel gasto para el que fueron recaudados.\n\nCuestiones referidas al estado de recursos y gastos"}, {"num": 726, "texto": "A los fines de presentar el estado de recursos y gastos, una entidad sin fines de lucro\naplicará los requerimientos de esta sección y de la sección “Cuestiones referidas al\nestado de resultados” [ver los párrafos 628 a 641].\n\nDefiniciones"}, {"num": 727, "texto": "A los fines de presentar el estado contable referido en esta sección, una entidad\ndeberá considerar las siguientes definiciones:\n\nRecursos para fines generales: Son los destinados a cumplir con los objetivos\nde la entidad. Incluyen:\na) Cuotas sociales o afiliaciones, aportadas periódicamente por los\nasociados o afiliados.\nb) Aportes por única vez, como las cuotas de ingreso.\n\nRecursos para fines específicos: Son contribuciones constituidas por:\na) Aportes recibidos y destinados a fines determinados, tales como aranceles\no derechos particulares para actividades específicas.\nb) Recursos generados por actividades con fines recaudatorios específicos,\noriginalmente destinados a la prestación de un servicio o a erogaciones\n\nrelacionados con bienes a suministrar o servicios a prestar a asociados o\nsectores de la comunidad.\n\nEstos recursos se reconocerán como tales en el período durante el cual se\nprestan los servicios o efectúan las erogaciones que motivaron su obtención.\n\nRecursos diversos: Son recursos originados por actividades tales como las\nsiguientes:\na) Venta de bienes en desuso.\nb) Recuperación de gastos.\nc) Aportes publicitarios recibidos.\nd) Subsidios y donaciones efectuados por terceros.\n\nGastos específicos de sectores: Son erogaciones que pueden atribuirse\ndirectamente a los distintos sectores o departamentos de la entidad. La división\nentre sectores podrá realizarse en función de criterios tales como los siguientes:\na) Ubicación geográfica de las sedes.\nb) Actividades (deportivas, sociales, culturales, benéficas).\nc) Tipo de función o servicio.\nd) Usuario.\n\nGastos generales de administración: Son erogaciones originadas en las\nactividades de una entidad, pero no constituyen gastos de sectores\ndeterminados.\n\nSuperávit (déficit) del ejercicio: Es el resultado neto obtenido mediante la\nsumatoria del conjunto de recursos y gastos.\n\nCuestiones relacionadas con la estructura"}, {"num": 728, "texto": "Una entidad presentará por separado:\na) En el cuerpo del estado, los recursos generados por las actividades ordinarias\ny los gastos necesarios para su obtención.\nb) En notas, cuando realice más de una actividad, los recursos generados por\ncada actividad y los gastos necesarios para su obtención."}, {"num": 729, "texto": "Una entidad presentará por separado las siguientes partidas:\na) recursos generales;\nb) recursos para fines específicos;\nc) recursos diversos;\nd) gastos generales y de administración;\ne) gastos específicos de sectores;\nf) depreciaciones de bienes de uso y amortizaciones de activos intangibles;\ng) otros gastos;\nh) resultados financieros y de tenencia.\n\nCuestiones referidas al estado de evolución del patrimonio neto de entidades sin fines de\nlucro"}, {"num": 730, "texto": "A los fines de presentar el estado de evolución del patrimonio neto, una entidad sin\nfines de lucro aplicará los requerimientos de esta sección y de la sección “Cuestiones\nreferidas al estado evolución del patrimonio neto” [ver los párrafos 642 a 648].\n\nDefiniciones"}, {"num": 731, "texto": "A los fines de presentar el estado contable referido en esta sección, una entidad\ndeberá considerar las siguientes definiciones:\n\nCapital: Comprende:\na) los aportes específicos efectuados por los asociados, transferidos una vez\nutilizados de acuerdo con el destino previsto; y\nb) los superávits producidos y asignados al capital.\n\nDichos componentes integran el capital incluso si, en caso de liquidación y por\ndisposición de los estatutos o la legislación, corresponde transferir o legar el\nremanente que se obtenga luego de realizar el activo y cancelar el pasivo:\na) a una entidad sin fines de lucro; o\nb) al patrimonio estatal.\n\nAportes de fondos para fines específicos: Son fondos originados en aportes de\nasociados con fines específicos y destinados al incremento del patrimonio social\ny no a la prestación de servicios o el desarrollo de actividades recurrentes, tales\ncomo los fondos para la construcción de obras edilicias. Estos fondos:\na) Deben incluirse en el patrimonio neto si sus destinatarios no son terceros\ndistintos de la entidad.\nb) Deben transferirse al capital en la medida de su utilización para el destino\nprevisto.\n\nSuperávits (déficits) no asignados: Son superávits (déficits) sin asignación\nespecífica.\n\nSuperávits (déficits) diferidos: Se componen de partidas equivalentes al\nresultado diferido.\n\nCuestiones relacionadas con la estructura"}, {"num": 732, "texto": "Dentro de los superávits (déficits) acumulados, una entidad expondrá en forma\ndiferenciada:\na) el superávit (déficit) del período acumulado; y\nb) el superávit (déficit) diferido acumulado."}, {"num": 733, "texto": "Cuando una entidad carece de capital o aportes similares, debido a su naturaleza\njurídica, podrá exponer únicamente un estado combinado del estado de evolución del\npatrimonio neto y del estado de recursos y gastos.\n\nCuestiones referidas al estado de flujos de efectivo de entidades sin fines de lucro"}, {"num": 734, "texto": "A los fines de presentar el estado de flujos de efectivo, una entidad sin fines de lucro\naplicará los requerimientos de esta sección y de la sección “Cuestiones referidas al\nestado de flujos de efectivo” [ver los párrafos 649 a 672]."}, {"num": 735, "texto": "Una entidad sin fines de lucro presentará siempre el estado de flujos de efectivo por\nel método directo. A estos fines:\na) adaptará, de acuerdo con las particularidades de su actividad, los términos\nenunciados en el párrafo 653; y\nb) aplicará, de corresponder, las simplificaciones previstas en el párrafo 666.\n\nCuestiones referidas a la revelación mediante notas de entidades sin fines de lucro"}, {"num": 736, "texto": "A los fines de presentar sus notas, una entidad sin fines de lucro aplicará los\nrequerimientos de esta sección y de la sección “Cuestiones referidas a la revelación\nmediante notas” [ver los párrafos 673 a 708]."}, {"num": 737, "texto": "Una entidad podrá exponer en notas el presupuesto económico y, si existiera, el\npresupuesto financiero, que:\na) hayan sido aprobados por el máximo órgano societario con facultad para\ndecidir; y\nb) contengan las proyecciones referidas al ejercicio al cual se refieren los estados\ncontables."}, {"num": 738, "texto": "Una entidad expresará las cifras de los presupuestos referidos en el párrafo anterior\nen una moneda tal que permita compararlos con los importes del estado de recursos\ny gastos y/o el estado de flujos de efectivo correspondientes al ejercicio por el cual\npresenta información."}, {"num": 739, "texto": "Una entidad podrá exponer en notas el presupuesto económico y, si existiera, el\npresupuesto financiero, que:\na) hayan sido aprobados por el máximo órgano societario con facultad para\ndecidir; y\nb) contengan las proyecciones referidas al ejercicio venidero."}, {"num": 740, "texto": "Una entidad, informará:\na) los recursos y gastos vinculados con cada sector o departamento; y\nb) las bases utilizadas para la definición de sectores o departamentos.\n\nPRESENTACIÓN DE ESTADOS CONTABLES CORRESPONDIENTES A PERÍODOS\nINTERMEDIOS\n\nDefiniciones"}]}, {"id": "c6s6", "nombre": "Períodos Intermedios", "parrafos": [{"num": 741, "texto": "A los fines de presentar los estados contables de períodos intermedios, una entidad\ndeberá considerar las siguientes definiciones:\n\nConjunto de estados contables completos, correspondiente a períodos\nintermedios: Es un conjunto de estados contables cuyo contenido equivale al\nde los estados contables de un ejercicio completo.\n\nConjunto de estados contables condensados, correspondiente a períodos\nintermedios: Es un conjunto de estados contables cuyas notas incluyen solo la\ninformación que resulta significativa para interpretar los cambios en la situación\npatrimonial, la evolución patrimonial y la evolución financiera desde la fecha\nde cierre del ejercicio anual más reciente y la fecha de cierre del período\nintermedio sobre el cual se informa.\n\nEstados contables correspondientes a períodos intermedios: Es un conjunto de\nestados contables, completo o condensado, referido a un período más pequeño\nque el ejercicio de la entidad.\n\nCriterios a emplear en los estados contables de períodos intermedios"}, {"num": 742, "texto": "Una entidad aplicará a los fines de preparar estados contables de períodos\nintermedios:\na) las mismas políticas contables que utiliza para sus estados contables\nanuales;\nb) las normas referidas a “Modificación de la información de ejercicios anteriores”\n[ver los párrafos 66 a 70]; y\nc) los criterios para evaluar la significación de una desviación establecidos en el\npárrafo 82."}, {"num": 743, "texto": "Como consecuencia de lo indicado en el párrafo anterior:\na) Los ingresos que se perciben de forma estacional, cíclica u ocasionalmente, y\nlos costos que no se incurren de forma uniforme, en ambos casos dentro de un\nmismo ejercicio contable anual, no deben anticiparse ni diferirse, si tal\ntratamiento no fuera apropiado para la presentación de la información\nfinanciera al final del ejercicio contable anual.\nb) El gasto por impuesto sobre las ganancias se reconocerá, en cada período\nintermedio, en función a la tasa impositiva promedio que se espera para el\nejercicio contable anual.\n\nPresentación de estados contables de períodos intermedios"}, {"num": 744, "texto": "Cuando deba presentar estados contables de períodos intermedios, una entidad\npodrá presentar:\na) estados contables completos de períodos intermedios; o\nb) estados contables condensados de períodos intermedios."}, {"num": 745, "texto": "Una entidad identificará en el título de los estados contables la alternativa de\npresentación seleccionada, de acuerdo con lo establecido en el párrafo anterior. Por\nejemplo, deberá indicar si se trata de un estado de situación patrimonial de período\nintermedio condensado."}, {"num": 746, "texto": "Una entidad aplicará las normas sobre “Información comparativa” contenidas en el\ninciso b), del párrafo 59."}, {"num": 747, "texto": "Una entidad que optó por estados contables de períodos intermedios condensados\ndeberá presentar:\na) un estado de situación patrimonial condensado de período intermedio;\nb) un estado de resultados condensado de período intermedio;\nc) un estado de evolución del patrimonio neto condensado de período intermedio;\nd) un estado de flujos de efectivo condensado de período intermedio; y\ne) notas (seleccionadas) a los estados contables condensados de período\nintermedio."}, {"num": 748, "texto": "En las notas a los estados contables de períodos intermedios condensados, una\nentidad incluirá información que sea significativa para la comprensión de los cambios\nocurridos en la situación patrimonial, los resultados y la evolución financiera\ndesde la fecha de sus estados contables anuales más recientes y la fecha de cierre\ndel período intermedio sobre el cual se informa."}, {"num": 749, "texto": "Para cumplimentar lo indicado en el párrafo anterior, una entidad deberá revelar en\nlas notas explicativas, como mínimo, la siguiente información:\na) Declaración de que no se han modificado las políticas y métodos utilizados en\nlos estados contables anuales más recientes, o descripción de la naturaleza\ny efecto de tales cambios.\nb) Explicación de la estacionalidad o carácter cíclico de las operaciones del\nperíodo intermedio.\nc) Naturaleza y monto de cuestiones que afectaron a los estados contables\nintermedios y que son inusuales por su naturaleza, tamaño o incidencia.\nd) Naturaleza y monto de los cambios ocurridos en las estimaciones informadas\nen períodos intermedios anteriores del ejercicio en curso o en ejercicios\nanteriores, si esos cambios tienen efecto significativo en el período intermedio\nactual-\ne) Movimientos (emisiones, recompras, reembolsos) de valores representativos\nde la deuda o el capital de la entidad.\nf) Dividendos pagados por cada tipo de acciones emitida.\ng) Hechos posteriores al cierre del período intermedio que, siendo de carácter\nsignificativo, no correspondió darle efecto en los estados contables del\nperíodo intermedio.\nh) El efecto de cambios en la composición de la entidad durante el período\nintermedio, tales como combinaciones de negocios, adquisición o venta de\ninversiones a largo plazo en otras entidades, restructuraciones, y operaciones\ndiscontinuadas"}, {"num": 750, "texto": "Una entidad presentará un conjunto de estados contables condensados bajo la\npresunción de que cualquier lector tendrá acceso a sus estados contables anuales\nmás recientes, con el fin de interpretar los cambios ocurridos en la situación\npatrimonial, la evolución patrimonial y la evolución financiera desde la fecha de\nsus estados contables anuales más recientes.\n\nRESOLUCIÓN TÉCNICA N°54\n\nTÍTULO II\n\n~NORMAS PARTICULARES~\n\nCAPÍTULO 7\n\nPROCEDIMIENTOS CONTABLES DE APLICACIÓN PARTICULAR\n\nINTRODUCCIÓN AL PRESENTE CAPÍTULO"}]}]}]}, {"id": "t2", "nombre": "TÍTULO II — NORMAS PARTICULARES", "capitulos": [{"id": "cap7", "num": 7, "nombre": "Procedimientos Particulares", "icono": "🔄", "secciones": [{"id": "c7s1", "nombre": "Conversión de EECC", "parrafos": [{"num": 752, "texto": "El objetivo de esta sección es establecer las reglas para la conversión de estados\ncontables de una entidad del exterior, a los fines de proceder a:\na) su consolidación;\nb) la aplicación del método del valor patrimonial proporcional; o\nc) su contabilización de conformidad con el párrafo 817.\n\nDefiniciones"}, {"num": 753, "texto": "A los fines de aplicar esta sección, una entidad deberá considerar las siguientes\ndefiniciones:\nDiferencias de conversión: Son las puestas en evidencia por la conversión de\nestados contables de una entidad del exterior.\n\nEntidad del exterior: Entidad que:\na) utiliza una moneda extranjera para la preparación de sus estados\ncontables; y\nb) es controlada, controlada conjuntamente o asociada de la entidad emisora\nde los estados contables.\n\nTipo de cambio: Relación de equivalencia entre la moneda argentina y una\nmoneda extranjera. Para convertir estados contables se utilizará el tipo de\ncambio efectivamente aplicable para la remesa de dividendos por parte de la\nentidad del exterior. Cuando se pierde la posibilidad de negociar estas dos\nmonedas en condiciones de mercado, una entidad aplicará lo dispuesto en el\npárrafo 128.\n\nTipo de cambio de contado: Tipo de cambio utilizado en transacciones de\nentrega inmediata.\n\nConversión de estados contables: requerimientos generales"}, {"num": 754, "texto": "Para convertir los elementos de la situación patrimonial, la evolución patrimonial,\ny la evolución financiera de una entidad del exterior cuya moneda no es la\ncorrespondiente a un contexto de inflación, una entidad utilizará el siguiente\nprocedimiento:\na) A la fecha de los estados contables y a la fecha de la información\ncomparativa, convertirá los activos y pasivos usando el tipo de cambio de cierre\ncorrespondiente a cada una de esas fechas.\nb) Convertirá los elementos correspondientes a la evolución patrimonial y la\nevolución financiera, usando el tipo de cambio de la fecha de cada\ntransacción, excepto que opte por la solución práctica del párrafo siguiente.\nc) Reconocerá todas las diferencias de conversión resultantes en una partida\nde resultados diferidos del período."}, {"num": 755, "texto": "Al aplicar el inciso b) del párrafo anterior, una entidad podrá utilizar, como solución\npráctica, un tipo de cambio aproximado (por ejemplo, un promedio), representativo de\nlos tipos existentes durante el período en el que ocurrieron las transacciones que\ndieron lugar a los elementos a convertir, siempre que las fluctuaciones en dichos tipos\nno hayan sido significativas durante el referido período (de acuerdo con lo establecido\nen el párrafo 82)."}, {"num": 756, "texto": "Una entidad puede tener cuentas por cobrar o pagar en moneda extranjera a una\nentidad del exterior. Cuando la liquidación de tales saldos no esté prevista ni sea\nprobable en el futuro previsible, representan, en esencia, una parte de la inversión\nmantenida en la entidad del exterior. Por lo tanto, una entidad tratará a las\ndiferencias de cambio puestas en evidencia por la conversión de tales saldos de\nacuerdo con lo dispuesto en el inciso c) del párrafo 754 y en el párrafo 758."}, {"num": 757, "texto": "Una entidad tratará la llave de negocio y los ajustes del valor razonable que recaen\nsobre la medición contable de activos y pasivos, surgidos de aplicar las disposiciones\nde la sección “Combinación de negocios” [ver los párrafos 958 a 989], como parte\nintegrante de los activos y pasivos de la entidad del exterior. Por lo tanto:\na) los expresará en la moneda utilizada por la entidad del exterior; y\nb) los convertirá al tipo de cambio de cierre, de acuerdo con los párrafos 754 y"}, {"num": 758, "texto": "Una entidad:\na) acumulará en un componente independiente de los resultados diferidos las\ndiferencias de conversión resultantes de aplicar la presente sección;\nb) mantendrá las diferencias de conversión identificadas en el inciso inmediato\nanterior en los resultados diferidos acumulados hasta que se produzca su\nventa o el reembolso total o parcial del capital; y\nc) transferirá tales diferencias al resultado del ejercicio cuando tengan lugar los\nhechos referidos en el inciso anterior."}, {"num": 759, "texto": "Las diferencias de conversión referidas en el párrafo anterior proceden de:\na) la conversión de los elementos de la evolución patrimonial a los tipos de\ncambio correspondientes a las fechas de las transacciones, o el considerado\nen el párrafo 755, y la de los elementos de los activos y pasivos al tipo de\ncambio de cierre; y\nb) la conversión de los activos menos los pasivos al inicio a un tipo de cambio de\ncierre diferente del tipo utilizado en el cierre anterior.\n\nExistencia de un contexto de inflación en el país de la entidad del exterior"}, {"num": 760, "texto": "Cuando la moneda de la entidad del exterior se corresponda con la de una economía\nen un contexto de inflación, una entidad:\na) ajustará los estados contables de la entidad del exterior, aplicando lo\ndispuesto en la sección “Expresión de los estados contables en moneda de\ncierre en un contexto de inflación (ajuste por inflación de los estados\ncontables)” [ver los párrafos 176 a 200]; y\nb) convertirá los estados contables de la entidad del exterior considerando lo\ndescripto en el párrafo 761."}, {"num": 761, "texto": "Tratamiento de la diferencia de conversión"}, {"num": 762, "texto": "Una entidad aplicará la sección “Contabilización del Impuesto a las Ganancias” [ver\nlos párrafos 571 a 600]a las diferencias temporarias que surjan por la aplicación de\nlos requerimientos de la presente sección.\n\nRevelación en notas"}, {"num": 763, "texto": "Una entidad revelará en notas:\na) La forma mediante la cual identificó la moneda de los estados contables que\nfueron objeto de conversión.\nb) Los tipos cambio utilizados para la conversión.\nc) Las diferencias de conversión reconocidas como resultados diferidos y\npresentadas dentro de los resultados diferidos acumulados.\nd) Las diferencias de conversión transferidas desde resultados diferidos a\nresultados del período, como consecuencia de la venta de la entidad del\nexterior o el reembolso total o parcial del capital.\ne) La partida en la cual se presentan las diferencias de conversión transferidas\ndesde resultados diferidos, indicadas en el párrafo anterior.\nf) Cualquier entidad del exterior que emplee la moneda de un país en un\ncontexto de inflación.\ng) Si existieran restricciones para el acceso al mercado oficial de cambios, y\nciertos activos o pasivos en moneda extranjera tuvieran que liquidarse o\ncancelarse utilizando mercados alternativos válidos para tal fin, pero a valores\nsustancialmente distintos a los importes informados en los estados contables,\no esto efectivamente haya ocurrido después de la fecha de los estados\ncontables y antes de la aprobación de los estados contables, una entidad\nrevelará tales circunstancias en las notas a los estados contables.\n\nPREPARACIÓN DE ESTADOS CONTABLES CONSOLIDADOS\n\nObjetivo"}]}, {"id": "c7s2", "nombre": "EECC Consolidados", "parrafos": [{"num": 764, "texto": "De acuerdo con el párrafo 33 de esta Resolución Técnica, una entidad presentará\nestados contables consolidados cuando controle a una o más entidades. El\nobjetivo de esta sección consiste en:\na) prescribir las normas sobre la presentación de estados contables\nconsolidados y la evaluación de control (sobre otra entidad);\nb) describir el concepto y contenido mínimo de los estados contables\nconsolidados; y\nc) establecer el procedimiento de consolidación.\n\nAclaración (texto no integrante de la presente Resolución Técnica)\n\nLos requerimientos de esta sección se basan en el “enfoque de la entidad”, según el cual:\na) Los estados contables consolidados presentan la información del grupo desde su\npropia perspectiva, y no desde la perspectiva de los propietarios de la entidad\ncontroladora;\nb) El patrimonio neto consolidado es la diferencia entre el activo total, y el pasivo total\ndel grupo económico.\nc) Tanto el patrimonio neto como el resultado del período deben informar, de manera\ndesagregada, las porciones atribuibles a:\n(i) los propietarios de la controladora; y\n(ii) los titulares de las participaciones no controladoras en subsidiarias.\n\nPor el contrario, la RT 21, adoptaba el “enfoque del propietario” (RT 21, apartado 2.2.). De\nacuerdo con este enfoque:\na) Los estados contables consolidados presentan el patrimonio neto sobre al que\ntienen derecho los propietarios de la controladora.\nb) Las participaciones no controladoras en subsidiarias se presentan en el estado de\nsituación patrimonial en un capítulo separado entre el pasivo total y el patrimonio\nneto.\nc) En el estado de resultados, se muestra como una partida separada la porción que le\ncorresponde a las participaciones no controladoras del resultado del período, a fin de\narribar al resultado atribuible a los propietarios de la controladora.\n\nDefiniciones"}, {"num": 765, "texto": "A los fines en esta sección, una entidad considerará las siguientes definiciones:\nActividades relevantes: Actividades de la participada que afectan de forma\nsignificativa sus rendimientos. Ejemplos de actividades que, dependiendo de las\ncircunstancias, pueden ser relevantes, incluyen, pero no se limitan, a:\na) Venta y compra de bienes o servicios.\nb) Gestión de activos financieros durante su vida (incluyendo cuando haya\nincumplimiento).\nc) Selección, adquisición o disposición de activos.\nd) Investigación y desarrollo de nuevos productos o procesos.\ne) Determinación de una estructura de financiación u obtención de\nfinanciación.\n\nControl (sobre otra entidad): Una entidad tiene control sobre una participada:\na) cuando detenta el poder para dirigir las actividades relevantes de la\nsegunda; y\nb) utiliza su poder sobre la participada como principal, y no como mandataria\nde otra parte.\n\nControlada (subsidiaria): Entidad controlada, directa o indirectamente, por una\nentidad controladora.\n\nDecisiones sobre actividades relevantes: Incluyen, pero no se limitan, a:\na) El establecimiento de decisiones de capital y operativas de la participada,\nincluyendo presupuestos.\nb) El nombramiento y remuneración del personal clave de la dirección de la\nparticipada o suministradores de servicios de gerenciamiento y rescisión\nde sus servicios o empleo.\n\nEntidad: Entidad que tiene la obligación de, u opta por, presentar estados\ncontables. No es relevante su personalidad jurídica (por ejemplo, un fideicomiso\nno cuenta con personalidad jurídica, pero se considera entidad para fines\ncontables).\n\nEntidad controladora: Entidad emisora de estados contables que controla a\notras entidades, de forma directa o indirecta.\n\nGrupo económico: Conjunto de entidades constituido por la entidad controladora\ny todas sus controladas (subsidiarias).\n\nParticipada: Cualquier otra entidad, con o sin personalidad jurídica, con la cual\nla entidad mantiene un vínculo –basado en derechos de voto o de otro tipo–, y\ncomo consecuencia del cual la entidad debe evaluar si tiene control sobre ella.\n\nParticipación no controladora: Parte del patrimonio neto de una entidad\ncontrolada no atribuible, directa o indirectamente, a la entidad controladora.\n\nNormas sobre presentación de estados contables consolidados y evaluación de control\n\nRequerimiento de presentación de estados contables consolidados"}, {"num": 766, "texto": "Excepto por lo permitido o requerido en los párrafos 767 y 769, una entidad\ncontroladora presentará estados contables consolidados que comprendan a todas\nsus controladas (subsidiarias), sea que las controle de forma directa o a través de\notras controladas (subsidiarias)."}, {"num": 767, "texto": "Una entidad controladora no necesita presentar estados contables consolidados si\ncumple todas las condiciones siguientes:\na) la controladora es también controlada y ningún accionista manifestó\ndisconformidad respecto de la decisión de no presentar estados contables\nconsolidados;\nb) no hace oferta pública de sus valores negociables ni se encuentra en proceso\nde hacerlo; y\nc) su última controladora (o alguna de las controladoras intermedias) elaboran\nestados contables consolidados que cumplan con esta Resolución Técnica,\notras normas contables o la Resolución Técnica 26."}, {"num": 768, "texto": "Cuando aplique lo dispuesto en el párrafo anterior, una entidad controladora\ncontabilizará las participaciones que controla de forma directa de acuerdo con lo\ndispuesto en la sección “Participaciones en subsidiarias, asociadas y negocios\nconjuntos societarios” [ver los párrafos 824 a 871]."}, {"num": 769, "texto": "Una entidad controladora no consolidará a una subsidiaria que adquirió y mantiene\nexclusivamente con la intención de venderla o disponer de ella dentro de un año\ndesde su fecha de adquisición. En este caso, una entidad controladora:\na) Contabilizará esta participación de acuerdo con los requerimientos de la\nsección “Inversiones Financieras” [ver los párrafos 212 a 235].\nb) Podrá extender el plazo de un año si existieran circunstancias, fuera de su\ncontrol, que probablemente demanden mayor tiempo para la venta o\ndisposición (por ejemplo, debido a la existencia de obligaciones contractuales\ncon partes no relacionadas o disposiciones legales o reglamentarias).\n\nDefinición de control (sobre otra entidad)"}, {"num": 770, "texto": "Una entidad evaluará si tiene control sobre una participada independientemente de:\na) la naturaleza del vínculo entre ellas; o\nb) la naturaleza jurídica de tal participada."}, {"num": 771, "texto": "Con el fin de aplicar la definición de control incluida en el párrafo 765, se considerará\nque una entidad controla a una participada si, y solo si:\na) tiene poder sobre la participada [ver los párrafos 772 a 779];\nb) está expuesta, o tiene derecho, a rendimientos variables procedentes del\nvínculo que mantiene con la participada [ver los párrafos 780 a781]; y\nc) cuenta con la capacidad de utilizar su poder sobre la participada para incidir\nsobre sus propios rendimientos (es decir, los rendimientos de la entidad\nemisora de estados contables) [ver los párrafos 782 a 783].\n\nAplicación de la definición de control\n\nPoder"}, {"num": 772, "texto": "Una entidad tiene poder sobre una participada cuando posee derechos que le otorgan\nla capacidad actual de dirigir las actividades relevantes de la segunda; es decir, las\nactividades que afectan de forma significativa a los rendimientos de la participada."}, {"num": 773, "texto": "Al evaluar si tiene poder sobre una participada, una entidad deberá considerar:\na) las actividades relevantes de la participada;\nb) la forma en que se toman las decisiones sobre las actividades a las que se\nrefiere el inciso inmediato anterior; y\nc) los derechos de la entidad y las demás partes sobre la participada."}, {"num": 774, "texto": "Una entidad considerará que las actividades financieras u operativas relevantes\nincluyen, entre otras y dependiendo de las circunstancias:\na) La venta y compra de bienes o servicios.\nb) La gestión de activos financieros.\nc) La selección, adquisición o disposición de activos.\nd) La investigación y desarrollo de nuevos productos o procesos.\ne) La determinación de una estructura de financiación u obtención de financiación."}, {"num": 775, "texto": "Una entidad considerará que las decisiones sobre actividades relevantes incluyen,\nentre otras y dependiendo de las circunstancias:\na) El establecimiento de decisiones de capital y operativas de la participada,\nincluyendo presupuestos.\nb) El nombramiento y remuneración del personal clave de la dirección de la\nparticipada o de los proveedores de servicios y rescisión de los servicios o\nempleo."}, {"num": 776, "texto": "Al evaluar si tiene poder sobre una participada, una entidad también considerará lo\nsiguiente:\na) Una entidad con capacidad presente para dirigir las actividades relevantes\ntiene poder incluso si su derecho a dirigir todavía no se ha ejercido. La\nevidencia de que una entidad ha estado dirigiendo actividades relevantes\npuede ayudar a determinar si tiene poder, pero no es, en sí misma, concluyente\npara determinar si la entidad tiene poder sobre una participada.\nb) Si dos o más entidades ostentan, cada una, derechos existentes que le\nconceden la capacidad unilateral para dirigir actividades relevantes diferentes,\nla entidad que tiene la capacidad presente para dirigir las actividades que\nafectan de forma más significativa a los rendimientos de la participada tiene el\npoder sobre la participada."}, {"num": 777, "texto": "Cuando mantenga derechos de voto y tales derechos sean un factor decisivo para\ndeterminar quién controla a la participada, una entidad presumirá que tiene poder\nsobre la participada cuando posea, directa o indirectamente a través de subsidiarias,\nla mayoría de los derechos de voto en la participada. Otros elementos, tales como\nderechos contractuales, podrían poner en evidencia que la mayoría de derecho de\nvoto es insuficiente para detentar el poder sobre la participada. Por su parte, algunas\nparticipadas son diseñadas de manera que los derechos de voto o similares no son\nel factor decisivo para decidir quién controla a esa entidad (por ejemplo, los\nfideicomisos). Esto no impedirá determinar quién detenta el poder sobre ese tipo de\nparticipadas, en el caso de que alguien efectivamente lo haga."}, {"num": 778, "texto": "Una entidad puede tener poder incluso si mantiene menos de una mayoría de los\nderechos de voto de una participada; por ejemplo, a través de:\na) un acuerdo contractual entre la entidad y otros titulares de derechos de voto;\nb) otros acuerdos contractuales;\nc) derechos de voto potenciales; o\nd) una combinación de lo referido en los incisos a) a c) del presente párrafo."}, {"num": 779, "texto": "Al evaluar el control, una entidad considerará sus derechos de voto potenciales, así\ncomo los derechos de voto potenciales mantenidos por otras partes, para determinar\nsi tiene poder. Los derechos de voto potenciales son derechos actualmente\nejercitables para obtener derechos de voto de una participada, tales como los que\nsurgen de instrumentos u opciones convertibles, incluyendo contratos a término. Esos\nderechos de voto potenciales se consideran solo si el titular del derecho tiene la\ncapacidad práctica de ejercerlo.\n\nRendimientos variables de una entidad procedentes de su vínculo con otra\nentidad"}, {"num": 780, "texto": "Una entidad está expuesta, o tiene derechos, a rendimientos variables procedentes\nde su vínculo con otra entidad cuando sus propios rendimientos tienen el potencial de\nvariar como consecuencia de tal vínculo. La variación de los rendimientos de la\nentidad puede ser positiva, negativa o ambas."}, {"num": 781, "texto": "Los rendimientos referidos en el párrafo anterior incluyen:\na) Dividendos, otras distribuciones de beneficios económicos procedentes de la\nparticipada (por ejemplo, intereses de títulos de deuda emitidos por la\nparticipada) y cambios en el valor de la inversión de la entidad en la participada.\nb) Remuneración por administrar los activos o pasivos de una participada,\ncomisiones y exposición a pérdidas por proporcionar apoyo de crédito o\nliquidez, participaciones residuales en los activos y pasivos de la participada\nen la liquidación de ésta, beneficios fiscales, y acceso a liquidez futura que una\nentidad tenga por su vínculo con una participada.\nc) Rendimientos que no están disponibles para otros tenedores de\nparticipaciones. Por ejemplo, una entidad puede utilizar sus activos en\ncombinación con los activos de la participada, tales como una combinación de\nfunciones operativas para conseguir economías de escala, ahorro de costos,\nfuentes de productos escasos, obtener acceso a conocimientos del propietario\no limitando algunas operaciones o activos, para mejorar el valor de otros\nactivos de la entidad.\n\nForma en la que una entidad utiliza su poder en una participada"}, {"num": 782, "texto": "Cuando evalúa si controla a una participada, una entidad determinará si:\na) es principal (mandante); o\nb) está actuando como una mandataria de otra entidad."}, {"num": 783, "texto": "Una mandataria es una parte dedicada principalmente a actuar en nombre y a\nbeneficio de otra parte (el principal) y, por lo tanto, no controla a la participada cuando\nejerce su autoridad para tomar decisiones. Por ejemplo, en una entidad que es un\nfideicomiso, un fiduciario puede actuar en carácter de mandataria de un fiduciante\nque, a través del contrato, le establece las actividades relevantes que debe realizar.\n\nEstados contables consolidados: concepto y contenido mínimo"}, {"num": 784, "texto": "Los estados contables consolidados presentan la información contable de un grupo\neconómico como si se tratara de una sola entidad económica."}, {"num": 785, "texto": "Un conjunto completo de estados contables consolidados comprende:\na) el estado de situación patrimonial consolidado o balance general consolidado;\nb) el estado de resultados consolidado;\nc) el estado de evolución del patrimonio neto consolidado;\nd) el estado de flujos de efectivo consolidado; y\ne) las notas a los estados contables consolidados, con un resumen de las\npolíticas contables significativas y cualquier otra información explicativa que\npermita al conjunto completo satisfacer los requisitos de la información\ncontenida en los estados contables.\n\nProcedimiento de consolidación\n\nRequerimientos generales para la preparación de estados contables consolidados"}, {"num": 786, "texto": "Al preparar los estados contables consolidados, una entidad:\na) Combinará los estados contables de la entidad controladora y sus\ncontroladas, línea por línea, agregando las partidas de activos, pasivos,\npatrimonio, resultados, resultados diferidos y flujos de efectivo de contenido\nsimilar desde el punto de vista del grupo económico.\nb) Eliminará el importe en libros de la inversión que la entidad controladora\nmantiene en cada entidad controlada junto con la porción del patrimonio neto\nperteneciente a la entidad controladora en cada una de las controladas.\nc) Eliminará en su totalidad, según lo establecido en los párrafos 796 a 799:\n(i) los saldos de activos y pasivos intragrupo; y\n(ii) las transacciones intragrupo que dan lugar a ingresos, gastos, otras\nvariaciones patrimoniales y flujos de efectivo.\nd) Medirá las participaciones no controladoras en los activos netos de las\ncontroladas consolidadas por:\n(i) el importe de esas participaciones no controladoras en la fecha de la\ncombinación inicial, calculado, de corresponder, de acuerdo con el párrafo\n977;\n(ii) la porción de la participación no controladora en los cambios ocurridos en\nel patrimonio neto de la controlada desde la fecha de la combinación;\nmás\n(iii) los cambios en la participación mantenida por los no controladores que no\ndan lugar a una pérdida de control.\ne) Presentará las participaciones no controladoras en los activos netos de las\ncontroladas consolidadas de acuerdo con lo establecido en el párrafo 805."}, {"num": 787, "texto": "Una entidad:\na) determinará las proporciones del resultado y de los cambios en el patrimonio\nneto distribuidos a los propietarios de la entidad controladora y a las\nparticipaciones no controladoras sobre la base de las participaciones\nexistentes en la propiedad; y\nb) no reflejará el posible ejercicio o conversión de las opciones o instrumentos\nconvertibles.\n\nPautas mínimas para la preparación de estados contables consolidados"}, {"num": 788, "texto": "Los estados contables de todas las entidades que integran el grupo económico\ndeben ser preparados a la fecha de los estados contables consolidados (es decir,\na la fecha de cierre de la entidad controladora) y abarcando igual período, excepto en\nel ejercicio en el cual comience o cese la consolidación de una subsidiaria. No es\nnecesario que se trate de estados contables de cierre de ejercicio, pudiendo\nprepararse estados contables especiales para la consolidación."}, {"num": 789, "texto": "Una entidad podrá optar por utilizar los estados contables de una controlada cuya\nfecha de cierre difiera de la fecha de los estados contables de la controladora\ncuando:\na) la diferencia entre ambos cierres no supere los tres meses; y\nb) la fecha de cierre de los estados contables de la entidad controlada sea\nanterior a la de la entidad controladora."}, {"num": 790, "texto": "Cuando se proceda de acuerdo con lo establecido en el párrafo anterior, una entidad\nregistrará ajustes para reflejar los efectos de:\na) las transacciones o eventos significativos para la entidad controladora; y\nb) las transacciones entre las entidades controladora y controlada, que\nmodificaron el patrimonio neto de la controlada, y tuvieron lugar entre las fechas\nde los estados contables de la entidad controlada y de la controladora."}, {"num": 791, "texto": "Con el propósito de computar los ajustes mencionados en el párrafo anterior, una\nentidad controladora podrá basarse en informes económico financieros emitidos por\nla dirección de la controlada para el control de su gestión. En ningún caso podrán\nrealizarse registros basados en cifras presupuestadas o pronosticadas."}, {"num": 792, "texto": "Una entidad expresará los estados contables consolidados en moneda de poder\nadquisitivo de la fecha a la cual corresponden (moneda de cierre), de acuerdo con lo\nestablecido en la sección “Expresión de los estados contables en moneda de cierre\nen un contexto de inflación (ajuste por inflación de los estados contables)” [ver los\npárrafos 176 a 200]."}, {"num": 793, "texto": "Una entidad convertirá, previamente a la consolidación, los estados contables de\nuna controlada (subsidiaria) que sea una entidad del exterior de acuerdo con el\npárrafo753, a la moneda argentina mediante la aplicación de las normas de la\nsección “Conversión de estados contables” [ver los párrafos 752 al 763]."}, {"num": 794, "texto": "En los estados contables de todas las entidades del grupo económico deberán\naplicarse las mismas normas contables para:\na) reconocer y medir los elementos sobre los que se informa en los estados\ncontables;\nb) convertir las mediciones contenidas en los estados contables, originalmente\nexpresadas en alguna moneda extranjera;\nc) agrupar y presentar las partidas, de acuerdo con lo establecido en el capítulo\n6 “Normas generales sobre presentación de estados contables”."}, {"num": 795, "texto": "Si las normas contables aplicadas por las controladas (subsidiarias) difieren de las\nutilizadas por la entidad controladora, ésta realizará los ajustes pertinentes con el fin\nde uniformarlas con las propias.\n\nTransacciones y saldos intragrupo"}, {"num": 796, "texto": "Una entidad eliminará:\na) los saldos de activos y pasivos intragrupo;\nb) las transacciones intragrupo que dan lugar a ingresos, gastos, otras\nvariaciones patrimoniales y flujos de efectivo; y\nc) las ganancias y pérdidas procedentes de transacciones intragrupo que estén\nreconocidas en activos, tales como bienes de cambio o bienes de uso, excepto\ncuando los activos que los contengan se encuentren medidos a valores\ncorrientes determinados sobre la base de operaciones realizadas con terceros\ny de acuerdo con las pautas establecidas en esta Resolución Técnica u otras\nnormas contables."}, {"num": 797, "texto": "Si las pérdidas intragrupo reflejan una desvalorización de los activos, una entidad\ndeberá reconocer dicha desvalorización en los estados contables consolidados\nsegún lo establecido en esta Resolución Técnica u otras normas contables."}, {"num": 798, "texto": "Una entidad aplicará la sección “Contabilización del Impuesto a las Ganancias” [ver\nlos párrafos 571 a 600]a las diferencias temporarias que surjan de la eliminación de\nlas ganancias y pérdidas procedentes de transacciones intragrupo."}, {"num": 799, "texto": "La posesión de acciones de una entidad del grupo económico por parte de otra\nentidad del mismo grupo es, en esencia, equivalente a la tenencia de acciones\npropias en cartera del grupo, considerado como una única entidad controladora. Por\nlo tanto, una entidad controladora expondrá el costo de tales acciones como una\nreducción del patrimonio neto consolidado.\n\nAdquisición y disposición de subsidiarias"}, {"num": 800, "texto": "Una entidad controladora incluirá los ingresos y los gastos de una entidad controlada,\nen los estados contables consolidados, desde la fecha de su adquisición hasta la\nfecha en la que la entidad controladora deje de controlar a la entidad controlada.\n\nAclaración (texto no integrante de la presente Resolución Técnica):\n\nEn el párrafo 801, expresiones tales como \"la entidad dará de baja en cuenta\" o \"la entidad\nreconocerá\" hacen referencia a las operaciones descriptas en la sección \"Preparación de\nestados contables: operaciones fundamentales\" [ver los párrafos 34 a 70]. Las referidas\nexpresiones no establecen la obligación de llevar \"registros diarios\" o similares y deben ser\nentendidas bajo un estricto sentido contable."}, {"num": 801, "texto": "Cuando cese de controlar a otra entidad, una entidad controladora en sus estados\ncontables consolidados:\na) dará de baja en cuentas:\n(i) a los activos (incluyendo la llave de negocios) y pasivos de la controlada\n(subsidiaria) por su importe en libros en la fecha en que se perdió el\ncontrol; y\n(ii) al importe en libros de todas las participaciones no controladoras en la\nanterior controlada (subsidiaria) en la fecha en que se pierda el control\n(incluyendo todos los componentes de resultados diferidos atribuibles a\nlas mismas);\nb) reconocerá:\n(i) el valor razonable de la contraprestación recibida, si la hubiera, por la\ntransacción, suceso o circunstancias que dieran lugar a la pérdida de\ncontrol;\n(ii) cuando la transacción, suceso o circunstancia que dé lugar a la pérdida\nde control conlleve una distribución de acciones de la entidad controlada\na los propietarios en su condición de tales, dicha distribución; y\n(iii) la inversión conservada en la que anteriormente fue una entidad\ncontrolada por su valor razonable en la fecha en que se pierda el control;\nc) reclasificará al resultado del periodo o transferirá directamente a ganancias\nacumuladas si lo requieren esta Resolución Técnica u otras normas\ncontables, los importes reconocidos en resultados diferidos en relación con\nla controlada (subsidiaria); y\nd) reconocerá toda diferencia resultante como ganancia o pérdida en el resultado\ndel periodo atribuible a la entidad controladora."}, {"num": 802, "texto": "Además de lo establecido en el párrafo anterior, cuando deje de consolidar a otra\nentidad, una entidad controladora:\na) contabilizará todos los importes anteriormente reconocidos en resultados\ndiferidos en relación con esa entidad controlada sobre la misma base que se\nhabría requerido si la entidad controladora hubiera dispuesto los activos o\npasivos relacionados;\nb) reclasificará la ganancia o pérdida de patrimonio al resultado del periodo\n(como un ajuste por reclasificación), si una ganancia o pérdida anteriormente\nreconocida en resultados diferidos se hubiera reclasificado al resultado del\nperiodo por la disposición de los activos o pasivos relacionados; y\nc) transferirá el saldo por revaluación directamente a resultados no asignados\nsi un saldo por revaluación anteriormente reconocido en resultados\ndiferidos se hubiera transferido directamente a resultados no asignados por la\ndisposición del activo."}, {"num": 803, "texto": "Si deja de ser controladora y continúa manteniendo una inversión en la anterior\ncontrolada (subsidiaria), una entidad:\na) En la fecha en que deje de ser controladora, considerará el importe en libros\nde cualquier participación conservada, medida de acuerdo con el párrafo801,\ncomo su costo atribuido.\nb) Desde la fecha en que deje de ser controladora, contabilizará posteriormente\nesa participación, según corresponda, como:\n(i) un activo financiero, de acuerdo con la sección “Inversiones\nFinancieras” [ver los párrafos 212 a 235]];\n(ii) una asociada, en cuyo caso aplicará la sección “Participaciones en\nsubsidiarias, asociadas y negocios conjuntos societarios” [ver los\npárrafos 824 a 871]; o\n(iii) en una entidad controlada de forma conjunta, en cuyo caso aplicará la\nsección “Negocios conjuntos” [ver los párrafos 808 a 823].\n\nCambios en las participaciones no controladoras\n\nAclaración (texto no integrante de la presente Resolución Técnica):\n\nEn el párrafo 804, expresiones tales como \"la entidad ajustará\" o \"la entidad reconocerá\"\nhacen referencia a las operaciones descriptas en el apartado \"Preparación de estados\ncontables: operaciones fundamentales\" [ver los párrafos 34 a 70]. Las referidas\nexpresiones no establecen la obligación de realizar \"registros diarios\" que afecten a la\nparticipación no controladora y deben ser entendidas bajo un estricto sentido contable."}, {"num": 804, "texto": "Cuando cambie la proporción del patrimonio neto mantenida por las participaciones\nno controladoras como consecuencia de una transacción entre los propietarios, una\nentidad controladora:\na) ajustará, en sus estados contables consolidados, los importes en libros de\nlas participaciones controladoras y no controladoras para reflejar los cambios\nen sus participaciones relativas en la controlada; y\nb) reconocerá directamente en el
